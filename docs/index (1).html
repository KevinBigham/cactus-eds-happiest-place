  if(!cat.wsState){cat.wsState='normal';cat.wsTimer=2000+Math.random()*5000;cat.wsMsg='';cat.wsPhaseT=0;}
  cat.wsPhaseT=(cat.wsPhaseT||0)+delta;
  cat.wsTimer=(cat.wsTimer||3000)-delta;
  if(cat.wsTimer<=0&&!cat.following){
    var arch = cat.archetype || null;
    var wsStates = arch ? arch.wsStates : ['normal','normal','normal','speech','stare','vibrate','levitate','philosophize'];
    cat.wsState=wsStates[Math.floor(Math.random()*wsStates.length)];
    var speechPool = arch ? arch.speech : WS_CAT_SPEECH;
    cat.wsMsg=(cat.wsState==='speech'||cat.wsState==='philosophize'||cat.wsState==='stare')?speechPool[Math.floor(Math.random()*speechPool.length)]:'';
    cat.wsTimer=cat.wsState==='normal'?3500+Math.random()*5000:1500+Math.random()*2500;
    cat.wsPhaseT=0;
  }
}

function _getCommercialForWorld(worldKey) {
  var wc = EWR_STATE.commercialsShown[worldKey] || 0;
  if(wc >= 2) return null;
  var pool = COMMERCIALS.slice();
  var shown = EWR_STATE.commercialsShown._seen || [];
  for(var i=pool.length-1;i>=0;i--){ if(shown.indexOf(pool[i].id)>=0) pool.splice(i,1); }
  if(pool.length===0) return null;
  return pool[Math.floor(Math.random()*pool.length)];
}

function _triggerCommercial(scene, returnScene, worldKey, extraData) {
  var ad = _getCommercialForWorld(worldKey||'w1');
  if(!ad){ scene.scene.start(returnScene, extraData||{}); return; }
  EWR_STATE.commercialsShown[worldKey||'w1'] = (EWR_STATE.commercialsShown[worldKey||'w1']||0)+1;
  if(!EWR_STATE.commercialsShown._seen) EWR_STATE.commercialsShown._seen=[];
  EWR_STATE.commercialsShown._seen.push(ad.id);
  EWR_STATE.rastaCorp.commercialsSeen++;
  scene.scene.start('CommercialBreak',{adId:ad.id,returnScene:returnScene,returnData:extraData||{}});
}

var NUKE_POOL = [];
function spawnNuke() {

}
function updateNukes(delta) {
  for (var i=NUKE_POOL.length-1;i>=0;i--) {
    NUKE_POOL[i].t+=delta;
    if (NUKE_POOL[i].t>=NUKE_POOL[i].maxT) NUKE_POOL.splice(i,1);
  }
}
function drawNukes(g) {
  for (var i=0;i<NUKE_POOL.length;i++) {
    var n=NUKE_POOL[i];
    var prog=n.t/n.maxT; // 0..1
    // fade: in 0..0.15, hold 0.15..0.75, out 0.75..1
    var al=prog<0.15?(prog/0.15):prog<0.75?1.0:((1.0-prog)/0.25);
    al=Math.max(0,Math.min(1,al));
    var stemH=Math.min(160,prog*1200);
    var capR=Math.min(55,prog*400);
    var bx=n.x, by=496; // screen bottom anchor
    // rainbow cycling colors
    var hue1=(n.t*0.18)%360; var hue2=(n.t*0.18+60)%360; var hue3=(n.t*0.18+120)%360;
    var rc1=Phaser.Display.Color.HSLToColor(hue1/360,1,0.55).color;
    var rc2=Phaser.Display.Color.HSLToColor(hue2/360,1,0.65).color;
    var rc3=Phaser.Display.Color.HSLToColor(hue3/360,1,0.8).color;
    // glow base
    g.fillStyle(rc1, al*0.22);
    g.fillCircle(bx, by, capR*1.8);
    // stem
    g.fillStyle(rc1, al*0.85);
    g.fillRect(bx-8, by-stemH, 16, stemH);
    // stem inner
    g.fillStyle(rc3, al*0.6);
    g.fillRect(bx-4, by-stemH, 8, stemH);
    // cap ellipse
    g.fillStyle(rc2, al*0.9);
    g.fillEllipse(bx, by-stemH, capR*2, capR*0.85);
    // cap highlight
    g.fillStyle(rc3, al*0.55);

// ── SOUND MODULE (Web Audio API — zero assets) ───────────────────
var SOUND = (function(){
  var ctx = null;
  function _init(){
    if(!ctx) try { ctx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){}
  }
  function _tone(type, f, f2, dur, vol, delay){
    if(!ctx) return;
    try {
      var osc=ctx.createOscillator(), gn=ctx.createGain();
      osc.connect(gn); gn.connect(ctx.destination);
      osc.type=type||'square';
      var t=ctx.currentTime+(delay||0);
      osc.frequency.setValueAtTime(f, t);
      if(f2) osc.frequency.exponentialRampToValueAtTime(Math.max(1,f2), t+dur);
      gn.gain.setValueAtTime(vol||0.18, t);
      gn.gain.exponentialRampToValueAtTime(0.0001, t+dur);
      osc.start(t); osc.stop(t+dur);
    } catch(e){}
  }
  return {
    init: _init,
    punch:   function(){ _tone('square',320,80,0.08,0.22); },
    kick:    function(){ _tone('square',160,50,0.12,0.28); },
    jump:    function(){ _tone('sine',200,500,0.14,0.15); },
    hurt:    function(){ _tone('sawtooth',440,80,0.3,0.3); },
    pickup:  function(){ _tone('sine',330,330,0.07,0.18); _tone('sine',660,660,0.08,0.18,0.14); },
    death:   function(){ _tone('sawtooth',440,55,0.9,0.35); },
    bossHit: function(){ _tone('square',60,30,0.25,0.35); },
    victory: function(){
      var notes=[262,330,392,523,659];
      for(var i=0;i<notes.length;i++){
        (function(nn,dd){ setTimeout(function(){ _tone('square',nn,nn,0.12,0.2); },dd); })(notes[i],i*100);
      }
    },
    charge: function(){ _tone('square',200,260,0.05,0.10); },
    blast:  function(){ _tone('sawtooth',120,40,0.25,0.6); }
  };
})();

  g.lineStyle(1,0x333333,1); g.strokeRect(bx-12,by-28,24,14);
  // sign stick
  g.fillStyle(0x884400,1); g.fillRect(bx-1,by-14,2,8);
  // face
  g.fillStyle(0x333300,1); g.fillCircle(bx-3,by-10,2); g.fillCircle(bx+3,by-10,2);
};
WorldMapScene.prototype._t2p=function(tx,ty){
  return {x:this.offX+tx*this.tW+this.tW/2,y:this.offY+ty*this.tH+this.tH/2+36};
};
WorldMapScene.prototype._getTile=function(tx,ty){
  if(ty<0||ty>=W1_ROWS.length) return null;
  var row=W1_ROWS[ty]; if(tx<0||tx>=row.length) return null;
  var ch=row[tx]; return W1_TILES[ch]||null;
};
WorldMapScene.prototype._drawMap=function(){
  var g=this.mapG, self=this;
  g.clear();
  for(var row=0;row<W1_ROWS.length;row++){
    for(var col=0;col<W1_ROWS[row].length;col++){
      var ch=W1_ROWS[row][col], tile=W1_TILES[ch]; if(!tile) continue;
      var px=self.offX+col*self.tW, py=self.offY+row*self.tH+36;
      switch(tile.type){
        case 'grass':
          g.fillStyle(parseInt(AT.grass.slice(1),16),1); g.fillRect(px,py,self.tW,self.tH);
          g.fillStyle(parseInt(AT.grassDark.slice(1),16),0.25); g.fillRect(px,py,self.tW,4); break;
        case 'path':
          g.fillStyle(parseInt(AT.dirt.slice(1),16),1); g.fillRect(px,py,self.tW,self.tH); break;
        case 'mountain':
          g.fillStyle(parseInt(AT.uiBg.slice(1),16),1); g.fillRect(px,py,self.tW,self.tH);
          g.fillStyle(0x4a3060,0.8); g.fillTriangle(px,py+self.tH,px+self.tW/2,py+4,px+self.tW,py+self.tH); break;
        case 'tree':
          g.fillStyle(parseInt(AT.grass.slice(1),16),1); g.fillRect(px,py,self.tW,self.tH);
          g.fillStyle(parseInt(AT.outline.slice(1),16),1); g.fillCircle(px+self.tW/2,py+14,14);
          g.fillStyle(parseInt(AT.grassDark.slice(1),16),1); g.fillCircle(px+self.tW/2,py+14,12);
          g.fillStyle(parseInt(AT.dirtDark.slice(1),16),1); g.fillRect(px+self.tW/2-3,py+22,6,12); break;
        case 'level':
          g.fillStyle(parseInt(AT.grass.slice(1),16),1); g.fillRect(px,py,self.tW,self.tH);
          var beaten=EWR_STATE.levelsBeaten.indexOf(tile.id)>=0;
          // Gate: V level only shows if 1-3 beaten
          if(tile.id==='1-V'&&EWR_STATE.levelsBeaten.indexOf('1-3')<0) break;
          var voidStyle=(tile.id==='1-V');
          g.fillStyle(voidStyle?0x220044:(beaten?0x888888:parseInt(AT.uiGold.slice(1),16)),0.22); g.fillCircle(px+self.tW/2,py+self.tH/2,22);
          g.fillStyle(voidStyle?0xcc44ff:(beaten?0x888888:parseInt(AT.uiGold.slice(1),16)),1);    g.fillCircle(px+self.tW/2,py+self.tH/2,12);
          g.fillStyle(parseInt(AT.outline.slice(1),16),1); g.fillCircle(px+self.tW/2,py+self.tH/2,8);
          g.fillStyle(voidStyle?0xcc44ff:(beaten?0x888888:parseInt(AT.uiGold.slice(1),16)),1);    g.fillCircle(px+self.tW/2,py+self.tH/2,5);
          // Lock icon on gated tiles
          if(!beaten&&tile.id!=='1-V'&&self._getGateMsgW1(tile)){
            g.fillStyle(0x000000,0.55); g.fillCircle(px+self.tW/2,py+self.tH/2,14);
            g.fillStyle(0xff4444,0.9); g.fillRoundedRect(px+self.tW/2-6,py+self.tH/2-4,12,10,2);
            g.lineStyle(3,0xff4444,0.9); g.strokeCircle(px+self.tW/2,py+self.tH/2-8,5);
          }
          break;
        case 'portal':
          var w1Unlocked=['1-1','1-2','1-3','1-4','1-5'].every(function(id){return EWR_STATE.levelsBeaten.indexOf(id)>=0;});
          var portalPulse=0.5+Math.sin(self.catTime*0.004)*0.5;
          g.fillStyle(w1Unlocked?0x001a20:parseInt(AT.sky.slice(1),16),1); g.fillRect(px,py,self.tW,self.tH);
          if(w1Unlocked){
            // Big glowing unlocked portal
            g.fillStyle(0x00ffcc,portalPulse*0.35); g.fillCircle(px+self.tW/2,py+self.tH/2,28);
            g.fillStyle(0x00ffcc,0.7+portalPulse*0.3); g.fillCircle(px+self.tW/2,py+self.tH/2,16);
            g.fillStyle(0xffffff,0.9); g.fillCircle(px+self.tW/2,py+self.tH/2,9);
            g.fillStyle(0x00ffcc,1); g.fillCircle(px+self.tW/2,py+self.tH/2,5);
            // Arrow pointing left toward portal from outside
            g.fillStyle(0xffd700,portalPulse); g.fillTriangle(px-12,py+self.tH/2-7,px-12,py+self.tH/2+7,px-1,py+self.tH/2);
            g.fillStyle(0xffd700,portalPulse*0.7); g.fillTriangle(px-20,py+self.tH/2-5,px-20,py+self.tH/2+5,px-12,py+self.tH/2);
          } else {
            g.fillStyle(0x00ffcc,0.08); g.fillCircle(px+self.tW/2,py+self.tH/2,22);
            g.fillStyle(0x334455,1); g.fillCircle(px+self.tW/2,py+self.tH/2,12);
            g.fillStyle(parseInt(AT.outline.slice(1),16),1); g.fillCircle(px+self.tW/2,py+self.tH/2,8);
            g.fillStyle(0x445566,1); g.fillCircle(px+self.tW/2,py+self.tH/2,5);
          }
          break;
        case 'catspot':
        default:
          g.fillStyle(parseInt(AT.grass.slice(1),16),1); g.fillRect(px,py,self.tW,self.tH); break;
      }
      g.lineStyle(1,parseInt(AT.outline.slice(1),16),0.07); g.strokeRect(px,py,self.tW,self.tH);
    }
  }
  // Ed has seen things badge
  if(EWR_STATE.secretBeaten&&EWR_STATE.secretBeaten['1-V']){
    g.fillStyle(0xcc44ff,1); g.fillCircle(self.offX+8*self.tW+self.tW/2-8,self.offY+4*self.tH+36+self.tH/2-22,5);
  }
};
WorldMapScene.prototype._spawnCats=function(){
  var positions=[], ri;
  for(ri=0;ri<W1_ROWS.length;ri++)
    for(var ci=0;ci<W1_ROWS[ri].length;ci++)
      if(W1_ROWS[ri][ci]==='C') positions.push({x:ci,y:ri});
  var extra=0;
  for(ri=1;ri<W1_ROWS.length-1&&extra<6;ri++)
    for(var ci2=1;ci2<W1_ROWS[ri].length-1&&extra<6;ci2++)
      if((W1_ROWS[ri][ci2]==='G'||W1_ROWS[ri][ci2]==='P')&&Math.random()<0.22){positions.push({x:ci2,y:ri});extra++;}
  for(var i=0;i<positions.length;i++){
    var p=positions[i];
    var px=this.offX+p.x*this.tW+this.tW/2, py=this.offY+p.y*this.tH+this.tH+36;
    this.mapCats.push({x:px,y:py,hx:px,ci:i%4,tailAng:Math.random()*Math.PI*2,facing:Math.random()<0.5?1:-1,wT:Math.random()*3000,sitting:Math.random()<0.5,name:CAT_NAMES[i%CAT_NAMES.length],petted:false,wsState:'normal',wsTimer:Math.random()*6000,wsMsg:'',wsPhaseT:0,archetype:_getCatArchetype(i)});
  }
};
WorldMapScene.prototype._popAloe=function(msg){
  this.aloePop.setText(msg).setAlpha(1).setY(55);
  this.tweens.add({targets:this.aloePop,y:30,alpha:0,duration:1800,ease:'Sine.easeOut'});
};
WorldMapScene.prototype._drawShop=function(){
  var g=this.shopG;
  g.clear();
  if(!this.shopOpen) { for(var i=0;i<this.shopTxts.length;i++) this.shopTxts[i].setAlpha(0); this.shopTitle.setAlpha(0); this.shopHint.setAlpha(0); return; }
  g.fillStyle(parseInt(AT.uiBg.slice(1),16),0.94); g.fillRoundedRect(260,95,440,400,10);
  g.lineStyle(2,parseInt(AT.uiGold.slice(1),16),0.8); g.strokeRoundedRect(260,95,440,400,10);
  this.shopTitle.setText("CHAIRMAN WHISKERS' SHOP").setAlpha(1);
  this.shopHint.setText('Up/Down=Select  Z=Buy  X=Close').setAlpha(1);
  for(var si=0;si<this.shopItems.length;si++){
    var item=this.shopItems[si];
    var bought=(item.key==='extraHeart')?(EWR_STATE.maxHealth[0]>3):EWR_STATE.shop[item.key];
    var sel=(si===this.shopSel);
    var col=bought?'#888888':(sel?'#ffd60a':AT.uiText);
    var costStr=item.cost===0?'FREE':''+item.cost+' aloe';
    var boughtStr=bought?' [OWNED]':'';
    this.shopTxts[si].setText((sel?'> ':' ')+item.label+'  '+costStr+boughtStr).setStyle({color:col}).setAlpha(1);
  }
};
WorldMapScene.prototype._buyShop=function(){
  var item=this.shopItems[this.shopSel];
  var bought=(item.key==='extraHeart')?(EWR_STATE.maxHealth[0]>3):EWR_STATE.shop[item.key];
  if(bought){ this._popAloe('already owned!'); return; }
  if(EWR_STATE.aloe<item.cost){ this._popAloe('need '+item.cost+' aloe!'); return; }
  EWR_STATE.aloe-=item.cost;
  if(item.key==='extraHeart'){ EWR_STATE.maxHealth[0]=Math.min(EWR_STATE.maxHealth[0]+1,5); EWR_STATE.health[0]=EWR_STATE.maxHealth[0]; }
  else if(item.key==='speedBoost'){ EWR_STATE.shop.speedBoost=true; ED_MOVE.walkSpeed=Math.round(ED_MOVE.walkSpeed*1.15); }
  else if(item.key==='speedBoost2'){ EWR_STATE.shop.speedBoost2=true; ED_MOVE.walkSpeed=Math.round(ED_MOVE.walkSpeed*1.15); }
  else if(item.key==='cigSalesmanPride'){ EWR_STATE.shop.cigSalesmanPride=true; EWR_STATE.maxHealth[0]=Math.min(EWR_STATE.maxHealth[0]+1,5); EWR_STATE.health[0]=EWR_STATE.maxHealth[0]; }
  else { EWR_STATE.shop[item.key]=true; if(item.key==='universeRipple'||item.key==='crtFilter')_mandelaFlash(this); }
  SOUND.pickup();
  this._popAloe('PURCHASED!');
};
WorldMapScene.prototype.update=function(time,delta){
  this.catTime+=delta; this.edCigF++; this.edSmokeT+=delta;
  if(this.edSmokeT>1100){this.edSmokeT=0;spawnSmoke(this.edPx.x+14,this.edPx.y-22);}
  updateSmoke();
  // WS map message timer
  this._wsMsgT-=delta;
  if(this._wsMsgT<=0){
    this._wsMsgT=10000+Math.random()*14000;
    var wmCols=['#ff6666','#ffdd00','#ff55cc','#00eeff','#cc88ff','#00ff99','#ff8844'];
    this.wsMsgTxt.setText(WS_MSGS[Math.floor(Math.random()*WS_MSGS.length)]).setColor(wmCols[Math.floor(Math.random()*wmCols.length)]).setAlpha(1);
    this.tweens.add({targets:this.wsMsgTxt,alpha:0,delay:3600,duration:900});
  }
  // Cat possession timer
  this._possessT-=delta;
  if(this._possessT<=0&&!this._possessedCat&&this.mapCats.length>0){
    this._possessT=55000+Math.random()*35000;
    this._possessedCat=this.mapCats[Math.floor(Math.random()*this.mapCats.length)];
    this._possessedCat.wsMsg='I AM CHANGED'; this._possessedCat.wsState='speech'; this._possessedCat.wsPhaseT=0;
  }
  var wmSpeaker=null;
  for(var i=0;i<this.mapCats.length;i++){
    var c=this.mapCats[i]; c.tailAng+=0.04; c.wT+=delta;
    updateCatWsState(c,delta);
    if(!c.sitting&&c.wT>2200){c.wT=0;c.facing*=-1;c.x+=c.facing*8;if(Math.abs(c.x-c.hx)>22)c.x=c.hx;}
    if((c.wsState==='speech'||c.wsState==='philosophize'||c.wsState==='stare')&&c.wsMsg&&!wmSpeaker) wmSpeaker=c;
  }
  var pad=this.input.gamepad&&this.input.gamepad.total>0?this.input.gamepad.getPad(0):null;
  var gpMapL=false,gpMapR=false,gpMapU=false,gpMapD=false,gpMapA=false,gpMapB=false;
  if(pad){
    var ax=pad.axes.length>0?pad.axes[0].getValue():0;
    var ay=pad.axes.length>1?pad.axes[1].getValue():0;
    gpMapL=(pad.left)||(ax<-0.5); gpMapR=(pad.right)||(ax>0.5);
    gpMapU=(pad.up)||(ay<-0.5);   gpMapD=(pad.down)||(ay>0.5);
    var aNow=pad.A&&pad.A.pressed;
    gpMapA=aNow&&!this._prevA; this._prevA=aNow;
    var bNow=pad.B&&pad.B.pressed;
    gpMapB=bNow&&!this._prevB; this._prevB=bNow;
  }
  // Arcade menu (Truth Kid)
  if(this._arcadeOpen){
    if(Phaser.Input.Keyboard.JustDown(this.keys.up)||gpMapU) this._arcadeSel=Math.max(0,this._arcadeSel-1);
    if(Phaser.Input.Keyboard.JustDown(this.keys.down)||gpMapD) this._arcadeSel=Math.min(this._arcadeItems.length-1,this._arcadeSel+1);
    if(Phaser.Input.Keyboard.JustDown(this.keys.punch)||gpMapA){
      var arcItm=this._arcadeItems[this._arcadeSel];
      if(!arcItm.scene){this._arcadeOpen=false;this.arcadeG.setAlpha(0);this.arcadeTxt.setAlpha(0);}
      else if(EWR_STATE.aloe>=arcItm.cost){EWR_STATE.aloe-=arcItm.cost;SMOKE_POOL.length=0;EX_POOL.length=0;FIRE_POOL.length=0;this.scene.start(arcItm.scene);}
      else{var arcSelf=this;this.nodeTxt.setText('NOT ENOUGH ALOE').setAlpha(1);this.time.delayedCall(1500,function(){if(arcSelf.nodeTxt)arcSelf.nodeTxt.setAlpha(0);});}
    }
    if(Phaser.Input.Keyboard.JustDown(this.keys.kick)||gpMapB){this._arcadeOpen=false;this.arcadeG.setAlpha(0);this.arcadeTxt.setAlpha(0);}
    this._drawArcadeMenu();
    this.mapG.clear(); this._drawMap();
    this.catG.clear();
    for(var aci=0;aci<this.mapCats.length;aci++){var ac=this.mapCats[aci];DRAW_CAT.draw(this.catG,ac.x,ac.y,CAT_COLORS[ac.ci],ac.tailAng,ac.facing,ac.sitting);}
    this.edG.clear(); DRAW_ED.draw(this.edG,this.edPx.x,this.edPx.y,0,this.edFacing<0,this.edCigF);
    this.hudG.clear(); DRAW_HUD.draw(this.hudG);
    this.aloeText.setText(EWR_STATE.aloe+' ALOE');
    return;
  }
  // Shop navigation
  if(this.shopOpen){
    if(Phaser.Input.Keyboard.JustDown(this.keys.up)||gpMapU){this.shopSel=Math.max(0,this.shopSel-1);}
    if(Phaser.Input.Keyboard.JustDown(this.keys.down)||gpMapD){this.shopSel=Math.min(this.shopItems.length-1,this.shopSel+1);}
    if(Phaser.Input.Keyboard.JustDown(this.keys.punch)||gpMapA){this._buyShop();}
    if(Phaser.Input.Keyboard.JustDown(this.keys.kick)||gpMapB){this.shopOpen=false;}
    this.mapG.clear(); this._drawMap();
    this.catG.clear();
    for(var ci=0;ci<this.mapCats.length;ci++){var c2=this.mapCats[ci];DRAW_CAT.draw(this.catG,c2.x,c2.y,CAT_COLORS[c2.ci],c2.tailAng,c2.facing,c2.sitting);}
    this.edG.clear(); DRAW_ED.draw(this.edG,this.edPx.x,this.edPx.y,0,this.edFacing<0,this.edCigF);
    this._drawShop();
    this.hudG.clear(); DRAW_HUD.draw(this.hudG);
    this.aloeText.setText(EWR_STATE.aloe+' ALOE');
    return;
  }
  this._drawShop();
  if(!this.moving&&time-this.lastMoveT>150){
    var dx=0,dy=0;
    if(Phaser.Input.Keyboard.JustDown(this.keys.left)||Phaser.Input.Keyboard.JustDown(this.keys.altL)||gpMapL){dx=-1;this.edFacing=-1;}
    else if(Phaser.Input.Keyboard.JustDown(this.keys.right)||Phaser.Input.Keyboard.JustDown(this.keys.altD)||gpMapR){dx=1;this.edFacing=1;}
    else if(Phaser.Input.Keyboard.JustDown(this.keys.up)||Phaser.Input.Keyboard.JustDown(this.keys.altU)||gpMapU){dy=-1;}
    else if(Phaser.Input.Keyboard.JustDown(this.keys.down)||gpMapD){dy=1;}
    if(dx!==0||dy!==0){
      var nx=this.edTile.x+dx, ny=this.edTile.y+dy;
      var tile=this._getTile(nx,ny);
      var gMsg=tile?this._getGateMsgW1(tile):null;
      if(gMsg){
        var self=this; this.nodeTxt.setText('🔒 '+gMsg).setAlpha(1);
        this.time.delayedCall(2200,function(){self.nodeTxt.setAlpha(0);});
      } else if(tile&&tile.passable){
        this.lastMoveT=time; this.moving=true;
        var tp=this._t2p(nx,ny), self=this;
        this.tweens.add({targets:this.edPx,x:tp.x,y:tp.y,duration:130,ease:'Linear',
          onComplete:function(){self.edTile.x=nx;self.edTile.y=ny;EWR_STATE.playerPos.x=nx;EWR_STATE.playerPos.y=ny;self.moving=false;self._onTile(nx,ny);}
        });
      }
    }
  }
  if(Phaser.Input.Keyboard.JustDown(this.keys.punch)||gpMapA){ this._tryPossessed(); this._tryPet(); this._tryEnter(); this._tryShop(); this._tryArcade(); }
  this.mapG.clear(); this._drawMap();
  this.catG.clear();
  for(var ci3=0;ci3<this.mapCats.length;ci3++){
    var c3=this.mapCats[ci3];
    var wsOxM=0,wsOyM=0;
    if(c3.wsState==='vibrate') wsOxM=Math.sin(c3.wsPhaseT*0.04)*3;
    if(c3.wsState==='levitate') wsOyM=-Math.abs(Math.sin(c3.wsPhaseT*0.006))*14;
    DRAW_CAT.draw(this.catG,c3.x+wsOxM,c3.y+wsOyM,CAT_COLORS[c3.ci],c3.tailAng,c3.facing,c3.sitting);
    if(c3===this._possessedCat){this.catG.lineStyle(3,0xff0000,0.5+Math.sin(time*0.005)*0.5);this.catG.strokeCircle(c3.x+wsOxM,c3.y+wsOyM,22);}
    if(wmSpeaker===c3){this.wsCatTxt.setText(c3.wsMsg).setPosition(Phaser.Math.Clamp(c3.x-60,10,860),Phaser.Math.Clamp(c3.y+wsOyM-50,14,490)).setAlpha(1);}
  }
  if(!wmSpeaker) this.wsCatTxt.setAlpha(0);
  var ef=this.moving?Math.floor(this.catTime/100)%4:0;
  this.edG.clear(); DRAW_ED.draw(this.edG,this.edPx.x,this.edPx.y,ef,this.edFacing<0,this.edCigF);
  for(var sp=0;sp<SMOKE_POOL.length;sp++){var p=SMOKE_POOL[sp];this.edG.fillStyle(0xaaaaaa,p.life*0.28);this.edG.fillCircle(p.x,p.y,p.r);}
  this.hudG.clear(); DRAW_HUD.draw(this.hudG);
  this.aloeText.setText(EWR_STATE.aloe+' ALOE');
  var curTile=this._getTile(this.edTile.x,this.edTile.y);
  if(curTile&&(curTile.type==='level'||curTile.type==='portal')){this.nodeTxt.setText(curTile.label).setAlpha(1);this.enterTxt.setAlpha(1);}
  else if(this.nodeTxt._inGateMsg){}
  else{this.nodeTxt.setAlpha(0);this.enterTxt.setAlpha(0);}
  // Portal hint pulse
  var _w1d=['1-1','1-2','1-3','1-4','1-5'].every(function(id){return EWR_STATE.levelsBeaten.indexOf(id)>=0;});
  if(_w1d){this.portalHintTxt.setAlpha(0.5+Math.sin(this.catTime*0.004)*0.5);}
  else{this.portalHintTxt.setAlpha(0);}
  // News ticker scroll
  this._tickX-=1.5*(delta/16);
  this.tickerTxt.setPosition(this._tickX,526);
  if(this._tickX<-this.tickerTxt.width){
    this._tickN=(this._tickN+1)%NEWS_TICKER.length;
    this.tickerTxt.setText('⚡ '+NEWS_TICKER[this._tickN]+'  ◆  ');
    this._tickX=960;
  }
};
WorldMapScene.prototype._onTile=function(tx,ty){
  var tile=this._getTile(tx,ty); if(!tile) return;
  if(tile.type==='secret'&&!EWR_STATE.secrets[tile.id]){EWR_STATE.secrets[tile.id]=true;EWR_STATE.aloe+=ALOE.secretFind;this._popAloe('+'+ALOE.secretFind+' ALOE! SECRET!');}
};
WorldMapScene.prototype._tryPet=function(){
  for(var i=0;i<this.mapCats.length;i++){
    var c=this.mapCats[i];
    if(Phaser.Math.Distance.Between(this.edPx.x,this.edPx.y,c.x,c.y)<62&&!c.petted){
      c.petted=true; c.sitting=true; EWR_STATE.aloe+=ALOE.catPet; EWR_STATE.catsPetted++;
      SOUND.pickup();
      this._popAloe('+'+ALOE.catPet+' ALOE  (purr...)'); break;
    }
  }
};
WorldMapScene.prototype._tryShop=function(){
  // Shop opens at tile col=7, row=6 (path tile on main road) after beating 1-1
  if(EWR_STATE.levelsBeaten.indexOf('1-1')<0) return;
  var shopTile=this._t2p(7,6);
  if(Math.abs(this.edPx.x-shopTile.x)<40&&Math.abs(this.edPx.y-shopTile.y)<40){
    this.shopOpen=true; this.shopSel=0;
  }
};
WorldMapScene.prototype._tryBeatCat=function(){
  if(!this._beatCatPx) return;
  if(Math.abs(this.edPx.x-this._beatCatPx.x)<55&&Math.abs(this.edPx.y-this._beatCatPx.y)<55){
    var line=BEAT_CAT_LINES[this._beatCatLineIdx%BEAT_CAT_LINES.length];
    this._beatCatLineIdx++;
    var self3=this;
    this.nodeTxt.setText(line).setAlpha(1);
    this.time.delayedCall(3800,function(){if(self3.nodeTxt)self3.nodeTxt.setAlpha(0);});
  }
};
WorldMapScene.prototype._tryArcade=function(){
  if(!this._beatCatPx) return;

Level11Scene.prototype.update=function(time,delta){

    this.time.delayedCall(1600,function(){SMOKE_POOL.length=0;EX_POOL.length=0;FIRE_POOL.length=0;self11.scene.start('WorldMap');});
  }
  if(this._retreating) return;
  if(this._dying){
    this._dyingT+=delta;
    var fa=Math.min(this._dyingT/700,0.92);
    this.dyingG.clear(); this.dyingG.fillStyle(0x000000,fa); this.dyingG.fillRect(0,0,960,540);
    if(this._dyingT>800&&this.dyingTxt.alpha<1){this.dyingTxt.setText('ED NEEDS A MINUTE').setAlpha(1);this.dyingTxt2.setText('...').setAlpha(1);}
    if(this._dyingT>2600){EWR_STATE.health[0]=EWR_STATE.maxHealth[0];EWR_STATE.combo.streak=0;EWR_STATE.combo.mult=1;SMOKE_POOL.length=0;EX_POOL.length=0;FIRE_POOL.length=0;for(var ca=0;ca<this.cats.length;ca++){this.cats[ca].following=false;this.cats[ca].loyal=false;}this.scene.restart();}
    return;
  }
  // Full Reality Break timer
  this._rbFullTimer+=delta;
  if(this._rbFullPhase===0&&this._rbFullTimer>=this._rbFullInterval){
    this._rbFullTimer=0; this._rbFullInterval=90000+Math.random()*60000;
    this._triggerFullRealityBreak();
  }
  // Phase advance logic
  if(this._rbFullPhase===1){
    this._rbFullT+=delta;
    if(this._rbFullT>=15000){
      this._rbFullPhase=2; this._rbFullT=0;
      this._startBrawlPhase();
      this.cameras.main.flash(500,255,150,0);
      this._flash('BOSS BRAWL INCOMING!!!',1400,32,'#ff8800');
      this.rbTitleTxt.setText('\u26a1 BOSS BRAWL PREVIEW \u26a1').setStyle({fontFamily:'Bangers,Georgia,serif',fontSize:'30px',color:'#ffd700',stroke:'#000000',strokeThickness:5,backgroundColor:'#00000099',padding:{x:12,y:5}}).setAlpha(1);
      SOUND.victory();
    }
  } else if(this._rbFullPhase===2){
    this._rbFullT+=delta;
    if(this._rbFullT>=15000){
      this._rbFullPhase=0; this.rbG.clear();
      this.rbTitleTxt.setAlpha(0); this.rbCountdownTxt.setAlpha(0);
      this.cameras.main.flash(500,0,200,100);
      this._flash('BACK TO REALITY',2200,30,'#00ff88');
      SOUND.hurt();
    }
  }
  if(this._rbFullPhase>0){
    this.levelT+=delta;
    updateSmoke(); updateExplosions(); updateFire();
    updateNukes(delta); this.nukeG.clear(); drawNukes(this.nukeG);
    this._drawRealityBreak(delta);
    var cdSec=Math.ceil((15000-this._rbFullT)/1000);
    this.rbCountdownTxt.setText(
      this._rbFullPhase===1?'NEXT: BOSS BRAWL IN '+cdSec+'s':'BACK TO REALITY IN '+cdSec+'s'
    ).setAlpha(1);
    this.hudG.clear(); DRAW_HUD.draw(this.hudG);
    this.aloeText.setText(EWR_STATE.aloe+' ALOE');
    return;
  }
  this.levelT+=delta;
  var dt=delta/1000, ep=this.ep, es=this.es;
  var pad=this.input.gamepad&&this.input.gamepad.total>0?this.input.gamepad.getPad(0):null;
  var gpL=false,gpR=false,gpJ=false,gpKick=false,gpPunchHeld=false;
  if(pad){
    var axV=pad.axes.length>0?pad.axes[0].getValue():0;
    var ayV=pad.axes.length>1?pad.axes[1].getValue():0;
    gpL=(pad.left)||(axV<-0.3); gpR=(pad.right)||(axV>0.3);
    gpJ=(pad.up)||(pad.A&&pad.A.pressed)||(ayV<-0.5);
    gpPunchHeld=!!(pad.X&&pad.X.pressed);
    var kNow=pad.B&&pad.B.pressed; gpKick=kNow&&!this._prevKickGP; this._prevKickGP=kNow;
  }
  var goL=this.keys.left.isDown||this.keys.altL.isDown||gpL;
  var goR=this.keys.right.isDown||this.keys.altR.isDown||gpR;
  var goJ=this.keys.up.isDown||this.keys.altU.isDown||gpJ;
  var goD=this.keys.down.isDown||this.keys.altD.isDown;
  var doKick=Phaser.Input.Keyboard.JustDown(this.keys.kick)||gpKick;
  // Charge / punch logic
  var zHeld=this.keys.punch.isDown||gpPunchHeld;
  var zWasHeld=this._prevZHeld||false;
  var zJustReleased=(!zHeld)&&zWasHeld;
  if(zHeld&&es.punchTimer<=0&&es.kickTimer<=0){var _pct=ep.chargeT;ep.chargeT+=delta;if(ep.chargeT>200&&Math.floor(ep.chargeT/300)>Math.floor(_pct/300))SOUND.charge();}
  if(zJustReleased&&es.punchTimer<=0&&es.kickTimer<=0){
    if(ep.chargeT>=1200){ this._emberBlast(); }
    else if(ep.chargeT>=60){
      es.punchTimer=340; es.punchActive=true; SOUND.punch();

    }
    ep.chargeT=0;
  }
  es.rapidZT=(es.rapidZT||0)+delta;
  if(es.rapidZT>500) es.rapidZ=0;
  if(!zHeld) ep.chargeT=Math.max(0,ep.chargeT-delta*3);
  this._prevZHeld=zHeld;
  // Movement
  var tVx=0;
  if(goL){tVx=-ED_MOVE.walkSpeed;es.facing=-1;}
  if(goR){tVx= ED_MOVE.walkSpeed;es.facing= 1;}
  if(goD&&ep.grounded) tVx*=0.35;
  var airM=ep.grounded?1:ED_MOVE.airControl;
  ep.vx+=(tVx-ep.vx)*Math.min(1,12*dt*airM);
  // Jump
  var wasGrounded=ep.grounded;
  if(goJ) ep.jumpBufMs=ED_MOVE.jumpBufMs;
  else ep.jumpBufMs=Math.max(0,ep.jumpBufMs-delta);
  if(ep.grounded) ep.coyoteMs=ED_MOVE.coyoteMs;
  else ep.coyoteMs=Math.max(0,ep.coyoteMs-delta);
  if(ep.jumpBufMs>0&&ep.coyoteMs>0&&ep.vy>=-10){
    ep.vy=ED_MOVE.jumpVel; ep.jumpBufMs=0; ep.coyoteMs=0; ep.grounded=false;
    SOUND.jump();
  }
  if(!goJ&&ep.vy<0) ep.vy*=ED_MOVE.jumpCut;
  // Double jump
  if(EWR_STATE.shop.doubleJump&&!ep.grounded&&wasGrounded===false&&ep.coyoteMs<=0&&ep.jumpBufMs>0&&ep.vy>0&&!ep.djUsed){

    this._flash(rbMsgs[Math.floor(Math.random()*rbMsgs.length)],2200,30,rbCol[Math.floor(Math.random()*rbCol.length)]);
    this.cameras.main.shake(900,0.028);
    this.cameras.main.flash(350,200,0,255);
    for(var rbi=0;rbi<this.mochiList.length;rbi++){spawnExplosion(this.mochiList[rbi].x,this.mochiList[rbi].y-15,0xff00ff,1.5);}
    SOUND.hurt();
  }
  // News ticker scroll
  this._tickX-=1.5*(delta/16);
  this.tickerTxt.setPosition(this._tickX,526);
  if(this._tickX<-this.tickerTxt.width){
    this._tickN=(this._tickN+1)%NEWS_TICKER.length;
    this.tickerTxt.setText('⚡ '+NEWS_TICKER[this._tickN]+'  ◆  ');
    this._tickX=960;
  }
  if(EWR_STATE.combo.streak>=10){spawnFire(ep.x+(Math.random()-0.5)*18,ep.y-16);spawnFire(ep.x+(Math.random()-0.5)*18,ep.y-8);}
  var wsCols=['#ff4444','#ff8c00','#ffd700','#00e676','#ff44aa','#00eeff','#cc44ff','#ffffff'];
  var wsYpos=[60,120,190,270,340,410,470];
  var wsXpos=[90,180,280,380,480,580,680,780,860];
  this._wsMsgT-=delta;
  if(this._wsMsgT<=0){
    this._wsMsgT=3000+Math.random()*5000;
    var wc=wsCols[Math.floor(Math.random()*wsCols.length)];
    var wy=wsYpos[Math.floor(Math.random()*wsYpos.length)];
    var wx=wsXpos[Math.floor(Math.random()*wsXpos.length)];
    var wsz=20+Math.floor(Math.random()*8);
    this._flash(WS_MSGS[Math.floor(Math.random()*WS_MSGS.length)],2600,wsz,wc,0,wy,wx);
    if(Math.random()<0.4){var wc2=wsCols[Math.floor(Math.random()*wsCols.length)];var wy2=wsYpos[Math.floor(Math.random()*wsYpos.length)];var wx2=wsXpos[Math.floor(Math.random()*wsXpos.length)];var wsz2=20+Math.floor(Math.random()*6);this.time.delayedCall(700,function(){this._flash(WS_MSGS[Math.floor(Math.random()*WS_MSGS.length)],2200,wsz2,wc2,0,wy2,wx2);},null,this);}
  }
  this._wsMsgT2-=delta;
  if(this._wsMsgT2<=0){
    this._wsMsgT2=4000+Math.random()*6000;
    var wc3=wsCols[Math.floor(Math.random()*wsCols.length)];
    var wy3=wsYpos[Math.floor(Math.random()*wsYpos.length)];
    var wx3=wsXpos[Math.floor(Math.random()*wsXpos.length)];
    this._flash(WS_MSGS[Math.floor(Math.random()*WS_MSGS.length)],3000,20,wc3,0,wy3,wx3);
  }
  // Cats update
  for(var ci2=0;ci2<this.cats.length;ci2++){
    var cat=this.cats[ci2]; cat.tailAng+=0.04; cat.wT+=delta; cat.danceT+=delta;
    if(!cat.following&&!cat.sitting&&cat.wT>2500){cat.wT=0;cat.wDir*=-1;}
    updateCatWsState(cat,delta);
  }
  // Animation frame
  var frame=0;
  if(es.hurtTimer>900)         frame=7;
  else if(!ep.grounded)        frame=4;
  else if(es.kickTimer>400)    frame=6;
  else if(es.punchTimer>200||ep.chargeT>200) frame=5;
  else if(Math.abs(ep.vx)>20) frame=Math.floor(this.levelT/120)%4;
  // Camera
  var camX=Phaser.Math.Clamp(ep.x-480,0,LW-960);
  this.cameras.main.scrollX=camX; this.cameras.main.scrollY=0;
  // Psychedelic low-HP
  this.psychG.clear();
  if(EWR_STATE.health[0]<=1&&EWR_STATE.maxHealth[0]>0){
    var pt=this.levelT;
    this.cameras.main.setRotation(Math.sin(pt*0.003)*0.012);
    var tintIdx=Math.floor(pt/500)%6;
    var tintCols=[0xff0044,0x00ffff,0xffff00,0xff00ff,0x00ff88,0xcc44ff];
    this.psychG.fillStyle(tintCols[tintIdx],0.07+Math.sin(pt*0.007)*0.03);
    this.psychG.fillRect(0,0,960,540);
    this.psychG.fillStyle(0xff0000,0.18+Math.sin(pt*0.005)*0.06);
    this.psychG.fillRect(0,0,960,55); this.psychG.fillRect(0,485,960,55);
    this.psychG.fillRect(0,0,55,540); this.psychG.fillRect(905,0,55,540);
  } else {
    this.cameras.main.setRotation(0);
  }
  // Draw cats
  this.catG.clear();
  var wsSpeaker11=null;
  for(var ci3=0;ci3<this.cats.length;ci3++){
    var c=this.cats[ci3];
    if(Math.abs(c.x-ep.x)>700) continue;
    var wsOx=0,wsOy=0;
    if(c.wsState==='vibrate') wsOx=Math.sin(c.wsPhaseT*0.04)*3;
    if(c.wsState==='levitate') wsOy=-Math.abs(Math.sin(c.wsPhaseT*0.006))*20;
    if((c.wsState==='speech'||c.wsState==='philosophize'||c.wsState==='stare')&&c.wsMsg&&!wsSpeaker11) wsSpeaker11=c;
    DRAW_CAT.draw(this.catG,c.x+wsOx,c.y+wsOy,CAT_COLORS[c.ci],c.tailAng,c.following?es.facing:c.wDir,c.sitting,c.dance||c.following,c.smoker,c.danceT);
    if(wsSpeaker11===c){var bx11=Phaser.Math.Clamp(c.x-camX,30,900),by11=Phaser.Math.Clamp(c.y+wsOy-52,14,480);this.wsCatTxt.setText(c.wsMsg).setPosition(bx11,by11).setAlpha(1);}
  }
  if(!wsSpeaker11) this.wsCatTxt.setAlpha(0);
  // Draw mochis
  this.mochiG.clear();
  for(var mi3=0;mi3<this.mochiList.length;mi3++){var m3=this.mochiList[mi3];if(Math.abs(m3.x-ep.x)<700)this._drawMochi(this.mochiG,m3);}
  // Draw pickups
  this.pickupG.clear();
  for(var ai2=0;ai2<this.pickups.length;ai2++){var ap2=this.pickups[ai2];if(ap2.collected)continue;if(Math.abs(ap2.x-ep.x)<700){var bob=Math.sin(ap2.bobT*0.003)*5;this._drawAloe(this.pickupG,ap2.x,ap2.y+bob);}}
  // Draw Ed
  this.edG.clear();
  DRAW_ED.draw(this.edG,ep.x,ep.y,frame,es.facing<0,es.cigF);
  if(ep.chargeT>0){var cr=Math.min(ep.chargeT/1200,1.0);this.edG.fillStyle(cr>=1?0xffffff:0xff6600,0.3+cr*0.5);this.edG.fillCircle(ep.x+es.facing*28,ep.y-27,5+cr*14);}
  if(es.punchActive){this.edG.fillStyle(0xffd60a,0.15);this.edG.fillCircle(ep.x+es.facing*56,ep.y-20,28);}
  if(es.kickActive){this.edG.fillStyle(0xff6b35,0.18);this.edG.fillCircle(ep.x+es.facing*ED_MOVE.kickRange,ep.y-10,32);}
  drawExplosions(this.edG); drawFire(this.edG);
  // Hurt dialogue (fires once per hurt cycle)
  if(es.hurtTimer>1100&&!this._hurtSaid){this._hurtSaid=true;if(Math.random()<0.35)this._showEdLine(ED_LINES_HURT);}
  if(es.hurtTimer<=0)this._hurtSaid=false;
  // Floating hearts (cat petting VFX)
  for(var hi=HEART_POOL.length-1;hi>=0;hi--){var hrt=HEART_POOL[hi];hrt.t+=delta;hrt.y+=hrt.vy*(delta/1000);hrt.alpha=Math.max(0,1-hrt.t/1300);if(hrt.alpha<=0){HEART_POOL.splice(hi,1);continue;}var hr=hrt.r;this.edG.fillStyle(0xff69b4,hrt.alpha);this.edG.fillCircle(hrt.x-hr*0.4,hrt.y,hr*0.55);this.edG.fillCircle(hrt.x+hr*0.4,hrt.y,hr*0.55);this.edG.fillTriangle(hrt.x-hr,hrt.y,hrt.x+hr,hrt.y,hrt.x,hrt.y+hr*1.2);}
  for(var sp=0;sp<SMOKE_POOL.length;sp++){var p=SMOKE_POOL[sp];this.edG.fillStyle(0xaaaaaa,p.life*0.3);this.edG.fillCircle(p.x,p.y,p.r);}
  // Combo text
  if(EWR_STATE.combo.streak>=3){
    var cStr=EWR_STATE.combo.streak>=10?'ON FIRE '+EWR_STATE.combo.streak+'x':EWR_STATE.combo.streak+'x COMBO';
    var cCol=EWR_STATE.combo.streak>=10?'#ff6b00':EWR_STATE.combo.streak>=6?'#ffd60a':'#ffffff';
    this.comboText.setText(cStr).setPosition(ep.x,ep.y-80).setStyle({color:cCol}).setAlpha(1);
  } else { this.comboText.setAlpha(0); }
  // Controls HUD
  if(this.levelT<30000){
    var ha=this.levelT<25000?0.88:0.88*(1-(this.levelT-25000)/5000);
    this.ctrlPanel.clear();
    this.ctrlPanel.fillStyle(parseInt(AT.uiBg.slice(1),16),ha*0.82);
    this.ctrlPanel.fillRoundedRect(6,6,168,82,4);
    this.ctrlPanel.lineStyle(1,parseInt(AT.uiGold.slice(1),16),ha*0.5);
    this.ctrlPanel.strokeRoundedRect(6,6,168,82,4);
    for(var li=0;li<this.ctrlLines.length;li++) this.ctrlLines[li].setAlpha(ha);
  } else {
    this.ctrlPanel.clear();
    for(var li2=0;li2<this.ctrlLines.length;li2++) this.ctrlLines[li2].setAlpha(0);
  }
  // HUD
  this.hudG.clear(); DRAW_HUD.draw(this.hudG);
  this.aloeText.setText(EWR_STATE.aloe+' ALOE');
};
Level11Scene.prototype._triggerDeath=function(){
  if(this._dying) return;
  this._dying=true; this._dyingT=0;
  SOUND.death(); this.cameras.main.shake(400,0.02);
};
Level11Scene.prototype._flash=function(msg,dur,sz,col,delay,fy,fx){
  var self=this,ft=this.flashTxt;
  if(fy||sz){
    var tmp=this.add.text(fx||480,fy||270,msg,{fontFamily:'Inconsolata,monospace',fontSize:(sz||42)+'px',color:col||AT.uiGold,stroke:AT.outline,strokeThickness:3,backgroundColor:'#00000077',padding:{x:10,y:5}}).setOrigin(0.5).setScrollFactor(0).setDepth(20);
    this.tweens.add({targets:tmp,alpha:0,delay:(delay||0)+(dur-600),duration:600,onComplete:function(){tmp.destroy();}});
    return;
  }
  ft.setText(msg).setAlpha(1);
  this.tweens.add({targets:ft,alpha:0,delay:dur-600,duration:600});
};

Level11Scene.prototype._spawnMochiParts=function(m){
  m.parts=[];
  var cols=[0xf4a8c7,0xcc5599,0xffd60a,0xff6b35,0x00e676];
  for(var i=0;i<12;i++){var a=(i/12)*Math.PI*2;m.parts.push({x:m.x,y:m.y,vx:Math.cos(a)*(2+Math.random()*4),vy:Math.sin(a)*(2+Math.random()*4)-3,life:1,color:cols[i%5],r:3+Math.random()*5});}
};
Level11Scene.prototype._drawMochi=function(g,m){
  if(m.dieT>=0){
    // Squish phase (0-320ms)
    if(m.squishT<320){
      var t=m.squishT/320;
      var scx=t<0.5?1+t*0.55:1.55-(t-0.5)*2.6; if(scx<0) scx=0;
      var scy=t<0.5?1-t*0.35:0.825+(t-0.5)*0.1;
      var sal=t<0.5?1:Math.max(0,1-(t-0.5)*2);
      if(sal>0){
        var my2=m.y+m.bAmt;
        g.save(); g.translateCanvas(m.x,my2-13); g.scaleCanvas(scx,scy);
        g.fillStyle(parseInt(AT.outline.slice(1),16),sal); g.fillCircle(0,0,17);
        g.fillStyle(parseInt(AT.mochiFg.slice(1),16),sal); g.fillCircle(0,0,15);
        g.restore();
      }
      return;
    }
    for(var i=0;i<m.parts.length;i++){var p=m.parts[i];if(p.life>0){g.fillStyle(p.color,p.life);g.fillCircle(p.x,p.y,p.r);}}
    return;
  }
  // Ghost: translucent blue shimmer
  if(m.type==='ghost'){
    var ga=0.25+Math.sin((m.bT||0)*0.005)*0.12;
    g.fillStyle(0x0000aa,0.12); g.fillEllipse(m.x,m.y+2,28,8);
    g.fillStyle(0xaaccff,ga+0.15); g.fillCircle(m.x,m.y-13,16);
    g.fillStyle(0xeeeeff,ga); g.fillCircle(m.x,m.y-13,13);
    g.fillStyle(0x00ffff,0.85); g.fillCircle(m.x-5,m.y-17,4); g.fillCircle(m.x+5,m.y-17,4);
    g.fillStyle(0x000000,1); g.fillCircle(m.x-5,m.y-17,2); g.fillCircle(m.x+5,m.y-17,2);
    for(var gh=0;gh<m.hp;gh++){g.fillStyle(0x00ffff,0.7);g.fillCircle(m.x-3+gh*6,m.y-32,2);}
    return;
  }
  // Bomber: round red pulsing ball with LED timer
  if(m.type==='bomber'){
    var bpulse=0.88+Math.sin((m.bT||0)*0.008)*0.12;
    g.fillStyle(0x000000,0.22); g.fillEllipse(m.x,m.y+2,36*bpulse,10);
    g.fillStyle(0xff2200,0.35); g.fillCircle(m.x,m.y-13,26*bpulse);
    g.fillStyle(parseInt(AT.outline.slice(1),16),1); g.fillCircle(m.x,m.y-13,20*bpulse);
    g.fillStyle(0xdd2200,1); g.fillCircle(m.x,m.y-13,18*bpulse);
    g.fillStyle(0xff5500,0.55); g.fillCircle(m.x-6,m.y-18,5); g.fillCircle(m.x+7,m.y-12,4);
    g.fillStyle(0x1a0000,1); g.fillEllipse(m.x-5,m.y-16,5,4); g.fillEllipse(m.x+5,m.y-16,5,4);
    var ledOn=Math.sin((m.bT||0)*0.014)>0;
    g.fillStyle(ledOn?0xff0000:0x550000,1); g.fillCircle(m.x,m.y-8,4);
    g.fillStyle(0xff4444,1); g.fillRect(m.x-18,m.y-35,Math.max(0,36*(m.hp/5)),4);
    g.lineStyle(1,0xffffff,0.4); g.strokeRect(m.x-18,m.y-35,36,4);
    return;
  }
  // Rasta cat: orange body, 3-stripe rasta hat, dreads, red eyes, green HP dots
  if(m.type==='rasta'){
    g.fillStyle(0x1a0a00,1); g.fillEllipse(m.x,m.y+2,30,8);
    g.fillStyle(0xff8800,1); g.fillCircle(m.x,m.y-13,15);
    g.fillStyle(0xffcc44,0.5); g.fillCircle(m.x-5,m.y-17,5);
    g.fillStyle(0x117700,1); g.fillRoundedRect(m.x-12,m.y-28,24,9,3);
    g.fillStyle(0xffdd00,1); g.fillRect(m.x-12,m.y-25,24,3);
    g.fillStyle(0xff2200,1); g.fillRect(m.x-12,m.y-22,24,3);
    for(var dr=0;dr<5;dr++){
      var rdx=m.x-10+dr*5;
      g.fillStyle(0x553300,1); g.fillRect(rdx,m.y-27+Math.sin((m.bT||0)*0.004+dr)*2,3,14);
    }
    g.fillStyle(0xff3300,0.9); g.fillCircle(m.x-4,m.y-16,3); g.fillCircle(m.x+4,m.y-16,3);
    for(var rh=0;rh<m.hp;rh++){g.fillStyle(0x00cc00,1);g.fillCircle(m.x-5+rh*5,m.y-32,2);}
    return;
  }
  // Insulin kamikaze fighter: syringe with wings, dive animation
  if(m.type==='insulin'){
    var ia=m.diveAng||(-Math.PI/2);
    g.save(); g.translateCanvas(m.x,m.y); g.rotateCanvas(ia);
    g.fillStyle(0xffffff,0.92); g.fillRoundedRect(-6,-22,12,32,3);
    g.fillStyle(0xff3300,0.7);
    for(var mii=0;mii<3;mii++) g.fillRect(-4,-16+mii*9,8,2);
    g.fillStyle(0xdd2200,1); g.fillRoundedRect(-6,-28,12,8,2);
    g.fillStyle(0xbbbbbb,1); g.fillRect(-2,10,4,16);
    g.fillStyle(0x888888,1); g.fillTriangle(-2,26,2,26,0,38);
    g.fillStyle(0xff6600,0.5); g.fillRect(-6,-22,5,5);
    g.fillStyle(0x000000,0.5); g.fillRect(-1,-22,5,5);
    g.fillStyle(0xff0000,1); g.fillCircle(-3,-8,3); g.fillCircle(3,-8,3);
    g.fillStyle(0xffffff,0.8); g.fillCircle(-3,-9,1.5); g.fillCircle(3,-9,1.5);
    g.restore();
    if(!m.diving){for(var hdi=0;hdi<m.hp;hdi++){g.fillStyle(0xff3300,1);g.fillCircle(m.x-3+hdi*7,m.y-50,4);}}
    return;
  }
  // Reality glitch enemy: phase-shifting, only hittable when visible
  if(m.type==='glitch'){
    var gvis=0.15+Math.abs(Math.sin((m.bT||0)*0.007))*0.85;
    var gcol=(m.bT||0)%600<300?0x00ffff:0xff00ff;
    g.fillStyle(gcol,gvis*0.8); g.fillRoundedRect(m.x-18,m.y-26,36,40,6);
    g.fillStyle(0xffffff,gvis*0.6);
    g.fillRect(m.x-18+Math.sin((m.bT||0)*0.013)*12,m.y-18,14,3);
    g.fillRect(m.x+4+Math.sin((m.bT||0)*0.019)*8,m.y-8,10,3);

  // Furrowed thick brows (steeper angle, lower)
  g.lineStyle(3*scl,0x1a0000,1);
  g.lineBetween(m.x-9*scl,my-18*scl,m.x-2*scl,my-15*scl); g.lineBetween(m.x+2*scl,my-15*scl,m.x+9*scl,my-18*scl);
  // Gritted teeth mouth
  g.fillStyle(0x1a0000,1); g.fillRect(m.x-6*scl,my-10*scl,12*scl,5*scl);
  g.fillStyle(0xffffff,1); g.fillRect(m.x-5*scl,my-9*scl,10*scl,3*scl);
  g.fillStyle(0x1a0000,1); g.fillRect(m.x-1*scl,my-9*scl,2,3*scl); g.fillRect(m.x+3*scl,my-9*scl,2,3*scl); g.fillRect(m.x-5*scl,my-9*scl,2,3*scl);
  // Anger marks on cheeks
  g.lineStyle(2,0xff2222,0.85);
  g.lineBetween(m.x-14*scl,my-14*scl,m.x-10*scl,my-12*scl); g.lineBetween(m.x-14*scl,my-12*scl,m.x-10*scl,my-14*scl);
  g.lineBetween(m.x+10*scl,my-14*scl,m.x+14*scl,my-12*scl); g.lineBetween(m.x+10*scl,my-12*scl,m.x+14*scl,my-14*scl);
  if(m.type!=='tank') { for(var h=0;h<m.hp;h++){g.fillStyle(parseInt(AT.aloe.slice(1),16),1);g.fillCircle(m.x-5+h*5,my-30,2);} }
  if(m.sunglasses){g.fillStyle(0x111111,0.95);g.fillRoundedRect(m.x-9*scl,my-17*scl,7*scl,5*scl,2);g.fillRoundedRect(m.x+2*scl,my-17*scl,7*scl,5*scl,2);}
  // Tank beret

    g.lineStyle(1,0x1a0000,1); g.lineBetween(-7,-9,-2,-7); g.lineBetween(2,-7,7,-9);
    g.restore();

  }

    g.fillStyle(0x2255dd,1); g.fillRoundedRect(m.x-9,my-34,18,10,3);

Level11Scene.prototype._drawRealityBreak=function(delta){
  var g=this.rbG, dt=delta/1000;
  g.clear();
  if(this._rbFullPhase===1){
    // ── Racing Phase ──
    // Sky gradient
    g.fillStyle(0x1a0033,1); g.fillRect(0,0,960,320);
    g.fillStyle(0x3d005a,1); g.fillRect(0,80,960,120);
    g.fillStyle(0x5a0080,0.5); g.fillRect(0,180,960,140);
    // Stars
    this._rbRaceT+=delta;
    var starSeed=42;
    for(var si=0;si<40;si++){
      starSeed=(starSeed*1664525+1013904223)&0xffffffff;
      var sx=((starSeed&0xffff)%960);
      starSeed=(starSeed*1664525+1013904223)&0xffffffff;
      var sy=((starSeed&0xffff)%220);
      starSeed=(starSeed*1664525+1013904223)&0xffffffff;
      var sb=(0.4+(starSeed&0xff)/255*0.6);
      g.fillStyle(0xffffff,sb); g.fillRect(sx,sy,2,2);
    }
    // KC-style skyline silhouette
    g.fillStyle(0x0d001a,1);
    var bldgs=[[0,260,60,60],[80,250,40,70],[140,240,50,80],[210,255,35,65],[260,245,60,75],[340,230,45,90],[400,250,55,70],[470,235,40,85],[520,248,60,72],[600,242,50,78],[665,255,35,65],[720,238,55,82],[790,250,40,70],[850,260,60,60],[920,245,40,75]];
    for(var bi=0;bi<bldgs.length;bi++){var b=bldgs[bi];g.fillRect(b[0],b[1],b[2],b[3]);}
    // Track
    g.fillStyle(0x555577,1); g.fillRect(0,320,960,220);
    g.fillStyle(0x444466,1); g.fillRect(0,320,960,8);
    g.fillStyle(0x666688,1); g.fillRect(0,448,960,8);
    // Scrolling dashes
    this._rbDash=(this._rbDash||0)+10*(delta/16);
    g.fillStyle(0xffffff,0.7);
    for(var di=0;di<20;di++){
      var dx=(di*100-this._rbDash%100+960)%960;
      g.fillRect(dx,378,50,6);
    }
    // Speed lines (perspective)
    g.lineStyle(2,0x00ffff,0.6);
    for(var li=0;li<16;li++){
      var lx=li*(960/16);
      g.beginPath(); g.moveTo(lx,320); g.lineTo(480,300); g.strokePath();
    }
    // Neon vertical streaks
    var streakCols=[0xff00ff,0x00ffff,0xffd700,0xff4444,0x44ff88,0xaa44ff,0xff8800,0x00ff44];
    for(var nsi=0;nsi<8;nsi++){
      var nsx=((nsi*137+this._rbRaceT*0.3)%960);
      g.fillStyle(streakCols[nsi%streakCols.length],0.18);
      g.fillRect(nsx,0,3,320);
    }
    // Update & draw racers
    for(var ri=0;ri<this._rbRacers.length;ri++){
      var r=this._rbRacers[ri];
      r.bT+=delta; r.boostT-=delta;
      if(r.boostT<0) r.boostT=0;
      if(Math.random()<0.01){r.boostT=800;spawnExplosion(r.x,r.y,r.col,1.2);}
      var spd=r.vx*(r.boostT>0?1.7:1);
      r.x+=spd*dt;
      if(r.x>960+40) r.x=-40;
      r.y=r.baseY+Math.sin(r.bT*0.004+ri)*15;
      // Collision check
      for(var rj=ri+1;rj<this._rbRacers.length;rj++){
        var r2=this._rbRacers[rj];
        if(Math.abs(r.x-r2.x)<30&&Math.abs(r.y-r2.y)<20){
          spawnExplosion((r.x+r2.x)/2,(r.y+r2.y)/2,0xffffff,2);
          var tmp=r.vx; r.vx=-r2.vx; r2.vx=-tmp;
          r.x+=r.vx>0?35:-35; r2.x+=r2.vx>0?35:-35;
        }
      }
      // Draw racer
      g.fillStyle(0x000000,0.25); g.fillEllipse(r.x,r.y+18,60,10);
      if(ri===0){
        // Ed's cig-rocket
        g.fillStyle(r.col,1); g.fillRect(r.x-26,r.y-10,52,20);
        g.fillStyle(0xff6600,1); g.fillTriangle(r.x+26,r.y,r.x+36,r.y-6,r.x+36,r.y+6);
        // Exhaust
        var exC=r.boostT>0?[0xff00ff,0x00ffff,0xffd700][Math.floor(r.bT/80)%3]:0xff6600;
        g.fillStyle(exC,0.8); g.fillEllipse(r.x-30,r.y,14+Math.random()*8,10);
        // Ed's tiny body
        g.fillStyle(0xffd700,1); g.fillCircle(r.x-2,r.y-14,7);
        g.fillStyle(0x222222,1); g.fillRect(r.x-6,r.y-8,12,10);
        g.fillStyle(0xff8800,1); g.fillRect(r.x+4,r.y-12,6,2);
      } else {
        // Cat racers
        g.fillStyle(r.col,1); g.fillEllipse(r.x,r.y,50,20);
        g.fillStyle(0xffffff,0.6); g.fillCircle(r.x+10,r.y-10,9);
        g.fillStyle(r.col,1);
        g.fillTriangle(r.x+6,r.y-18,r.x+10,r.y-24,r.x+14,r.y-18);
        g.fillTriangle(r.x+14,r.y-18,r.x+18,r.y-24,r.x+22,r.y-18);
        g.fillStyle(0x222222,1); g.fillCircle(r.x+8,r.y-11,2); g.fillCircle(r.x+13,r.y-11,2);
        // Exhaust
        var exC2=r.boostT>0?[0xff00ff,0x00ffff,0xffd700][Math.floor(r.bT/80)%3]:0xff6600;
        g.fillStyle(exC2,0.7); g.fillEllipse(r.x-28,r.y+2,12+Math.random()*6,8);
      }
      // Name label
      g.fillStyle(0x000000,0.6); g.fillRect(r.x-22,r.y-34,44,12);
      // (text drawn on g is not possible – skip text labels to avoid complexity)
    }
    // Ambient explosions
    if(Math.random()<0.05) spawnExplosion(Math.random()*960,320+Math.random()*120,streakCols[Math.floor(Math.random()*streakCols.length)],1);
    // Progress bar (cyan)
    var prog1=this._rbFullT/15000;
    g.fillStyle(0x001a33,0.85); g.fillRect(0,530,960,10);
    g.fillStyle(0x00ffff,0.9); g.fillRect(0,530,960*prog1,10);
  } else if(this._rbFullPhase===2){
    // ── Boss Brawl Phase ──

    g.fillStyle(0x1a0030,1); g.fillRect(0,0,960,300);

    for(var spi=0;spi<18;spi++){
      var spx=spi*60-30, spw=40;
      g.fillTriangle(spx,540,spx+spw/2,440+Math.sin(spi*1.3)*20,spx+spw,540);
    }
    // Floor
    g.fillStyle(0x222244,1); g.fillRect(0,480,960,60);
    g.fillStyle(0x333366,1); g.fillRect(0,480,960,6);
    // Platforms
    g.fillStyle(0x2a2a55,1); g.fillRect(150,380,200,18);
    g.fillStyle(0x3a3a77,1); g.fillRect(150,380,200,5);
    g.fillStyle(0x2a2a55,1); g.fillRect(610,380,200,18);
    g.fillStyle(0x3a3a77,1); g.fillRect(610,380,200,5);
    // Pulsing neon border
    var borderCol=[0xff00ff,0x00ffff,0xffd700,0xff4444][Math.floor(this._rbFullT/1000)%4];
    g.lineStyle(4,borderCol,0.7);
    g.strokeRect(4,4,952,532);
    // Update brawlers
    for(var bwi=0;bwi<this._rbBrawlers.length;bwi++){
      var bw=this._rbBrawlers[bwi];
      bw.bT+=delta; bw.atkT-=delta;
      // Gravity
      bw.vy+=600*dt;
      bw.x+=bw.vx*dt; bw.y+=bw.vy*dt;
      // Wall bounce
      if(bw.x<40){bw.x=40;bw.vx=Math.abs(bw.vx);}
      if(bw.x>920){bw.x=920;bw.vx=-Math.abs(bw.vx);}
      // Floor/platform collision
      var grounded=false;
      if(bw.y>=480){bw.y=480;bw.vy=0;grounded=true;}
      if(bw.y>=380&&bw.y<=398&&bw.vy>=0&&((bw.x>=150&&bw.x<=350)||(bw.x>=610&&bw.x<=810))){
        bw.y=380;bw.vy=0;grounded=true;
      }
      // Passive slide toward nearest enemy
      if(grounded){
        bw.vx*=0.9;
        var nearest=null, nearD=999999;
        for(var bwj=0;bwj<this._rbBrawlers.length;bwj++){
          if(bwj===bwi) continue;
          var d2=Math.abs(this._rbBrawlers[bwj].x-bw.x);
          if(d2<nearD){nearD=d2;nearest=this._rbBrawlers[bwj];}
        }
        if(nearest){
          bw.facing=nearest.x>bw.x?1:-1;
          bw.vx+=bw.facing*120*dt;
        }
        // Random jump
        if(Math.random()<0.005){bw.vy=-400;grounded=false;}
      }
      // Attack
      if(bw.atkT<=0){
        var target=null;
        do{var ti=Math.floor(Math.random()*this._rbBrawlers.length);}while(ti===bwi);
        target=this._rbBrawlers[ti];
        bw.facing=target.x>bw.x?1:-1;
        if(grounded&&Math.random()<0.4) bw.vy=-380;
        this._rbProjs.push({x:bw.x,y:bw.y-20,vx:bw.facing*320+(Math.random()-0.5)*60,vy:-200+Math.random()*100,owner:bwi,t:0,col:bw.col});

      for(var bwk=0;bwk<this._rbBrawlers.length;bwk++){

    for(var bdi=0;bdi<this._rbBrawlers.length;bdi++){
      var bd=this._rbBrawlers[bdi];

      if(bd.type==='ed'){
        DRAW_ED.draw(g,bx,by,Math.floor(bd.bT/120)%4,bd.facing<0,bd.bT/100);
      } else if(bd.type==='daikon'){
        g.fillStyle(0xffffff,1); g.fillEllipse(bx,by-10,36,44);
        g.fillStyle(0x228822,1);
        g.fillTriangle(bx-10,by-28,bx-4,by-48,bx+2,by-28);
        g.fillTriangle(bx,by-30,bx+5,by-50,bx+12,by-30);
        g.fillTriangle(bx+8,by-27,bx+14,by-45,bx+18,by-27);
        g.fillStyle(0x111111,1); g.fillEllipse(bx-8,by-10,9,5); g.fillEllipse(bx+8,by-10,9,5);
      } else if(bd.type==='handtowel'){
        g.fillStyle(0x44aaff,1); g.fillCircle(bx,by-14,16);
        g.fillStyle(0x88ccff,1); g.fillRect(bx-12,by-28,24,10);
        g.fillStyle(0x111111,1); g.fillCircle(bx-5,by-15,3); g.fillCircle(bx+5,by-15,3);
        g.fillStyle(0x44aaff,1); g.fillRect(bx-10,by-2,20,18);
      } else if(bd.type==='queen'){
        g.fillStyle(0xff44cc,1); g.fillCircle(bx,by-14,17);
        g.fillStyle(0xffd700,1);
        g.fillTriangle(bx-14,by-28,bx-10,by-42,bx-4,by-28);
        g.fillTriangle(bx-2,by-28,bx+1,by-46,bx+4,by-28);
        g.fillTriangle(bx+6,by-28,bx+12,by-42,bx+16,by-28);
        g.fillStyle(0x111111,1); g.fillCircle(bx-6,by-14,3); g.fillCircle(bx+6,by-14,3);
        g.fillStyle(0xff44cc,1); g.fillEllipse(bx,by-1,32,20);
      } else if(bd.type==='admiral'){
        g.fillStyle(0x00ffaa,1); g.fillEllipse(bx,by-8,40,36);

var MOBILE_MODE = false;
var VPAD = {left:false,right:false,up:false,down:false,punch:false,kick:false};
function _patchKey(key, flag) {
  Object.defineProperty(key,'isDown',{
    get:function(){return VPAD[flag]||this._isDown;},
    set:function(v){this._isDown=v;},
    configurable:true, enumerable:true
  });
}
function _initVPad(scene) {
  VPAD.left=false; VPAD.right=false; VPAD.up=false; VPAD.down=false; VPAD.punch=false; VPAD.kick=false;
  _patchKey(scene.keys.left,  'left');
  _patchKey(scene.keys.right, 'right');
  _patchKey(scene.keys.altL,  'left');
  _patchKey(scene.keys.altR,  'right');
  _patchKey(scene.keys.up,    'up');
  _patchKey(scene.keys.altU,  'up');
  _patchKey(scene.keys.down,  'down');
  _patchKey(scene.keys.punch, 'punch');
  _patchKey(scene.keys.kick,  'kick');
  var vg=scene.add.graphics().setScrollFactor(0).setDepth(96).setVisible(MOBILE_MODE);
  // D-pad circle background
  vg.fillStyle(0x000000,0.38); vg.fillCircle(127,432,112);
  vg.lineStyle(1.5,0xffffff,0.18); vg.strokeCircle(127,432,112);
  vg.lineStyle(1,0xffffff,0.1); vg.lineBetween(22,432,232,432); vg.lineBetween(127,325,127,540);
  // Direction arrows
  vg.fillStyle(0x44cc77,0.8); vg.fillTriangle(127,338,108,370,146,370);
  vg.fillStyle(0x44cc77,0.8); vg.fillTriangle(127,526,108,494,146,494);
  vg.fillStyle(0x88aaff,0.8); vg.fillTriangle(37,432,67,414,67,450);
  vg.fillStyle(0x88aaff,0.8); vg.fillTriangle(217,432,187,414,187,450);
  // Z button (punch)
  vg.fillStyle(0x000000,0.4); vg.fillCircle(800,479,60);
  vg.lineStyle(2,0xff8833,0.8); vg.strokeCircle(800,479,60);
  vg.fillStyle(0xcc4400,0.5); vg.fillCircle(800,479,57);
  // X button (kick)
  vg.fillStyle(0x000000,0.4); vg.fillCircle(912,479,40);
  vg.lineStyle(2,0xffd60a,0.8); vg.strokeCircle(912,479,40);
  vg.fillStyle(0x997700,0.52); vg.fillCircle(912,479,37);
  // Labels
  scene.add.text(800,466,'Z',{fontFamily:'Inconsolata,monospace',fontSize:'28px',color:'#ffaa55',fontStyle:'bold',stroke:'#000000',strokeThickness:3}).setOrigin(0.5).setScrollFactor(0).setDepth(97).setVisible(MOBILE_MODE);
  scene.add.text(800,494,'PUNCH',{fontFamily:'Inconsolata,monospace',fontSize:'11px',color:'#ff9955',stroke:'#000000',strokeThickness:1}).setOrigin(0.5).setScrollFactor(0).setDepth(97).setVisible(MOBILE_MODE);
  scene.add.text(912,468,'X',{fontFamily:'Inconsolata,monospace',fontSize:'24px',color:'#ffdd44',fontStyle:'bold',stroke:'#000000',strokeThickness:3}).setOrigin(0.5).setScrollFactor(0).setDepth(97).setVisible(MOBILE_MODE);
  scene.add.text(912,494,'KICK',{fontFamily:'Inconsolata,monospace',fontSize:'11px',color:'#ffdd44',stroke:'#000000',strokeThickness:1}).setOrigin(0.5).setScrollFactor(0).setDepth(97).setVisible(MOBILE_MODE);
  // Touch detection (d-pad + action buttons + swipe gestures)
  var _swipeVPAD={left:false,right:false,up:false,down:false,punch:false};
  function _setFor(flag,ms){_swipeVPAD[flag]=true;scene.time.delayedCall(ms,function(){_swipeVPAD[flag]=false;});}
  var _swipeMap={};
  function _upd() {
    var _pk=VPAD.kick;
    VPAD.left=false; VPAD.right=false; VPAD.up=false; VPAD.down=false; VPAD.punch=false; VPAD.kick=false;
    var ptrs=scene.input.manager.pointers;
    for(var i=0;i<ptrs.length;i++) {
      var p=ptrs[i]; if(!p.isDown) continue;
      var ddx=p.x-127,ddy=p.y-432;
      if(ddx*ddx+ddy*ddy<112*112) {
        if(Math.abs(ddy)>=Math.abs(ddx)){if(ddy<0)VPAD.up=true;else VPAD.down=true;}
        else{if(ddx<0)VPAD.left=true;else VPAD.right=true;}
      }
      var zdx=p.x-800,zdy=p.y-479; if(zdx*zdx+zdy*zdy<60*60) VPAD.punch=true;
      var xdx=p.x-912,xdy=p.y-479; if(xdx*xdx+xdy*xdy<42*42) VPAD.kick=true;
    }
    VPAD.left=VPAD.left||_swipeVPAD.left;
    VPAD.right=VPAD.right||_swipeVPAD.right;
    VPAD.up=VPAD.up||_swipeVPAD.up;
    VPAD.down=VPAD.down||_swipeVPAD.down;
    VPAD.punch=VPAD.punch||_swipeVPAD.punch;
    if(VPAD.kick&&!_pk) scene.keys.kick._justDown=true;
  }
  scene.input.on('pointerdown',_upd);
  scene.input.on('pointermove',_upd);
  scene.input.on('pointerup',_upd);
  // Swipe gesture recognition
  scene.input.on('pointerdown',function(ptr){_swipeMap[ptr.id]={x:ptr.x,y:ptr.y,t:Date.now()};});
  scene.input.on('pointerup',function(ptr){
    var s=_swipeMap[ptr.id]; if(!s) return; delete _swipeMap[ptr.id];
    var dx=ptr.x-s.x,dy=ptr.y-s.y,dt=(Date.now()-s.t)||1;
    var len=Math.sqrt(dx*dx+dy*dy),spd=len/dt*1000;
    if(len<55||spd<200||dt>320) return;
    var ax=Math.abs(dx),ay=Math.abs(dy);
    if(s.x<500){
      if(ay>ax&&dy<0)      _setFor('up',130);
      else if(ay>ax&&dy>0) _setFor('down',110);
      else if(dx<0)        _setFor('left',220);
      else                 _setFor('right',220);
    } else {
      if((ay>ax&&dy<0)||dx>0){_swipeVPAD.punch=true;scene.time.delayedCall(20,function(){_swipeVPAD.punch=false;});}
      else{scene.keys.kick._justDown=true;}
    }
  });
}

function _startBgAnim(scene,opts){
  opts=opts||{};
  var color=opts.color||0xffffff, count=opts.count||20, spd=opts.speed||1.0;
  var sMin=(opts.size||[0.8,2])[0], sMax=(opts.size||[0.8,2])[1];
  var W=960,H=540;
  var g=scene.add.graphics().setDepth(1).setScrollFactor(0);
  var parts=[];
  for(var i=0;i<count;i++){
    parts.push({x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-0.5)*spd*18,vy:-Math.random()*spd*12-spd*4,
      a:Math.random()*Math.PI*2,aV:(Math.random()*0.4+0.2)*0.033,
      r:sMin+Math.random()*(sMax-sMin)});
  }
  scene.time.addEvent({delay:33,loop:true,callback:function(){
    g.clear();
    for(var i=0;i<parts.length;i++){
      var p=parts[i];
      p.x+=p.vx*0.033; p.y+=p.vy*0.033; p.a+=p.aV;
      if(p.x<0)p.x+=W; if(p.x>W)p.x-=W;
      if(p.y<0)p.y+=H; if(p.y>H)p.y-=H;
      g.fillStyle(color,0.06+Math.abs(Math.sin(p.a))*0.22);
      g.fillCircle(p.x,p.y,p.r);
    }
  }});
}

  g.fillTriangle(x+sc*10,y-sc*76,x+sc*26,y-sc*60,x+sc*16,y-sc*54);

  // Face - sunglasses
  var gy2=y-sc*38;
  g.fillStyle(0x080010,0.95); g.fillEllipse(x-sc*14,gy2,sc*20,sc*11); g.fillEllipse(x+sc*14,gy2,sc*20,sc*11);
  g.lineStyle(2,0xbbbbbb,1); g.lineBetween(x-sc*4,gy2,x+sc*4,gy2);
  g.lineStyle(1.5,0x888888,0.8); g.lineBetween(x-sc*24,gy2,x-sc*27,gy2); g.lineBetween(x+sc*24,gy2,x+sc*27,gy2);
  if(dk.hp<50){g.lineStyle(3,0xff1111,1);g.lineBetween(x-sc*22,gy2-sc*9,x-sc*6,gy2-sc*6);g.lineBetween(x+sc*6,gy2-sc*6,x+sc*22,gy2-sc*9);}
  // Block visual
  if(dk.blocking){g.lineStyle(3,0x8888ff,0.7);g.strokeCircle(x,y-40,54);}

Level15Scene.prototype._updateDk=function(dt,delta){
  var dk=this.dk,ed=this.ed,self=this;
  dk.facing=ed.x<dk.x?-1:1;
  dk.stateT+=delta; dk.aiTimer-=delta;
  if(dk.hurtTimer>0){dk.state='hurt';dk.hurtTimer-=delta;if(dk.hurtTimer<=0){dk.state='idle';dk.stateT=0;}dk.vx*=0.7;return;}
  dk.blocking=false;
  var dist=Math.abs(ed.x-dk.x);
  // Heartbreak beam active
  if(dk.state==='heartbreak'){
    dk.beamChargeT+=delta;
    if(dk.beamChargeT>=1500){
      dk.beamActive=true;dk.beamT=900;dk.beamFired=true;dk.state='idle';dk.stateT=0;dk.aiTimer=1200;
      this.cameras.main.shake(500,0.04); SOUND.blast();
      this._flash('LHC HEARTBREAK BEAM!!!',1100,'#cc88ff');
      try{var fl=this.add.graphics().setScrollFactor(0).setDepth(80);fl.fillStyle(0xcc33ff,0.5);fl.fillRect(0,0,960,540);this.time.delayedCall(80,function(){fl.destroy();});}catch(e){}
    }
    dk.vx*=0.8; return;
  }
  // AI decision
  if(dk.aiTimer<=0){
    var r=Math.random();
    if(!dk.beamFired&&dk.hp<60&&dist>100){dk.state='heartbreak';dk.beamChargeT=0;dk.stateT=0;dk.aiTimer=2500;this._flash('LHC... FORGIVE ME...',1400,'#cc88ff');}
    else if(dist>280){if(r<0.48){dk.state='spike';}else if(r<0.82){dk.state='approach';}else{dk.state='idle';}dk.aiTimer=550+Math.random()*400;}
    else if(dist>140){if(r<0.30){dk.state='spike';}else if(r<0.55){dk.state='approach';}else if(r<0.78){dk.state='summon';}else{dk.state='block';}dk.aiTimer=450+Math.random()*500;}
    else{if(r<0.40){dk.state='retreat';}else if(r<0.68){dk.state='block';}else{dk.state='summon';}dk.aiTimer=380+Math.random()*420;}
    dk.stateT=0;
  }
  var maxMochis=dk.hp<40?3:2;
  if(dk.state==='idle'){dk.vx*=0.82;}
  else if(dk.state==='approach'){dk.vx=(ed.x<dk.x?-1:1)*(dk.hp<40?110:90);if(dist<120){dk.state='idle';dk.aiTimer=0;}}
  else if(dk.state==='retreat'){dk.vx=(ed.x<dk.x?1:-1)*90;if(dist>300){dk.state='idle';dk.aiTimer=0;}}
  else if(dk.state==='spike'){dk.vx*=0.7;if(dk.stateT>=380){dk.projectiles.push({x:dk.x+dk.facing*30,y:dk.y-35,vx:dk.facing*320,spin:0});SOUND.kick();dk.state='idle';dk.stateT=0;dk.aiTimer=580+Math.random()*350;}}
  else if(dk.state==='block'){dk.blocking=true;dk.vx*=0.7;if(dk.stateT>=900){dk.state='idle';dk.stateT=0;}}
  else if(dk.state==='summon'){if(dk.mochis.length<maxMochis){var mDir=ed.x>dk.x?1:-1;dk.mochis.push({x:dk.x+mDir*55,y:472,vx:mDir*80,dieT:-1});spawnExplosion(dk.x,dk.y-30,0xff00cc,1.5);}dk.state='idle';dk.stateT=0;}
  // Physics
  dk.vy=Math.min(dk.vy+600*dt,600); dk.x+=dk.vx*dt; dk.y+=dk.vy*dt; dk.grounded=false;
  for(var pi=0;pi<this.platRects.length;pi++){var pl=this.platRects[pi];if(dk.vy>=0&&dk.y>=pl.y&&dk.y<=pl.y+pl.h+8&&dk.x-30<pl.x+pl.w&&dk.x+30>pl.x){if(dk.y-dk.vy*dt<pl.y+3){dk.y=pl.y;dk.vy=0;dk.grounded=true;}}}
  if(dk.x<80){dk.x=80;dk.vx=0;} if(dk.x>880){dk.x=880;dk.vx=0;}
};

  else{this.comboText.setAlpha(0);}

Level15Scene.prototype.update=function(time,delta){
  this.levelT+=delta;
  var dt=delta/1000,ed=this.ed,dk=this.dk,match=this.match;
  // ── Input ──
  var pad=this.input.gamepad&&this.input.gamepad.total>0?this.input.gamepad.getPad(0):null;
  var gpL=false,gpR=false,gpJ=false,gpKick=false,gpPunchHeld=false;
  if(pad){var axV=pad.axes.length>0?pad.axes[0].getValue():0;gpL=(pad.left)||(axV<-0.3);gpR=(pad.right)||(axV>0.3);gpJ=(pad.up)||(pad.A&&pad.A.pressed);gpPunchHeld=!!(pad.X&&pad.X.pressed);var kNow=pad.B&&pad.B.pressed;gpKick=kNow&&!this._prevKickGP;this._prevKickGP=kNow;}
  var goL=this.keys.left.isDown||this.keys.altL.isDown||gpL||(VPAD&&VPAD.left);
  var goR=this.keys.right.isDown||this.keys.altR.isDown||gpR||(VPAD&&VPAD.right);
  var goJ=this.keys.up.isDown||this.keys.altU.isDown||gpJ||(VPAD&&VPAD.jump);
  var zHeld=this.keys.punch.isDown||gpPunchHeld||(VPAD&&VPAD.punch);
  var zWasHeld=this._prevZHeld||false;
  var zJustReleased=!zHeld&&zWasHeld;
  this._prevZHeld=zHeld;
  var doKick=Phaser.Input.Keyboard.JustDown(this.keys.kick)||gpKick;
  // ── Match state machine ──
  match.stateT+=delta;
  if(match.state==='INTRO'){
    if(this.levelT>=this._introEnd){match.state='ROUND_ANNOUNCE';match.stateT=0;this._showCenter('ROUND '+match.round,null,0);}
    updateSmoke();updateExplosions();
    this.edG.clear(); DRAW_ED.draw(this.edG,ed.x,ed.y,0,ed.facing<0,ed.cigF);
    this.bossG.clear(); this._drawDk(this.bossG,dk);
    this.beamG.clear(); this._drawHUD();
    return;
  }
  if(match.state==='ROUND_ANNOUNCE'){
    if(match.stateT>=600){match.state='FIGHT_START';match.stateT=0;this._showCenter('FIGHT!',null,800);}
    updateSmoke();updateExplosions();
    this.edG.clear(); DRAW_ED.draw(this.edG,ed.x,ed.y,0,ed.facing<0,ed.cigF);
    this.bossG.clear(); this._drawDk(this.bossG,dk);
    this.beamG.clear(); this._drawHUD();
    return;
  }
  if(match.state==='FIGHT_START'){
    if(match.stateT>=800){match.state='FIGHT';match.stateT=0;this.sfCenterTxt.setAlpha(0);this.sfSubTxt.setAlpha(0);}
    updateSmoke();updateExplosions();
    this.edG.clear(); DRAW_ED.draw(this.edG,ed.x,ed.y,0,ed.facing<0,ed.cigF);
    this.bossG.clear(); this._drawDk(this.bossG,dk);
    this.beamG.clear(); this._drawHUD();
    return;
  }
  if(match.state==='KO'){
    if(match.stateT>=2400){
      if(match.winner==='ed'){match.edWins++;}else{match.dkWins++;}
      if(match.edWins>=2){match.state='WIN';match.stateT=0;this._showCenter('YOU WIN!','CIG SALESMAN PREVAILS',0);}
      else if(match.dkWins>=2){match.state='LOSE';match.stateT=0;this._showCenter('K.O.','DAIKON LORD WINS...',0);}
      else{match.round++;this._resetRound();match.state='ROUND_ANNOUNCE';match.stateT=0;this._showCenter('ROUND '+match.round,null,0);}
    }
    updateSmoke();updateExplosions();
    this.edG.clear(); DRAW_ED.draw(this.edG,ed.x,ed.y,7,ed.facing<0,ed.cigF);
    this.bossG.clear(); this._drawDk(this.bossG,dk);
    this.beamG.clear(); this._drawHUD();
    return;
  }
  if(match.state==='WIN'){
    if(match.stateT>=2800){this._beatLevel();}
    updateSmoke();updateExplosions();
    this.edG.clear(); DRAW_ED.draw(this.edG,ed.x,ed.y,0,ed.facing<0,ed.cigF);
    this.bossG.clear(); this._drawDk(this.bossG,dk);
    this.beamG.clear(); this._drawHUD();
    return;
  }
  if(match.state==='LOSE'){
    if(match.stateT>=2800){SMOKE_POOL.length=0;EX_POOL.length=0;FIRE_POOL.length=0;this.cameras.main.setRotation(0);this.scene.start('WorldMap');}
    updateSmoke();updateExplosions();
    this.edG.clear(); DRAW_ED.draw(this.edG,ed.x,ed.y,7,ed.facing<0,ed.cigF);
    this.bossG.clear(); this._drawDk(this.bossG,dk);
    this.beamG.clear(); this._drawHUD();
    return;
  }
  // ── FIGHT state ──
  // Charge system
  if(zHeld&&ed.punchTimer<=0&&ed.kickTimer<=0&&!ed.spinKick){
    var _pct=ed.chargeT; ed.chargeT+=delta;
    if(ed.chargeT>200&&Math.floor(ed.chargeT/300)>Math.floor(_pct/300))SOUND.charge();

WorldMap2Scene.prototype._updateHudW2 = function(){
  this.hudTxt.setText('ALOE: '+EWR_STATE.aloe+'  HP: '+EWR_STATE.health[0]+'/'+EWR_STATE.maxHealth[0]);
};

WorldMap2Scene.prototype._drawEdW2 = function(){
  var g=this.edG; g.clear();
  var p=this._t2pW2(this.edTile.x,this.edTile.y);
  var ex=p.x, ey=p.y-10;
  g.fillStyle(0x00ffcc,1); g.fillCircle(ex,ey-8,9);
  g.fillStyle(0x050010,1); g.fillCircle(ex-3,ey-10,2); g.fillCircle(ex+3,ey-10,2);
  g.fillStyle(0x00ffcc,0.9); g.fillRect(ex-7,ey,14,16);
};

WorldMap2Scene.prototype._t2pW2 = function(tx,ty){
  return {x:this.offX+tx*this.tW+this.tW/2, y:this.offY+ty*this.tH+this.tH+60};
};

WorldMap2Scene.prototype._getTileW2 = function(tx,ty){
  if(ty<0||ty>=W2_ROWS.length) return null;
  var row=W2_ROWS[ty]; if(tx<0||tx>=row.length) return null;
  var ch=row[tx]; return W2_TILES[ch]||null;
};

WorldMap2Scene.prototype._drawMapW2 = function(){
  var g=this.mapG, self=this;
  g.clear();
  for(var row=0;row<W2_ROWS.length;row++){
    for(var col=0;col<W2_ROWS[row].length;col++){
      var ch=W2_ROWS[row][col], tile=W2_TILES[ch]; if(!tile) continue;
      var px=self.offX+col*self.tW, py=self.offY+row*self.tH+60;
      switch(tile.type){
        case 'neon_wall':
          g.fillStyle(0x0a0020,1); g.fillRect(px,py,self.tW,self.tH);
          g.lineStyle(1,0x440088,0.8); g.strokeRect(px,py,self.tW,self.tH); break;
        case 'neon_path':
          g.fillStyle(0x050015,1); g.fillRect(px,py,self.tW,self.tH);
          g.lineStyle(1,0x00ffcc,0.25); g.strokeRect(px,py,self.tW,self.tH); break;
        case 'empty':
          g.fillStyle(0x070018,1); g.fillRect(px,py,self.tW,self.tH); break;
        case 'exit':
          g.fillStyle(0x070018,1); g.fillRect(px,py,self.tW,self.tH);
          g.fillStyle(0xff00ff,0.18); g.fillCircle(px+self.tW/2,py+self.tH/2,22);
          g.fillStyle(0xff00ff,1); g.fillCircle(px+self.tW/2,py+self.tH/2,12);
          g.fillStyle(0x050010,1); g.fillCircle(px+self.tW/2,py+self.tH/2,8);
          g.fillStyle(0x00ffcc,1); g.fillCircle(px+self.tW/2,py+self.tH/2,5); break;
        case 'level':
          g.fillStyle(0x070018,1); g.fillRect(px,py,self.tW,self.tH);
          var beaten2=EWR_STATE.levelsBeaten.indexOf(tile.id)>=0;
          g.fillStyle(beaten2?0x444444:0x00ffcc,0.22); g.fillCircle(px+self.tW/2,py+self.tH/2,22);
          g.fillStyle(beaten2?0x666666:0x00ffcc,1);    g.fillCircle(px+self.tW/2,py+self.tH/2,12);
          g.fillStyle(0x050010,1); g.fillCircle(px+self.tW/2,py+self.tH/2,8);
          g.fillStyle(beaten2?0x666666:0x00ffcc,1);    g.fillCircle(px+self.tW/2,py+self.tH/2,5); break;
        case 'race':
          var rUnlocked=EWR_STATE.levelsBeaten.indexOf('2-4')>=0;
          g.fillStyle(0x070018,1); g.fillRect(px,py,self.tW,self.tH);
          g.fillStyle(rUnlocked?0xffd700:0x554400,0.35); g.fillCircle(px+self.tW/2,py+self.tH/2,22);
          g.fillStyle(rUnlocked?0xffd700:0x554400,1); g.fillCircle(px+self.tW/2,py+self.tH/2,12);
          g.fillStyle(0x050010,1); g.fillCircle(px+self.tW/2,py+self.tH/2,8);
          g.fillStyle(rUnlocked?0xff6600:0x332200,1); g.fillCircle(px+self.tW/2,py+self.tH/2,5); break;
        case 'catspot':
        default:
          g.fillStyle(0x070018,1); g.fillRect(px,py,self.tW,self.tH); break;
      }
    }
  }
};

WorldMap2Scene.prototype._spawnCatsW2 = function(){
  for(var ri=0;ri<W2_ROWS.length;ri++){
    for(var ci=0;ci<W2_ROWS[ri].length;ci++){
      if(W2_ROWS[ri][ci]==='C'){
        var p=this._t2pW2(ci,ri);
        this.mapCats.push({x:p.x,y:p.y-10,ci:0,tailAng:0,facing:1,wT:0,sitting:true,petted:false});
      }
    }
  }
};

WorldMap2Scene.prototype._tryEnterW2 = function(){
  var tile=this._getTileW2(this.edTile.x,this.edTile.y);
  if(!tile) return;
  if(tile.type==='exit'){
    EWR_STATE.playerPosW2={x:this.edTile.x,y:this.edTile.y};
    SMOKE_POOL.length=0;EX_POOL.length=0;FIRE_POOL.length=0;
    this.scene.start('WorldMap'); return;
  }
  if(tile.type==='race'){
    if(EWR_STATE.levelsBeaten.indexOf('2-4')<0){
      var self=this; this.nodeTxt.setText('Beat The Cat Cig Parade first!').setAlpha(1);
      this.time.delayedCall(2200,function(){self.nodeTxt.setAlpha(0);}); return;
    }
    SMOKE_POOL.length=0;EX_POOL.length=0;FIRE_POOL.length=0;
    EWR_STATE.raceUnlocked=true; this.scene.start('FZeroMenu'); return;
  }
  if(tile.type==='level'){
    var gateMsg2=null;
    if(tile.id==='2-2'&&EWR_STATE.levelsBeaten.indexOf('2-1')<0) gateMsg2='Beat Signal Static first!';
    if(tile.id==='2-3'&&EWR_STATE.levelsBeaten.indexOf('2-2')<0) gateMsg2='Beat Chrome Alley first!';
    if(tile.id==='2-4'&&EWR_STATE.levelsBeaten.indexOf('2-3')<0) gateMsg2='Beat The Neon King first!';
    if(gateMsg2){
      var self=this;
      this.nodeTxt.setText(gateMsg2).setAlpha(1);
      this.time.delayedCall(2200,function(){self.nodeTxt.setAlpha(0);});
      return;
    }
    var destMap={'2-1':'Level21','2-2':'Level22','2-3':'Level23','2-4':'Level24'};
    var dest2=destMap[tile.id];
    if(dest2){EWR_STATE.playerPosW2={x:this.edTile.x,y:this.edTile.y};SMOKE_POOL.length=0;EX_POOL.length=0;FIRE_POOL.length=0;this.scene.start(dest2);}
  }
};

WorldMap2Scene.prototype._openShopW2 = function(){
  var W=960,H=540;
  this.shopOpen=true; this.shopSel=0;
  this.shopPanel.setAlpha(1);
  this.shopPanel.clear();
  this.shopPanel.fillStyle(0x050010,0.95); this.shopPanel.fillRoundedRect(W/2-200,H/2-130,400,260,12);
  this.shopPanel.lineStyle(2,0x00ffcc,1); this.shopPanel.strokeRoundedRect(W/2-200,H/2-130,400,260,12);
  this._renderShopW2();
};

WorldMap2Scene.prototype._renderShopW2 = function(){
  var items=[
    {key:'lifeSteal',  label:'Life Steal',   cost:350, desc:'Kills heal 0.33 HP'},
    {key:'aloeMagnet', label:'Aloe Magnet',  cost:200, desc:'Pickup range 44\u219244px\u219244140px'}
  ];
  var lines=['[ NEON DISTRICT SHOP ]',''];
  for(var i=0;i<items.length;i++){
    var it=items[i];
    var owned=EWR_STATE.shop[it.key];
    var prefix=this.shopSel===i?'> ':'  ';
    lines.push(prefix+(owned?'[OWNED] ':'')+it.label+' — '+it.cost+' aloe');
    lines.push('    '+it.desc);
    lines.push('');
  }
  lines.push('  [ESC / X to close]');
  this.shopTxt.setText(lines.join('\n')).setAlpha(1);
};

WorldMap2Scene.prototype._buyShopW2 = function(){
  var items=[
    {key:'lifeSteal',  cost:350},
    {key:'aloeMagnet', cost:200}
  ];
  var it=items[this.shopSel];
  if(!it) return;
  if(EWR_STATE.shop[it.key]){return;}
  if(EWR_STATE.aloe<it.cost){
    this.nodeTxt.setText('Not enough aloe!').setAlpha(1);
    var self=this; this.time.delayedCall(1500,function(){self.nodeTxt.setAlpha(0);});
    return;
  }
  EWR_STATE.aloe-=it.cost;
  EWR_STATE.shop[it.key]=true;
  this._renderShopW2();
  this._updateHudW2();
};

WorldMap2Scene.prototype.update = function(time,delta){
  if(this.inputCooldown>0){this.inputCooldown-=delta; return;}
  // WS neon messages
  if(this.wsMsgTxt){
    this._wsMsgT=(this._wsMsgT||10000)-delta;
    if(this._wsMsgT<=0){
      this._wsMsgT=10000+Math.random()*12000;
      var nc=['#ff00ff','#00ffcc','#ff4444','#ffd700'][Math.floor(Math.random()*4)];
      this.wsMsgTxt.setText(WS_MSGS[Math.floor(Math.random()*WS_MSGS.length)]).setColor(nc).setAlpha(1);
      this.tweens.add({targets:this.wsMsgTxt,alpha:0,delay:3600,duration:900});
    }
  }
  if(this.w2TickerTxt){this._w2TickX-=1.5*(delta/16);this.w2TickerTxt.setPosition(this._w2TickX,526);if(this._w2TickX<-this.w2TickerTxt.width){this._w2TickN=(this._w2TickN+1)%W2_MAP_NEWS.length;this.w2TickerTxt.setText('⚡ '+W2_MAP_NEWS[this._w2TickN]+'  ◆  ');this._w2TickX=960;}}
  var cur=this.cursors;
  var upP=Phaser.Input.Keyboard.JustDown(cur.up);
  var downP=Phaser.Input.Keyboard.JustDown(cur.down);
  var leftP=Phaser.Input.Keyboard.JustDown(cur.left);
  var rightP=Phaser.Input.Keyboard.JustDown(cur.right);
  var zJD=Phaser.Input.Keyboard.JustDown(this.keyZ);
  var xJD=Phaser.Input.Keyboard.JustDown(this.keyX2);
  var entJD=Phaser.Input.Keyboard.JustDown(this.keyEnter);

  if(this.shopOpen){
    var items2=[{key:'lifeSteal'},{key:'aloeMagnet'}];
    if(upP){this.shopSel=Math.max(0,this.shopSel-1);this._renderShopW2();}
    if(downP){this.shopSel=Math.min(items2.length-1,this.shopSel+1);this._renderShopW2();}
    if(zJD||entJD){this._buyShopW2();}
    if(xJD){this.shopOpen=false;this.shopPanel.setAlpha(0);this.shopTxt.setAlpha(0);}
    return;
  }

  var moved=false;
  var nx=this.edTile.x, ny=this.edTile.y;
  if(upP)    ny--;
  if(downP)  ny++;
  if(leftP)  nx--;
  if(rightP) nx++;
  if(nx!==this.edTile.x||ny!==this.edTile.y){
    var nt=this._getTileW2(nx,ny);
    var gateW2=null;
    if(nt&&nt.type==='level'){
      var b2=EWR_STATE.levelsBeaten;
      if(nt.id==='2-2'&&b2.indexOf('2-1')<0) gateW2='Beat Signal Static first!';
      else if(nt.id==='2-3'&&b2.indexOf('2-2')<0) gateW2='Beat Chrome Alley first!';
      else if(nt.id==='2-4'&&b2.indexOf('2-3')<0) gateW2='Beat The Neon King first!';
    }
    if(gateW2){
      var selfG2=this; this.nodeTxt.setText('🔒 '+gateW2).setAlpha(1);
      this.time.delayedCall(2200,function(){selfG2.nodeTxt.setAlpha(0);});
    } else if(nt&&nt.passable){
      this.edTile.x=nx; this.edTile.y=ny; moved=true;
      this.inputCooldown=140;
      if(nt.label){this.nodeTxt.setText(nt.label).setAlpha(1);this.time.delayedCall(1800,function(){});}
      else{this.nodeTxt.setAlpha(0);}
    }
  }
  if((zJD||entJD)&&!moved){
    this._tryEnterW2();
  }
  if(xJD&&!moved){
    // Check shop — shop is near exit tile
    var shopTile=this._getTileW2(this.edTile.x,this.edTile.y);
    if(shopTile&&shopTile.type==='neon_path'){this._openShopW2();}
  }
  // Cat petting
  for(var ci=0;ci<this.mapCats.length;ci++){
    var cat=this.mapCats[ci]; cat.tailAng+=0.04;
    var ep2=this._t2pW2(this.edTile.x,this.edTile.y);
    if(zJD&&Math.abs(ep2.x-cat.x)<50&&!cat.petted){
      cat.petted=true; EWR_STATE.aloe+=ALOE.catPet; EWR_STATE.catsPetted++;
      this.nodeTxt.setText('+'+ALOE.catPet+' ALOE  (neon meow!)').setAlpha(1);
      this._updateHudW2();
    }
  }
  if(moved){this._drawEdW2(); this._drawMapW2();}
  // Draw cats
  var cg=this.catG; cg.clear();
  for(var ci2=0;ci2<this.mapCats.length;ci2++){
    var ct=this.mapCats[ci2];
    cg.fillStyle(0x00ffcc,1); cg.fillCircle(ct.x,ct.y-8,7);
    cg.fillStyle(0x050010,1); cg.fillCircle(ct.x-2,ct.y-10,1); cg.fillCircle(ct.x+2,ct.y-10,1);
    cg.fillStyle(0xff00ff,1); cg.fillRect(ct.x-5,ct.y,10,10);
    cg.lineStyle(1,0x00ffcc,0.8); cg.beginPath();
    cg.moveTo(ct.x,ct.y+10);
    cg.lineTo(ct.x+Math.sin(ct.tailAng)*12,ct.y+20); cg.strokePath();
  }
};
