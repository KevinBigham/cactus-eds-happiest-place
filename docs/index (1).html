// SLOT MACHINE — AAA mini-game (triggered after Level 1-2 beat)
// ════════════════════════════════════════════════════════════════
var SL_SYMS=['CIG','CAT','VOID','ALOE','MOCHI','7 7 7','BEEF'];
var SL_COLS=[0xffd700,0xff9f43,0xcc44ff,0x00e676,0xff4444,0xffffff,0xff8888];
function SlotMachineScene(){ Phaser.Scene.call(this,{key:'SlotMachine'}); }
SlotMachineScene.prototype=Object.create(Phaser.Scene.prototype);
SlotMachineScene.prototype.constructor=SlotMachineScene;
SlotMachineScene.prototype.create=function(){
  var W=960,H=540,self=this;
  this._t=0; this._done=false;
  this._stopT=[1500,2500,3500]; // when each reel stops
  this._stopped=[false,false,false];
  // Pre-determine result
  var r=Math.random();
  var result;
  if(r<0.05) result='jackpot';
  else if(r<0.30) result='double';
  else result='miss';
  // Choose symbols based on result
  var s0,s1,s2;
  if(result==='jackpot'){
    var ji=Math.floor(Math.random()*SL_SYMS.length);
    s0=ji;s1=ji;s2=ji;
    if(s0===2) { result='void_jackpot'; } // 3x VOID special
  } else if(result==='double'){
    var di=Math.floor(Math.random()*SL_SYMS.length);
    s0=di;s1=di;
    do{s2=Math.floor(Math.random()*SL_SYMS.length);}while(s2===di);
    if(Math.random()<0.5){var tmp=s1;s1=s2;s2=tmp;} // randomize which differs
  } else {
    s0=Math.floor(Math.random()*SL_SYMS.length);
    do{s1=Math.floor(Math.random()*SL_SYMS.length);}while(s1===s0);
    do{s2=Math.floor(Math.random()*SL_SYMS.length);}while(s2===s0||s2===s1);
  }
  this._finalSyms=[s0,s1,s2];
  this._result=result;
  // Current displayed symbol index per reel (spinning)
  this._spinIdx=[0,0,0];
  this._spinSpeed=12; // frames between symbol changes while spinning
  this._spinCounter=0;
  // Graphics
  this.bgG=this.add.graphics().setDepth(0);
  this.slotG=this.add.graphics().setDepth(2);
  this.hudG=this.add.graphics().setDepth(5);
  // Text objects for reel symbols
  var reelStyle={fontFamily:'Bangers,Georgia,serif',fontSize:'32px',color:'#ffffff',stroke:'#000000',strokeThickness:5,align:'center'};
  var rx=[W/2-155,W/2,W/2+155];
  this._reelTxts=[];
  for(var i=0;i<3;i++){
    this._reelTxts.push(this.add.text(rx[i],H/2+10,SL_SYMS[0],reelStyle).setOrigin(0.5).setDepth(4));
  }
  this.flashTxt=this.add.text(W/2,130,'',{fontFamily:'Bangers,Georgia,serif',fontSize:'50px',color:'#ffd700',stroke:'#000000',strokeThickness:8}).setOrigin(0.5).setDepth(10).setAlpha(0);
  this.wsTxt=this.add.text(W/2,H-36,'',{fontFamily:'Inconsolata,monospace',fontSize:'14px',color:'#ff44aa',stroke:'#000000',strokeThickness:2}).setOrigin(0.5).setDepth(6).setAlpha(0);
  this.add.text(W/2,28,'ED\'S LUCKY CIG SLOTS',{fontFamily:'Bangers,Georgia,serif',fontSize:'36px',color:'#ffd700',stroke:'#000000',strokeThickness:6}).setOrigin(0.5).setDepth(6);
  // WS spin messages
  var wsSpinMsgs=['THE MACHINE KNOWS','GAMBLING IS LOVING YOURSELF','THIS IS FINE','SPIN IS TRUTH','DO NOT LOOK AT THE REELS (LOOK AT THE REELS)','THE SYMBOLS ARE CHOSEN','FATE IS ALSO A CIG'];
  var wsIdx=0;
  this._wsSpinTimer=2500;
  this._wsSpinMsgs=wsSpinMsgs; this._wsSpinIdx=0;
  // Result revealed flags
  this._revealed=false;
  this._revealDelay=3800;
  SOUND.pickup();
};
SlotMachineScene.prototype._flash=function(txt,dur,sz,col){
  var self=this;
  this.flashTxt.setText(txt).setFontSize((sz||42)+'px').setColor(col||'#ffd700').setAlpha(1);
  this.tweens.add({targets:this.flashTxt,alpha:0,duration:dur||1200,delay:300});
};
SlotMachineScene.prototype.update=function(time,delta){
  if(this._done) return;
  var self=this;
  this._t+=delta;
  // WS spin messages
  this._wsSpinTimer-=delta;
  if(this._wsSpinTimer<=0){
    this._wsSpinTimer=2200+Math.random()*1500;
    var wm=this._wsSpinMsgs[this._wsSpinIdx%this._wsSpinMsgs.length]; this._wsSpinIdx++;
    this.wsTxt.setText(wm).setAlpha(1);
    this.tweens.add({targets:this.wsTxt,alpha:0,delay:1800,duration:600});
  }
  // Reel spinning
  this._spinCounter+=delta;
  var spinRate=80; // ms per symbol change while spinning
  if(this._spinCounter>=spinRate){
    this._spinCounter=0;
    for(var i=0;i<3;i++){
      if(!this._stopped[i]){
        this._spinIdx[i]=(this._spinIdx[i]+1)%SL_SYMS.length;
        this._reelTxts[i].setText(SL_SYMS[this._spinIdx[i]]);
        var cc=SL_COLS[this._spinIdx[i]]; 
        this._reelTxts[i].setColor('#'+('000000'+cc.toString(16)).slice(-6));
      }
    }
  }
  // Stop reels at scheduled times
  for(var ri=0;ri<3;ri++){
    if(!this._stopped[ri]&&this._t>=this._stopT[ri]){
      this._stopped[ri]=true;
      this._spinIdx[ri]=this._finalSyms[ri];
      this._reelTxts[ri].setText(SL_SYMS[this._finalSyms[ri]]);
      var fc=SL_COLS[this._finalSyms[ri]];
      this._reelTxts[ri].setColor('#'+('000000'+fc.toString(16)).slice(-6));
      SOUND.punch(); this.cameras.main.shake(80,0.007);
    }
  }
  // Reveal result
  if(!this._revealed&&this._t>=this._revealDelay){
    this._revealed=true;
    var res=this._result;
    var reward=0;
    if(res==='void_jackpot'){
      reward=80; EWR_STATE.aloe+=reward;
      this._flash('THE VOID WINS. SO DO YOU.',2200,28,'#cc44ff');
      SOUND.victory();
    } else if(res==='jackpot'){
      reward=150; EWR_STATE.aloe+=reward;
      SOUND.victory();
      for(var jj=0;jj<3;jj++){(function(d){self.time.delayedCall(d,function(){SOUND.victory();self.cameras.main.shake(200,0.02);});})(jj*300);}
      this._flash('JACKPOT!!! +150 ALOE',2400,44,'#ffd700');
    } else if(res==='double'){
      reward=50; EWR_STATE.aloe+=reward;
      this._flash('+50 ALOE / CLOSE ENOUGH',1800,30,'#ffcc00');
      SOUND.pickup();
    } else {
      reward=10; EWR_STATE.aloe+=reward;
      var missMsgs=['THE MACHINE SAW YOUR SOUL / +10 ALOE','BETTER LUCK IN THE ECONOMY / +10','THE CIG WINS / YOU WIN ANYWAY / +10','BEEF / +10 ALOE'];
      this._flash(missMsgs[Math.floor(Math.random()*missMsgs.length)],2000,20,'#aaaaaa');
    }
    this.time.delayedCall(3500,function(){ self._done=true; self.scene.start('WorldMap',{aloeEarned:reward}); });
  }
  this._draw();
};
SlotMachineScene.prototype._draw=function(){
  var W=960,H=540;
  var t=this._t;
  // Background — dark purple casino
  this.bgG.clear();
  this.bgG.fillStyle(0x12002a,1); this.bgG.fillRect(0,0,W,H);
  // Pulsing border
  var pulse=0.5+Math.sin(t*0.003)*0.5;
  this.bgG.lineStyle(3,0xffd700,0.4+pulse*0.4); this.bgG.strokeRect(8,8,W-16,H-16);
  this.bgG.lineStyle(2,0xcc44ff,0.2+pulse*0.3); this.bgG.strokeRect(14,14,W-28,H-28);
  // Reel backgrounds
  this.slotG.clear();
  var rx2=[W/2-155,W/2,W/2+155];
  for(var i=0;i<3;i++){
    var stopped=this._stopped[i];
    var rc=stopped?0xcc44ff:0x220044;
    this.slotG.fillStyle(rc,stopped?0.25:0.12); this.slotG.fillRoundedRect(rx2[i]-65,H/2-55,130,110,8);
    this.slotG.lineStyle(2,stopped?0xffd700:0x440088,1); this.slotG.strokeRoundedRect(rx2[i]-65,H/2-55,130,110,8);
    // spinning lines inside reel
    if(!stopped){
      var lineOff=((t*0.3)+i*40)%110;
      this.slotG.lineStyle(1,0x440088,0.3);
      for(var sl=0;sl<3;sl++){
        var ly=H/2-55+((lineOff+sl*37)%110);
        this.slotG.beginPath(); this.slotG.moveTo(rx2[i]-65,ly); this.slotG.lineTo(rx2[i]+65,ly); this.slotG.strokePath();
      }
    }
  }
  // Center pay line
  this.slotG.lineStyle(2,0xffd700,0.5); this.slotG.beginPath();
  this.slotG.moveTo(W/2-220,H/2+8); this.slotG.lineTo(W/2+220,H/2+8); this.slotG.strokePath();
  // Neon corner lights
  var cornerCols=[0xff00ff,0x00ffcc,0xffd700,0xff4444];
  var corners=[[30,80],[W-30,80],[30,H-80],[W-30,H-80]];
  for(var ci=0;ci<4;ci++){
    this.slotG.fillStyle(cornerCols[ci],0.4+Math.sin(t*0.004+ci)*0.3);
    this.slotG.fillCircle(corners[ci][0],corners[ci][1],8+Math.sin(t*0.005+ci)*3);
  }
};

GhostDodgeScene.prototype._setLivesText=function(){
  var s=''; for(var i=0;i<this._lives;i++) s+='< '; this.livesT.setText(s.trim());
};
GhostDodgeScene.prototype.update=function(time,delta){
  if(this._phase!=='playing') return;
  var dt=delta/1000;
  this._timeLeft-=delta; this._spawnT-=delta; this._wsMsgT-=delta; this._moveCool-=delta;
  if(this._wsMsgT<=0){
    this._wsMsgT=5000+Math.random()*3000;
    this.wsTxt.setText(this._wsMsgs[Math.floor(Math.random()*this._wsMsgs.length)]).setAlpha(1);
    this.tweens.add({targets:this.wsTxt,alpha:0,delay:2000,duration:700});
  }
  if(this._spawnT<=0){
    this._spawnT=700+Math.random()*900;
    var lane=Math.floor(Math.random()*3);
    this._ghosts.push({x:this._lanes[lane],y:-30,spd:160+Math.random()*80,col:Math.random()<0.5?0x00eeff:0xff44cc,lane:lane});
  }
  if(this._moveCool<=0){
    if(Phaser.Input.Keyboard.JustDown(this.leftKey)||Phaser.Input.Keyboard.JustDown(this.aKey)){this._laneIdx=Math.max(0,this._laneIdx-1);this._moveCool=180;}
    if(Phaser.Input.Keyboard.JustDown(this.rightKey)||Phaser.Input.Keyboard.JustDown(this.dKey)){this._laneIdx=Math.min(2,this._laneIdx+1);this._moveCool=180;}
  }
  for(var gi=this._ghosts.length-1;gi>=0;gi--){
    var gh=this._ghosts[gi]; gh.y+=gh.spd*dt;
    if(gh.y>430&&gh.lane===this._laneIdx){
      this._ghosts.splice(gi,1); this._lives--;
      this._setLivesText(); SOUND.hurt(); this.cameras.main.shake(100,0.012);
      if(this._lives<=0){this._endGame();return;}
      continue;
    }
    if(gh.y>540){
      if(gh.lane!==this._laneIdx){EWR_STATE.aloe+=4;this._score+=4;}
      this._ghosts.splice(gi,1); continue;
    }
  }
  if(this._timeLeft<=0){this._endGame();return;}
  var tf=Math.max(0,this._timeLeft/15000);
  this.timerG.clear();
  this.timerG.fillStyle(0x222233,1); this.timerG.fillRect(80,80,800,14);
  this.timerG.fillStyle(tf>0.5?0x00eeff:tf>0.25?0xffd700:0xff2200,1); this.timerG.fillRect(80,80,800*tf,14);
  this.ghostG.clear();

  this.playerG.fillStyle(0xffd700,1); this.playerG.fillRect(px-15,420,30,40);
  this.playerG.fillStyle(0xff8800,1); this.playerG.fillCircle(px,412,12);
  this.scoreTxt.setText('ALOE: +'+this._score);
};
GhostDodgeScene.prototype._endGame=function(){
  this._phase='done';
  var winMsg=this._lives>0?'SURVIVED! +'+this._score+' ALOE':'FAILED. THE GHOST WON.';
  this.feedTxt.setText(winMsg).setAlpha(1);
  if(this._lives>0) SOUND.victory(); else SOUND.hurt();
  var self=this;
  this.time.delayedCall(2500,function(){self.scene.start('WorldMap2');});
};

InsulinAdmiralScene.prototype._drawArenaIA=function(){

InsulinAdmiralScene.prototype._drawAdmiral=function(g,boss){
  if(boss.dieT>=0)return;
  var bx=boss.x,by=boss.y;
  var hitCol=boss.hitFlash>0?0xffffff:null;
  var ph3glow=boss.phase===3?Math.abs(Math.sin(boss.bT*0.005))*0.8:0;
  // syringe ship (horizontal, 130px wide)
  // barrel
  g.fillStyle(hitCol||0xffffff,0.92);g.fillRoundedRect(bx-65,by-12,100,24,4);
  // measurement lines
  g.fillStyle(0xff3300,0.7);
  for(var mi=0;mi<4;mi++)g.fillRect(bx-55+mi*20,by-12,2,24);
  // plunger (left side)
  g.fillStyle(hitCol||0xdd2200,1);g.fillRoundedRect(bx-74,by-14,14,28,2);
  // needle (right side)
  g.fillStyle(0xbbbbbb,1);g.fillRect(bx+35,by-3,22,6);
  g.fillStyle(0x888888,1);g.fillTriangle(bx+57,by-3,bx+57,by+9,bx+70,by+3);
  // cockpit dome (glass bubble on top)
  if(boss.phase===3){g.fillStyle(0xff5500,ph3glow*0.6);g.fillCircle(bx-20,by-12,22);}
  g.fillStyle(hitCol||0x224466,0.85);g.fillCircle(bx-20,by-12,18);
  g.fillStyle(0x88ccff,0.4);g.fillCircle(bx-24,by-16,8);
  // admiral silhouette in cockpit
  g.fillStyle(0x003355,1);g.fillCircle(bx-20,by-14,7);g.fillRoundedRect(bx-24,by-8,8,10,2);
  // HP bar
  var hpFrac=Math.max(0,boss.hp/boss.maxHp);
  g.fillStyle(0x0a0a18,0.8);g.fillRoundedRect(bx-44,by-36,88,10,3);
  var hpCol=boss.phase===3?0xff0000:boss.phase===2?0xff8800:0xff3300;
  g.fillStyle(hpCol,1);g.fillRect(bx-42,by-34,Math.max(0,84*hpFrac),6);
  g.lineStyle(1,0xff8800,0.7);g.strokeRect(bx-44,by-36,88,10);
};

InsulinAdmiralScene.prototype._drawKamikaze=function(g,km){
  if(km.dieT>=0){
    if(km.dieT<300){g.fillStyle(0xff3300,0.6*(1-km.dieT/300));g.fillCircle(km.x,km.y,20*(km.dieT/300+0.5));}
    return;
  }
  var ia=km.diveAng||(-Math.PI/2);
  g.save();g.translateCanvas(km.x,km.y);g.rotateCanvas(ia);
  g.fillStyle(0xffffff,0.9);g.fillRoundedRect(-5,-20,10,28,2);
  g.fillStyle(0xff3300,0.7);for(var mi=0;mi<3;mi++)g.fillRect(-3,-14+mi*7,6,2);
  g.fillStyle(0xdd2200,1);g.fillRoundedRect(-5,-26,10,7,2);
  g.fillStyle(0xbbbbbb,1);g.fillRect(-1,8,2,12);
  g.fillStyle(0x888888,1);g.fillTriangle(-1,20,1,20,0,28);
  g.fillStyle(0xff0000,1);g.fillCircle(-2,-7,2.5);g.fillCircle(2,-7,2.5);
  g.restore();
};

InsulinAdmiralScene.prototype.update=function(time,delta){
  var self=this;var dt=delta/1000;
  this._t+=delta;
  if(this._beaten)return;
  var ep=this.ep,es=this.es,boss=this.boss;
  var W=960;

  // Ed physics
  ep.vy+=28;ep.vy=Math.min(ep.vy,700);
  if(es.hurtTimer>0)es.hurtTimer-=delta;
  if(es.punchTimer>0){es.punchTimer-=delta;es.punchActive=es.punchTimer>300&&es.punchTimer<700;}
  if(es.kickTimer>0){es.kickTimer-=delta;es.kickActive=es.kickTimer>200&&es.kickTimer<500;}
  var left=this.keys.left.isDown||this.keys.a.isDown;
  var right=this.keys.right.isDown||this.keys.d.isDown;
  var jumpJD=Phaser.Input.Keyboard.JustDown(this.keys.up)||Phaser.Input.Keyboard.JustDown(this.keys.w)||Phaser.Input.Keyboard.JustDown(this.keys.space);
  if(this.vpad){left=left||this.vpad.left;right=right||this.vpad.right;if(this.vpad.jumpJD)jumpJD=true;}
  if(left){ep.vx=Math.max(ep.vx-18,-140);es.facing=-1;}
  if(right){ep.vx=Math.min(ep.vx+18,140);es.facing=1;}
  if(!left&&!right)ep.vx*=0.75;
  if(jumpJD&&(ep.grounded||ep.coyoteMs>0)){ep.vy=-520;ep.grounded=false;ep.coyoteMs=0;SOUND.jump();}
  if(jumpJD&&!ep.grounded&&!ep.djUsed){ep.vy=-400;ep.djUsed=true;SOUND.jump();}
  ep.coyoteMs-=delta;ep.x+=ep.vx*dt;ep.y+=ep.vy*dt;
  ep.grounded=false;
  for(var pi=0;pi<this.plats.length;pi++){
    var p=this.plats[pi];
    if(ep.x+10>p.x&&ep.x-10<p.x+p.w&&ep.y>p.y&&ep.y-ep.vy*dt<=p.y+2){ep.y=p.y;ep.vy=0;ep.grounded=true;ep.coyoteMs=90;ep.djUsed=false;}
  }
  if(ep.y>560){ep.y=440;ep.vy=0;_takeDmg();SOUND.hurt();if(EWR_STATE.health[0]<=0){this._triggerDeathIA();return;}}
  if(ep.x<0)ep.x=0;if(ep.x>W)ep.x=W;
  if(Phaser.Input.Keyboard.JustDown(this.keys.z)&&es.punchTimer<=0){es.punchTimer=900;SOUND.punch();}
  if(Phaser.Input.Keyboard.JustDown(this.keys.x)&&es.kickTimer<=0){es.kickTimer=700;SOUND.kick();}

  if(this._t<this._introEnd+500){this._renderIA();return;}

  boss.bT+=delta;
  // Phase transitions
  if(boss.hp<=14&&boss.phase<3){
    boss.phase=3;boss.shotInterval=1400;boss.waveInterval=3000;boss.vx=boss.vx>0?140:-140;
    this._flash('ALL UNITS CONVERGE!',1800,30,'#ff0000');
    boss.alertFlash=1;
  } else if(boss.hp<=28&&boss.phase<2){
    boss.phase=2;boss.shotInterval=2600;boss.waveInterval=4000;boss.vx=boss.vx>0?120:-120;
    this._flash('DIVE PROTOCOL!',1600,30,'#ff8800');
  }

  // Admiral movement (phase 1+2: hover at y=280; phase 3: sweeps faster)
  if(!boss.diveMode){
    boss.x+=boss.vx*dt;
    if(boss.x<80){boss.x=80;boss.vx=Math.abs(boss.vx);boss.dir=1;}
    if(boss.x>W-80){boss.x=W-80;boss.vx=-Math.abs(boss.vx);boss.dir=-1;}
    // Phase 2: personal dive at player
    if(boss.phase>=2&&boss.diveCooldown<=0&&boss.bT%5500<delta){
      boss.diveMode=true;boss.diveT=0;
      var ddx=ep.x-boss.x,ddy=440-boss.y,dlen=Math.sqrt(ddx*ddx+ddy*ddy)||1;
      boss.diveVX=ddx/dlen*340;boss.diveVY=ddy/dlen*340;
      spawnExplosion(boss.x,boss.y,0xff3300,1.2);
    }
    if(boss.diveCooldown>0)boss.diveCooldown-=delta;
  } else {
    boss.x+=boss.diveVX*dt;boss.y+=boss.diveVY*dt;boss.diveT+=delta;
    if(es.hurtTimer<=0&&Math.abs(boss.x-ep.x)<40&&Math.abs(boss.y-ep.y)<30){
      _takeDmg();es.hurtTimer=1200;SOUND.hurt();ep.vy=-400;ep.vx=-es.facing*200;
      if(EWR_STATE.health[0]<=0){this._triggerDeathIA();return;}
    }
    if(boss.diveT>1200||boss.y>480){boss.diveMode=false;boss.diveCooldown=4000;boss.y=280;}
  }

  // Needle projectiles
  boss.shotT+=delta;
  if(boss.shotT>=boss.shotInterval){
    boss.shotT=0;
    var ang=Math.atan2(ep.y-boss.y,ep.x-boss.x);
    if(boss.phase===3){
      for(var fa=-1;fa<=1;fa++){var a2=ang+fa*0.45;boss.projectiles.push({x:boss.x+70*Math.cos(ang),y:boss.y,vx:Math.cos(a2)*300,vy:Math.sin(a2)*300,life:2000});}
    } else {
      boss.projectiles.push({x:boss.x+70*Math.cos(ang),y:boss.y,vx:Math.cos(ang)*270,vy:Math.sin(ang)*270,life:2000});
    }
  }
  for(var pj=boss.projectiles.length-1;pj>=0;pj--){
    var proj=boss.projectiles[pj];
    proj.x+=proj.vx*dt;proj.y+=proj.vy*dt;proj.life-=delta;
    if(proj.life<=0||proj.y>560||proj.x<-20||proj.x>W+20){boss.projectiles.splice(pj,1);continue;}
    if(es.hurtTimer<=0&&Math.abs(ep.x-proj.x)<16&&Math.abs(ep.y-proj.y)<16){
      boss.projectiles.splice(pj,1);_takeDmg();es.hurtTimer=1200;SOUND.hurt();ep.vy=-280;
      if(EWR_STATE.health[0]<=0){this._triggerDeathIA();return;}
    }
  }

  // Kamikaze waves
  boss.waveTimer+=delta;
  var waveCount=boss.phase===3?5:boss.phase===2?4:3;
  if(boss.waveTimer>=boss.waveInterval){
    boss.waveTimer=0;
    for(var wi=0;wi<waveCount;wi++){
      var wx=100+Math.random()*760,wy=60+wi*15;
      boss.activeWave.push({x:wx,y:wy,hp:1,dieT:-1,diving:false,bT:Math.random()*2000,dir:Math.random()<0.5?1:-1,pMin:50,pMax:910,baseY:60+wi*15,diveAng:-Math.PI/2,diveVX:0,diveVY:0,type:'insulin'});
    }
    this._flash('WAVE INBOUND!',1000,22,'#ff8800');
  }

  // Update wave kamikaze enemies
  for(var wi2=boss.activeWave.length-1;wi2>=0;wi2--){
    var km=boss.activeWave[wi2];
    if(km.dieT>=0){km.dieT+=delta;if(km.dieT>500)boss.activeWave.splice(wi2,1);continue;}
    km.bT+=delta;
    if(!km.diving){
      km.x+=km.dir*55*dt;km.y=(km.baseY||60)+Math.sin(km.bT*0.0022)*12;km.diveAng=-Math.PI/2;
      if(km.x<km.pMin){km.x=km.pMin;km.dir=1;}if(km.x>km.pMax){km.x=km.pMax;km.dir=-1;}
      if(km.bT>1200&&Math.abs(km.x-ep.x)<130){
        km.diving=true;km.bT=0;
        var ddx2=ep.x-km.x,ddy2=480-km.y,dlen2=Math.sqrt(ddx2*ddx2+ddy2*ddy2)||1;
        km.diveVX=ddx2/dlen2*420;km.diveVY=ddy2/dlen2*420;
      }
    } else {
      km.x+=km.diveVX*dt;km.y+=km.diveVY*dt;km.diveAng=Math.atan2(km.diveVY,km.diveVX)+Math.PI/2;
      if(es.hurtTimer<=0&&Math.abs(km.x-ep.x)<26&&Math.abs(km.y-ep.y)<26){
        es.hurtTimer=1200;_takeDmg();SOUND.hurt();
        if(EWR_STATE.health[0]<=0){this._triggerDeathIA();return;}
        km.dieT=0;spawnExplosion(km.x,km.y,0xff3300,1.8);km.diving=false;
      }
      if(km.y>510){km.dieT=0;spawnExplosion(km.x,km.y,0xff3300,1.2);km.diving=false;}
    }
    // Punch hits kamikaze
    if(es.punchActive&&Math.abs(ep.x+es.facing*56-km.x)<28&&Math.abs(ep.y-20-km.y)<28&&es.punchTimer>550){
      km.hp--;if(km.hp<=0){km.dieT=0;EWR_STATE.aloe+=ALOE.insulinDeath;spawnExplosion(km.x,km.y,0xff3300,1.4);}
    }
    // Kick hits kamikaze
    if(es.kickActive&&Math.abs(ep.x+es.facing*72-km.x)<28&&Math.abs(ep.y-10-km.y)<28&&es.kickTimer>380){
      km.hp--;if(km.hp<=0){km.dieT=0;EWR_STATE.aloe+=ALOE.insulinDeath;spawnExplosion(km.x,km.y,0xff3300,1.4);}
    }
  }

  // Boss contact damage
  if(es.hurtTimer<=0&&boss.dieT<0&&!boss.diveMode&&Math.abs(ep.x-boss.x)<42&&Math.abs(ep.y-boss.y)<28){
    _takeDmg();es.hurtTimer=1200;SOUND.hurt();ep.vy=-350;ep.vx=-es.facing*200;
    if(EWR_STATE.health[0]<=0){this._triggerDeathIA();return;}
  }
  // Punch hits boss
  if(es.punchActive&&boss.dieT<0&&Math.abs(ep.x+es.facing*56-boss.x)<50&&Math.abs(ep.y-20-boss.y)<28&&es.punchTimer>550){
    boss.hp--;boss.hitFlash=200;spawnExplosion(boss.x,boss.y,0xff3300,1.2);SOUND.bossHit();
    this.cameras.main.shake(120,0.008);

    }

function FZeroMenuScene(){ Phaser.Scene.call(this,{key:'FZeroMenu'}); }
FZeroMenuScene.prototype=Object.create(Phaser.Scene.prototype);
FZeroMenuScene.prototype.constructor=FZeroMenuScene;
FZeroMenuScene.prototype.create=function(){
  var self=this; var W=960, H=540;
  this._sel=0; this._done=false;
  var tracks=[FZERO_TRACKS.westport,FZERO_TRACKS.vine,FZERO_TRACKS.crossroads];
  this._tracks=tracks;
  var bg=this.add.graphics();
  // Space background
  bg.fillStyle(0x000010,1);bg.fillRect(0,0,W,H);
  for(var si=0;si<140;si++){bg.fillStyle(0xffffff,Math.random()*0.7+0.1);bg.fillCircle(Math.random()*W,Math.random()*H,Math.random()<0.2?1.5:0.8);}
  // KC Skyline
  bg.fillStyle(0x0a0010,1);
  var blds=[[0,80,60,160],[70,100,50,130],[130,75,70,155],[210,90,40,140],[260,60,80,170],[350,85,55,145],[415,70,65,160],[490,50,90,180],[590,80,70,150],[670,65,55,165],[735,90,45,140],[790,55,75,175],[875,75,85,155]];
  for(var bi=0;bi<blds.length;bi++){var bl=blds[bi];bg.fillRect(bl[0],H-80-bl[1],bl[2],bl[1]);}
  this.add.text(W/2,30,'F-ZERO KC RACING CIRCUIT',{fontFamily:'Bangers,Georgia,serif',fontSize:'42px',color:'#ffd700',stroke:'#000000',strokeThickness:7}).setOrigin(0.5).setDepth(5);
  this.add.text(W/2,70,'SELECT TRACK',{fontFamily:'Inconsolata,monospace',fontSize:'20px',color:'#ff44ff',stroke:'#000000',strokeThickness:4}).setOrigin(0.5).setDepth(5);
  // Track cards
  this._cards=[];
  for(var ti=0;ti<tracks.length;ti++){
    var tr=tracks[ti];
    var cx=160+ti*230,cy=220;
    var cardG=this.add.graphics().setDepth(4);
    var bestTime=EWR_STATE.raceScores[tr.key]?'BEST: '+EWR_STATE.raceScores[tr.key]+'s':'NO RECORD';
    var obstCount=tr.obstacles.length;
    var nameT=this.add.text(cx,cy-60,tr.name,{fontFamily:'Bangers,Georgia,serif',fontSize:'16px',color:'#ffd700',stroke:'#000000',strokeThickness:4,align:'center',wordWrap:{width:200}}).setOrigin(0.5).setDepth(6);
    var distT=this.add.text(cx,cy-20,'DIST: '+tr.dist,{fontFamily:'Inconsolata,monospace',fontSize:'13px',color:'#ffffff',stroke:'#000000',strokeThickness:2}).setOrigin(0.5).setDepth(6);
    var obstT=this.add.text(cx,cy,'OBSTACLES: '+obstCount,{fontFamily:'Inconsolata,monospace',fontSize:'12px',color:'#ffaa44',stroke:'#000000',strokeThickness:2}).setOrigin(0.5).setDepth(6);
    var bestT=this.add.text(cx,cy+20,bestTime,{fontFamily:'Inconsolata,monospace',fontSize:'12px',color:'#00ffcc',stroke:'#000000',strokeThickness:2}).setOrigin(0.5).setDepth(6);
    this._cards.push({g:cardG,cx:cx,cy:cy,track:tr,nameT:nameT});
  }
  this.add.text(W/2,H-40,'ARROW KEYS = SELECT   Z = RACE   X = BACK',{fontFamily:'Inconsolata,monospace',fontSize:'13px',color:'#aaaaaa',stroke:'#000000',strokeThickness:2}).setOrigin(0.5).setDepth(5);
  this.keys={
    left:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.LEFT),
    right:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.RIGHT),
    z:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.Z),
    x:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.X)
  };
  this._t=0;
};
FZeroMenuScene.prototype.update=function(time,delta){
  this._t+=delta;
  if(this._done)return;
  if(Phaser.Input.Keyboard.JustDown(this.keys.left)){this._sel=Math.max(0,this._sel-1);}
  if(Phaser.Input.Keyboard.JustDown(this.keys.right)){this._sel=Math.min(2,this._sel+1);}
  if(Phaser.Input.Keyboard.JustDown(this.keys.z)){
    this._done=true;
    var selTrack=this._tracks[this._sel];
    this.scene.start('FZero',{track:selTrack,fromMenu:true});
    return;
  }
  if(Phaser.Input.Keyboard.JustDown(this.keys.x)){
    this.scene.start('WorldMap2');return;
  }
  // Draw cards
  for(var ti=0;ti<this._cards.length;ti++){
    var card=this._cards[ti];
    var g=card.g;g.clear();
    var sel=ti===this._sel;
    var pulse=sel?(0.7+Math.sin(this._t*0.005)*0.3):0.25;
    g.fillStyle(sel?0x220055:0x110022,0.9);g.fillRoundedRect(card.cx-100,card.cy-80,200,160,10);
    g.lineStyle(sel?3:1,sel?0xff00ff:0x440055,pulse);g.strokeRoundedRect(card.cx-100,card.cy-80,200,160,10);
    if(sel){g.fillStyle(0xff00ff,0.08);g.fillRoundedRect(card.cx-100,card.cy-80,200,160,10);}
  }
};

  this.mainG=this.add.graphics().setDepth(5);

  this.aloeTxt=this.add.text(20,94,'ALOE: 0',{fontFamily:'Inconsolata,monospace',fontSize:'18px',color:'#00cc66',stroke:'#000000',strokeThickness:3}).setDepth(20);
  this.timerTxt=this.add.text(W-20,70,'60s',{fontFamily:'Inconsolata,monospace',fontSize:'20px',color:'#ff8800',stroke:'#000000',strokeThickness:3}).setOrigin(1,0).setDepth(20);
  this.feedTxt=this.add.text(W/2,140,'',{fontFamily:'Bangers,Georgia,serif',fontSize:'26px',color:'#ffd700',stroke:'#000000',strokeThickness:5}).setOrigin(0.5).setDepth(20).setAlpha(0);
  // Ed sprite position (left side, pitching)

  this.keys={z:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.Z)};
  this._cigThrowT=0;this._cigAnim=null;
};
CigSalesScene.prototype._spawnNPC=function(){
  var types=[
    {type:'office_worker',window:500,aloe:18,spd:55,col:0x334455,label:'OFFICE WORKER'},
    {type:'chill_dude',window:1200,aloe:8,spd:28,col:0x226622,label:'CHILL DUDE'},
    {type:'grandma',window:300,aloe:25,spd:38,col:0x885566,label:'GRANDMA'},
    {type:'cat_friend',window:3000,aloe:6,spd:22,col:0xff9f43,label:'CAT FRIEND'},
    {type:'daikon_sympathizer',window:800,aloe:0,spd:44,col:0x885500,label:'DAIKON SYM.'},
    {type:'lhc_tourist',window:2000,aloe:40,spd:32,col:0x00aaff,label:'LHC TOURIST'}
  ];
  var roll=Math.random();
  var tIdx=(roll<0.05)?5:Math.floor(Math.random()*5);
  var t=types[tIdx];
  var npc={x:980,y:430,type:t.type,col:t.col,label:t.label,aloe:t.aloe,spd:t.spd,
    windowDur:t.window,haloT:0,haloGrowing:true,haloPhase:0,
    said:false,sold:false,trolled:false,dieT:-1,
    loreIdx:Math.floor(Math.random()*3)};
  this._npcs.push(npc);
};
CigSalesScene.prototype.update=function(time,delta){
  var self=this; var dt=delta/1000; var W=960,H=540;
  if(this._done)return;
  this._t+=delta; this._timeLeft-=delta;
  if(this._timeLeft<=0){this._timeLeft=0;this._endGame();return;}
  // Spawn
  this._spawnTimer+=delta;
  if(this._spawnTimer>=this._spawnInterval){this._spawnTimer=0;this._spawnNPC();if(this._spawnInterval>1800)this._spawnInterval-=50;}
  var zJD=Phaser.Input.Keyboard.JustDown(this.keys.z);
  // Update NPCs
  for(var ni=this._npcs.length-1;ni>=0;ni--){
    var npc=this._npcs[ni];
    if(npc.dieT>=0){npc.dieT+=delta;if(npc.dieT>1000){this._npcs.splice(ni,1);}continue;}
    npc.x-=npc.spd*dt;
    if(npc.x<-60){this._npcs.splice(ni,1);continue;}
    // Halo pulse
    npc.haloT+=delta;
    var halog=npc.haloGrowing?(npc.haloT/npc.windowDur):1-(npc.haloT/npc.windowDur);
    npc.haloPhase=Math.min(1,Math.max(0,halog));
    if(npc.haloT>npc.windowDur){
      if(npc.haloGrowing){
        npc.haloGrowing=false;npc.haloT=0;
        if(npc.type==='daikon_sympathizer'&&!npc.trolled){npc.trolled=true;}
      } else {
        npc.haloGrowing=true;npc.haloT=0;
      }
    }
    // Z press pitch check — within 180px of Ed
    if(zJD&&!npc.sold&&!npc.trolled&&Math.abs(npc.x-this._edX)<180){
      var haloOk=npc.haloPhase>0.65;
      if(npc.type==='cat_friend')haloOk=true;
      if(npc.type==='daikon_sympathizer')haloOk=false;
      if(haloOk){
        npc.sold=true;npc.dieT=0;
        this._sales++;this._totalAloe+=npc.aloe;
        var msgs=['SOLD!','NICE!','SMOOTH.','YES!','DEAL!'];
        self._showFeed(msgs[Math.floor(Math.random()*msgs.length)]+' +'+npc.aloe+' ALOE','#ffd700');
        spawnExplosion(npc.x,npc.y-30,0xffd700,1.0);
      } else {
        npc.dieT=0;
        self._showFeed(npc.type==='daikon_sympathizer'?'TRICKED! 0 ALOE':'MISSED WINDOW!','#ff4444');
      }
    }
  }
  this.scoreTxt.setText('SALES: '+this._sales);
  this.aloeTxt.setText('ALOE: +'+this._totalAloe);
  this.timerTxt.setText(Math.ceil(this._timeLeft/1000)+'s');
  this._render();
};
CigSalesScene.prototype._showFeed=function(txt,col){
  var self=this;
  this.feedTxt.setText(txt).setColor(col||'#ffd700').setAlpha(1);
  this.tweens.add({targets:this.feedTxt,alpha:0,duration:900,delay:300});
};
CigSalesScene.prototype._render=function(){
  var g=this.mainG;g.clear();
  var W=960;
  // Draw Ed (left, pitching)
  DRAW_ED.draw(g,this._edX,this._edY,5,false,0);
  // Draw NPCs
  for(var ni=0;ni<this._npcs.length;ni++){
    var npc=this._npcs[ni];
    if(npc.dieT>=0){
      if(npc.sold){g.fillStyle(0xffd700,0.5*(1-npc.dieT/1000));g.fillCircle(npc.x,npc.y-30,30*(npc.dieT/1000+0.5));}
      continue;
    }
    // NPC body
    g.fillStyle(npc.col,1);g.fillRoundedRect(npc.x-14,npc.y-50,28,50,4);
    // NPC head
    g.fillStyle(0xffccaa,1);g.fillCircle(npc.x,npc.y-58,14);
    // LHC tourist: CERN badge
    if(npc.type==='lhc_tourist'){g.fillStyle(0x00aaff,1);g.fillRoundedRect(npc.x-8,npc.y-44,16,12,2);g.fillStyle(0xffffff,1);g.fillCircle(npc.x,npc.y-38,4);}
    // Halo (receptivity ring)
    var haloAlpha=npc.haloPhase*0.7+0.1;
    var haloR=18+npc.haloPhase*12;
    var haloCol=npc.type==='daikon_sympathizer'?0xff0000:npc.type==='cat_friend'?0x00ff88:0xffd700;
    g.lineStyle(3,haloCol,haloAlpha);g.strokeCircle(npc.x,npc.y-58,haloR);
    if(npc.haloPhase>0.8){g.fillStyle(haloCol,0.15);g.fillCircle(npc.x,npc.y-58,haloR);}
    // Label
    g.fillStyle(0x000000,0.5);g.fillRoundedRect(npc.x-30,npc.y-85,60,14,3);
  }
  // HUD flash
  var hg=this.hudG;hg.clear();
  if(this._timeLeft<10000){hg.fillStyle(0xff0000,0.08*(1+Math.sin(this._t*0.01)));hg.fillRect(0,0,W,540);}
};
CigSalesScene.prototype._endGame=function(){
  this._done=true;
  EWR_STATE.aloe+=this._totalAloe;
  var self=this; var W=960,H=540;
  var eg=this.add.graphics().setDepth(30);
  eg.fillStyle(0x000000,0.85);eg.fillRoundedRect(W/2-220,H/2-120,440,240,12);
  eg.lineStyle(2,0xffd700,1);eg.strokeRoundedRect(W/2-220,H/2-120,440,240,12);
  this.add.text(W/2,H/2-95,'SESSION REPORT',{fontFamily:'Bangers,Georgia,serif',fontSize:'30px',color:'#ffd700',stroke:'#000000',strokeThickness:6}).setOrigin(0.5).setDepth(35);
  this.add.text(W/2,H/2-60,'CIGS SOLD: '+this._sales,{fontFamily:'Inconsolata,monospace',fontSize:'20px',color:'#ffffff',stroke:'#000000',strokeThickness:3}).setOrigin(0.5).setDepth(35);
