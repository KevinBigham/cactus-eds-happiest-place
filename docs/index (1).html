Level23Scene.prototype._drawPlats23 = function(){
  var g=this.platG; g.clear();
  for(var i=0;i<this.platRects.length;i++){
    var p=this.platRects[i];
    if(i===0){
      g.fillStyle(0x0a001a,1); g.fillRect(p.x,p.y,p.w,p.h);
      g.lineStyle(2,0x00ffcc,0.8); g.strokeRect(p.x,p.y,p.w,p.h);
    } else {
      g.fillStyle(0x110022,1); g.fillRect(p.x,p.y,p.w,p.h);
      g.lineStyle(2,0xff00ff,0.9); g.strokeRect(p.x,p.y,p.w,p.h);
      g.fillStyle(0x00ffcc,0.5); g.fillRect(p.x,p.y,p.w,3);
    }
  }
};

Level23Scene.prototype._drawBoss23 = function(g, boss){
  if(boss.dieT>=0) return;
  var bx=boss.x, by=boss.y;
  var ph=boss.phase;
  var sc = ph===3?1.9:(ph===2?1.65:1.4);
  var flash=boss.hitFlash>0;
  var p3=ph===3;
  // Shadow
  g.fillStyle(0x000000,0.3); g.fillEllipse(bx,by+4,56*sc,14);
  // Body (metallic dark gray)
  g.fillStyle(flash?0xffffff:0x404048,1);
  g.fillRoundedRect(bx-18*sc,by-48*sc,36*sc,36*sc,5);
  // Outline neon
  g.lineStyle(2,p3?0xff0066:0x00ffcc,1);
  g.strokeRoundedRect(bx-18*sc,by-48*sc,36*sc,36*sc,5);
  // Arms
  g.fillStyle(0x303038,1);
  g.fillRect(bx-30*sc,by-42*sc,12*sc,22*sc); // left arm
  g.fillRect(bx+18*sc, by-42*sc,12*sc,22*sc); // right arm
  g.fillStyle(p3?0xff0066:0x00ffcc,1);
  g.fillCircle(bx-24*sc,by-20*sc,4*sc); // left fist
  g.fillCircle(bx+24*sc,by-20*sc,4*sc); // right fist
  // Legs
  g.fillStyle(0x303038,1);
  g.fillRect(bx-14*sc,by-12*sc,10*sc,18*sc);
  g.fillRect(bx+4*sc,  by-12*sc,10*sc,18*sc);
  // Crown antennae (5 spikes)
  var tipColor=p3?0xff0000:0x00ffcc;
  for(var sp=-2;sp<=2;sp++){
    var sx=bx+sp*8*sc, sy=by-48*sc;
    var sh=12+Math.abs(sp)*4; // taller in center
    g.fillStyle(0x505058,1); g.fillRect(sx-2,sy-sh*sc,4,sh*sc);
    g.fillStyle(tipColor,1); g.fillCircle(sx,sy-sh*sc,3);
  }
  // Eyes
  g.fillStyle(p3?0xff0000:0x00ffff,1);
  g.fillCircle(bx-7*sc,by-36*sc,5*sc);
  g.fillCircle(bx+7*sc, by-36*sc,5*sc);
  g.fillStyle(0x000000,1);
  g.fillCircle(bx-7*sc,by-36*sc,2*sc);
  g.fillCircle(bx+7*sc, by-36*sc,2*sc);
  // HP bar
  var barW=100, barH=8;
  var hpFrac=Math.max(0,boss.hp/boss.maxHp);
  var hpColor = p3?0xff0066:(ph===2?0xffaa00:0x00ffcc);
  g.fillStyle(0x111111,1); g.fillRect(bx-barW/2,by-70*sc,barW,barH);
  g.fillStyle(hpColor,1); g.fillRect(bx-barW/2,by-70*sc,barW*hpFrac,barH);
  g.lineStyle(1,0xffffff,0.4); g.strokeRect(bx-barW/2,by-70*sc,barW,barH);
};

Level23Scene.prototype._drawEd23 = function(g, ep, es, levelT){
  var ex=ep.x, ey=ep.y;
  g.fillStyle(0x000000,0.25); g.fillEllipse(ex,ey+2,24,8);
  // Body
  g.fillStyle(0x2d1b4e,1);
  g.fillRect(ex-6,ey-24,12,20);
  // Head
  g.fillStyle(0xffe0a0,1); g.fillCircle(ex,ey-30,10);
  g.fillStyle(0x111111,1); g.fillCircle(ex+(es.facing*3),ey-31,3);
  // Arms
  g.fillStyle(0x2d1b4e,1); g.fillRect(ex-12,ey-22,6,12); g.fillRect(ex+6,ey-22,6,12);
  // Legs
  g.fillStyle(0x1a0a2e,1);
  g.fillRect(ex-6,ey-4,5,10); g.fillRect(ex+1,ey-4,5,10);
};

Level23Scene.prototype._physEd23 = function(ep, plats, dt, delta){
  var GRAV=1200;
  ep.vy+=GRAV*dt;
  if(ep.vy>700) ep.vy=700;
  ep.x+=ep.vx*dt; ep.y+=ep.vy*dt;
  ep.vx*=Math.pow(0.0001,dt);
  ep.grounded=false;
  for(var i=0;i<plats.length;i++){
    var p=plats[i];
    if(ep.x+ep.w/2>p.x&&ep.x-ep.w/2<p.x+p.w&&ep.y>p.y-2&&ep.y-(ep.vy*dt)<=p.y+2&&ep.vy>=0){
      ep.y=p.y; ep.vy=0; ep.grounded=true; ep.djUsed=false; break;
    }
  }
  if(ep.x<14) ep.x=14;
  if(ep.x>946) ep.x=946;
};

Level23Scene.prototype._physBoss23 = function(boss, delta, dt){
  var GRAV=900, FLOOR=490;
  boss.vy+=GRAV*dt;
  if(boss.vy>600) boss.vy=600;
  boss.x+=boss.vx*dt;
  boss.y+=boss.vy*dt;
  boss.grounded=false;
  if(boss.y>=FLOOR){boss.y=FLOOR;boss.vy=0;boss.grounded=true;}
  if(boss.x<60){boss.x=60;boss.vx=Math.abs(boss.vx);}
  if(boss.x>900){boss.x=900;boss.vx=-Math.abs(boss.vx);}
};

Level23Scene.prototype._triggerDeath = function(){
  this._dying=true;
  SOUND.hurt&&SOUND.hurt();
  this.cameras.main.shake(400,0.025);
  var self=this;
  this.time.delayedCall(1800,function(){
    EWR_STATE.health[0]=1;
    self.scene.start('WorldMap2');
  });
};

Level23Scene.prototype._beatBoss23 = function(){
  if(this._beaten) return;
  this._beaten=true;
  EWR_STATE.levelsBeaten.indexOf('2-3')<0&&EWR_STATE.levelsBeaten.push('2-3');
  EWR_STATE.aloe+=ALOE.beat23;
  EWR_STATE.fightWins=(EWR_STATE.fightWins||0)+1;
  this.phaseTxt.setText('THE NEON KING\nDEFEATED!').setAlpha(1);
  this.cameras.main.shake(500,0.03);
  var self=this;
  this.time.delayedCall(3200,function(){
    SMOKE_POOL.length=0;EX_POOL.length=0;FIRE_POOL.length=0;
    self.scene.start('WorldMap2',{aloeEarned:ALOE.beat23});
  });
};

Level23Scene.prototype.update = function(time, delta){
  if(this._beaten) return;
  if(this._dying){this._dyingT+=delta; return;}
  var self=this;
  var dt=Math.min(delta/1000,0.05);
  this.levelT+=delta;

  var ep=this.ep, es=this.es, boss=this.boss;
  var cur=this.cursors;

  // --- Input ---
  var left  = cur.left.isDown;
  var right = cur.right.isDown;
  var up    = Phaser.Input.Keyboard.JustDown(cur.up);
  var zDown = this.keyZ.isDown;
  var zJD   = Phaser.Input.Keyboard.JustDown(this.keyZ);
  var xJD   = Phaser.Input.Keyboard.JustDown(this.keyX2);
  var doKick= xJD;

  // Horizontal move
  if(left) {ep.vx-=1600*dt; es.facing=-1;}
  if(right){ep.vx+=1600*dt; es.facing=1;}
  if(!left&&!right) ep.vx*=Math.pow(0.001,dt);
  if(ep.vx>220) ep.vx=220; if(ep.vx<-220) ep.vx=-220;

  // Jump
  if(up){
    if(ep.grounded){ep.vy=-520;ep.grounded=false;}
    else if(!ep.djUsed&&EWR_STATE.shop.doubleJump){ep.vy=-480;ep.djUsed=true;}
  }
  if(!cur.up.isDown&&ep.vy<-200) ep.vy*=0.6;

  // Timers
  if(es.hurtTimer>0) es.hurtTimer-=delta;
  if(es.punchTimer>0){es.punchTimer-=delta;es.punchActive=es.punchTimer>90;}
  if(doKick&&es.kickTimer<=0&&es.punchTimer<=0){es.kickTimer=600;es.kickActive=true;}
  if(es.kickTimer>0){es.kickTimer-=delta;es.kickActive=es.kickTimer>200;}

  // Punch / charge
  if(zJD&&es.punchTimer<=0&&es.kickTimer<=0) ep.chargeT=0;
  if(zDown) ep.chargeT+=delta;
  if(!zDown&&ep.chargeT>0){
    if(ep.chargeT>=1200){
      // Ember blast
      var er=80;
      if(Math.abs(ep.x-boss.x)<er+40&&Math.abs(ep.y-boss.y)<er+40&&boss.dieT<0&&boss.hitFlash<=0){
        boss.hp-=3; boss.hitFlash=200;
        spawnExplosion(boss.x,boss.y-20,0xff6b35,2.0);
        this.cameras.main.shake(200,0.018);
        this.aloeEarned+=ALOE.bossHit;
        if(boss.hp<=0){this._killBoss23();return;}
      }
      spawnExplosion(ep.x+es.facing*40,ep.y-20,0xff6b35,1.8);
      SOUND.blast&&SOUND.blast();
    } else if(ep.chargeT>50){
      es.punchTimer=340; es.punchActive=true;
    }
    ep.chargeT=0;
  }

  // Physics
  this._physEd23(ep,this.platRects,dt,delta);
  if(ep.y>620){this._triggerDeath();return;}

  // Punch hits boss
  if(es.punchActive&&boss.dieT<0&&boss.hitFlash<=0){
    var hx=ep.x+es.facing*56;
    if(Math.abs(hx-boss.x)<72&&Math.abs(ep.y-boss.y)<52){
      boss.hp--; boss.hitFlash=200;
      spawnExplosion(boss.x,boss.y-20,0xffd60a,1.2); SOUND.punch&&SOUND.punch();
      this.cameras.main.shake(80,0.006);
      this.aloeEarned+=ALOE.bossHit;
      es.punchActive=false;
      if(EWR_STATE.shop.lifeSteal){EWR_STATE.healFraction=(EWR_STATE.healFraction||0)+0.33;if(EWR_STATE.healFraction>=1.0){EWR_STATE.healFraction-=1.0;EWR_STATE.health[0]=Math.min(EWR_STATE.health[0]+1,EWR_STATE.maxHealth[0]);spawnExplosion(ep.x,ep.y-20,0xff0088,0.5);}}
      if(boss.hp<=0){this._killBoss23();return;}
    }
  }
  // Kick hits boss
  if(es.kickActive&&boss.dieT<0&&boss.hitFlash<=0){
    var kx=ep.x+es.facing*ED_MOVE.kickRange;
    if(Math.abs(kx-boss.x)<72&&Math.abs(ep.y-boss.y)<52){
      boss.hp-=2; boss.hitFlash=220;
      spawnExplosion(boss.x,boss.y-20,0xff6b35,1.5); SOUND.kick&&SOUND.kick();
      this.cameras.main.shake(120,0.009);
      this.aloeEarned+=ALOE.bossHit*2;
      es.kickActive=false;
      if(EWR_STATE.shop.lifeSteal){EWR_STATE.healFraction=(EWR_STATE.healFraction||0)+0.33;if(EWR_STATE.healFraction>=1.0){EWR_STATE.healFraction-=1.0;EWR_STATE.health[0]=Math.min(EWR_STATE.health[0]+1,EWR_STATE.maxHealth[0]);spawnExplosion(ep.x,ep.y-20,0xff0088,0.5);}}
      if(boss.hp<=0){this._killBoss23();return;}
    }
  }

  // Phase transitions
  if(boss.dieT<0){
    if(boss.phase===1&&boss.hp<=18){
      boss.phase=2; boss.vx=es.facing>0?-160:160;
      boss.shotInterval=1800; boss.spawnTimer=0;
      this.phaseTxt.setText('PHASE 2').setAlpha(1);
      this.time.delayedCall(1200,function(){self.phaseTxt.setAlpha(0);});
      this.cameras.main.shake(300,0.022);
      spawnExplosion(boss.x,boss.y-30,0xff00ff,3.0);
    }
    if(boss.phase===2&&boss.hp<=9){
      boss.phase=3; boss.vx=es.facing>0?-200:200;
      boss.shotInterval=1200; boss.spawnTimer=0;
      this.phaseTxt.setText('PHASE 3\nBULLET HELL').setAlpha(1);
      this.time.delayedCall(1500,function(){self.phaseTxt.setAlpha(0);});
      this.cameras.main.shake(500,0.03);
      spawnExplosion(boss.x,boss.y-30,0xff0000,4.0);
    }
  }

  // Boss update
  if(boss.dieT<0){
    boss.bT+=delta;
    if(boss.hitFlash>0) boss.hitFlash-=delta;
    boss.rotAngle+=delta*0.0018; // slow rotation for bullet hell

    // Phase 3: random jumps
    if(boss.phase===3){
      boss._jumpT=(boss._jumpT||0)+delta;
      if(boss._jumpT>3000&&boss.grounded){boss._jumpT=0;boss.vy=-440;}
    }

    // Boss physics
    this._physBoss23(boss,delta,dt);

    // Boss facing Ed
    boss.vx=boss.phase===3?200:boss.phase===2?160:120;
    if(boss.x>ep.x) boss.vx=-boss.vx;

    // Boss shoot
    boss.shotT+=delta;
    if(boss.shotT>=boss.shotInterval){
      boss.shotT=0;
      var dx=ep.x-boss.x, dy=(ep.y-30)-(boss.y-30);
      var dist=Math.sqrt(dx*dx+dy*dy)||1;
      if(boss.phase===1){
        // Single aimed shot
        boss.projectiles.push({x:boss.x,y:boss.y-30,vx:(dx/dist)*240,vy:(dy/dist)*240,life:2.0});
        SOUND.blast&&SOUND.blast();
      } else if(boss.phase===2){
        // 3-way fan
        var ang=Math.atan2(dy,dx);
        for(var f=-1;f<=1;f++){
          var fa=ang+f*0.35;
          boss.projectiles.push({x:boss.x,y:boss.y-30,vx:Math.cos(fa)*260,vy:Math.sin(fa)*260,life:2.0});
        }
        SOUND.blast&&SOUND.blast();
      } else {
        // Phase 3: rotating 8-way bullet hell
        for(var ai=0;ai<8;ai++){
          var a=boss.rotAngle+(ai/8)*Math.PI*2;
          boss.projectiles.push({x:boss.x,y:boss.y-30,vx:Math.cos(a)*280,vy:Math.sin(a)*280,life:2.5});
        }
        SOUND.blast&&SOUND.blast();
      }
    }

    // Minion spawning (phase 2+)
    if(boss.phase>=2){
      var mSpawnInterval=boss.phase===3?6000:8000;
      boss.spawnTimer=(boss.spawnTimer||0)+delta;
      if(boss.spawnTimer>=mSpawnInterval){
        boss.spawnTimer=0;
        var spawnSide=boss.x>480?1:-1;
        boss.minions.push({x:spawnSide<0?900:60,y:450,type:'ghost',baseY:320,
          dir:spawnSide,spd:55,hp:2,pMin:30,pMax:930,
          dieT:-1,squishT:0,bT:0,bAmt:0,parts:[]});
      }
    }

    // Boss contact damage
    if(es.hurtTimer<=0&&Math.abs(ep.x-boss.x)<42&&Math.abs(ep.y-boss.y)<52){
      _takeDmg(); EWR_STATE.combo.streak=0; EWR_STATE.combo.mult=1;
      es.hurtTimer=1200; SOUND.hurt&&SOUND.hurt(); this.cameras.main.shake(250,0.014);
      ep.vx=-es.facing*260; ep.vy=-240;
      if(EWR_STATE.health[0]<=0){this._triggerDeath();return;}
    }

    // Projectile hits Ed
    for(var pi=boss.projectiles.length-1;pi>=0;pi--){
      var prj=boss.projectiles[pi];
      prj.x+=prj.vx*dt; prj.y+=prj.vy*dt; prj.life-=delta*0.001;
      if(prj.life<=0||prj.x<0||prj.x>960||prj.y<0||prj.y>600){boss.projectiles.splice(pi,1);continue;}
      if(es.hurtTimer<=0&&Math.abs(prj.x-ep.x)<16&&Math.abs(prj.y-ep.y)<16){
        _takeDmg(); EWR_STATE.combo.streak=0; EWR_STATE.combo.mult=1;
        es.hurtTimer=1200; SOUND.hurt&&SOUND.hurt(); this.cameras.main.shake(200,0.012);
        ep.vx=-prj.vx*0.3; ep.vy=-160;
        boss.projectiles.splice(pi,1);
        if(EWR_STATE.health[0]<=0){this._triggerDeath();return;}
      }
    }

    // Minion update
    for(var mni=boss.minions.length-1;mni>=0;mni--){
      var mn=boss.minions[mni];
      if(mn.dieT>=0){mn.dieT+=delta; if(mn.dieT>600) boss.minions.splice(mni,1); continue;}
      mn.bT+=delta; mn.x+=mn.dir*mn.spd*dt;
      mn.y=(mn.baseY||320)+Math.sin(mn.bT*0.003)*22;
      if(mn.x<mn.pMin){mn.x=mn.pMin;mn.dir=1;} if(mn.x>mn.pMax){mn.x=mn.pMax;mn.dir=-1;}
      // Punch/kick hits minion
      if(es.punchActive&&mn.dieT<0){
        var hxm=ep.x+es.facing*56;
        if(Math.abs(hxm-mn.x)<52&&Math.abs(ep.y-mn.y)<36){
          mn.hp--; spawnExplosion(mn.x,mn.y,0xffd60a,0.8);
          if(mn.hp<=0){mn.dieT=0;mn.squishT=0;EWR_STATE.aloe+=ALOE.ghostDeath;}
        }
      }
      if(es.kickActive&&mn.dieT<0){
        var kxm=ep.x+es.facing*ED_MOVE.kickRange;
        if(Math.abs(kxm-mn.x)<65&&Math.abs(ep.y-mn.y)<36){

  for(var sp2=0;sp2<SMOKE_POOL.length;sp2++){var sp2p=SMOKE_POOL[sp2];pg2.fillStyle(0xaaaaaa,sp2p.life*0.3);pg2.fillCircle(sp2p.x,sp2p.y,sp2p.r);}

  // HUD
  var hg=this.hudG; hg.clear();
  // Health bar
  var hpFrac2=EWR_STATE.health[0]/EWR_STATE.maxHealth[0];
  hg.fillStyle(0x333333,1); hg.fillRect(10,8,120,10);
  hg.fillStyle(0x00ff88,1); hg.fillRect(10,8,120*hpFrac2,10);
  hg.lineStyle(1,0xffffff,0.4); hg.strokeRect(10,8,120,10);
  this.bossHpTxt.setText('HP:'+EWR_STATE.health[0]+'  ALOE:'+EWR_STATE.aloe+'  NEON KING HP:'+Math.max(0,boss.hp));
};

function FZeroScene(){ Phaser.Scene.call(this,{key:'FZero'}); }
FZeroScene.prototype = Object.create(Phaser.Scene.prototype);
FZeroScene.prototype.constructor = FZeroScene;

FZeroScene.prototype.create = function(){
  var self=this;
  var W=960, H=540;
  var _fzData=this.scene.settings.data||{};
  var _fzCfg=_fzData.track||FZERO_TRACKS.westport;
  this._trackCfg=_fzCfg; this._fromMenu=_fzData.fromMenu||false;
  this._finishDist=_fzCfg.dist; this._startT=0;
  this._done=false; this._won=false; this._countdown=3000;
  this._trackX=0; this._edVX=260; this._edBoost=0; this._edY=390; this._edHop=0;
  this._slowT=0; this._totalT=0;
  // stars
  this._stars=[];
  for(var si=0;si<120;si++) this._stars.push({x:Math.random()*W,y:20+Math.random()*380,spd:1.5+Math.random()*4,r:Math.random()<0.3?2:1});
  // AI racers using track config speeds
  this._racers=[
    {trackX:0,spd:_fzCfg.aiSpeeds[0],col:0xff9f43,y:340,name:'RACE CAT A',done:false},
    {trackX:0,spd:_fzCfg.aiSpeeds[1],col:0x00e5ff,y:360,name:'RACE CAT B',done:false},
    {trackX:0,spd:_fzCfg.aiSpeeds[2],col:0xaa44ff,y:410,name:'RACE CAT C',done:false}
  ];
  // obstacles from track config
  this._obstacles=_fzCfg.obstacles.map(function(ob){return{tx:ob.tx,hit:false};});
  this._dashOffset=0;
  this.bgG=this.add.graphics().setDepth(0);
  this.trackG=this.add.graphics().setDepth(1);
  this.racerG=this.add.graphics().setDepth(3);
  this.edG=this.add.graphics().setDepth(5);
  this.hudG=this.add.graphics().setScrollFactor(0).setDepth(20);
  this.flashTxt=this.add.text(W/2,220,'',{fontFamily:'Bangers,Georgia,serif',fontSize:'48px',color:'#ff00ff',stroke:'#000000',strokeThickness:6}).setOrigin(0.5).setDepth(30).setAlpha(0);
  var hintTxt='Z or UP = BOOST  •  '+_fzCfg.name+'  •  FIRST TO '+_fzCfg.dist+'!';
  this.hintTxt=this.add.text(W/2,H-28,hintTxt,{fontFamily:'Inconsolata,monospace',fontSize:'14px',color:'#ffd700',stroke:'#000000',strokeThickness:2}).setOrigin(0.5).setDepth(20);
  this.add.text(W/2,16,_fzCfg.name,{fontFamily:'Bangers,Georgia,serif',fontSize:'26px',color:'#ffd700',stroke:'#000000',strokeThickness:4}).setOrigin(0.5).setDepth(20);
  this.keys={
    left: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.LEFT),
    right: this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.RIGHT),
    up:   this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.UP),
    w:    this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W),
    z:    this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.Z),
    space:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE)
  };
  this._flash('GET READY!',1200);
  this.time.delayedCall(1400,function(){self._flash('GO!!!',900);});
};

FZeroScene.prototype._flash = function(txt,dur,sz,col){
  var self=this;
  this.flashTxt.setText(txt).setFontSize((sz||44)+'px').setColor(col||'#ff00ff').setAlpha(1);
  this.tweens.add({targets:this.flashTxt,alpha:0,duration:dur||1000,delay:200});
};

FZeroScene.prototype.update = function(time, delta){
  var dt=delta/1000;
  var W=960, H=540;
  this._totalT+=delta;
  if(this._done) return;
  if(this._totalT<1600) return; // wait for GET READY
  var boost=Phaser.Input.Keyboard.JustDown(this.keys.z)||Phaser.Input.Keyboard.JustDown(this.keys.up)||Phaser.Input.Keyboard.JustDown(this.keys.w)||Phaser.Input.Keyboard.JustDown(this.keys.space);
  if(boost && this._edBoost<=0){
    this._edBoost=1200;
    this._edHop=1;
    if(EWR_STATE.aloe>=50) EWR_STATE.aloe-=50;
  }
  if(this._edBoost>0){ this._edBoost-=delta; this._edVX=Math.min(440,this._edVX+2.5); }
  else { this._edVX=Math.max(260,this._edVX-1.5); }
  if(this._slowT>0){ this._slowT-=delta; this._edVX=Math.max(180,this._edVX-1); }
  if(this._edHop>0){ this._edY=Math.max(360,this._edY-3); this._edHop+=delta; if(this._edHop>400){this._edHop=0;} }
  else { this._edY=Math.min(390,this._edY+4); }
  this._trackX+=this._edVX*dt;
  this._dashOffset=(this._dashOffset+this._edVX*dt*0.12)%60;
  // update AI racers
  for(var ri=0;ri<this._racers.length;ri++){
    var r=this._racers[ri];
    if(!r.done){r.trackX+=r.spd*dt;}
    if(r.trackX>=this._finishDist&&!r.done){ r.done=true; }
  }
  // check obstacles
  for(var oi=0;oi<this._obstacles.length;oi++){
    var ob=this._obstacles[oi];
    if(!ob.hit && this._trackX>ob.tx-80 && this._trackX<ob.tx+40 && this._edY>365 && this._edHop<=0){
      ob.hit=true; this._slowT=600; this._edVX=Math.max(180,this._edVX-80);
      this.cameras.main.shake(200,0.01);
      this._flash('MOCHI BLOCKADE!',800,28,'#ff4444');
    }
    if(ob.hit) this._obstacles[oi].screenX=-9999;
  }
  // win condition
  if(this._trackX>=this._finishDist && !this._done){
    this._done=true; this._won=true;
    var self=this;
    var elapsed=Math.floor(this._totalT/1000);
    var tk=this._trackCfg.key;
    if(!EWR_STATE.raceScores[tk]||elapsed<EWR_STATE.raceScores[tk]){EWR_STATE.raceScores[tk]=elapsed;}
    this._flash('YOU WIN! TIME: '+elapsed+'s',2500,48,'#ffd700');
    SOUND.victory();
    var winDest=this._fromMenu?'FZeroMenu':'WorldMap3';
    this.time.delayedCall(3200,function(){ self.scene.start(winDest,{fromRace:true}); });
    return;
  }
  // lose condition (all AI done and Ed not done)
  var allDone=true; for(var ri2=0;ri2<this._racers.length;ri2++){if(!this._racers[ri2].done)allDone=false;}
  if(allDone && !this._done){
    this._done=true; this._won=false;
    var self2=this;
    var loseDest=this._fromMenu?'FZeroMenu':null;
    this._flash('YOU LOST!',2000,40,'#ff4444');
    this.time.delayedCall(2600,function(){ if(loseDest)self2.scene.start(loseDest);else self2.scene.restart(); });
    return;
  }
  this._drawRace(W, H);
};

FZeroScene.prototype._drawRace = function(W, H){
  var g=this.bgG; g.clear();
  // sky gradient (dark purple to pink)
  for(var sy=0;sy<320;sy++){
    var t=sy/320;
    var rc=Math.floor(10+t*40); var gc=Math.floor(0+t*10); var bc=Math.floor(20+t*50);
    g.fillStyle((rc<<16)|(gc<<8)|bc,1); g.fillRect(0,sy,W,1);
  }
  // stars
  for(var si=0;si<this._stars.length;si++){
    var s=this._stars[si];
    s.x-=s.spd*(16/16);
    if(s.x<0) s.x=W+2;
    g.fillStyle(0xffffff,0.7+Math.sin(this._totalT*0.003+si)*0.3);
    g.fillCircle(s.x,s.y,s.r);
  }
  // KC skyline silhouette
  g.fillStyle(0x0a0010,1);
  var blds=[[0,80,60,160],[70,100,50,130],[130,75,70,155],[210,90,40,140],[260,60,80,170],[350,85,55,145],[415,70,65,160],[490,50,90,180],[590,80,70,150],[670,65,55,165],[735,90,45,140],[790,55,75,175],[875,75,85,155]];
  for(var bi=0;bi<blds.length;bi++){
    var bl=blds[bi]; g.fillRect(bl[0],320-bl[1],bl[2],bl[1]);
    // windows
    g.fillStyle(0x332200,1);
    for(var wy=0;wy<3;wy++) for(var wx=0;wx<Math.floor(bl[2]/16);wx++){
      if(Math.sin(bi*7+wy*3+wx*5)>0.2){g.fillStyle(0xffd700,0.7);g.fillRect(bl[0]+4+wx*14,320-bl[1]+8+wy*18,8,10);}
    }
    g.fillStyle(0x0a0010,1);
  }
  // ground strip
  g.fillStyle(0x1a1a2e,1); g.fillRect(0,318,W,H-318);
  // track
  var tg=this.trackG; tg.clear();
  // track surface
  tg.fillStyle(0x333355,1); tg.fillRect(0,320,W,160);
  tg.fillStyle(0x222244,1); tg.fillRect(0,320,W,2);
  tg.fillStyle(0x555577,1); tg.fillRect(0,476,W,2);
  // dashed center lines
  tg.lineStyle(3,0xffffff,0.6);
  for(var di=0;di<20;di++){
    var dx=((di*60)-this._dashOffset%60+W)%W;
    if(dx<W) {tg.beginPath();tg.moveTo(dx,398);tg.lineTo(dx+36,398);tg.strokePath();}
  }
  // speed lines (perspective)
  tg.lineStyle(1,0x00ffff,0.25);
  for(var sli=0;sli<8;sli++){
    var slx=(sli*130+this._totalT*0.3)%W;
    tg.beginPath();tg.moveTo(slx,320);tg.lineTo(slx-40,480);tg.strokePath();
  }
  // obstacles on track
  for(var oi=0;oi<this._obstacles.length;oi++){
    var ob=this._obstacles[oi];
    if(ob.hit) continue;
    var obScreenX=W*0.7-(this._trackX-ob.tx)*0.08;
    if(obScreenX>-20&&obScreenX<W+20){
      tg.fillStyle(0xff4444,1); tg.fillCircle(obScreenX,400,16);
      tg.fillStyle(0xffccdd,1); tg.fillCircle(obScreenX-5,394,5); tg.fillCircle(obScreenX+5,394,5);
      tg.fillStyle(0x000000,1); tg.fillCircle(obScreenX-5,394,2); tg.fillCircle(obScreenX+5,394,2);
    }
  }
  // finish line
  var finScreenX=W*0.7-(this._trackX-7000)*0.08;
  if(finScreenX>-40&&finScreenX<W+40){
    for(var fi=0;fi<8;fi++){
      tg.fillStyle(fi%2===0?0xffffff:0x000000,1);
      tg.fillRect(finScreenX-4,320+fi*20,20,20);
      tg.fillRect(finScreenX+4,320+fi*20,20,20);
    }
    tg.fillStyle(0xffd700,0.8); tg.fillRect(finScreenX-8,300,4,180);
    tg.add.text;
  }
  // progress bar
  tg.fillStyle(0x222244,1); tg.fillRect(20,58,400,14);
  tg.fillStyle(0x00e676,1); tg.fillRect(20,58,Math.min(400,this._trackX/7000*400),14);
  tg.fillStyle(0xffd700,1); tg.fillRect(20+Math.min(400,this._trackX/7000*400)-2,54,4,22);
  // AI progress on bar
  for(var ri3=0;ri3<this._racers.length;ri3++){
    var rc2=this._racers[ri3];
    tg.fillStyle(rc2.col,0.7); tg.fillRect(20+Math.min(400,rc2.trackX/7000*400)-3,58,6,14);
  }
  // draw AI racers on track
  var rg=this.racerG; rg.clear();
  for(var ri4=0;ri4<this._racers.length;ri4++){
    var rc3=this._racers[ri4];
    if(rc3.done) continue;
    // position racers relative to Ed
    var diff=rc3.trackX-this._trackX;
    var rx=480+diff*0.7; // perspective offset
    var ry=rc3.y;
    if(rx<-20||rx>W+20) continue;
    // cat head on rocket
    rg.fillStyle(0x000000,0.3); rg.fillEllipse(rx+2,ry+4,44,14);
    rg.fillStyle(rc3.col,1); rg.fillEllipse(rx,ry-8,34,26); // rocket body
    rg.fillStyle(0xffffff,1); rg.fillCircle(rx,ry-8,10); // cat head
    rg.fillStyle(0x000000,1); rg.fillCircle(rx-4,ry-10,2); rg.fillCircle(rx+4,ry-10,2); // eyes
    // ears
    rg.fillStyle(rc3.col,1);
    rg.fillTriangle(rx-8,ry-18,rx-4,ry-12,rx-12,ry-12);
    rg.fillTriangle(rx+8,ry-18,rx+4,ry-12,rx+12,ry-12);
    // exhaust trail
    rg.fillStyle(rc3.col,0.4); rg.fillEllipse(rx-26,ry-5,28,10);
    rg.fillStyle(0xffffff,0.2); rg.fillEllipse(rx-38,ry-5,20,7);
  }
  // draw Ed on cig rocket
  var eg=this.edG; eg.clear();
  var ex=200, ey=this._edY;
  var boostAmt=this._edBoost>0?1:0;
  // shadow
  eg.fillStyle(0x000000,0.2); eg.fillEllipse(ex+3,ey+10,70,18);
  // cig rocket body
  eg.fillStyle(0xd4c8a0,1); eg.fillRoundedRect(ex-40,ey-4,80,12,4);
  eg.fillStyle(0xff6b35,1); eg.fillCircle(ex+42,ey+2,8); // lit end
  eg.fillStyle(0xffdd44,boostAmt?0.9:0.5); eg.fillCircle(ex+42,ey+2,4+boostAmt*4);
  // rainbow exhaust
  var exhaust=this._edBoost>0?['#ff4444','#ff8c00','#ffd700','#00e676','#00bcd4']:['#aaaaaa','#cccccc'];
  for(var ei=0;ei<exhaust.length;ei++){
    var ecol=parseInt(exhaust[ei].slice(1),16);
    eg.fillStyle(ecol,0.5-ei*0.1); eg.fillEllipse(ex-42-ei*12,ey+2,18,8+ei*2);
  }
  // Ed cactus body on rocket
  eg.fillStyle(parseInt(AT.skinEd.slice(1),16),1);
  eg.fillRoundedRect(ex-8,ey-18,16,16,3);
  eg.fillStyle(0xf5f0dc,1);
  eg.fillCircle(ex-10,ey-12,3); eg.fillCircle(ex+10,ey-12,3); // spines
  // cig in mouth
  eg.fillStyle(0xd4c8a0,1); eg.fillRect(ex+6,ey-14,14,3);
  eg.fillStyle(0xff6b35,0.9); eg.fillCircle(ex+20,ey-13,3);
  // speed boost aura
  if(this._edBoost>0){
    eg.fillStyle(0xffd700,0.25); eg.fillCircle(ex,ey-6,42);
  }
  // HUD
  var hg=this.hudG; hg.clear();
  hg.fillStyle(0x000000,0.5); hg.fillRoundedRect(14,46,410,36,6);

function WorldMap3Scene(){ Phaser.Scene.call(this,{key:'WorldMap3'}); }
WorldMap3Scene.prototype = Object.create(Phaser.Scene.prototype);

WorldMap3Scene.prototype.create = function(){

  // background — warm plains/dusk
  var bg=this.add.graphics();
  for(var sy=0;sy<H;sy++){
    var t=sy/H;
    var rc=Math.floor(120+t*80);var gc=Math.floor(80+t*60);var bc=Math.floor(40+t*20);
    bg.fillStyle((rc<<16)|(gc<<8)|bc,1); bg.fillRect(0,sy,W,1);
  }
  this.mapG=this.add.graphics().setDepth(2);
  this.edG=this.add.graphics().setDepth(5);
  this.catG=this.add.graphics().setDepth(3);
  this.nodeTxt=this.add.text(W/2,H-28,'',{fontFamily:'Inconsolata,monospace',fontSize:'16px',color:AT.uiGold,stroke:AT.outline,strokeThickness:4}).setOrigin(0.5).setDepth(10).setAlpha(0);
  this.aloeText=this.add.text(20,12,'',{fontFamily:'Inconsolata,monospace',fontSize:'22px',color:AT.aloe,stroke:AT.outline,strokeThickness:4}).setDepth(10);
  this.add.text(W/2,12,'WORLD 3  —  EYE 70',{fontFamily:'Bangers,Georgia,serif',fontSize:'22px',color:'#f5f0dc',stroke:AT.outline,strokeThickness:4}).setOrigin(0.5).setDepth(10);
  // Ed start position
  var startData=this.scene.settings.data;
  if(EWR_STATE.playerPosW3){this.edTile={x:EWR_STATE.playerPosW3.x,y:EWR_STATE.playerPosW3.y};}
  else {this.edTile={x:1,y:4};} // starts at exit tile
  this._moveTimer=0;
  this.keys={
    left:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.LEFT),
    right:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.RIGHT),
    up:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.UP),
    down:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.DOWN),
    a:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A),
    d:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D),
    w:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W),
    s:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.S),
    z:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.Z)
  };
  // spawn ambient cats
  this._cats=[];
  var catSpots=[];
  for(var r=0;r<W3_ROWS.length;r++) for(var c2=0;c2<W3_ROWS[r].length;c2++){if(W3_ROWS[r][c2]==='C')catSpots.push({x:c2,y:r});}
  for(var ci=0;ci<Math.min(4,catSpots.length+2);ci++){
    var csp=catSpots[ci%Math.max(1,catSpots.length)];
    var cp=self._t2p3(csp?csp.x:3, csp?csp.y:5);
    self._cats.push({x:cp.x,y:cp.y+self.tH*0.4,ci:ci%4,tailAng:Math.random()*Math.PI*2,wDir:Math.random()<0.5?1:-1,wT:Math.random()*3000,sitting:Math.random()<0.6,danceT:0,dance:false});
  }
  this._t=0;
  // WS messages over World 3
  this._wsMsgT=9000+Math.random()*10000;
  this.wsMsgTxt=this.add.text(W/2,H/2-20,'',{fontFamily:'Inconsolata,monospace',fontSize:'30px',color:'#ffd700',stroke:'#000000',strokeThickness:5,backgroundColor:'#000000cc',padding:{x:20,y:12}}).setOrigin(0.5).setDepth(30).setAlpha(0);
  this._w3TickX=960; this._w3TickN=0;
  this.w3TickerTxt=this.add.text(960,526,'⚡ '+W3_MAP_NEWS[0]+'  ◆  ',{fontFamily:'Inconsolata,monospace',fontSize:'14px',color:'#ffd700',stroke:'#000000',strokeThickness:2,backgroundColor:'#000000',padding:{x:4,y:2}}).setDepth(10);

WorldMap3Scene.prototype._t2p3=function(tx,ty){
  return {x:this.mapOffX+tx*this.tW+this.tW/2, y:this.mapOffY+ty*this.tH+this.tH/2};
};
WorldMap3Scene.prototype._getTile3=function(tx,ty){
  if(ty<0||ty>=W3_ROWS.length||tx<0||tx>=W3_ROWS[ty].length) return null;
  var ch=W3_ROWS[ty][tx]; return W3_TILES[ch]||null;
};
WorldMap3Scene.prototype._showMsg=function(txt,dur){
  var self=this; this.nodeTxt.setText(txt).setAlpha(1);
  this.time.delayedCall(dur,function(){self.nodeTxt.setAlpha(0);});
};

WorldMap3Scene.prototype.update=function(time,delta){
  var self=this; this._t+=delta; this._moveTimer-=delta;
  this.aloeText.setText('ALOE: '+EWR_STATE.aloe);
  // WS messages
  if(this.wsMsgTxt){
    this._wsMsgT=(this._wsMsgT||10000)-delta;
    if(this._wsMsgT<=0){
      this._wsMsgT=10000+Math.random()*12000;
      var w3c=['#ffd700','#ff4444','#ff44aa','#00eeff'][Math.floor(Math.random()*4)];
      this.wsMsgTxt.setText(WS_MSGS[Math.floor(Math.random()*WS_MSGS.length)]).setColor(w3c).setAlpha(1);
      this.tweens.add({targets:this.wsMsgTxt,alpha:0,delay:3600,duration:900});
    }
  }
  // movement
  if(this._moveTimer<=0){
    var dx=0,dy=0;
    if(Phaser.Input.Keyboard.JustDown(this.keys.left)||Phaser.Input.Keyboard.JustDown(this.keys.a)) dx=-1;
    else if(Phaser.Input.Keyboard.JustDown(this.keys.right)||Phaser.Input.Keyboard.JustDown(this.keys.d)) dx=1;
    else if(Phaser.Input.Keyboard.JustDown(this.keys.up)||Phaser.Input.Keyboard.JustDown(this.keys.w)) dy=-1;
    else if(Phaser.Input.Keyboard.JustDown(this.keys.down)||Phaser.Input.Keyboard.JustDown(this.keys.s)) dy=1;
    if(dx!==0||dy!==0){
      var nx=this.edTile.x+dx, ny=this.edTile.y+dy;
      var tile=this._getTile3(nx,ny);
      // Gate check
      var gateW3=null;
      var b3=EWR_STATE.levelsBeaten;
      if(tile){
        if(tile.id==='3-2'&&b3.indexOf('3-1')<0) gateW3='Beat Quality Hill first!';
        else if(tile.id==='3-3'&&b3.indexOf('3-2')<0) gateW3='Beat Financial District first!';
        else if(tile.id==='3-4'&&b3.indexOf('3-1')<0) gateW3='Beat Quality Hill to reach Gladstone!';
        else if(tile.id==='3-5'&&b3.indexOf('3-3')<0) gateW3='Beat Power & Light first!';
        else if(tile.id==='3-6'&&b3.indexOf('3-2')<0) gateW3='Beat Financial District to reach Westport!';
        else if(tile.id==='3-boss'){
          if(b3.indexOf('3-3')<0||b3.indexOf('3-4')<0||b3.indexOf('3-5')<0) gateW3='Beat Power & Light, Gladstone, and Blue Springs first!';
        }
      }
      if(gateW3){
        var selfG3=this; this.nodeTxt.setText('🔒 '+gateW3).setAlpha(1);
        this.time.delayedCall(2500,function(){selfG3.nodeTxt.setAlpha(0);});
      } else if(tile&&tile.passable){
        this.edTile.x=nx;this.edTile.y=ny;this._moveTimer=140;
        var onTile=this._getTile3(this.edTile.x,this.edTile.y);
        if(onTile&&onTile.label){this.nodeTxt.setText(onTile.label).setAlpha(1);}
        else{this.nodeTxt.setAlpha(0);}
      }
    }
  }
  // enter
  if(Phaser.Input.Keyboard.JustDown(this.keys.z)){this._tryEnterW3();}
  // cat animation
  for(var ci=0;ci<this._cats.length;ci++){
    var cat=this._cats[ci];
    cat.tailAng+=0.04; cat.wT+=delta;
    if(!cat.sitting&&cat.wT>2000+Math.random()*3000){cat.wDir*=-1;cat.wT=0;}
    if(!cat.sitting){cat.x+=cat.wDir*0.4;}
  }
  if(this.w3TickerTxt){this._w3TickX-=1.5*(delta/16);this.w3TickerTxt.setPosition(this._w3TickX,526);if(this._w3TickX<-this.w3TickerTxt.width){this._w3TickN=(this._w3TickN+1)%W3_MAP_NEWS.length;this.w3TickerTxt.setText('⚡ '+W3_MAP_NEWS[this._w3TickN]+'  ◆  ');this._w3TickX=960;}}
  this._drawMapW3(); this._drawEdW3(); this._drawCatsW3();
};

WorldMap3Scene.prototype._drawMapW3=function(){
  var g=this.mapG; g.clear();
  for(var r=0;r<W3_ROWS.length;r++){
    for(var c=0;c<W3_ROWS[r].length;c++){
      var ch=W3_ROWS[r][c];
      var tile=W3_TILES[ch];
      if(!tile) continue;
      var px=this.mapOffX+c*this.tW, py=this.mapOffY+r*this.tH;
      var cx=px+this.tW/2, cy=py+this.tH/2;
      switch(tile.type){
        case 'mountain': g.fillStyle(0x7f6000,1);g.fillRect(px,py,this.tW,this.tH);g.fillStyle(0x5a4400,1);g.fillTriangle(cx,py+4,px+4,py+this.tH-4,px+this.tW-4,py+this.tH-4);break;
        case 'empty':    g.fillStyle(0xc8a040,1);g.fillRect(px,py,this.tW,this.tH);break;
        case 'grass':    g.fillStyle(0x8ac926,1);g.fillRect(px,py,this.tW,this.tH);break;
        case 'path':
          // Eye 70 road — row 4 gets highway treatment
          if(r===4){g.fillStyle(0x555566,1);g.fillRect(px,py,this.tW,this.tH);g.fillStyle(0xffd700,0.5);g.fillRect(px+this.tW/2-2,py+4,4,this.tH-8);}
          else{g.fillStyle(0xd4a04e,1);g.fillRect(px,py,this.tW,this.tH);}
          break;
        case 'river':    g.fillStyle(0x2255aa,1);g.fillRect(px,py,this.tW,this.tH);g.fillStyle(0x4477cc,0.5);g.fillRect(px+2,py+8,this.tW-4,8);break;
        case 'bridge':   g.fillStyle(0x7a5c2e,1);g.fillRect(px,py,this.tW,this.tH);g.lineStyle(2,0x5a3c0e,1);for(var bi=0;bi<4;bi++){g.beginPath();g.moveTo(px+4+bi*12,py+4);g.lineTo(px+4+bi*12,py+this.tH-4);g.strokePath();}break;
        case 'exit':     g.fillStyle(0x3355aa,1);g.fillRect(px,py,this.tW,this.tH);g.fillStyle(0x88aaff,1);g.fillCircle(cx,cy,12);g.fillStyle(0xffffff,1);g.fillTriangle(cx-5,cy-7,cx-5,cy+7,cx+8,cy);break;
        case 'level':
          var beaten=EWR_STATE.levelsBeaten.indexOf(tile.id)>=0;
          g.fillStyle(beaten?0x004400:0x220044,1);g.fillRect(px,py,this.tW,this.tH);
          g.lineStyle(2,beaten?0x00e676:0xffd700,1);g.strokeRect(px+2,py+2,this.tW-4,this.tH-4);
          g.fillStyle(beaten?0x00e676:0xffd700,1);g.fillCircle(cx,cy,10);
          g.fillStyle(0x000000,1);g.fillCircle(cx,cy,7);
          g.fillStyle(beaten?0x00e676:0xffd700,1);g.fillCircle(cx,cy,4);
          break;
        case 'boss':
          var bpulse=0.5+Math.sin(this._t*0.004)*0.5;
          g.fillStyle(0x330000,1);g.fillRect(px,py,this.tW,this.tH);
          g.lineStyle(2,0xff0000,1);g.strokeRect(px+2,py+2,this.tW-4,this.tH-4);
          g.fillStyle(0xff0000,bpulse);g.fillCircle(cx,cy,14);
          g.fillStyle(0xffffff,1);
          // skull shape
          g.fillCircle(cx,cy-4,9);
          g.fillRect(cx-6,cy+1,12,8);
          g.fillStyle(0x330000,1);
          g.fillCircle(cx-4,cy-5,3);g.fillCircle(cx+4,cy-5,3);
          g.fillRect(cx-5,cy+4,3,5);g.fillRect(cx-1,cy+4,3,5);g.fillRect(cx+3,cy+4,3,5);
          break;
        case 'catspot':
          g.fillStyle(0xc8a040,1);g.fillRect(px,py,this.tW,this.tH);
          g.fillStyle(0xff9f43,1);g.fillCircle(cx,cy,8);
          g.fillStyle(0x000000,1);g.fillCircle(cx-3,cy-2,2);g.fillCircle(cx+3,cy-2,2);
          break;
      }
    }
  }
  // Eye 70 label along row 4
  var eyePx=this.mapOffX, eyePy=this.mapOffY+4*this.tH+this.tH/2+14;
  // drawn via a text object created once (we just use nodeTxt for messages)
};

WorldMap3Scene.prototype._drawEdW3=function(){
  var g=this.edG; g.clear();
  var p=this._t2p3(this.edTile.x,this.edTile.y);
  g.fillStyle(0x000000,0.25);g.fillEllipse(p.x+2,p.y+14,28,10);
  g.fillStyle(parseInt(AT.skinEd.slice(1),16),1);g.fillRoundedRect(p.x-8,p.y-18,16,20,3);
  g.fillStyle(0xf5f0dc,1);g.fillCircle(p.x-10,p.y-12,3);g.fillCircle(p.x+10,p.y-12,3);
  g.fillStyle(0x000000,1);g.fillCircle(p.x-5,p.y-8,3);g.fillCircle(p.x+5,p.y-8,3);
  g.fillStyle(parseInt(AT.cigBody.slice(1),16),1);g.fillRect(p.x+6,p.y-10,10,3);
  g.fillStyle(parseInt(AT.cigTip.slice(1),16),1);g.fillCircle(p.x+17,p.y-9,3);
};

WorldMap3Scene.prototype._drawCatsW3=function(){
  var g=this.catG; g.clear();
  for(var ci=0;ci<this._cats.length;ci++){DRAW_CAT.draw(g,this._cats[ci]);}
};

WorldMap3Scene.prototype._tryEnterW3=function(){
  var self=this;
  var tile=this._getTile3(this.edTile.x,this.edTile.y);
  if(!tile) return;
  if(tile.type==='exit'){
    SMOKE_POOL.length=0;EX_POOL.length=0;FIRE_POOL.length=0;
    this.scene.start('WorldMap2'); return;
  }
  if(tile.type!=='level'&&tile.type!=='boss') return;
  var id=tile.id;
  // gate logic
  var beaten=EWR_STATE.levelsBeaten;
  var gateMsg=null;
  if(id==='3-2'&&beaten.indexOf('3-1')<0) gateMsg='Beat Quality Hill first!';
  else if(id==='3-3'&&beaten.indexOf('3-2')<0) gateMsg='Beat Financial District first!';
  else if(id==='3-4'&&beaten.indexOf('3-1')<0) gateMsg='Beat Quality Hill to reach Gladstone!';
  else if(id==='3-5'&&beaten.indexOf('3-3')<0) gateMsg='Beat Power & Light first!';
  else if(id==='3-6'&&beaten.indexOf('3-2')<0) gateMsg='Beat Financial District to reach Westport!';
  else if(id==='3-boss'){
    if(beaten.indexOf('3-3')<0||beaten.indexOf('3-4')<0||beaten.indexOf('3-5')<0)
      gateMsg='Beat Power & Light, Gladstone, and Blue Springs to face Mr. Handtowel!';
  }
  if(gateMsg){self._showMsg(gateMsg,3000);return;}
  // First-time World 3 entry — show Rasta Corp Ad
  if(!EWR_STATE.rastaCorp.commercialsSeen){
    EWR_STATE.playerPosW3={x:this.edTile.x,y:this.edTile.y};
    SMOKE_POOL.length=0;EX_POOL.length=0;FIRE_POOL.length=0;
    this.scene.start('RastaCorpAd',{returnScene:'WorldMap3'}); return;
  }
  var destMap={'3-1':'Level31','3-2':'Level32','3-3':'Level33','3-4':'Level34','3-5':'Level35','3-6':'Level36','3-boss':'HandtowelScene'};
  var dest=destMap[id];
  if(dest){EWR_STATE.playerPosW3={x:this.edTile.x,y:this.edTile.y};SMOKE_POOL.length=0;EX_POOL.length=0;FIRE_POOL.length=0;this.scene.start(dest);}
};

        self.tweens.add({targets:self.introTxt,alpha:0,duration:800,delay:1200});
      });
    })(lines[li],delay);
    delay+=2200;
  }
  this._introEnd=delay+500;
  this._flash('MR. HANDTOWEL',2000);
  this._drawBg();
  this._drawPlats();
};

HandtowelScene.prototype._drawHandtowel=function(g, boss){
  if(boss.dieT>=0) return; // handled in death
  var bx=boss.x, by=boss.y;
  var sc=boss.phase===1?1.6:boss.phase===2?1.8:2.0;
  var swag=Math.sin(boss.swaggerAng)*4; // swagger bob
  var hitCol=boss.hitFlash>0?0xffffff:null;
  // shadow
  g.fillStyle(0x000000,0.3);g.fillEllipse(bx+2,by+4,52*sc,18);
  // trench coat
  g.fillStyle(hitCol||0x2a2a2a,1);
  g.fillRect(bx-18*sc,by-40*sc+swag,36*sc,50*sc); // coat body
  g.fillRect(bx-24*sc,by-35*sc+swag,14*sc,42*sc); // coat left lapel
  g.fillRect(bx+10*sc,by-35*sc+swag,14*sc,42*sc); // coat right lapel
  g.fillStyle(0x1a1a1a,1);
  g.fillRect(bx-20*sc,by+8*sc+swag,40*sc,6*sc); // coat hem detail
  // gold chains (3)
  if(boss.phase<3){
    g.lineStyle(2,0xffd700,0.9);
    g.beginPath();g.arc(bx,by-25*sc+swag,14*sc,0.3,2.8);g.strokePath();
    g.beginPath();g.arc(bx,by-22*sc+swag,11*sc,0.5,2.6);g.strokePath();
    g.beginPath();g.arc(bx,by-19*sc+swag,8*sc,0.7,2.4);g.strokePath();
  } else {
    // phase 3: chains flying off
    g.lineStyle(2,0xffd700,0.6);
    g.beginPath();g.moveTo(bx-10*sc,by-25*sc+swag);g.lineTo(bx+16*sc,by-30*sc+swag);g.strokePath();
    g.beginPath();g.moveTo(bx-8*sc,by-22*sc+swag);g.lineTo(bx+14*sc,by-15*sc+swag);g.strokePath();
  }
  // cat body (orange with dark spots)
  g.fillStyle(hitCol||0xff8800,1);
  g.fillCircle(bx,by-55*sc+swag,24*sc); // head
  g.fillRoundedRect(bx-14*sc,by-45*sc+swag,28*sc,30*sc,4);
  // dark spots
  g.fillStyle(0xcc5500,0.6);
  g.fillCircle(bx-8*sc,by-55*sc+swag,5*sc);g.fillCircle(bx+8*sc,by-50*sc+swag,4*sc);g.fillCircle(bx+4*sc,by-62*sc+swag,3*sc);
  // ears
  g.fillStyle(hitCol||0xff8800,1);
  g.fillTriangle(bx-18*sc,by-72*sc+swag,bx-10*sc,by-58*sc+swag,bx-24*sc,by-58*sc+swag);
  g.fillTriangle(bx+18*sc,by-72*sc+swag,bx+10*sc,by-58*sc+swag,bx+24*sc,by-58*sc+swag);
  // eyes (yellow, scowling, red in phase 3)
  var eyeCol=boss.phase===3?0xff0000:0xffdd00;
  g.fillStyle(eyeCol,1);
  g.fillCircle(bx-8*sc,by-57*sc+swag,5*sc);g.fillCircle(bx+8*sc,by-57*sc+swag,5*sc);
  g.fillStyle(0x000000,1);
  g.fillCircle(bx-8*sc+(boss.dir>0?2:0),by-57*sc+swag,2.5*sc);g.fillCircle(bx+8*sc+(boss.dir>0?2:0),by-57*sc+swag,2.5*sc);
  // scowl
  g.lineStyle(2,0x000000,1);g.beginPath();g.moveTo(bx-6*sc,by-50*sc+swag);g.lineTo(bx+6*sc,by-50*sc+swag);g.strokePath();
  // fedora (phase 1+2, flies off in phase 3)
  if(!boss.fedoraFly){
    g.fillStyle(0x111111,1);
    g.fillRect(bx-20*sc,by-76*sc+swag,40*sc,8*sc); // brim
    g.fillRect(bx-13*sc,by-90*sc+swag,26*sc,16*sc); // crown
    g.fillStyle(0xdd0022,1);g.fillRect(bx-13*sc,by-77*sc+swag,26*sc,4*sc); // red band
  } else {
    // flying fedora
    g.fillStyle(0x111111,1);
    g.fillRect(bx-20*sc,boss.fedoraY,40*sc,8*sc);
    g.fillRect(bx-13*sc,boss.fedoraY-14*sc,26*sc,16*sc);
    g.fillStyle(0xdd0022,1);g.fillRect(bx-13*sc,boss.fedoraY+1*sc,26*sc,4*sc);
    boss.fedoraY-=1.5;
  }
  // cigar (NOT a cigarette — big, fat, brown)
  var cx2=bx+boss.dir*20*sc, cy2=by-50*sc+swag;
  g.fillStyle(0x8b4513,1);g.fillRect(cx2,cy2,boss.dir*18*sc,5*sc);
  g.fillStyle(0xcc6633,1);g.fillRect(cx2,cy2,boss.dir*5*sc,5*sc);
  g.fillStyle(0xff4400,0.8);g.fillCircle(cx2+boss.dir*20*sc,cy2+2*sc,3*sc);
  // phase 3 aura
  if(boss.phase===3){
    g.fillStyle(0xff0000,0.12+Math.sin(this._t*0.012)*0.08);
    g.fillCircle(bx,by-40*sc,50*sc);
  }
  // HP bar
  g.fillStyle(0x440000,1);g.fillRect(bx-40,by-105*sc-10,80,10);
  var hpFrac=boss.hp/boss.maxHp;
  var hpCol=boss.phase===3?0xff0000:boss.phase===2?0xff8800:0x00e676;
  g.fillStyle(hpCol,1);g.fillRect(bx-40,by-105*sc-10,Math.max(0,80*hpFrac),10);
  g.lineStyle(1,0xffffff,0.5);g.strokeRect(bx-40,by-105*sc-10,80,10);
};

HandtowelScene.prototype.update=function(time,delta){
  var self=this; var dt=delta/1000;
  this._t+=delta;
  if(this._beaten) return;
  var ep=this.ep, es=this.es, boss=this.boss;
  var W=960;

  // ── Ed physics ──
  ep.vy+=28; ep.vy=Math.min(ep.vy,700);
  if(es.hurtTimer>0) es.hurtTimer-=delta;
  if(es.punchTimer>0){es.punchTimer-=delta;es.punchActive=es.punchTimer>300&&es.punchTimer<700;}
  if(es.kickTimer>0){es.kickTimer-=delta;es.kickActive=es.kickTimer>200&&es.kickTimer<500;}
  // input
  var left=this.keys.left.isDown||this.keys.a.isDown;
  var right=this.keys.right.isDown||this.keys.d.isDown;
  var jumpJD=Phaser.Input.Keyboard.JustDown(this.keys.up)||Phaser.Input.Keyboard.JustDown(this.keys.w)||Phaser.Input.Keyboard.JustDown(this.keys.space);
  if(this.vpad){left=left||this.vpad.left;right=right||this.vpad.right;if(this.vpad.jumpJD)jumpJD=true;}
  if(left){ep.vx=Math.max(ep.vx-18,-140);es.facing=-1;}
  if(right){ep.vx=Math.min(ep.vx+18,140);es.facing=1;}
  if(!left&&!right){ep.vx*=0.75;}
  if(jumpJD&&(ep.grounded||ep.coyoteMs>0)){ep.vy=-520;ep.grounded=false;ep.coyoteMs=0;SOUND.jump();}
  ep.coyoteMs-=delta;
  ep.x+=ep.vx*dt; ep.y+=ep.vy*dt;
  ep.grounded=false;
  for(var pi=0;pi<this.plats.length;pi++){
    var p=this.plats[pi];
    if(ep.x+10>p.x&&ep.x-10<p.x+p.w&&ep.y>p.y&&ep.y-ep.vy*dt<=p.y+2){
      ep.y=p.y;ep.vy=0;ep.grounded=true;ep.coyoteMs=90;ep.djUsed=false;
    }
  }
  if(ep.y>540){ep.y=464;ep.vy=0;_takeDmg();SOUND.hurt();if(EWR_STATE.health[0]<=0){this._triggerDeath();return;}}
  if(ep.x<0)ep.x=0;if(ep.x>W)ep.x=W;
  // punch
  if(Phaser.Input.Keyboard.JustDown(this.keys.z)&&es.punchTimer<=0){es.punchTimer=900;SOUND.punch();}
  if(Phaser.Input.Keyboard.JustDown(this.keys.x)&&es.kickTimer<=0){es.kickTimer=700;SOUND.kick();}

  // ── Boss AI ──
  if(this._t<this._introEnd+500) { this._render(); return; } // wait for intro
  boss.bT+=delta; boss.swaggerAng+=delta*0.003;
  // phase transitions
  if(boss.hp<10&&boss.phase<3){boss.phase=3;boss.fedoraFly=true;this._flash('PHASE 3: FULL MAFIA MODE',1800,28,'#ff0000');boss.shotInterval=1200;boss.vx=boss.vx>0?190:-190;}
  else if(boss.hp<22&&boss.phase<2){boss.phase=2;this._flash('HE CALLED BACKUP!',1600,28,'#ff8800');boss.shotInterval=2000;boss.vx=boss.vx>0?130:-130;this._spawnMinions();}
  // movement
  if(!boss.stomping){
    boss.x+=boss.vx*dt;
    if(boss.x<80){boss.x=80;boss.vx=Math.abs(boss.vx);boss.dir=1;}
    if(boss.x>W-80){boss.x=W-80;boss.vx=-Math.abs(boss.vx);boss.dir=-1;}
  }
  // phase 3 stomp
  if(boss.phase===3&&!boss.stomping&&boss.bT%3000<delta){
    boss.stomping=true;boss.stompT=0;
    var origX=boss.x;
    self.tweens.add({targets:boss,x:ep.x,duration:400,ease:'Power2',onComplete:function(){
      spawnExplosion(boss.x,boss.y,0xff0000,2);SOUND.blast();
      if(Math.abs(ep.x-boss.x)<80&&es.hurtTimer<=0){
        _takeDmg();es.hurtTimer=1200;SOUND.hurt();ep.vy=-400;
        if(EWR_STATE.health[0]<=0){self._triggerDeath();}
      }
      boss.stomping=false;
    }});
  }
  // projectiles (joints)
  boss.shotT+=delta;
  if(boss.shotT>=boss.shotInterval){
    boss.shotT=0;
    var angle=Math.atan2(ep.y-boss.y,ep.x-boss.x);
    if(boss.phase===3){
      // 3-way fan
      for(var fa=-1;fa<=1;fa++){
        var a2=angle+fa*0.35;
        boss.projectiles.push({x:boss.x,y:boss.y-30,vx:Math.cos(a2)*280,vy:Math.sin(a2)*280,life:2000});
      }
    } else {
      boss.projectiles.push({x:boss.x,y:boss.y-30,vx:Math.cos(angle)*240,vy:Math.sin(angle)*240,life:2000});
    }
  }
  // update projectiles
  for(var pj=boss.projectiles.length-1;pj>=0;pj--){
    var proj=boss.projectiles[pj];
    proj.x+=proj.vx*dt; proj.y+=proj.vy*dt;
    proj.life-=delta; proj.vy+=10; // gravity on joints
    if(proj.life<=0||proj.y>540||proj.x<0||proj.x>W){boss.projectiles.splice(pj,1);continue;}
    if(es.hurtTimer<=0&&Math.abs(ep.x-proj.x)<18&&Math.abs(ep.y-30-proj.y)<18){
      boss.projectiles.splice(pj,1);
      _takeDmg();es.hurtTimer=1200;SOUND.hurt();ep.vy=-300;
      if(EWR_STATE.health[0]<=0){this._triggerDeath();return;}
    }
  }
  // update minions
  for(var mj=boss.minions.length-1;mj>=0;mj--){
    var min=boss.minions[mj];
    if(min.dieT>=0){min.dieT+=delta;if(min.dieT>600)boss.minions.splice(mj,1);continue;}
    min.x+=min.dir*min.spd*dt;min.bT+=delta;
    if(min.x<min.pMin){min.x=min.pMin;min.dir=1;}
    if(min.x>min.pMax){min.x=min.pMax;min.dir=-1;}
    if(es.hurtTimer<=0&&Math.abs(ep.x-min.x)<26&&Math.abs(ep.y-min.y)<30){
      _takeDmg();es.hurtTimer=1200;SOUND.hurt();ep.vy=-300;
      if(EWR_STATE.health[0]<=0){this._triggerDeath();return;}
    }
  }
  // boss contact damage
  if(es.hurtTimer<=0&&boss.dieT<0&&Math.abs(ep.x-boss.x)<32&&Math.abs(ep.y-10-(boss.y-40))<40){
    _takeDmg();es.hurtTimer=1200;SOUND.hurt();ep.vy=-350;ep.vx=-es.facing*200;
    if(EWR_STATE.health[0]<=0){this._triggerDeath();return;}
  }
  // punch hits boss
  if(es.punchActive&&boss.dieT<0&&Math.abs(ep.x+es.facing*56-boss.x)<34&&Math.abs(ep.y-20-(boss.y-40))<40&&es.punchTimer>550){
    boss.hp--; boss.hitFlash=180; spawnExplosion(boss.x,boss.y-30,0xffd700,1.2);SOUND.bossHit();
    this.cameras.main.shake(120,0.008);
    if(boss.hp<=0&&boss.dieT<0){this._killBoss();return;}
  }
  // kick hits boss
  if(es.kickActive&&boss.dieT<0&&Math.abs(ep.x+es.facing*72-boss.x)<34&&Math.abs(ep.y-10-(boss.y-40))<40&&es.kickTimer>380){
    boss.hp--; boss.hitFlash=180; spawnExplosion(boss.x,boss.y-30,0xff6b35,1.0);SOUND.bossHit();
    this.cameras.main.shake(100,0.007);
    if(boss.hp<=0&&boss.dieT<0){this._killBoss();return;}
  }
  // punch/kick hits minions
  for(var mj2=boss.minions.length-1;mj2>=0;mj2--){
    var min2=boss.minions[mj2]; if(min2.dieT>=0) continue;
    var punch2=es.punchActive&&Math.abs(ep.x+es.facing*56-min2.x)<24&&Math.abs(ep.y-20-min2.y)<28&&es.punchTimer>550;
    var kick2=es.kickActive&&Math.abs(ep.x+es.facing*72-min2.x)<24&&Math.abs(ep.y-10-min2.y)<28&&es.kickTimer>380;
    if(punch2||kick2){min2.hp--;spawnExplosion(min2.x,min2.y-10,0xffd700,0.8);if(punch2)SOUND.punch();else SOUND.kick();if(min2.hp<=0){min2.dieT=0;EWR_STATE.aloe+=18;spawnExplosion(min2.x,min2.y-10,0x00e676,1);}}
  }
  if(boss.hitFlash>0) boss.hitFlash-=delta;
  // dollar rain in phase 3
  if(boss.phase===3&&Math.random()<0.08){
    spawnExplosion(Math.random()*W,50,0xffd700,0.4);
  }
  this._render();
};

HandtowelScene.prototype._spawnMinions=function(){
  this.boss.minions.push({x:50,y:464,hp:3,spd:55,dir:1,bT:0,dieT:-1,pMin:20,pMax:400,type:'rasta'});
  this.boss.minions.push({x:910,y:464,hp:3,spd:55,dir:-1,bT:0,dieT:-1,pMin:560,pMax:940,type:'rasta'});
  this._flash('BACKUP ARRIVES!',1200,26,'#ff8800');
};

HandtowelScene.prototype._render=function(){
  var ep=this.ep, es=this.es, boss=this.boss;
  var W=960;
  this.bgG.clear(); this._drawBg(); this._drawPlats();
  // draw projectiles (joints = green circles)
  var bg2=this.bossG; bg2.clear();
  for(var pj=0;pj<boss.projectiles.length;pj++){
    var proj=boss.projectiles[pj];
    bg2.fillStyle(0x00cc44,1);bg2.fillCircle(proj.x,proj.y,7);
    bg2.fillStyle(0x005500,1);bg2.fillCircle(proj.x,proj.y,4);
    bg2.fillStyle(0xaaff00,0.5);bg2.fillCircle(proj.x-2,proj.y-2,3);
  }
  // draw minions
  for(var mj=0;mj<boss.minions.length;mj++){
    this._drawMochi(bg2, boss.minions[mj]);
  }
  this._drawHandtowel(bg2, boss);
  // draw Ed
  var frame=es.punchTimer>0?5:es.kickTimer>0?6:!ep.grounded?4:ep.vx!==0?Math.floor(es.walkT/180)%3+1:0;
  this.edG.clear();
  DRAW_ED.draw(this.edG, ep.x, ep.y, frame, es.facing<0, es.cigF);
  if(es.punchActive){this.edG.fillStyle(0xffd60a,0.15);this.edG.fillCircle(ep.x+es.facing*56,ep.y-20,28);}
  if(es.kickActive){this.edG.fillStyle(0xff6b35,0.18);this.edG.fillCircle(ep.x+es.facing*ED_MOVE.kickRange,ep.y-10,32);}
  drawExplosions(this.edG);drawFire(this.edG);
  for(var sp=0;sp<SMOKE_POOL.length;sp++){var smk=SMOKE_POOL[sp];this.edG.fillStyle(0xaaaaaa,smk.life*0.3);this.edG.fillCircle(smk.x,smk.y,smk.r);}
  // HUD
  var hg=this.hudG; hg.clear();
  hg.fillStyle(0x000000,0.5);hg.fillRoundedRect(14,14,200,28,5);
  hg.fillStyle(0xff0000,1);hg.fillRect(18,18,Math.max(0,EWR_STATE.health[0]/EWR_STATE.maxHealth[0]*190),20);
  hg.lineStyle(1,0xffffff,0.5);hg.strokeRect(18,18,190,20);
  // boss HP
  hg.fillStyle(0x110000,1);hg.fillRoundedRect(W/2-120,14,240,28,5);
  var bhpFrac=boss.hp/boss.maxHp;
  var bhpCol=boss.phase===3?0xff0000:boss.phase===2?0xff8800:0x00e676;
  hg.fillStyle(bhpCol,1);hg.fillRect(W/2-116,18,Math.max(0,232*bhpFrac),20);
  hg.lineStyle(1,0xffd700,0.7);hg.strokeRect(W/2-116,18,232,20);
  // aloe
  this.add.text;
};

HandtowelScene.prototype._drawMochi=function(g,m){
  Level11Scene.prototype._drawMochi.call(this,g,m);
};

HandtowelScene.prototype._triggerDeath=function(){
  if(this._dead) return; this._dead=true;
  var self=this;
  SOUND.death();
  this._flash('ED NEEDS A MINUTE',2000,36,'#ffffff');
  this.time.delayedCall(2800,function(){
    EWR_STATE.health[0]=EWR_STATE.maxHealth[0];
    EX_POOL.length=0;SMOKE_POOL.length=0;FIRE_POOL.length=0;
    self.scene.restart();
  });
};

HandtowelScene.prototype._killBoss=function(){
  var self=this; this._beaten=true;
  var boss=this.boss;
  boss.dieT=0;boss.fedoraFly=true;
  spawnExplosion(boss.x,boss.y-40,0xffd700,3);spawnExplosion(boss.x-30,boss.y-20,0xff0000,2);spawnExplosion(boss.x+30,boss.y-20,0xff0000,2);
  SOUND.victory();this.cameras.main.shake(400,0.025);
  this._flash('HANDTOWEL GOES DOWN!!!',2500,42,'#ffd700');
  if(EWR_STATE.levelsBeaten.indexOf('3-boss')<0){EWR_STATE.levelsBeaten.push('3-boss');EWR_STATE.aloe+=600;EWR_STATE.rastaCorp.bossesDefeated++;}
  _triggerFourthWallBreak(this,'handtowel');
  _mandelaFlash(this);
  this.time.delayedCall(1200,function(){
    self._flash('THE RASTA MOVEMENT HAS FALLEN (FOR NOW)',2200,22,'#00e676');
  });
  this.time.delayedCall(16000,function(){
    EX_POOL.length=0;SMOKE_POOL.length=0;FIRE_POOL.length=0;
    if(Math.random()<0.30){ _triggerCommercial(self,'WorldMap4','w3',{fromBoss:'handtowel'}); }
    else { self.scene.start('WorldMap4',{fromBoss:'handtowel'}); }
  });
};

WorldMap4Scene.prototype._drawMap4=function(){

MochiQueenScene.prototype._flash=function(txt,dur,sz,col){

};

MochiQueenScene.prototype._drawArenaMQ=function(){
  var g=this.bgG; g.clear();
  var W=960,H=540;
  // deep velvet purple background
  g.fillStyle(0x1a0030,1); g.fillRect(0,0,W,H);
  // royal purple floor
  g.fillStyle(0x2d0050,1); g.fillRect(0,430,W,H-430);
  // gold trim floor line
  g.lineStyle(3,0xffd700,0.8); g.beginPath(); g.moveTo(0,430); g.lineTo(W,430); g.strokePath();
  // velvet curtains on sides
  g.fillStyle(0x8b0057,1); g.fillRect(0,0,90,430); g.fillRect(W-90,0,90,430);
  g.fillStyle(0xcc0088,0.35); g.fillRect(10,0,25,430); g.fillRect(W-35,0,25,430);
  // gold curtain trim
  g.lineStyle(2,0xffd700,0.6);
  g.beginPath(); g.moveTo(90,0); g.lineTo(90,430); g.strokePath();
  g.beginPath(); g.moveTo(W-90,0); g.lineTo(W-90,430); g.strokePath();
  // throne backdrop banner
  g.fillStyle(0x660040,1); g.fillRect(340,0,280,80);
  g.lineStyle(2,0xffd700,0.9); g.strokeRect(344,4,272,72);
  g.fillStyle(0xffd700,0.2); g.fillRect(352,10,260,58);
  // mochi pattern on walls (pink dots)
  g.fillStyle(0xff88cc,0.12);
  for(var px=120;px<W-120;px+=60){
    for(var py=20;py<350;py+=60){
      g.fillCircle(px,py,16);
    }
  }
  // candelabras (stylized)
  for(var ci=0;ci<3;ci++){
    var cx=180+ci*300;
    g.fillStyle(0xffd700,0.9); g.fillRect(cx-3,380,6,50);
    g.fillStyle(0xffdd00,1); g.fillCircle(cx,378,5);
    g.fillStyle(0xff8800,0.7); g.fillCircle(cx,375,3);
  }
};

MochiQueenScene.prototype._drawPlatsMQ=function(){
  var g=this.platG; g.clear();
  for(var pi=0;pi<this.plats.length;pi++){
    var p=this.plats[pi];
    g.fillStyle(0x4a0070,1); g.fillRect(p.x,p.y,p.w,p.h);
    g.fillStyle(0xffd700,1); g.fillRect(p.x,p.y,p.w,4);
    g.lineStyle(1,0xcc88ff,0.5); g.strokeRect(p.x,p.y,p.w,p.h);
  }
};

MochiQueenScene.prototype._drawMochiQueen=function(g, boss){
  if(boss.dieT>=0) return;
  var bx=boss.x, by=boss.y;
  var sc=boss.scale||2.2;
  var bob=Math.sin(boss.bT*0.002)*5;
  var hitCol=boss.hitFlash>0?0xffffff:null;
  // shadow
  g.fillStyle(0x000000,0.25); g.fillEllipse(bx+3,by+6,60*sc,20);
  // main body (giant pink sphere)
  g.fillStyle(hitCol||0xff99cc,1); g.fillCircle(bx,by-32*sc+bob,28*sc);
  // darker pink core
  g.fillStyle(hitCol||0xee77aa,0.6); g.fillCircle(bx-4*sc,by-36*sc+bob,18*sc);
  // cheek blush
  g.fillStyle(0xff6699,0.5); g.fillCircle(bx-14*sc,by-28*sc+bob,8*sc); g.fillCircle(bx+14*sc,by-28*sc+bob,8*sc);
  // eyes (angry royalty)
  g.fillStyle(0xffffff,1); g.fillCircle(bx-9*sc,by-35*sc+bob,5*sc); g.fillCircle(bx+9*sc,by-35*sc+bob,5*sc);
  var eyeCol=boss.phase===3?0xff0000:boss.phase===2?0xff6600:0x880044;
  g.fillStyle(eyeCol,1); g.fillCircle(bx-9*sc,by-35*sc+bob,2.5*sc); g.fillCircle(bx+9*sc,by-35*sc+bob,2.5*sc);
  // angry eyebrows
  g.lineStyle(3*sc,0x660033,1);
  g.beginPath(); g.moveTo(bx-16*sc,by-42*sc+bob); g.lineTo(bx-6*sc,by-39*sc+bob); g.strokePath();
  g.beginPath(); g.moveTo(bx+16*sc,by-42*sc+bob); g.lineTo(bx+6*sc,by-39*sc+bob); g.strokePath();
  // mouth (frown with fangs)
  g.lineStyle(2*sc,0x660033,1);
  g.beginPath(); g.arc(bx,by-30*sc+bob,10*sc,0.2,2.9); g.strokePath();
  g.fillStyle(0xffffff,1);
  g.fillTriangle(bx-5*sc,by-27*sc+bob,bx-3*sc,by-23*sc+bob,bx-1*sc,by-27*sc+bob);
  g.fillTriangle(bx+1*sc,by-27*sc+bob,bx+3*sc,by-23*sc+bob,bx+5*sc,by-27*sc+bob);
  // stubby arms
  g.fillStyle(hitCol||0xff99cc,1);
  g.fillRoundedRect(bx-38*sc,by-36*sc+bob,12*sc,18*sc,3);
  g.fillRoundedRect(bx+26*sc,by-36*sc+bob,12*sc,18*sc,3);
  // crown (orbit in phase 3 or sit on head)
  if(boss.crownOrbit){
    // crown orbiting at radius 48
    var ca=boss.crownAng;
    var cOrX=bx+Math.cos(ca)*48*sc;
    var cOrY=(by-38*sc+bob)+Math.sin(ca)*28*sc;
    this._drawCrown(g,cOrX,cOrY,sc*0.9);
  } else {
    this._drawCrown(g,bx,by-60*sc+bob,sc);
  }
  // HP bar
  var hpFrac=Math.max(0,boss.hp/boss.maxHp);
  g.fillStyle(0x1a0030,0.8); g.fillRoundedRect(bx-44,by-80*sc-14,88,12,3);
  var hpCol=boss.phase===3?0xff0000:boss.phase===2?0xff8800:0xff88cc;
  g.fillStyle(hpCol,1); g.fillRect(bx-42,by-80*sc-12,Math.max(0,84*hpFrac),8);
  g.lineStyle(1,0xffd700,0.7); g.strokeRect(bx-44,by-80*sc-14,88,12);
};

MochiQueenScene.prototype._drawCrown=function(g,cx,cy,sc){
  var sc2=sc||1;
  // crown base
  g.fillStyle(0xffd700,1); g.fillRect(cx-18*sc2,cy-6*sc2,36*sc2,10*sc2);
  // 3 crown points
  g.fillTriangle(cx-16*sc2,cy-6*sc2,cx-12*sc2,cy-6*sc2,cx-14*sc2,cy-20*sc2);
  g.fillTriangle(cx-4*sc2,cy-6*sc2,cx+4*sc2,cy-6*sc2,cx,cy-26*sc2);
  g.fillTriangle(cx+12*sc2,cy-6*sc2,cx+16*sc2,cy-6*sc2,cx+14*sc2,cy-20*sc2);
  // jewels
  g.fillStyle(0xff0066,1); g.fillCircle(cx-14*sc2,cy-20*sc2,3*sc2);
  g.fillStyle(0x00ccff,1); g.fillCircle(cx,cy-26*sc2,4*sc2);
  g.fillStyle(0xff0066,1); g.fillCircle(cx+14*sc2,cy-20*sc2,3*sc2);
  g.fillStyle(0xffffff,0.6); g.fillCircle(cx+0.5*sc2,cy-26*sc2-1.5*sc2,1.5*sc2);
};

MochiQueenScene.prototype.update=function(time,delta){
  var self=this; var dt=delta/1000;
  this._t+=delta;
  if(this._beaten) return;
  var ep=this.ep, es=this.es, boss=this.boss;
  var W=960;

  // Ed physics
  ep.vy+=28; ep.vy=Math.min(ep.vy,700);
  if(es.hurtTimer>0) es.hurtTimer-=delta;
  if(es.punchTimer>0){es.punchTimer-=delta;es.punchActive=es.punchTimer>300&&es.punchTimer<700;}
  if(es.kickTimer>0){es.kickTimer-=delta;es.kickActive=es.kickTimer>200&&es.kickTimer<500;}
  var left=this.keys.left.isDown||this.keys.a.isDown;
  var right=this.keys.right.isDown||this.keys.d.isDown;
  var jumpJD=Phaser.Input.Keyboard.JustDown(this.keys.up)||Phaser.Input.Keyboard.JustDown(this.keys.w)||Phaser.Input.Keyboard.JustDown(this.keys.space);
  if(this.vpad){left=left||this.vpad.left;right=right||this.vpad.right;if(this.vpad.jumpJD)jumpJD=true;}
  if(left){ep.vx=Math.max(ep.vx-18,-140);es.facing=-1;}
  if(right){ep.vx=Math.min(ep.vx+18,140);es.facing=1;}
  if(!left&&!right) ep.vx*=0.75;
  if(jumpJD&&(ep.grounded||ep.coyoteMs>0)){ep.vy=-520;ep.grounded=false;ep.coyoteMs=0;SOUND.jump();}
  if(jumpJD&&!ep.grounded&&!ep.djUsed){ep.vy=-400;ep.djUsed=true;SOUND.jump();}
  ep.coyoteMs-=delta;
  ep.x+=ep.vx*dt; ep.y+=ep.vy*dt;
  ep.grounded=false;
  for(var pi=0;pi<this.plats.length;pi++){
    var p=this.plats[pi];
    if(ep.x+10>p.x&&ep.x-10<p.x+p.w&&ep.y>p.y&&ep.y-ep.vy*dt<=p.y+2){
      ep.y=p.y;ep.vy=0;ep.grounded=true;ep.coyoteMs=90;ep.djUsed=false;
    }
  }
  if(ep.y>560){ep.y=440;ep.vy=0;_takeDmg();SOUND.hurt();if(EWR_STATE.health[0]<=0){this._triggerDeath();return;}}
  if(ep.x<0)ep.x=0;if(ep.x>W)ep.x=W;
  if(Phaser.Input.Keyboard.JustDown(this.keys.z)&&es.punchTimer<=0){es.punchTimer=900;SOUND.punch();}
  if(Phaser.Input.Keyboard.JustDown(this.keys.x)&&es.kickTimer<=0){es.kickTimer=700;SOUND.kick();}

  if(this._t<this._introEnd+500){this._renderMQ();return;}

  // Boss AI
  boss.bT+=delta; boss.crownAng+=delta*0.003;
  // Phase transitions
  if(boss.hp<=12&&boss.phase<3){
    boss.phase=3;boss.crownOrbit=true;boss.shotInterval=1600;
    boss.vx=boss.vx>0?165:-165;
    this._flash('FULL MOCHI COURT!',1800,30,'#ff00cc');
  } else if(boss.hp<=24&&boss.phase<2){
    boss.phase=2;boss.shotInterval=2000;boss.vx=boss.vx>0?140:-140;
    this._flash('ROYAL CHARGE!',1600,30,'#ff8800');
    this._spawnMinionsMQ();
  }

  // Crown orbit damage in phase 3
  if(boss.crownOrbit&&es.hurtTimer<=0){
    var cOrX=boss.x+Math.cos(boss.crownAng)*48*boss.scale;
    var cOrY=(boss.y-38*boss.scale)+Math.sin(boss.crownAng)*28*boss.scale;
    if(Math.abs(ep.x-cOrX)<20&&Math.abs(ep.y-cOrY)<20){
      _takeDmg();es.hurtTimer=1200;SOUND.hurt();ep.vy=-320;
      if(EWR_STATE.health[0]<=0){this._triggerDeath();return;}
    }
  }

  // Charge in phase 2+
  if(boss.chargeMode){
    boss.chargeT+=delta;
    boss.x+=boss.vx*dt*2.5;
    if(boss.x<20||boss.x>W-20){boss.chargeMode=false;boss.chargeCooldown=5000;boss.vx=-boss.vx;boss.x=Math.max(20,Math.min(W-20,boss.x));}
    if(es.hurtTimer<=0&&Math.abs(ep.x-boss.x)<36&&Math.abs(ep.y-boss.y+30)<50){
      _takeDmg();es.hurtTimer=1000;SOUND.hurt();ep.vy=-400;ep.vx=es.facing*-220;
      if(EWR_STATE.health[0]<=0){this._triggerDeath();return;}
    }
  } else {
    boss.x+=boss.vx*dt;
    if(boss.x<80){boss.x=80;boss.vx=Math.abs(boss.vx);boss.dir=1;}
    if(boss.x>W-80){boss.x=W-80;boss.vx=-Math.abs(boss.vx);boss.dir=-1;}
    // Trigger charge in phase 2+
    if(boss.phase>=2&&boss.chargeCooldown<=0&&boss.bT%4500<delta){
      boss.chargeMode=true;boss.chargeT=0;
      boss.vx=(ep.x>boss.x?1:-1)*Math.abs(boss.vx);
      spawnExplosion(boss.x,boss.y-30,0xff00cc,1.5);
    }
    if(boss.chargeCooldown>0) boss.chargeCooldown-=delta;
  }

  // Projectiles (mochi blob shots)
  boss.shotT+=delta;
  if(boss.shotT>=boss.shotInterval){
    boss.shotT=0;
    var ang=Math.atan2(ep.y-boss.y,ep.x-boss.x);
    if(boss.phase===3){
      for(var fa=-1;fa<=1;fa++){
        var a2=ang+fa*0.4;
        boss.projectiles.push({x:boss.x,y:boss.y-30,vx:Math.cos(a2)*260,vy:Math.sin(a2)*260,life:2200,r:9});
      }
    } else {
      boss.projectiles.push({x:boss.x,y:boss.y-30,vx:Math.cos(ang)*230,vy:Math.sin(ang)*230,life:2200,r:9});
    }
  }
  for(var pj=boss.projectiles.length-1;pj>=0;pj--){
    var proj=boss.projectiles[pj];
    proj.x+=proj.vx*dt;proj.y+=proj.vy*dt;proj.life-=delta;proj.vy+=9;
    if(proj.life<=0||proj.y>560||proj.x<-20||proj.x>W+20){boss.projectiles.splice(pj,1);continue;}
    if(es.hurtTimer<=0&&Math.abs(ep.x-proj.x)<22&&Math.abs(ep.y-30-proj.y)<22){
      boss.projectiles.splice(pj,1);
      _takeDmg();es.hurtTimer=1200;SOUND.hurt();ep.vy=-280;
      if(EWR_STATE.health[0]<=0){this._triggerDeath();return;}
    }
  }

  // Minion timer (phase 1: every 10s, phase 2+: every 8s)
  boss.minionTimer+=delta;
  var mSpawn=boss.phase===1?10000:8000;
  if(boss.minionTimer>=mSpawn){boss.minionTimer=0;this._spawnMinionsMQ();}

  // Update minions
  for(var mj=boss.minions.length-1;mj>=0;mj--){
    var min=boss.minions[mj];
    if(min.dieT>=0){min.dieT+=delta;if(min.dieT>600)boss.minions.splice(mj,1);continue;}
    min.x+=min.dir*min.spd*dt;min.bT+=delta;
    if(min.x<min.pMin){min.x=min.pMin;min.dir=1;}
    if(min.x>min.pMax){min.x=min.pMax;min.dir=-1;}
    if(es.hurtTimer<=0&&Math.abs(ep.x-min.x)<26&&Math.abs(ep.y-min.y)<30){
      _takeDmg();es.hurtTimer=1200;SOUND.hurt();ep.vy=-300;
      if(EWR_STATE.health[0]<=0){this._triggerDeath();return;}
    }
  }

  // Boss contact damage
  if(es.hurtTimer<=0&&boss.dieT<0&&Math.abs(ep.x-boss.x)<32&&Math.abs(ep.y-10-(boss.y-44))<44){
    _takeDmg();es.hurtTimer=1200;SOUND.hurt();ep.vy=-350;ep.vx=-es.facing*200;
    if(EWR_STATE.health[0]<=0){this._triggerDeath();return;}
  }

  // Punch hits boss
  if(es.punchActive&&boss.dieT<0&&Math.abs(ep.x+es.facing*56-boss.x)<36&&Math.abs(ep.y-20-(boss.y-44))<44&&es.punchTimer>550){
    boss.hp--;boss.hitFlash=200;spawnExplosion(boss.x,boss.y-30,0xff88cc,1.2);SOUND.bossHit();
    this.cameras.main.shake(120,0.008);
    if(boss.hp<=0&&boss.dieT<0){this._killBoss();return;}
  }
  // Kick hits boss
  if(es.kickActive&&boss.dieT<0&&Math.abs(ep.x+es.facing*72-boss.x)<36&&Math.abs(ep.y-10-(boss.y-44))<44&&es.kickTimer>380){
    boss.hp--;boss.hitFlash=200;spawnExplosion(boss.x,boss.y-30,0xff00cc,1.0);SOUND.bossHit();
    this.cameras.main.shake(100,0.007);
    if(boss.hp<=0&&boss.dieT<0){this._killBoss();return;}
  }
  // Punch/kick hits minions
  for(var mj2=boss.minions.length-1;mj2>=0;mj2--){
    var min2=boss.minions[mj2]; if(min2.dieT>=0) continue;
    var punch2=es.punchActive&&Math.abs(ep.x+es.facing*56-min2.x)<24&&Math.abs(ep.y-20-min2.y)<28&&es.punchTimer>550;
    var kick2=es.kickActive&&Math.abs(ep.x+es.facing*72-min2.x)<24&&Math.abs(ep.y-10-min2.y)<28&&es.kickTimer>380;
    if(punch2||kick2){min2.hp--;spawnExplosion(min2.x,min2.y-10,0xff88cc,0.8);if(punch2)SOUND.punch();else SOUND.kick();if(min2.hp<=0){min2.dieT=0;EWR_STATE.aloe+=ALOE.mochiDeath;spawnExplosion(min2.x,min2.y-10,0xff00cc,1);}}
  }
  if(boss.hitFlash>0) boss.hitFlash-=delta;
  // Phase 3: glitter rain
  if(boss.phase===3&&Math.random()<0.07){
    spawnExplosion(Math.random()*W,30,0xff88cc,0.3);
  }
  this._renderMQ();
};

CatDemocracyScene.prototype.update=function(time,delta){
  var self=this; this._t+=delta;
  var dt=delta/1000, W=960, H=540;
  var ed=this.ed, es=this.es;
  if(!this._done){
    this.timerMs=Math.max(0,this.timerMs-delta);
    if(this.timerMs<=0){ this._finish(this.votes>=this.winVotes); }
  }

  if(es.hurtTimer>0) es.hurtTimer-=delta;
  if(es.punchTimer>0){es.punchTimer-=delta;es.punchActive=es.punchTimer>180&&es.punchTimer<360;}

  var jumpJD=Phaser.Input.Keyboard.JustDown(this.keys.up)||Phaser.Input.Keyboard.JustDown(this.keys.w)||Phaser.Input.Keyboard.JustDown(this.keys.space);
  if(jumpJD&&ed.grounded&&!this._done){ed.vy=-400;ed.grounded=false;SOUND.jump();}
  if(Phaser.Input.Keyboard.JustDown(this.keys.z)&&es.punchTimer<=0&&!this._done){es.punchTimer=520;SOUND.punch();}

  if(!this._done){
    ed.worldX+=60*dt;
    if(ed.worldX>this.worldW-120) ed.worldX=this.worldW-120;
  }
  ed.vy+=980*dt;
  ed.y+=ed.vy*dt;
  if(ed.y>=460){ed.y=460;ed.vy=0;ed.grounded=true;} else ed.grounded=false;
  this.scrollX=Phaser.Math.Clamp(ed.worldX-ed.x,0,this.worldW-W);

  if(!this._done){
    this._mochiT-=delta;
    if(this._mochiT<=0){this._mochiT=3000;this._spawnMochiDrop();}
  }

  for(var ci=0;ci<this.cats.length;ci++){
    var cat=this.cats[ci];
    cat.tailAng+=0.04;
    if(cat.walking&&!cat.voted&&!this._done){
      cat.x+=cat.walkDir*22*dt;
      if(cat.x<cat.walkMin){cat.x=cat.walkMin;cat.walkDir=1;}
      if(cat.x>cat.walkMax){cat.x=cat.walkMax;cat.walkDir=-1;}
      cat.facing=cat.walkDir;
    }
    if(cat.dance) cat.danceT+=delta*2; else cat.danceT+=delta;

    if(!this._done&&!cat.voted&&Math.abs(cat.x-ed.worldX)<=40&&Math.abs(cat.y-ed.y)<=36){
      cat.voted=true; cat.sitting=false; cat.dance=true; cat.walking=false; cat.facing=1;
      this.votes=Math.min(this.maxVotes,this.votes+1);
      SOUND.pickup(); spawnExplosion(cat.x,cat.y-18,0x00e676,0.8);

    }
  }

  for(var mi=this.mochis.length-1;mi>=0;mi--){
    var m=this.mochis[mi];
    m.x+=m.vx*dt; m.y+=m.vy*dt; m.vy+=560*dt; m.spin+=m.spinV;
    if(m.y>560||m.x<this.scrollX-80||m.x>this.scrollX+W+80){this.mochis.splice(mi,1);continue;}

    if(es.punchActive&&!this._done&&Math.abs((ed.worldX+es.facing*56)-m.x)<36&&Math.abs((ed.y-22)-m.y)<32){
      this.mochis.splice(mi,1);
      spawnExplosion(m.x,m.y,0xffd700,1.0);
      _addCombo(this,ed.x+es.facing*56,ed.y-20);
      continue;
    }
    if(es.hurtTimer<=0&&!this._done&&Math.abs(ed.worldX-m.x)<20&&Math.abs((ed.y-24)-m.y)<22){
      this.mochis.splice(mi,1);
      es.hurtTimer=900;
      this.votes=Math.max(0,this.votes-2);
      SOUND.hurt(); spawnExplosion(m.x,m.y,0xff4444,1.2);
      this._flash('-2 VOTES',800,24,'#ff4444');
    }
  }

  es.cigF++; es.walkT+=delta;
  if(Math.random()<0.04) spawnSmoke(ed.x+es.facing*14,ed.y-24);
  updateSmoke(); updateExplosions(); updateFire();

  // Background
  this.bgG.clear();
  for(var sy=0;sy<360;sy++){
    var t=sy/360;
    var rc=Math.floor(130+t*50), gc=Math.floor(190+t*30), bc=Math.floor(250-t*70);
    this.bgG.fillStyle((rc<<16)|(gc<<8)|bc,1); this.bgG.fillRect(0,sy,W,1);
  }
  this.bgG.fillStyle(0xffdd77,0.9); this.bgG.fillCircle(840,90,52);
  this.bgG.fillStyle(parseInt(AT.outline.slice(1),16),0.9);
  for(var bx=0;bx<14;bx++){
    var bw=42+((bx*23)%38), bh=70+((bx*41)%170);
    var px=bx*78-(this.scrollX*0.15%78);
    this.bgG.fillRect(px,360-bh,bw,bh);
    this.bgG.fillStyle(0xf8d17a,0.25);
    this.bgG.fillRect(px+6,370-bh,6,8); this.bgG.fillRect(px+16,370-bh,6,8); this.bgG.fillRect(px+26,370-bh,6,8);
    this.bgG.fillStyle(parseInt(AT.outline.slice(1),16),0.9);
  }

  // Ground + world entities
  this.worldG.clear();
  this.worldG.fillStyle(0xe7b44a,1); this.worldG.fillRect(0,480,W,60);
  this.worldG.fillStyle(0xd29a34,1); this.worldG.fillRect(0,476,W,6);
  this.worldG.fillStyle(0xc88e2a,0.7);
  for(var gx=0;gx<W;gx+=28){this.worldG.fillRect(gx,486+(gx%56===0?2:0),18,3);}

  for(var si2=0;si2<this.signs.length;si2++){
    var sg=this.signs[si2], st=this.signTexts[si2];
    var sx=sg.x-this.scrollX;
    if(sx<-220||sx>W+220){st.setAlpha(0);continue;}
    this.worldG.fillStyle(0x6b3f14,1); this.worldG.fillRect(sx-6,426,5,54); this.worldG.fillRect(sx+52,426,5,54);
    this.worldG.lineStyle(2,0x8f5c2a,0.7); this.worldG.strokeRect(sx-8,424,67,58);
    st.setPosition(sx+25,404).setAlpha(1);
  }

  for(var ci2=0;ci2<this.cats.length;ci2++){
    var c=this.cats[ci2], cx=c.x-this.scrollX;
    if(cx<-80||cx>W+80) continue;
    var cDance=c.dance||(c.faction==='gremblin'&&!c.voted&&Math.sin(this._t*0.006+ci2)>0.35);
    var cSit=c.sitting&&!c.dance;
    DRAW_CAT.draw(this.worldG,cx,c.y,CAT_COLORS[c.ci],c.tailAng,c.facing,cSit,cDance,c.smoker,c.danceT);
    if(c.voted){
      this.worldG.fillStyle(0x00e676,0.9); this.worldG.fillCircle(cx,c.y-36,4);
      this.worldG.fillStyle(0xffffff,0.9); this.worldG.fillRect(cx-1,c.y-39,2,6); this.worldG.fillRect(cx-3,c.y-37,6,2);
    }
  }

  for(var mi2=0;mi2<this.mochis.length;mi2++){
    var mm=this.mochis[mi2], mx=mm.x-this.scrollX;
    if(mx<-40||mx>W+40) continue;
    this.worldG.save(); this.worldG.translateCanvas(mx,mm.y); this.worldG.rotateCanvas(mm.spin);
    this.worldG.fillStyle(0xff99cc,1); this.worldG.fillCircle(0,0,12);
    this.worldG.fillStyle(0xff77bb,0.7); this.worldG.fillCircle(-3,-3,6);
    this.worldG.fillStyle(0xffffff,0.8); this.worldG.fillCircle(-4,-4,2);
    this.worldG.restore();
  }

  this.edG.clear();
  var frame=es.punchTimer>0?5:(!ed.grounded?4:Math.floor(es.walkT/180)%3+1);
  DRAW_ED.draw(this.edG,ed.x,ed.y,frame,false,es.cigF);
  if(es.punchActive){this.edG.fillStyle(0xffd60a,0.16);this.edG.fillCircle(ed.x+56,ed.y-20,30);}
  drawExplosions(this.edG);
  for(var spi=0;spi<SMOKE_POOL.length;spi++){var sm=SMOKE_POOL[spi];this.edG.fillStyle(0xcccccc,sm.life*0.35);this.edG.fillCircle(sm.x,sm.y,sm.r);}

  this.hudG.clear();
  this.hudG.fillStyle(0x000000,0.25); this.hudG.fillRect(0,0,960,52);
  this.voteTxt.setText('VOTES: '+this.votes+' / '+this.maxVotes);
  this.timeTxt.setText('TIME: '+Math.ceil(this.timerMs/1000));
};

// MOCHI SMASH — AAA mini-game (triggered after Level 1-1 beat)
// ════════════════════════════════════════════════════════════════
function MochiSmashScene(){ Phaser.Scene.call(this,{key:'MochiSmash'}); }
MochiSmashScene.prototype=Object.create(Phaser.Scene.prototype);
MochiSmashScene.prototype.constructor=MochiSmashScene;
MochiSmashScene.prototype.create=function(){
  var W=960,H=540,self=this;
  this._score=0; this._timeLeft=20000; this._done=false;
  this._cursor=4; // center of 3x3 grid
  this._wsMT=4000+Math.random()*3000;
  this._wsMsg='';
  var wsMsgs=['DESTROY THEM','HOW DOES IT FEEL','GOOD. GOOD. GOOD.',
    'THE MOCHI FEEL THIS','THIS IS THERAPEUTIC (IT IS NOT)',
    'SMASH MORE','DO NOT STOP','MOCHI POPULATION: DECLINING',
    'THEY KEEP COMING','THIS IS YOUR PURPOSE'];
  this._wsMsgs=wsMsgs;
  // Grid holes — 3x3
  var cols=3,rows=3,hw=90,hh=90,gOx=(W-cols*hw*2)/2+hw,gOy=130;
  this._holes=[];
  for(var r=0;r<rows;r++) for(var c=0;c<cols;c++){
    this._holes.push({x:gOx+c*hw*2,y:gOy+r*hh*1.5,mochi:false,mochiT:0,interval:700+Math.random()*1200,popT:0,up:false});
  }
  // Schedule first mochi pops
  for(var i=0;i<this._holes.length;i++){
    (function(h,delay){ self.time.delayedCall(delay,function(){ if(!self._done) h.interval=500+Math.random()*1100; }); })(this._holes[i],500+i*300);
  }
  // Graphics layers
  this.bgG=this.add.graphics().setDepth(0);
  this.holeG=this.add.graphics().setDepth(1);
  this.mochiG=this.add.graphics().setDepth(2);
  this.hudG=this.add.graphics().setDepth(5);
  // Text
  this.add.text(W/2,18,'MOCHI SMASH',{fontFamily:'Bangers,Georgia,serif',fontSize:'44px',color:'#ffd700',stroke:'#000000',strokeThickness:7}).setOrigin(0.5).setDepth(6);
  this.add.text(W/2,56,'Arrows/WASD = Move  Z = SMASH',{fontFamily:'Inconsolata,monospace',fontSize:'14px',color:'#aaaaaa',stroke:'#000000',strokeThickness:2}).setOrigin(0.5).setDepth(6);
  this.scoreTxt=this.add.text(W-20,18,'SCORE: 0',{fontFamily:'Inconsolata,monospace',fontSize:'22px',color:'#00e676',stroke:'#000000',strokeThickness:4}).setOrigin(1,0).setDepth(6);
  this.timerTxt=this.add.text(W/2,H-20,'20s',{fontFamily:'Inconsolata,monospace',fontSize:'22px',color:'#ff4444',stroke:'#000000',strokeThickness:4}).setOrigin(0.5,1).setDepth(6);
  this.flashTxt=this.add.text(W/2,H/2,'',{fontFamily:'Bangers,Georgia,serif',fontSize:'42px',color:'#ffd700',stroke:'#000000',strokeThickness:7}).setOrigin(0.5).setDepth(10).setAlpha(0);
  this.wsTxt=this.add.text(W/2,86,'',{fontFamily:'Inconsolata,monospace',fontSize:'18px',color:'#ff44aa',stroke:'#000000',strokeThickness:3,backgroundColor:'#000000aa',padding:{x:10,y:5}}).setOrigin(0.5).setDepth(6).setAlpha(0);
  // Keys
  this.keys={
    left:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.LEFT),
    right:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.RIGHT),
    up:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.UP),
    down:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.DOWN),
    a:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.A),
    d:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.D),
    w:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.W),
    s:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.S),
    z:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.Z)
  };
  this._moveCooldown=0;
  SOUND.pickup();
};
MochiSmashScene.prototype._flash=function(txt,dur,sz,col){
  var self=this;
  this.flashTxt.setText(txt).setFontSize((sz||34)+'px').setColor(col||'#ffd700').setAlpha(1);
  this.tweens.add({targets:this.flashTxt,alpha:0,duration:dur||800,delay:200});
};
MochiSmashScene.prototype.update=function(time,delta){
  if(this._done) return;
  var self=this;
  // Timer
  this._timeLeft-=delta;
  if(this._timeLeft<=0){
    this._timeLeft=0; this._done=true;
    SOUND.victory();
    this._flash('TIME\'S UP!  SCORE: '+this._score,2500,30,'#ffd700');
    this.time.delayedCall(3000,function(){ self.scene.start('WorldMap',{aloeEarned:0}); });
    return;
  }
  var secsLeft=Math.ceil(this._timeLeft/1000);
  this.timerTxt.setText(secsLeft+'s').setColor(secsLeft<=5?'#ff2222':secsLeft<=10?'#ff8800':'#ff4444');
  // WS messages
  this._wsMT-=delta;
  if(this._wsMT<=0){
    this._wsMT=4000+Math.random()*3000;
    var wsm=this._wsMsgs[Math.floor(Math.random()*this._wsMsgs.length)];
    this.wsTxt.setText(wsm).setAlpha(1);
    this.tweens.add({targets:this.wsTxt,alpha:0,delay:2000,duration:700});
  }
  // Mochi pop timing
  for(var i=0;i<this._holes.length;i++){
    var h=this._holes[i];
    h.mochiT+=delta;
    if(!h.up&&h.mochiT>=h.interval){
      h.up=true; h.mochiT=0; h.popT=0;
      h.interval=800+Math.random()*1400;
    }
    if(h.up){
      h.popT+=delta;
      if(h.popT>1600+Math.random()*600) { h.up=false; h.mochiT=0; }
    }
  }
  // Input - cursor movement
  this._moveCooldown=Math.max(0,this._moveCooldown-delta);
  if(this._moveCooldown<=0){
    var moved=false;
    if(Phaser.Input.Keyboard.JustDown(this.keys.left)||Phaser.Input.Keyboard.JustDown(this.keys.a)){
      if(this._cursor%3>0){this._cursor--;moved=true;}
    } else if(Phaser.Input.Keyboard.JustDown(this.keys.right)||Phaser.Input.Keyboard.JustDown(this.keys.d)){
      if(this._cursor%3<2){this._cursor++;moved=true;}
    } else if(Phaser.Input.Keyboard.JustDown(this.keys.up)||Phaser.Input.Keyboard.JustDown(this.keys.w)){
      if(this._cursor>=3){this._cursor-=3;moved=true;}
    } else if(Phaser.Input.Keyboard.JustDown(this.keys.down)||Phaser.Input.Keyboard.JustDown(this.keys.s)){
      if(this._cursor<6){this._cursor+=3;moved=true;}
    }
    if(moved) this._moveCooldown=130;
  }
  // Smash
  if(Phaser.Input.Keyboard.JustDown(this.keys.z)){
    var h2=this._holes[this._cursor];
    if(h2&&h2.up){
      h2.up=false; h2.mochiT=0; h2.popT=0;
      this._score+=10; EWR_STATE.aloe+=10;
      this.scoreTxt.setText('SCORE: '+this._score);
      SOUND.punch(); this.cameras.main.shake(60,0.008);
      spawnExplosion(h2.x,h2.y,0xff4444,1.8);
      var floatTxt=this.add.text(h2.x,h2.y-20,'+10',{fontFamily:'Inconsolata,monospace',fontSize:'22px',color:'#ff4444',stroke:'#000000',strokeThickness:3}).setOrigin(0.5).setDepth(8);
      this.tweens.add({targets:floatTxt,y:h2.y-70,alpha:0,duration:700,onComplete:function(){floatTxt.destroy();}});
    } else {
      SOUND.hurt();
      var missMsgs=['THERE WAS NOTHING THERE','MISS','NOTHING','THE MOCHI WAS A CONCEPT'];
      this._flash(missMsgs[Math.floor(Math.random()*missMsgs.length)],600,18,'#888888');
    }
  }
  // Draw
  this._draw();
};
MochiSmashScene.prototype._draw=function(){
  var W=960,H=540;
  // BG
  this.bgG.clear();
  this.bgG.fillStyle(0x0a0008,1); this.bgG.fillRect(0,0,W,H);
  // subtle grid
  this.bgG.lineStyle(1,0x220033,0.4);
  for(var gx=0;gx<W;gx+=60){this.bgG.beginPath();this.bgG.moveTo(gx,0);this.bgG.lineTo(gx,H);this.bgG.strokePath();}
  for(var gy=0;gy<H;gy+=60){this.bgG.beginPath();this.bgG.moveTo(0,gy);this.bgG.lineTo(W,gy);this.bgG.strokePath();}
  // timer bar
  var tf=Math.max(0,this._timeLeft/20000);
  var barCol=tf>0.5?0x00e676:tf>0.25?0xff8800:0xff2222;
  this.hudG.clear();
  this.hudG.fillStyle(0x333333,1); this.hudG.fillRect(80,H-14,800,8);
  this.hudG.fillStyle(barCol,1); this.hudG.fillRect(80,H-14,Math.floor(800*tf),8);
  // Holes + mochis
  this.holeG.clear();
  this.mochiG.clear();
  for(var i=0;i<this._holes.length;i++){
    var h=this._holes[i];
    var isCursor=(i===this._cursor);
    // hole shadow
    this.holeG.fillStyle(0x1a0028,1); this.holeG.fillEllipse(h.x,h.y+6,64,20);
    // hole
    this.holeG.fillStyle(0x2a1040,1); this.holeG.fillEllipse(h.x,h.y,60,18);
    this.holeG.lineStyle(2,isCursor?0xffd700:0x550088,1); this.holeG.strokeEllipse(h.x,h.y,60,18);
    // cursor glow ring
    if(isCursor){
      this.holeG.lineStyle(3,0xffd700,0.7+Math.sin(Date.now()*0.005)*0.3);
      this.holeG.strokeEllipse(h.x,h.y,76,34);
    }
    // Mochi
    if(h.up){
      var popPct=Math.min(h.popT/200,1.0);
      var my=h.y-Math.round(32*popPct);
      // body
      this.mochiG.fillStyle(0xffeedd,1); this.mochiG.fillEllipse(h.x,my,38,28);
      // eyes
      this.mochiG.fillStyle(0x111111,1);
      this.mochiG.fillCircle(h.x-7,my-4,3); this.mochiG.fillCircle(h.x+7,my-4,3);
      // angry eyebrows (V shape)
      this.mochiG.lineStyle(2,0x111111,1);
      this.mochiG.beginPath(); this.mochiG.moveTo(h.x-11,my-9); this.mochiG.lineTo(h.x-4,my-7); this.mochiG.strokePath();
      this.mochiG.beginPath(); this.mochiG.moveTo(h.x+11,my-9); this.mochiG.lineTo(h.x+4,my-7); this.mochiG.strokePath();
      // frown
      this.mochiG.beginPath(); this.mochiG.arc(h.x,my+3,5,0.4*Math.PI,0.6*Math.PI,false); this.mochiG.strokePath();
    }
  }
};
