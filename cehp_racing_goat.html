    }else{
      var now7=(this.time&&this.time.now!==undefined)?this.time.now:_nowTs();
      if(this._editorCopyBaseArmUntil&&now7<=this._editorCopyBaseArmUntil){
        var baseCopy=(this._trackCfg.pickups&&this._trackCfg.pickups.length)?_raceDeepClone(this._trackCfg.pickups):[];
        this._fzEditorSetPickupArray(baseCopy);
        this._fzEditorNormalizePickups();
        this._fzEditorQueueRebuild(true);
        this._editorCopyBaseArmUntil=0;
        this._flash('BASE -> '+layer7.toUpperCase(),760,18,'#a8ffcc');
      }else{
        this._editorCopyBaseArmUntil=now7+1200;
        this._flash('PRESS 7 AGAIN TO OVERWRITE',760,16,'#ffcc88');
      }
    }
  }
  if(Phaser.Input.Keyboard.JustDown(this.keys.eight)){
    var layer8=this._editorPickupLayer||'BASE';
    if(layer8==='BASE'){
      this._flash('LAYER IS BASE',620,16,'#ffcc88');
    }else{
      var baseList=(this._trackCfg.pickups&&this._trackCfg.pickups.length)?this._trackCfg.pickups:[];
      var merged=(this._fzEditorGetPickupArray(true)||[]).slice(0);
      var itemsCfg=_raceItemsCfg();
      var minDs=Math.max(20,Number(itemsCfg.pickupDs||18)*0.75);
      var minDd=Math.max(8,Number(itemsCfg.pickupDd||18)*0.5);
      var lap8=(tr&&tr.lapLength)?Math.max(1,Number(tr.lapLength)):Math.max(1,Number(this._raceWorld&&this._raceWorld.track&&this._raceWorld.track.lapLength||1));
      for(var b8=0;b8<baseList.length;b8++){
        var src8=baseList[b8]||{};
        var s8=Number(src8.s)||0, d8=Number(src8.d)||0;
        var dup=false;
        for(var m8=0;m8<merged.length;m8++){
          var cur8=merged[m8]||{};
          var ds8=Math.abs(_raceDeltaSWrap(s8,Number(cur8.s)||0,lap8));
          var dd8=Math.abs(d8-(Number(cur8.d)||0));
          if(ds8<minDs&&dd8<minDd){ dup=true; break; }
        }
        if(!dup) merged.push({s:s8,d:d8,kind:String(src8.kind||'ITEM_BOX')});
      }
      this._fzEditorSetPickupArray(merged);
      this._fzEditorNormalizePickups();
      this._fzEditorQueueRebuild(true);
      this._flash('BASE MERGED -> '+layer8.toUpperCase(),760,18,'#a8d5ff');
    }
  }
  if(Phaser.Input.Keyboard.JustDown(this.keys.minus)) ed.zoneStrength=_raceClamp((ed.zoneStrength||1)-0.1,0.1,3.0);
  if(Phaser.Input.Keyboard.JustDown(this.keys.equals)) ed.zoneStrength=_raceClamp((ed.zoneStrength||1)+0.1,0.1,3.0);
  if(Phaser.Input.Keyboard.JustDown(this.keys.h)){
    if(this._fzEditorAutoPlacePickups()){
      this._fzEditorQueueRebuild(true);
      this._flash('AUTO PICKUPS',620,20,'#a8ffcc');
    }
  }
  if(Phaser.Input.Keyboard.JustDown(this.keys.j)){
    if(this._fzEditorNormalizePickups()){
      this._fzEditorQueueRebuild(true);
      this._flash('PICKUPS NORMALIZED',620,18,'#a8ffcc');
    }
  }

  if(Phaser.Input.Keyboard.JustDown(this.keys.openBracket)&&cpSel[ed.selectedCp]){
    cpSel[ed.selectedCp].width=Math.max(92,Number(cpSel[ed.selectedCp].width||140)-4);
    this._fzEditorQueueRebuild(false);
  }
  if(Phaser.Input.Keyboard.JustDown(this.keys.closeBracket)&&cpSel[ed.selectedCp]){
    cpSel[ed.selectedCp].width=Math.min(280,Number(cpSel[ed.selectedCp].width||140)+4);
    this._fzEditorQueueRebuild(false);
  }
  if(Phaser.Input.Keyboard.JustDown(this.keys.backspace)&&cpSel.length>4){
    var delIdx=_raceClamp(ed.selectedCp||0,0,cpSel.length-1);
    cpSel.splice(delIdx,1);
    ed.selectedCp=_raceClamp(delIdx,0,cpSel.length-1);
    this._fzEditorQueueRebuild(true);
  }

  var tr=this._raceWorld&&this._raceWorld.track?this._raceWorld.track:null;
  if(Phaser.Input.Keyboard.JustDown(this.keys.c)&&tr&&tr.samples&&tr.samples.length){
    var cpP=this._fzMouseTrackProjection(wp.x,wp.y);
    if(!this._trackCfg.checkpoints) this._trackCfg.checkpoints=[];
    this._trackCfg.checkpoints.push({s:cpP.s,radius:46});
    this._fzEditorQueueRebuild(true);
  }
  if(Phaser.Input.Keyboard.JustDown(this.keys.b)&&tr&&tr.samples&&tr.samples.length){
    var bp=this._fzMouseTrackProjection(wp.x,wp.y);
    var pArrB=this._fzEditorGetPickupArray(true);
    pArrB.push({s:bp.s,d:bp.d,kind:'ITEM_BOX'});
    this._fzEditorSetPickupArray(pArrB);
    this._fzEditorQueueRebuild(true);
    this._flash('ITEM BOX PLACED',620,18,'#a8ffcc');
  }
  if(Phaser.Input.Keyboard.JustDown(this.keys.x)&&this._trackCfg.checkpoints&&this._trackCfg.checkpoints.length&&tr){
    var cpProj=this._fzMouseTrackProjection(wp.x,wp.y);
    var lap=Math.max(1,tr.lapLength||1);
    var best=-1,bScore=1e18;
    for(var ci=0;ci<this._trackCfg.checkpoints.length;ci++){
      var cpi=this._trackCfg.checkpoints[ci];
      var ds=Math.abs(_raceDeltaSWrap(cpProj.s,_raceResolveS(cpi.s||0,lap),lap));
      if(ds<bScore){ bScore=ds; best=ci; }
    }
    if(best>=0&&bScore<Math.max(26,lap*0.03)){
      this._trackCfg.checkpoints.splice(best,1);
      this._fzEditorQueueRebuild(true);
    }
  }

  if(Phaser.Input.Keyboard.JustDown(this.keys.del)&&tr){
    var zp=this._fzMouseTrackProjection(wp.x,wp.y);
    var lapDel=Math.max(1,tr.lapLength||1);
    var pidx=-1,pbest=1e18;
    var picksCfg=this._fzEditorGetPickupArray(false)||[];
    for(var pdi=0;pdi<picksCfg.length;pdi++){
      var pkd=picksCfg[pdi]||{};
      var pds=Math.abs(_raceDeltaSWrap(zp.s,_raceResolveS(pkd.s||0,lapDel),lapDel));
      var pdd=Math.abs((Number(pkd.d)||0)-zp.d);
      var score=pds+(pdd*0.6);
      if(score<pbest){ pbest=score; pidx=pdi; }
    }
    if(pidx>=0&&pbest<38){
      picksCfg.splice(pidx,1);
      this._fzEditorSetPickupArray(picksCfg);
      this._fzEditorQueueRebuild(true);
      this._flash('ITEM BOX REMOVED',620,18,'#ffcc88');
    }else if(this._trackCfg.zones&&this._trackCfg.zones.length){
      var zidx=-1;
      for(var zi=this._trackCfg.zones.length-1;zi>=0;zi--){
        var z=this._trackCfg.zones[zi];
        if(!_raceInSZone(zp.s,z,tr.lapLength||1)) continue;
        if(zp.d<Math.min(z.d0,z.d1)||zp.d>Math.max(z.d0,z.d1)) continue;
        zidx=zi; break;
      }
      if(zidx>=0){
        this._trackCfg.zones.splice(zidx,1);
        this._fzEditorQueueRebuild(true);
      }
    }
  }

  if(Phaser.Input.Keyboard.JustDown(this.keys.l)&&tr&&tr.samples&&tr.samples.length){
    var ap=this._fzMouseTrackProjection(wp.x,wp.y);
    if(!this._trackCfg.lineAnchors) this._trackCfg.lineAnchors=[];
    var nearest=-1,nearestScore=1e18;
    var lapL=Math.max(1,tr.lapLength||1);
    for(var ai=0;ai<this._trackCfg.lineAnchors.length;ai++){
      var an=this._trackCfg.lineAnchors[ai];
      var ads=Math.abs(_raceDeltaSWrap(ap.s,_raceResolveS(an.s||0,lapL),lapL));
      var add=Math.abs((Number(an.d)||0)-ap.d);
      var sc=ads+(add*0.6);
      if(sc<nearestScore){ nearestScore=sc; nearest=ai; }
    }
    if(nearest>=0&&nearestScore<32){
      this._trackCfg.lineAnchors[nearest].s=ap.s;
      this._trackCfg.lineAnchors[nearest].d=ap.d;
    }else{
      this._trackCfg.lineAnchors.push({s:ap.s,d:ap.d});
    }
    this._fzEditorQueueRebuild(true);
  }
  if(Phaser.Input.Keyboard.JustDown(this.keys.k)&&this._trackCfg.lineAnchors&&this._trackCfg.lineAnchors.length&&tr){
    var kp=this._fzMouseTrackProjection(wp.x,wp.y);
    var kl=-1,ks=1e18,lapK=Math.max(1,tr.lapLength||1);
    for(var ki=0;ki<this._trackCfg.lineAnchors.length;ki++){
      var ka=this._trackCfg.lineAnchors[ki];
      var kds=Math.abs(_raceDeltaSWrap(kp.s,_raceResolveS(ka.s||0,lapK),lapK));
      var kdd=Math.abs((Number(ka.d)||0)-kp.d);
      var kv=kds+(kdd*0.6);
      if(kv<ks){ ks=kv; kl=ki; }
    }
    if(kl>=0&&ks<38){
      this._trackCfg.lineAnchors.splice(kl,1);
      this._fzEditorQueueRebuild(true);
    }
  }

  if(Phaser.Input.Keyboard.JustDown(this.keys.p)){
    this._fzEditorSaveDraft();
    console.log('[TRACK WORKSHOP EXPORT '+(this._trackCfg.key||'track')+']');
    console.log(JSON.stringify(this._trackCfg,null,2));
    this._flash('TRACK JSON EXPORTED + SLOT',820,20,'#ffe08a');
  }
  if(Phaser.Input.Keyboard.JustDown(this.keys.o)){
    if(this._fzEditorLoadDraft()) this._flash('TRACK DRAFT LOADED',820,20,'#a8ffcc');
    else this._flash('NO DRAFT FOUND',820,20,'#ffaaaa');
  }

  if(ptr.isDown&&!ed.wasPointerDown){
    if(this.keys.shift&&this.keys.shift.isDown){
      var after=(ed.selectedCp>=0)?ed.selectedCp:nearCp.idx;
      if(after<0) after=0;
      if(cpSel.length){
        var tmpl=cpSel[_raceClamp(after,0,cpSel.length-1)]||cpSel[0];
        cpSel.splice(after+1,0,{x:wp.x,y:wp.y,width:Number(tmpl.width||140),bank:0,elev:0});
        ed.selectedCp=after+1;
        ed.dragMode='cp';
        this._fzEditorQueueRebuild(true);
      }
    }else if(nearCp.idx>=0&&nearCp.dist<=cpThresh){
      ed.selectedCp=nearCp.idx;
      ed.dragMode='cp';
    }else{
      ed.dragMode='zone';
      ed.paintStart=this._fzMouseTrackProjection(wp.x,wp.y);
    }
  }
  if(ptr.isDown&&ed.dragMode==='cp'&&cpSel[ed.selectedCp]){
    cpSel[ed.selectedCp].x=wp.x;
    cpSel[ed.selectedCp].y=wp.y;
    this._fzEditorQueueRebuild(false);
  }
  if(!ptr.isDown&&ed.wasPointerDown){
    if(ed.dragMode==='zone'&&ed.paintStart){
      if(!this._trackCfg.zones) this._trackCfg.zones=[];
      var z0=ed.paintStart;
      var z1=this._fzMouseTrackProjection(wp.x,wp.y);
      var s0=z0.s, s1=z1.s;
      if(tr){
        var ds=Math.abs(_raceDeltaSWrap(s0,s1,tr.lapLength||1));
        if(ds>(tr.lapLength||1)*0.5){
          var ts=s0; s0=s1; s1=ts;
        }else{
          var mn=Math.min(s0,s1), mx=Math.max(s0,s1); s0=mn; s1=mx;
        }
      }else{
        var mn2=Math.min(s0,s1), mx2=Math.max(s0,s1); s0=mn2; s1=mx2;
      }
      this._trackCfg.zones.push({
        s0:s0,s1:s1,
        d0:Math.min(z0.d,z1.d),d1:Math.max(z0.d,z1.d),
        type:ed.selectedZoneType,
        strength:_raceClamp(ed.zoneStrength||1,0.1,3.0)
      });
      this._fzEditorQueueRebuild(true);
    }
    ed.dragMode='';
    ed.paintStart=null;
  }
  ed.wasPointerDown=!!ptr.isDown;
};
FZeroScene.prototype._fzDrawEditorOverlay=function(W,H,camX,camY,zoom){
  if(!this._editorOpen){
    if(this.editorHelpTxt) this.editorHelpTxt.setVisible(false);
    return;
  }
  var tg=this.trackG;
  var cps=(this._trackCfg&&this._trackCfg.controlPoints)?this._trackCfg.controlPoints:[];
  var i;
  for(i=0;i<cps.length;i++){
    var cp=cps[i];
    var sp=this._fzWorldToScreen(cp.x,cp.y,camX,camY,zoom,W,H);
    tg.fillStyle(i===this._editor.selectedCp?0xffdd66:0x66ccff,0.9);
    tg.fillCircle(sp.x,sp.y,i===this._editor.selectedCp?6:4);
    if(i===this._editor.selectedCp){
      tg.lineStyle(1,0xffffff,0.7);
      tg.strokeCircle(sp.x,sp.y,9);
    }
  }
  var anchors=(this._trackCfg&&this._trackCfg.lineAnchors)?this._trackCfg.lineAnchors:[];
  var tr=this._raceWorld&&this._raceWorld.track?this._raceWorld.track:null;
  if(tr){
    for(i=0;i<anchors.length;i++){
      var a=anchors[i];
      var sm=_raceSampleAt(tr,a.s||0);
      var ax=sm.x+sm.nx*(Number(a.d)||0), ay=sm.y+sm.ny*(Number(a.d)||0);
      var asp=this._fzWorldToScreen(ax,ay,camX,camY,zoom,W,H);
      tg.fillStyle(0xff88ff,0.9); tg.fillRect(asp.x-3,asp.y-3,6,6);
    }
  }
  if(this.editorHelpTxt){
    var zType=(this._editor&&this._editor.selectedZoneType)?this._editor.selectedZoneType:'BOOST_PAD';
    var zStr=(this._editor&&this._editor.zoneStrength!==undefined)?this._editor.zoneStrength:1;
    var cpCount=cps.length;
    var ancCount=anchors.length;
    var layerKey=this._editorPickupLayer||'BASE';
    var pickupCount=(this._fzEditorGetPickupArray(false)||[]).length;
    var layerCounts=(this._editorLint&&this._editorLint.metrics&&this._editorLint.metrics.pickupLayerCounts)?this._editorLint.metrics.pickupLayerCounts:{BASE:0,combat_starter:0,combat_chaos:0};
    var lint=this._editorLint||{ok:true,warnings:[],metrics:{}};
    var warn=(lint.warnings&&lint.warnings.length)?lint.warnings.slice(0,3).join(' | '):'none';
    var slotInfo='slots:'+((this._editorSlots&&this._editorSlots.length)||0)+' sel:'+(Math.max(0,this._editorSlotSel)+1);
    if(this._editorSlots&&this._editorSlots.length===0) slotInfo='slots:0';
    var warnBytes=Math.max(1024,Math.floor((BALANCE.race&&BALANCE.race.workshop&&BALANCE.race.workshop.largeDraftWarnBytes)||900000));
    var sizeBytes=Math.max(0,Math.floor(this._editorStorageBytes||0));
    var sizeInfo='size:'+Math.floor(sizeBytes/1024)+'kb'+(sizeBytes>warnBytes?' WARN':'');
    var panelInfo='panel:'+(this._editorPanelOpen?'ON':'OFF');
    var uHint=(this._editorDeleteArmUntil&&((this.time&&this.time.now!==undefined)?this.time.now:_nowTs())<=this._editorDeleteArmUntil)?'  DELETE ARMED':'';
    var slotLines='';
    if(this._editorPanelOpen&&this._editorSlots&&this._editorSlots.length){
      var s0=Math.max(0,this._editorSlotSel-2), s1=Math.min(this._editorSlots.length,s0+5), si;
      var arr=['SLOTS:'];
      for(si=s0;si<s1;si++){
        var sl=this._editorSlots[si]||{};
        arr.push((si===this._editorSlotSel?'> ':'  ')+(sl.name||('Draft '+(si+1)))+'  '+new Date(sl.ts||0).toLocaleTimeString());
      }
      slotLines='\n'+arr.join('\n');
    }
    this.editorHelpTxt.setVisible(true).setText(
      'ZONE:'+zType+' STR:'+zStr.toFixed(1)+'  CP:'+cpCount+'  ANCH:'+ancCount+'  PICKUPS:'+pickupCount+'\n'+
      'PICKUP LAYER:'+layerKey.toUpperCase()+'  COUNTS BASE:'+Math.floor(layerCounts.BASE||0)+'  STARTER:'+Math.floor(layerCounts.combat_starter||0)+'  CHAOS:'+Math.floor(layerCounts.combat_chaos||0)+'\n'+
      'WORKSHOP [Y close] drag CP | SHIFT+Click insert | [Backspace] delete CP | [ ] width\n'+
      '[1..5] zone type  [drag] paint  [DEL] erase pickup/zone  [-/+ strength]\n'+
      '[6] cycle pickup layer  [7,7] copy BASE->layer  [8] merge BASE->layer  [C] add checkpoint  [X] remove checkpoint  [B] place item box  [H] auto pickups  [J] normalize pickups\n'+
      '[L/K] add/remove line anchor\n'+
      '[N] save slot  [I] slot panel  [UP/DOWN] select slot  [ENTER] load slot  [U,U] delete slot\n'+
      '[P] export+save draft  [O] load legacy last draft  (sim paused, writes blocked)\n'+
      'LINT:'+(lint.ok?'OK':'WARN')+'  '+warn+'\n'+
      slotInfo+'  '+sizeInfo+'  '+panelInfo+uHint+slotLines
    );
  }
};

FZeroScene.prototype._fzProcessEvents=function(events,isGhost){
  if(!events||!events.length) return;
  var ghost=!!isGhost;
  var juiceCfg=(BALANCE.race&&BALANCE.race.juice)||{};
  for(var i=0;i<events.length;i++){
    var ev=events[i];
    if(ev.type==='checkpoint'&&ev.id==='p1'){
      if(ghost){
        this._ghostCheckpointSplits.push(Number(ev.timeMs)||0);
      }else{
        this._playerCheckpointSplits.push(Number(ev.timeMs)||0);
        var idx=this._playerCheckpointSplits.length-1;
        if(!this._reducedEffects) this._splitPopText='Split '+(Math.max(0,Number(ev.timeMs)||0)/1000).toFixed(2)+'s';
        if(this._ghostCheckpointSplits.length>idx){
          this._lastSplitDeltaMs=this._playerCheckpointSplits[idx]-this._ghostCheckpointSplits[idx];
          if(!this._reducedEffects){
            this._splitPopText='Split '+((this._lastSplitDeltaMs>=0?'+':'')+(this._lastSplitDeltaMs/1000).toFixed(2)+'s');
            this._splitPopFrames=Math.max(10,Math.floor(juiceCfg.splitPopFrames||36));
          }
        }
        if(!this._reducedEffects&&this._splitPopFrames<=0) this._splitPopFrames=Math.max(10,Math.floor(juiceCfg.splitPopFrames||36));
        this._fzBeep(620,0.06,0.025);
      }
    }
    if(ghost) continue;
    if(ev.type==='go') this._flash('GO!!!',700,42,'#00ffff');
    if(ev.type==='manualBoost'&&ev.id==='p1'){
      this._flash('BOOST!',430,26,'#ffd700');
      this._fzPushRing(0xffd700);
      this._fzBeep(820,0.05,0.03);
      if(this._audioEnabled&&SOUND.kick) SOUND.kick();
    }
    if(ev.type==='driftBoost'&&ev.id==='p1'){
      this._fzPushRing(0xffcc66);
      this._fzBeep(920,0.05,0.028);
    }
    if(ev.type==='boostLocked'&&ev.id==='p1'){
      this._fzSetBadge('BOOST_LOCKED',juiceCfg.badgeFrames||42);
      this._fzBeep(180,0.08,0.02);
    }
    if(ev.type==='wallScrape'&&ev.id==='p1'&&this._raceWorld.frame%12===0){
      if(!this._reducedEffects) this.cameras.main.shake(80,_lowEffectsOn()?0.0018:0.004);
      this._fzBeep(220,0.05,0.02);
    }
    if(ev.type==='lap'&&ev.id==='p1'){
      this._flash('LAP '+ev.lap+' CLEAR',900,28,'#00e676');
      this._fzBeep(520,0.09,0.03);
    }
    if(ev.type==='ITEM_PICKUP'&&ev.racerId==='p1'){
      this._flash('ITEM: '+String(ev.itemType||'BOX'),520,20,'#8fd8ff');
      this._fzBeep(680,0.05,0.022);
    }
    if(ev.type==='ITEM_USE'&&ev.racerId==='p1'){
      this._fzBeep(760,0.05,0.024);
    }
    if(ev.type==='ITEM_TURBO'&&ev.racerId==='p1'){
      this._fzPushRing(0x66e6ff);
      this._fzBeep(900,0.05,0.026);
    }
    if(ev.type==='ITEM_HIT'){
      if(ev.targetId==='p1'){
        this._fzSetBadge('SLOWED',juiceCfg.badgeFrames||42);
        this._fzBeep(240,0.07,0.025);
      }
      if(ev.sourceId==='p1'){
        this._fzBeep(720,0.05,0.02);
      }
    }
    if(ev.type==='ITEM_BLOCK'&&ev.targetId==='p1'){
      this._fzBeep(460,0.04,0.02);
    }
    if(ev.type==='ASSERT_FAIL'&&FEATURE_FLAGS.raceInvariantsAssert){
      this._assertPaused=true;
      this._flash('ASSERT '+(ev.key||'FAIL'),1100,22,'#ff5555');
      if(this._raceWorld&&this._raceWorld.frame%8===0){
        console.warn('[RACE ASSERT FAIL]',ev);
      }
    }
  }
};

  var en=Math.floor(p.energy);
  var timerTxt=(this._raceMs/1000).toFixed(2)+'s';
  var modeTag=this._isReplay?'REPLAY':(this._isTimeTrial?'TIME TRIAL':(this._isGrandPrix?'GRAND PRIX':(this._isCombat?'COMBAT':'RACE')));
  var diffTag=(this._isReplay||this._isTimeTrial)?'N/A':this._difficultyKey;
  var cupTag=(this._isGrandPrix&&this._gpState&&this._gpState.tracks)?('  CUP '+(Math.max(0,Math.floor(this._gpState.raceIndex||0))+1)+'/'+this._gpState.tracks.length):'';
  var itemTag='  ITEM '+((p.inventory&&p.inventory.type)?p.inventory.type:'NONE')+'  SHIELD x'+Math.max(0,Math.floor(p.shieldCharges||0));
  var splitTxt='';
  var paceTxt='';
  if(this._isTimeTrial&&this._ghostWorld&&this._playerCheckpointSplits.length){
    var dms=this._lastSplitDeltaMs||0;
    splitTxt='  CPΔ '+(dms>=0?'+':'')+(dms/1000).toFixed(2)+'s';
    paceTxt='  PB PACE '+(dms<=0?'AHEAD':'BEHIND');
  }
  var statusTxt=this._fzStatusRow();
  this.hintTxt.setText('['+modeTag+'] DIFF '+diffTag+cupTag+'  LAP '+lapShow+'/'+this._lapsTotal+'  POS '+pos+'/'+this._fieldCount+'  SPD '+spd+'  EN '+en+itemTag+'  TIME '+timerTxt+splitTxt+paceTxt+(statusTxt?('  '+statusTxt):'')+'  PSEUDO3D');
  _fitTextInRect(this.hintTxt,{w:930,h:28},{minFont:10,maxFont:14});
  if(this.replayBadgeTxt) this.replayBadgeTxt.setVisible(!!this._isReplay).setPosition(W-72,19);
  if(p.draftingActive&&!this._isReplay){
    hg.fillStyle(0x000000,0.72); hg.fillRoundedRect(W-232,10,92,18,5);
    hg.lineStyle(1,0x7ce6ff,0.9); hg.strokeRoundedRect(W-232,10,92,18,5);
    if(!this._draftTxtObj){
      this._draftTxtObj=this.add.text(W-167,19,'DRAFT',{fontFamily:'Inconsolata,monospace',fontSize:'11px',color:'#7ce6ff',stroke:'#000000',strokeThickness:3}).setDepth(24).setScrollFactor(0);
    }
    this._draftTxtObj.setVisible(true).setPosition(W-167,19);
  }else if(this._draftTxtObj){
    this._draftTxtObj.setVisible(false);
  }
  hg.fillStyle(0x000000,0.65); hg.fillRoundedRect(12,10,430,30,6);
  hg.lineStyle(2,0xffd700,0.7); hg.strokeRoundedRect(12,10,430,30,6);
  if(!this._reducedEffects&&this._splitPopFrames>0&&this._splitPopText){
    var ap2=_raceClamp(this._splitPopFrames/Math.max(1,(BALANCE.race&&BALANCE.race.juice&&BALANCE.race.juice.splitPopFrames)||36),0,1);
    hg.fillStyle(0x000000,0.5*ap2); hg.fillRoundedRect(W*0.5-82,horizon+24,164,20,5);
    if(!this._splitPopTxtObj){
      this._splitPopTxtObj=this.add.text(W*0.5,horizon+34,'',{fontFamily:'Inconsolata,monospace',fontSize:'12px',color:'#88ffdd',stroke:'#000000',strokeThickness:3}).setOrigin(0.5).setDepth(24).setScrollFactor(0);
    }
    this._splitPopTxtObj.setVisible(true).setAlpha(ap2).setText(this._splitPopText).setPosition(W*0.5,horizon+34-(1-ap2)*6);
  }else if(this._splitPopTxtObj){
    this._splitPopTxtObj.setVisible(false);
  }
  if(FEATURE_FLAGS.raceDebugOverlay){
    this.debugTxt.setVisible(true);
    this.debugTxt.setText(
      'HASH:'+CEHP_RACE_ENGINE.stateHash(world)+
      '  F:'+world.frame+
      '  S:'+p.s.toFixed(1)+
      '  D:'+p.d.toFixed(2)+
      '  V:'+p.v.toFixed(3)+
      '  CP:'+p.cpIndex+
      '  EN:'+p.energy.toFixed(1)+
      '  ITEM:'+((p.inventory&&p.inventory.type)?p.inventory.type:'NONE')+
      '  SH:'+Math.floor(p.shieldCharges||0)+
      '  DRAFT:'+(p.draftingActive?'Y':'N')+
      '  PSEUDO3D'
    );
  }else{
    this.debugTxt.setVisible(false);
  }
};

FZeroScene.prototype.update=(function(cfg){
  return function(time, delta){
    var LW=cfg.LW;
    delta=_clampDelta(delta);
    _runSceneSanityChecks(this);
    this._elapsedMs+=delta;
    if(!this._raceEnabled){
      this.hintTxt.setText('RACE ENGINE V2 DISABLED (FEATURE_FLAGS.raceEngineV2=false)');
      this._drawRace(LW,540);
      return;
    }
    this._fzHandleTrackEditor(delta,LW,540);
    if(this._editorOpen){
      this.hintTxt.setText('TRACK WORKSHOP OPEN — Y TO CLOSE');
      this._drawRace(LW,540);
      _layoutHudSafe(this);
      _layoutDialogSafe(this);
      return;
    }
    this._fzHandleDebugKeys();
    var raw=this._isReplay?null:this._fzReadInput();
    var liveInput=this._isReplay?this._stepInputScratch:CEHP_RACE_ENGINE.buildInput(raw||{});
    if(!this._audioUnlocked&&!this._isReplay&&raw&&(raw.left||raw.right||raw.brake||raw.drift||raw.boostJD)){
      this._fzMaybeInitAudio();
    }
    if(this._assertPaused){
      if(Phaser.Input.Keyboard.JustDown(this.keys.enter)){
        this._assertPaused=false;
        this._flash('ASSERT RESUME',700,22,'#99ffcc');
      }else{
        this.hintTxt.setText('RACE ASSERT PAUSED — PRESS ENTER');
        this._drawRace(LW,540);
        _layoutHudSafe(this);
        _layoutDialogSafe(this);
        return;
      }
    }
    if(this._isReplay&&(Phaser.Input.Keyboard.JustDown(this.keys.esc)||Phaser.Input.Keyboard.JustDown(this.keys.x))){
      this._done=true;
      _sceneTransitionSafe(this,'FZeroMenu',{returnScene:'FZeroMenu',preselect:this._trackCfg.key,mode:'RACE',profileKey:this._profileKey});
      return;
    }
    if(!this._done&&this._raceWorld){
      this._acc+=delta;
      var oneShotConsumed=false;
      while(this._acc>=this._fixedStep){
        this._acc-=this._fixedStep;
        var stepInput=liveInput;
        if(this._isReplay){
          stepInput=this._fzReplayInputFrame();
        }
        this._fzRecordPackedInput(stepInput);
        var events=CEHP_RACE_ENGINE.step(this._raceWorld,stepInput);
        this._fzProcessEvents(events);
        if(!this._isReplay&&!oneShotConsumed){
          liveInput.player.boostJD=false;
          liveInput.player.driftJD=false;
          oneShotConsumed=true;
        }
        if(this._ghostWorld&&this._isTimeTrial){
          this._fzStepGhostWorld();
        }
        if(this._raceWorld.phase==='RACING'||this._raceWorld.phase==='FINISHED') this._raceMs=Math.floor(this._raceWorld.raceFrames*this._fixedStep);
        if(this._raceWorld.phase==='RACING'){
          var lapStart=this._raceWorld.racers&&this._raceWorld.racers[0]?this._raceWorld.racers[0].lapStartFrame:0;
          this._lapElapsedMs=Math.max(0,Math.floor((this._raceWorld.raceFrames-lapStart)*this._fixedStep));
        }
        var pStep=this._raceWorld.racers&&this._raceWorld.racers[0]?this._raceWorld.racers[0]:null;
        if(pStep){
          if(pStep.draftingActive) this._fzSetBadge('DRAFT',(BALANCE.race&&BALANCE.race.juice&&BALANCE.race.juice.badgeFrames)||42);
          if((pStep.slowFrames||0)>0) this._fzSetBadge('SLOWED',(BALANCE.race&&BALANCE.race.juice&&BALANCE.race.juice.badgeFrames)||42);
          var zNow=CEHP_RACE_ENGINE.zoneTypeAt(this._raceWorld.track,pStep.s,pStep.d)||'';
          if(zNow===RACE_ZONE_TYPES.PIT) this._fzSetBadge('PIT_REGEN',(BALANCE.race&&BALANCE.race.juice&&BALANCE.race.juice.zoneBadgeFrames)||28);
          if(zNow===RACE_ZONE_TYPES.ROUGH) this._fzSetBadge('ROUGH',(BALANCE.race&&BALANCE.race.juice&&BALANCE.race.juice.zoneBadgeFrames)||28);
          if(zNow===RACE_ZONE_TYPES.SLOW) this._fzSetBadge('SLOW',(BALANCE.race&&BALANCE.race.juice&&BALANCE.race.juice.zoneBadgeFrames)||28);
        }
        this._fzTickBadges();
        if(this._raceWorld.phase==='FINISHED'){
          this._fzFinishRace();
          break;
        }
      }
      var p=this._raceWorld.racers&&this._raceWorld.racers[0]?this._raceWorld.racers[0]:null;
      if(p) this._lastZoneType=CEHP_RACE_ENGINE.zoneTypeAt(this._raceWorld.track,p.s,p.d)||'';
    }
    if(FEATURE_FLAGS.raceDeterminismAssert&&this._raceWorld&&this._raceWorld.frame%180===0){
      var quick=window._raceDeterminismReport({trackKey:this._trackCfg.key,seed:this._raceWorld.rng.seed,frames:240,snapshotFrame:120,log:window.RACE_TEST_LOG,profileKey:this._profileKey,difficultyKey:this._difficultyKey,raceMode:this._raceMode,simV:this._simV});
      if(!quick.ok||!quick.snapOk) this._flash('RACE HASH DIVERGED',1400,22,'#ff4444');
    }
    this._drawRace(LW,540);
    _layoutHudSafe(this);
    _layoutDialogSafe(this);
  };
})({LW:960});

FZeroScene.prototype._drawRace = function(W, H){
  var world=this._raceWorld;
  if(!world) return;
  if(FEATURE_FLAGS.racePseudo3D&&!FEATURE_FLAGS.raceTopDownDebug){
    for(var ci=0;ci<this._cpDebugTexts.length;ci++) this._cpDebugTexts[ci].setVisible(false);
    this.zoneLegendTxt.setVisible(false);
    if(this.editorHelpTxt) this.editorHelpTxt.setVisible(false);
    if(this._trackCacheSprite) this._trackCacheSprite.setVisible(false);
    this._drawRacePseudo3D(W,H,world);
    return;
  }
  var player=world.racers[0];
  var pPos=this._fzPosForRacer(player);
  this._lastZoneType=CEHP_RACE_ENGINE.zoneTypeAt(world.track,player.s,player.d)||'';
  this._fzUpdateTopDownCamera(pPos,pPos.s,player);
  var camX=this._worldCam.x, camY=this._worldCam.y;

  var g=this.bgG; g.clear();
  var debtStyle=this._trackCfg&&this._trackCfg.bgStyle==='debt';
  for(var sy=0;sy<H;sy++){
    var t=sy/H;
    var rc=Math.floor((debtStyle?14:8)+t*(debtStyle?40:28));
    var gc=Math.floor((debtStyle?4:8)+t*(debtStyle?20:24));
    var bc=Math.floor((debtStyle?10:20)+t*(debtStyle?22:38));
    g.fillStyle((rc<<16)|(gc<<8)|bc,1); g.fillRect(0,sy,W,1);
  }
  for(var si=0;si<this._bgStars.length;si++){
    var st=this._bgStars[si];
    var sx=(st.x-((camX*0.04+this._elapsedMs*0.02*st.spd)%W)+W)%W;
    var sy2=(st.y-((camY*0.03)%H)+H)%H;
    g.fillStyle(0xffffff,0.45+0.45*Math.sin((this._elapsedMs*0.002)+(si*0.37)));
    g.fillCircle(sx,sy2,st.r);
  }

  var tg=this.trackG; tg.clear();
  var zg=this.zoneG; zg.clear();
  var rg=this.racerG; rg.clear();
  var eg=this.edG; eg.clear();
  var zoom=this._worldCam.zoom;
  var tr=world.track;
  var samples=tr.samples||[];
  var i;
  var useCache=!!FEATURE_FLAGS.raceTrackRenderCacheEnabled;
  if(useCache){
    this._fzBuildTrackCache();
    if(this._trackCacheSprite){
      this._trackCacheSprite.setVisible(true);
      this._trackCacheSprite.setPosition(
        Math.floor((W*0.5)+((this._trackCacheMinX-camX)*zoom)),
        Math.floor((H*0.5)+((this._trackCacheMinY-camY)*zoom))
      );
      this._trackCacheSprite.setScale(zoom);
    }
  }else if(this._trackCacheSprite){
    this._trackCacheSprite.setVisible(false);
  }
  if(!useCache||!this._trackCacheSprite){
    for(i=0;i<samples.length;i++){
      var a=samples[i], b=samples[(i+1)%samples.length];
      var la={x:a.x+a.nx*(a.width*0.5),y:a.y+a.ny*(a.width*0.5)};
      var lb={x:b.x+b.nx*(b.width*0.5),y:b.y+b.ny*(b.width*0.5)};
      var ra={x:a.x-a.nx*(a.width*0.5),y:a.y-a.ny*(a.width*0.5)};
      var rb={x:b.x-b.nx*(b.width*0.5),y:b.y-b.ny*(b.width*0.5)};
      var sla=this._fzWorldToScreen(la.x,la.y,camX,camY,zoom,W,H);
      var slb=this._fzWorldToScreen(lb.x,lb.y,camX,camY,zoom,W,H);
      var sra=this._fzWorldToScreen(ra.x,ra.y,camX,camY,zoom,W,H);
      var srb=this._fzWorldToScreen(rb.x,rb.y,camX,camY,zoom,W,H);
      tg.lineStyle(3,0x2f3f66,0.95);
      tg.beginPath(); tg.moveTo(sla.x,sla.y); tg.lineTo(slb.x,slb.y); tg.strokePath();
      tg.beginPath(); tg.moveTo(sra.x,sra.y); tg.lineTo(srb.x,srb.y); tg.strokePath();
      if(i%2===0){
        var ca=this._fzWorldToScreen(a.x,a.y,camX,camY,zoom,W,H);
        var cb=this._fzWorldToScreen(b.x,b.y,camX,camY,zoom,W,H);
        tg.lineStyle(1,0x8ea3d7,0.45);
        tg.beginPath(); tg.moveTo(ca.x,ca.y); tg.lineTo(cb.x,cb.y); tg.strokePath();
      }
      if(i%7===0){
        var mx=(sla.x+sra.x)*0.5, my=(sla.y+sra.y)*0.5;
        var nx=(slb.x+srb.x)*0.5, ny=(slb.y+srb.y)*0.5;
        tg.lineStyle(1,0xffffff,0.28);
        tg.beginPath(); tg.moveTo(mx,my); tg.lineTo(nx,ny); tg.strokePath();
      }
    }
    if(FEATURE_FLAGS.raceRacingLineIndicatorEnabled&&tr.lineD&&tr.lineD.length){
      for(i=0;i<samples.length;i++){
        if((i%3)===1) continue;
        var rs0=samples[i], rs1=samples[(i+1)%samples.length];
        var rd0=Number(tr.lineD[i])||0;
        var rd1=Number(tr.lineD[(i+1)%samples.length])||0;
        var rl0=this._fzWorldToScreen(rs0.x+rs0.nx*rd0,rs0.y+rs0.ny*rd0,camX,camY,zoom,W,H);
        var rl1=this._fzWorldToScreen(rs1.x+rs1.nx*rd1,rs1.y+rs1.ny*rd1,camX,camY,zoom,W,H);
        tg.lineStyle(2,0x9fe8ff,0.34);
        tg.beginPath(); tg.moveTo(rl0.x,rl0.y); tg.lineTo(rl1.x,rl1.y); tg.strokePath();
      }
    }
  }
  var checkpoints=tr.checkpoints||[];
  this._fzEnsureCheckpointLabels(FEATURE_FLAGS.raceDebugOverlay?checkpoints.length:0);
  for(i=0;i<checkpoints.length;i++){
    var cp=checkpoints[i];
    var csm=_raceSampleAt(tr,cp.s);
    var gateHalf=Math.min((csm.width||120)*0.46,cp.radius||42);
    var gl=this._fzWorldToScreen(csm.x+csm.nx*gateHalf,csm.y+csm.ny*gateHalf,camX,camY,zoom,W,H);
    var gr2=this._fzWorldToScreen(csm.x-csm.nx*gateHalf,csm.y-csm.ny*gateHalf,camX,camY,zoom,W,H);
    if(!useCache||!this._trackCacheSprite){
      tg.lineStyle(2,0xf4f7ff,0.55);
      tg.beginPath(); tg.moveTo(gl.x,gl.y); tg.lineTo(gr2.x,gr2.y); tg.strokePath();
    }
    if(FEATURE_FLAGS.raceDebugOverlay&&this._cpDebugTexts[i]){
      this._cpDebugTexts[i].setVisible(true).setPosition((gl.x+gr2.x)*0.5-4,(gl.y+gr2.y)*0.5-8).setText(String(i+1));
    }
  }

  if(!useCache||!this._trackCacheSprite){
    var zones=tr.zones||[];
    for(i=0;i<zones.length;i++){
      var z=zones[i];
      var segs=0;
      var step=28;
      var ss=z.s0;
      while(segs<220){
        var sNext=ss+step;
        var stop=false;
        if(z.s0<=z.s1){ if(ss>z.s1) break; if(sNext>z.s1){ sNext=z.s1; stop=true; } }
        else{
          if(ss>=tr.lapLength&&sNext>=tr.lapLength){ ss-=tr.lapLength; sNext-=tr.lapLength; }
          if(ss<=z.s1&&sNext>z.s1){ sNext=z.s1; stop=true; }
        }
        var sm0=_raceSampleAt(tr,ss);
        var sm1=_raceSampleAt(tr,sNext);
        var d0a=_raceClamp(z.d0,-sm0.width*0.5,sm0.width*0.5);
        var d1a=_raceClamp(z.d1,-sm0.width*0.5,sm0.width*0.5);
        var d0b=_raceClamp(z.d0,-sm1.width*0.5,sm1.width*0.5);
        var d1b=_raceClamp(z.d1,-sm1.width*0.5,sm1.width*0.5);
        var p0=this._fzWorldToScreen(sm0.x+sm0.nx*d0a,sm0.y+sm0.ny*d0a,camX,camY,zoom,W,H);
        var p1=this._fzWorldToScreen(sm0.x+sm0.nx*d1a,sm0.y+sm0.ny*d1a,camX,camY,zoom,W,H);
        var p2=this._fzWorldToScreen(sm1.x+sm1.nx*d0b,sm1.y+sm1.ny*d0b,camX,camY,zoom,W,H);
        var p3=this._fzWorldToScreen(sm1.x+sm1.nx*d1b,sm1.y+sm1.ny*d1b,camX,camY,zoom,W,H);
        this._fzDrawZonePattern(zg,z,p0,p1,p2,p3,segs);
        ss=sNext;
        segs++;
        if(stop) break;
        if(z.s0>z.s1&&ss>tr.lapLength) ss-=tr.lapLength;
        if(z.s0>z.s1&&ss>=z.s1&&ss<z.s0&&segs>8) break;
      }
    }
  }
  this._fzDrawEditorOverlay(W,H,camX,camY,zoom);
  var drawPickups=!!((world.items&&world.items.enabled)||this._editorOpen);
  if(drawPickups){
    var pickArr=tr.pickups||[];
    var pickCd=(world.items&&world.items.boxCooldown)?world.items.boxCooldown:[];
    for(i=0;i<pickArr.length;i++){
      var pk=pickArr[i]||{};
      var pkSm=_raceSampleAt(tr,pk.s||0);
      var pkx=pkSm.x+pkSm.nx*(Number(pk.d)||0);
      var pky=pkSm.y+pkSm.ny*(Number(pk.d)||0);
      var pks=this._fzWorldToScreen(pkx,pky,camX,camY,zoom,W,H);
      if(pks.x<-18||pks.x>W+18||pks.y<-18||pks.y>H+18) continue;
      var on=((pickCd[i]||0)<=0);
      var col=on?0x66f2ff:0x345268;
      zg.fillStyle(col,on?0.9:0.55);
      zg.beginPath();
      zg.moveTo(pks.x,pks.y-6);
      zg.lineTo(pks.x+6,pks.y);
      zg.lineTo(pks.x,pks.y+6);
      zg.lineTo(pks.x-6,pks.y);
      zg.closePath();
      zg.fillPath();
      zg.lineStyle(1,on?0xd7fbff:0x4e6f88,on?0.95:0.6);
      zg.strokePath();
    }
    if(world.items&&world.items.enabled){
      var proj=world.items.projectiles||[];
      for(i=0;i<proj.length;i++){
        var pr=proj[i]||{};
        var prSm=_raceSampleAt(tr,pr.s||0);
        var prx=prSm.x+prSm.nx*(Number(pr.d)||0);
        var pry=prSm.y+prSm.ny*(Number(pr.d)||0);
        var prs=this._fzWorldToScreen(prx,pry,camX,camY,zoom,W,H);
        if(prs.x<-16||prs.x>W+16||prs.y<-16||prs.y>H+16) continue;
        rg.fillStyle(0xff7788,0.95); rg.fillCircle(prs.x,prs.y,3.2);
        rg.fillStyle(0xffccd3,0.72); rg.fillCircle(prs.x,prs.y,1.4);
      }
      var mines=world.items.mines||[];
      for(i=0;i<mines.length;i++){
        var mn=mines[i]||{};
        var mnSm=_raceSampleAt(tr,mn.s||0);
        var mnx=mnSm.x+mnSm.nx*(Number(mn.d)||0);
        var mny=mnSm.y+mnSm.ny*(Number(mn.d)||0);
        var mns=this._fzWorldToScreen(mnx,mny,camX,camY,zoom,W,H);
        if(mns.x<-16||mns.x>W+16||mns.y<-16||mns.y>H+16) continue;
        var arm=(mn.armFrames||0)<=0;
        rg.fillStyle(arm?0xff5566:0x885566,0.9); rg.fillRect(mns.x-3,mns.y-3,6,6);
        rg.lineStyle(1,0x000000,0.6); rg.strokeRect(mns.x-3,mns.y-3,6,6);
      }
      var fields=world.items.fields||[];
      for(i=0;i<fields.length;i++){
        var fl=fields[i]||{};
        var flSm=_raceSampleAt(tr,fl.s||0);
        var flx=flSm.x+flSm.nx*(Number(fl.d)||0);
        var fly=flSm.y+flSm.ny*(Number(fl.d)||0);
        var fls=this._fzWorldToScreen(flx,fly,camX,camY,zoom,W,H);
        var rr=Math.max(6,Math.floor((Number(fl.dRadius)||16)*zoom*0.75));
        zg.lineStyle(1,0x88aaff,0.35); zg.strokeCircle(fls.x,fls.y,rr);
      }
    }
  }

  for(i=0;i<world.racers.length;i++){
    var r=world.racers[i];
    var rp=this._fzPosForRacer(r);
    var sp=this._fzWorldToScreen(rp.x,rp.y,camX,camY,zoom,W,H);
    if(sp.x<-30||sp.x>W+30||sp.y<-30||sp.y>H+30) continue;
    var ang=Math.atan2(rp.s.ty,rp.s.tx)+(r.dv*0.09);
    var sz=r.isPlayer?11:8;
    var pA={x:sp.x+Math.cos(ang)*sz*1.5,y:sp.y+Math.sin(ang)*sz*1.5};
    var pB={x:sp.x+Math.cos(ang+2.3)*sz,y:sp.y+Math.sin(ang+2.3)*sz};
    var pC={x:sp.x+Math.cos(ang-2.3)*sz,y:sp.y+Math.sin(ang-2.3)*sz};
    var gR=r.isPlayer?eg:rg;
    gR.fillStyle(0x000000,0.35); gR.fillCircle(sp.x+1,sp.y+2,sz+2);
    gR.fillStyle(r.color,1); gR.fillTriangle(pA.x,pA.y,pB.x,pB.y,pC.x,pC.y);
    if(r.boostTimer>0||r.zoneBoostFrames>0){

  var retryMode='RACE';

      var gpNextTrack=_raceTrackWithCupOverride(gpNextKey,(this._gpState&&this._gpState.cupKey)||'starter')||FZERO_TRACKS[gpNextKey];
      this._nextGpData={track:gpNextTrack,fromMenu:true,mode:'GRAND_PRIX',profileKey:this._profileKey,difficultyKey:this._difficultyKey,gpState:this._gpState,simV:4};
    }
  }

  if(splits&&splits.laps&&splits.laps.length){

    for(li=0;li<splits.laps.length&&li<5;li++){
      var lObj=splits.laps[li]||{};

    if(d.ghostSaved&&d.ghostSavedSimV){
      ttDeltaText+='\nSAVED GHOST simV='+Math.floor(d.ghostSavedSimV);
    }
  }
  var gpText='';
  if(this._gpActive){
    var gpLines=[];
    var gpl=this._gpStandings||[];
    for(var gi=0;gi<gpl.length&&gi<8;gi++){
      var gs=gpl[gi]||{};
      gpLines.push('#'+(gs.rank||gi+1)+' '+String(gs.id||'').toUpperCase()+'  '+Math.floor(gs.points||0)+'pts  '+((Math.floor(gs.timeMs||0)/1000).toFixed(2))+'s');
    }
    gpText='\n\nGP STANDINGS:\n'+(gpLines.length?gpLines.join('\n'):'(no standings)');
    if(!this._gpFinished&&this._gpState&&this._gpState.nextTrackKey){

    }else if(this._gpFinished&&gpl.length){
      gpText+='\nCUP WINNER: '+String(gpl[0].id||'').toUpperCase();
    }

  this._combatTelemetry=d.combatTelemetry||{};

  _consumeRuleMods('race-results');
  var bg=this.add.graphics();
  bg.fillStyle(0x090018,1);bg.fillRect(0,0,W,H);

  this.add.text(W/2,56,'HYPERSPEED DEBT DERBY RESULTS',{fontFamily:'Bangers,Georgia,serif',fontSize:'44px',color:won?'#ffd700':'#ff7777',stroke:'#000000',strokeThickness:8}).setOrigin(0.5);
  var modeLabel=this._raceMode;
  if(this._gpCombat&&this._raceMode==='GRAND_PRIX') modeLabel='GRAND PRIX (COMBAT)';
  this.add.text(W/2,94,'MODE: '+modeLabel+'  PROFILE: '+this._profileKey+'  DIFF: '+this._difficultyKey,{fontFamily:'Inconsolata,monospace',fontSize:'14px',color:'#88ffff',stroke:'#000000',strokeThickness:3}).setOrigin(0.5);
  this.headTxt=this.add.text(W/2,132,won?'PODIUM SECURED':'ELIMINATED',{fontFamily:'Bangers,Georgia,serif',fontSize:'42px',color:won?'#00ff88':'#ff4444',stroke:'#000000',strokeThickness:7}).setOrigin(0.5);
  this.sumTxt=this.add.text(W/2,238,'',{fontFamily:'Inconsolata,monospace',fontSize:'18px',color:'#f5f0dc',stroke:'#000000',strokeThickness:4,align:'center',wordWrap:{width:760}}).setOrigin(0.5);
  var pts=won?Math.max(0,(4-rank)*4+12):0;

  this._resChampPts=((this._raceMode==='REPLAY'||this._raceMode==='TIME_TRIAL'||this._raceMode==='GRAND_PRIX')?0:pts);
  this._resTtGhostLine=((this._raceMode==='TIME_TRIAL'&&d.ghostSaved)?'\nNEW GHOST SAVED':'');
  this._resTtDeltaText=ttDeltaText||'';
  this._resGpText=gpText||'';
  this._resDebugText=(d.debugEditedTrack?'\nDEBUG TRACK EDIT RUN (NO SAVE/UNLOCK WRITE)':'');
  this._fzRefreshResultsSummary();

  }

    tab:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.TAB)
  };
  _saveState('auto',EWR_STATE,'fzero-results');

};
FZeroResultsScene.prototype._fzBuildCombatResultsText=function(){
  if(!(this._raceMode==='COMBAT'||this._gpCombat)) return '';
  var ct=this._combatTelemetry||{};
  var byItem=ct.byItem||{};
  var itemTotals=ct.itemTotals||{};
  var hitsByItem=ct.hitsByItem||{};
  var blocksByItem=ct.blocksByItem||{};
  var g=function(obj,key,field){
    var row=(obj&&obj[key])||{};
    return Math.floor(row[field]||0);
  };
  var row=function(k){
    return k+': P'+g(byItem,k,'p')+' U'+g(byItem,k,'u')+' D'+g(byItem,k,'hD')+' T'+g(byItem,k,'hT')+' B'+g(byItem,k,'blocks');
  };
  var text='\nCOMBAT: PICKUPS '+Math.floor(ct.pickups||0)+'  USES '+Math.floor(ct.uses||0)+'  HITS DEALT '+Math.floor(ct.hitsDealt||0)+'  HITS TAKEN '+Math.floor(ct.hitsTaken||0);
  if(this._combatTelemetryView==='detail'){
    text+='\n'+row('MISSILE');
    text+='\n'+row('MINE');
    text+='\n'+row('EMP');
    text+='\n'+row('SHIELD');
    text+='\n'+row('TURBO');
    text+='\n'+row('REPAIR');
    text+='\nITEM TOTALS U: MSL '+g(itemTotals,'MISSILE','u')+' MNE '+g(itemTotals,'MINE','u')+' EMP '+g(itemTotals,'EMP','u')+' SHD '+g(itemTotals,'SHIELD','u')+' TRB '+g(itemTotals,'TURBO','u')+' RPR '+g(itemTotals,'REPAIR','u');
    text+='\nHITS BY ITEM: MSL '+Math.floor(hitsByItem.MISSILE||0)+' MNE '+Math.floor(hitsByItem.MINE||0)+' EMP '+Math.floor(hitsByItem.EMP||0)+' SHD '+Math.floor(hitsByItem.SHIELD||0)+' TRB '+Math.floor(hitsByItem.TURBO||0)+' RPR '+Math.floor(hitsByItem.REPAIR||0);
    text+='\nBLOCKS BY ITEM: MSL '+Math.floor(blocksByItem.MISSILE||0)+' MNE '+Math.floor(blocksByItem.MINE||0)+' EMP '+Math.floor(blocksByItem.EMP||0)+' SHD '+Math.floor(blocksByItem.SHIELD||0)+' TRB '+Math.floor(blocksByItem.TURBO||0)+' RPR '+Math.floor(blocksByItem.REPAIR||0);
    text+='\n[TAB] COMPACT';
  }else{
    text+='\nLEFT:  '+row('MISSILE')+'  |  '+row('MINE')+'  |  '+row('EMP');
    text+='\nRIGHT: '+row('SHIELD')+'  |  '+row('TURBO')+'  |  '+row('REPAIR');
    text+='\n[TAB] DETAILS';
  }
  return text;
};
FZeroResultsScene.prototype._fzRefreshResultsSummary=function(){
  if(!this.sumTxt) return;
  this.sumTxt.setText(
    'TRACK: '+this._resTrackKey+
    '\nRANK: '+this._resRank+'/16'+
    '\nTIME: '+this._resTimeSec+'s'+
    '\nOUTCOME: '+this._resOutcome+
    '\nLAP SPLITS: '+this._resLapSplitText+
    '\nCHAMPIONSHIP PTS: +'+this._resChampPts+

    this._resTtDeltaText+

};
FZeroResultsScene.prototype.update=(function(cfg){
  return function(time,delta){
    var LW=cfg.LW;
    if(this._done) return;
    if((this._raceMode==='COMBAT'||this._gpCombat)&&this.keys.tab&&Phaser.Input.Keyboard.JustDown(this.keys.tab)){
      this._combatTelemetryView=(this._combatTelemetryView==='compact')?'detail':'compact';
      this._fzRefreshResultsSummary();
    }
    if(Phaser.Input.Keyboard.JustDown(this.keys.z)){
      this._done=true;
      if(this._gpActive){
        if(!this._gpFinished&&this._nextGpData){
          _sceneTransitionSafe(this,'FZero',this._nextGpData);
        }else{
          _sceneTransitionSafe(this,'FZeroMenu',{fromFZero:true,mode:'GRAND_PRIX',gpCupSource:this._gpCupSource,profileKey:this._profileKey,difficultyKey:this._difficultyKey,preselect:(this._gpState&&this._gpState.currentTrackKey)||'westport'});
        }
      }else{
        _sceneTransitionSafe(this,this._returnScene,{fromFZero:true});
      }
      return;
    }
    if(Phaser.Input.Keyboard.JustDown(this.keys.x)){
      this._done=true;
      if(this._gpActive){
        _sceneTransitionSafe(this,'FZeroMenu',{fromFZero:true,mode:'GRAND_PRIX',gpCupSource:this._gpCupSource,profileKey:this._profileKey,difficultyKey:this._difficultyKey,preselect:(this._gpState&&this._gpState.currentTrackKey)||'westport'});
      }else{
        _sceneTransitionSafe(this,'FZero',this._retryData);

    if(Phaser.Input.Keyboard.JustDown(this.keys.c)){
      this._done=true;
      _sceneTransitionSafe(this,SCENE_KEYS.saveManager,{mode:'save',returnScene:SCENE_KEYS.fzeroResults,returnData:this.scene.settings.data||{}});
      return;
    }
  };
})({LW:960});

FZeroMenuScene.prototype._fzMenuPersistSettings=function(){
  if(!EWR_STATE.fzero||typeof EWR_STATE.fzero!=='object') return;
  if(!EWR_STATE.fzero.settings||typeof EWR_STATE.fzero.settings!=='object') EWR_STATE.fzero.settings={};

  EWR_STATE.fzero.settings.gpEnabled=(this._baseRaceMode==='GRAND_PRIX');
  EWR_STATE.fzero.settings.combatEnabled=(this._baseRaceMode==='COMBAT');
  EWR_STATE.fzero.settings.gpCupKey=this._gpCupKey;
  EWR_STATE.fzero.settings.combatCupKey=this._combatCupKey;
  EWR_STATE.fzero.settings.gpCupSource=this._gpCupSource;
  EWR_STATE.fzero.settings.showRacingLine=(FEATURE_FLAGS.raceRacingLineIndicatorEnabled!==false);
  EWR_STATE.fzero.settings.defaultView=FEATURE_FLAGS.racePseudo3D?'PSEUDO3D':'TOPDOWN';
  if(EWR_STATE.fzero.settings.audioEnabled===undefined) EWR_STATE.fzero.settings.audioEnabled=true;
  if(EWR_STATE.fzero.settings.reducedEffects===undefined) EWR_STATE.fzero.settings.reducedEffects=false;
  EWR_STATE.fzero.difficulty=_raceLegacyDifficultyFromKey(this._difficultyKey);
  var sig=this._difficultyKey+'|'+(this._baseRaceMode==='GRAND_PRIX'?'1':'0')+'|'+(this._baseRaceMode==='COMBAT'?'1':'0')+'|'+this._gpCupKey+'|'+this._combatCupKey+'|'+this._gpCupSource+'|'+(FEATURE_FLAGS.raceRacingLineIndicatorEnabled?'1':'0')+'|'+(FEATURE_FLAGS.racePseudo3D?'PSEUDO3D':'TOPDOWN')+'|'+(EWR_STATE.fzero.settings.audioEnabled?'1':'0')+'|'+(EWR_STATE.fzero.settings.reducedEffects?'1':'0');

    this._settingsSig=sig;
    _saveState('auto',EWR_STATE,'fzero-menu-settings');

FZeroMenuScene.prototype._fzMenuTrackListAll=function(){
  var keys=Object.keys(FZERO_TRACKS||{});
  var out=[],i;
  for(i=0;i<keys.length;i++){
    if(FZERO_TRACKS[keys[i]]) out.push(FZERO_TRACKS[keys[i]]);
  }
  return out;
};
FZeroMenuScene.prototype._fzMenuSetSelectionByKey=function(trackKey){
  var k=String(trackKey||'');
  var i;
  for(i=0;i<this._tracksFiltered.length;i++){
    if(this._tracksFiltered[i].key===k){
      this._sel=i;
      this._page=Math.floor(i/Math.max(1,this._pageSize||6));
      return true;
    }
  }
  return false;
};
FZeroMenuScene.prototype._fzMenuApplyTrackFilters=function(){
  var src=this._tracks||[];
  var diff=String(this._filterDifficulty||'ALL').toUpperCase();
  var style=String(this._filterStyle||'ALL').toUpperCase();
  var out=[],i,t,dv,sv;
  for(i=0;i<src.length;i++){
    t=src[i];
    dv=String(t.difficultyTag||'MED').toUpperCase();
    sv=String(t.styleTag||'TECH').toUpperCase();
    if(diff!=='ALL'&&dv!==diff) continue;
    if(style!=='ALL'&&sv!==style) continue;
    out.push(t);
  }
  if(!out.length) out=src.slice(0);
  this._tracksFiltered=out;
  if(this._sel>=out.length) this._sel=Math.max(0,out.length-1);
  if(this._sel<0) this._sel=0;
  this._page=Math.floor(this._sel/Math.max(1,this._pageSize||6));
};
FZeroMenuScene.prototype._fzMenuSelectedTrack=function(){
  if(!this._tracksFiltered||!this._tracksFiltered.length) return FZERO_TRACKS.westport;
  return this._tracksFiltered[_raceClamp(this._sel,0,this._tracksFiltered.length-1)];
};
FZeroMenuScene.prototype._fzMenuThumbTextureKey=function(track){
  var v=Math.max(1,Math.floor((BALANCE.race&&BALANCE.race.cache&&BALANCE.race.cache.thumbKeyVersion)||1));
  var sig=_raceTrackSignatureHash(track||{});
  return 'raceThumb_'+String(track&&track.key||'westport')+'_v'+v+'_'+sig;
};
FZeroMenuScene.prototype._fzMenuEnsureThumb=function(track){
  if(!FEATURE_FLAGS.raceMenuThumbnailsEnabled||!track) return '';
  var texKey=this._fzMenuThumbTextureKey(track);
  if(this.textures&&this.textures.exists(texKey)){
    _raceThumbTouch(texKey);
    return texKey;
  }
  var tr=_raceBuildTrackCache(track);
  var w=this._thumbSize.w, h=this._thumbSize.h;
  var gg=this.make.graphics({x:0,y:0,add:false});
  gg.fillStyle(0x0d1020,1); gg.fillRect(0,0,w,h);
  var samples=tr.samples||[];
  if(samples.length){
    var minX=999999,maxX=-999999,minY=999999,maxY=-999999,i;
    for(i=0;i<samples.length;i++){
      var sm=samples[i], hw=(sm.width||120)*0.5;
      minX=Math.min(minX,sm.x-hw); maxX=Math.max(maxX,sm.x+hw);
      minY=Math.min(minY,sm.y-hw); maxY=Math.max(maxY,sm.y+hw);
    }
    var pad=10;
    var sx=(w-(pad*2))/Math.max(1,maxX-minX);
    var sy=(h-(pad*2))/Math.max(1,maxY-minY);
    var sc=Math.max(0.02,Math.min(sx,sy));
    var toX=function(x){ return pad+((x-minX)*sc); };
    var toY=function(y){ return pad+((y-minY)*sc); };
    var zones=tr.zones||[];
    for(i=0;i<zones.length;i++){
      var z=zones[i];
      var s0=_raceSampleAt(tr,z.s0), s1=_raceSampleAt(tr,z.s1);
      var cx=(toX(s0.x)+toX(s1.x))*0.5, cy=(toY(s0.y)+toY(s1.y))*0.5;
      var col=(z.type===RACE_ZONE_TYPES.BOOST_PAD)?0xffd700:(z.type===RACE_ZONE_TYPES.PIT?0x44e6ff:(z.type===RACE_ZONE_TYPES.DAMAGE?0xff5555:(z.type===RACE_ZONE_TYPES.SLOW?0xaa66ff:0x8b5a2b)));
      gg.fillStyle(col,0.22); gg.fillCircle(cx,cy,3.2);
    }
    for(i=0;i<samples.length;i++){
      var a=samples[i], b=samples[(i+1)%samples.length];
      var laX=toX(a.x+a.nx*(a.width*0.5)), laY=toY(a.y+a.ny*(a.width*0.5));
      var lbX=toX(b.x+b.nx*(b.width*0.5)), lbY=toY(b.y+b.ny*(b.width*0.5));
      var raX=toX(a.x-a.nx*(a.width*0.5)), raY=toY(a.y-a.ny*(a.width*0.5));
      var rbX=toX(b.x-b.nx*(b.width*0.5)), rbY=toY(b.y-b.ny*(b.width*0.5));
      gg.lineStyle(2,0x334b72,0.92);
      gg.beginPath(); gg.moveTo(laX,laY); gg.lineTo(lbX,lbY); gg.strokePath();
      gg.beginPath(); gg.moveTo(raX,raY); gg.lineTo(rbX,rbY); gg.strokePath();
      if(i%3===0){
        gg.lineStyle(1,0x9fb8ff,0.35);
        gg.beginPath(); gg.moveTo(toX(a.x),toY(a.y)); gg.lineTo(toX(b.x),toY(b.y)); gg.strokePath();
      }
    }
  }
  gg.generateTexture(texKey,w,h);
  gg.destroy();
  _raceThumbTouch(texKey);
  var keep={}; keep[texKey]=1;
  _raceThumbEvictIfNeeded(this,keep);
  return texKey;
};
FZeroMenuScene.prototype.update=(function(cfg){
  return function(time,delta){
    this._t+=delta;
    if(this._done)return;
    var inGp=(this._raceMode==='GRAND_PRIX');
    if(inGp){
      var gpTable=(this._gpCupSource==='COMBAT')?(FZERO_COMBAT_CUPS||{}):(FZERO_CUPS||{});
      var gpKeys=(this._gpCupSource==='COMBAT')?this._combatCupKeys:this._cupKeys;
      if(!gpKeys||!gpKeys.length) gpKeys=(this._gpCupSource==='COMBAT')?['combat_starter']:['starter'];
      var gpKey=(this._gpCupSource==='COMBAT')?this._combatCupKey:this._gpCupKey;
      if(!gpTable[gpKey]) gpKey=gpKeys[0];
      if(FEATURE_FLAGS.raceMenuFiltersEnabled){
        this._filterDifficulty='ALL';
        this._filterStyle='ALL';
      }
      if(Phaser.Input.Keyboard.JustDown(this.keys.left)||Phaser.Input.Keyboard.JustDown(this.keys.up)){
        var ciL=gpKeys.indexOf(gpKey); if(ciL<0) ciL=0;
        gpKey=gpKeys[(ciL+gpKeys.length-1)%gpKeys.length];
      }
      if(Phaser.Input.Keyboard.JustDown(this.keys.right)||Phaser.Input.Keyboard.JustDown(this.keys.down)){
        var ciR=gpKeys.indexOf(gpKey); if(ciR<0) ciR=0;
        gpKey=gpKeys[(ciR+1)%gpKeys.length];
      }
      if(this._gpCupSource==='COMBAT') this._combatCupKey=gpKey;
      else this._gpCupKey=gpKey;
      var cupTrack=(gpTable[gpKey]&&gpTable[gpKey].tracks&&gpTable[gpKey].tracks.length)?gpTable[gpKey].tracks[0]:'westport';
      this._gpPreviewTrackKey=cupTrack;
      this._fzMenuSetSelectionByKey(cupTrack);
    }else{
      this._gpPreviewTrackKey='';
      if(Phaser.Input.Keyboard.JustDown(this.keys.up)){ this._sel=Math.max(0,this._sel-1); }
      if(Phaser.Input.Keyboard.JustDown(this.keys.down)){ this._sel=Math.min(this._tracksFiltered.length-1,this._sel+1); }
      if(this._raceMode==='COMBAT'){
        var cKeys=this._combatCupKeys&&this._combatCupKeys.length?this._combatCupKeys:['combat_starter'];
        var cIdx=cKeys.indexOf(this._combatCupKey); if(cIdx<0) cIdx=0;
        if(Phaser.Input.Keyboard.JustDown(this.keys.left)){ cIdx=(cIdx+cKeys.length-1)%cKeys.length; this._combatCupKey=cKeys[cIdx]; }
        if(Phaser.Input.Keyboard.JustDown(this.keys.right)){ cIdx=(cIdx+1)%cKeys.length; this._combatCupKey=cKeys[cIdx]; }
      }else{
        if(Phaser.Input.Keyboard.JustDown(this.keys.left)){ this._page=Math.max(0,this._page-1); this._sel=Math.min(this._tracksFiltered.length-1,this._page*this._pageSize); }
        if(Phaser.Input.Keyboard.JustDown(this.keys.right)){ var maxPage=Math.max(0,Math.ceil(this._tracksFiltered.length/this._pageSize)-1); this._page=Math.min(maxPage,this._page+1); this._sel=Math.min(this._tracksFiltered.length-1,this._page*this._pageSize); }
      }
    }
    if(FEATURE_FLAGS.raceTimeTrialModeEnabled&&Phaser.Input.Keyboard.JustDown(this.keys.t)){
      this._raceMode=(this._raceMode==='TIME_TRIAL')?this._baseRaceMode:'TIME_TRIAL';
    }
    if(FEATURE_FLAGS.raceGrandPrixEnabled&&Phaser.Input.Keyboard.JustDown(this.keys.g)){
      if(this._baseRaceMode==='COMBAT'&&FEATURE_FLAGS.raceCombatCupEnabled){
        if(this._raceMode==='GRAND_PRIX'&&this._gpCupSource==='COMBAT'){
          this._raceMode='COMBAT';
        }else{
          this._gpCupSource='COMBAT';
          this._raceMode='GRAND_PRIX';
        }
      }else{
        this._gpCupSource='RACE';
        this._baseRaceMode=(this._baseRaceMode==='GRAND_PRIX')?'RACE':'GRAND_PRIX';
        if(this._raceMode!=='TIME_TRIAL') this._raceMode=this._baseRaceMode;
      }
    }
    if(FEATURE_FLAGS.raceCombatEnabled&&Phaser.Input.Keyboard.JustDown(this.keys.i)){
      if(this._raceMode==='TIME_TRIAL'){
        this._baseRaceMode='COMBAT';
        this._raceMode='COMBAT';
      }else if(this._baseRaceMode==='COMBAT'){
        this._baseRaceMode='RACE';
        if(this._raceMode==='COMBAT'||(this._raceMode==='GRAND_PRIX'&&this._gpCupSource==='COMBAT')) this._raceMode='RACE';
        if(this._gpCupSource==='COMBAT') this._gpCupSource='RACE';
      }else{
        this._baseRaceMode='COMBAT';
        this._raceMode='COMBAT';
      }
    }
    if(FEATURE_FLAGS.raceDifficultyEnabled&&Phaser.Input.Keyboard.JustDown(this.keys.d)){
      var dOrder=['EASY','NORMAL','HARD','MASTER'];
      var di=dOrder.indexOf(this._difficultyKey); if(di<0) di=1;

    }
    if(FEATURE_FLAGS.raceMenuFiltersEnabled&&Phaser.Input.Keyboard.JustDown(this.keys.f)){
      var fd=['ALL','EASY','MED','HARD'];
      var fi=fd.indexOf(this._filterDifficulty); if(fi<0) fi=0;
      this._filterDifficulty=fd[(fi+1)%fd.length];
      this._fzMenuApplyTrackFilters();
    }
    if(FEATURE_FLAGS.raceMenuFiltersEnabled&&Phaser.Input.Keyboard.JustDown(this.keys.s)){
      var fs=['ALL','TECH','SPEED','HAZARD','STRATEGY'];
      var fsi=fs.indexOf(this._filterStyle); if(fsi<0) fsi=0;
      this._filterStyle=fs[(fsi+1)%fs.length];
      this._fzMenuApplyTrackFilters();
    }
    if(Phaser.Input.Keyboard.JustDown(this.keys.l)){
      FEATURE_FLAGS.raceRacingLineIndicatorEnabled=!FEATURE_FLAGS.raceRacingLineIndicatorEnabled;
    }
    if(Phaser.Input.Keyboard.JustDown(this.keys.v)){
      if(FEATURE_FLAGS.racePseudo3D){
        FEATURE_FLAGS.racePseudo3D=false; FEATURE_FLAGS.raceTopDownDebug=true;
      }else{
        FEATURE_FLAGS.racePseudo3D=true; FEATURE_FLAGS.raceTopDownDebug=false;
      }
    }
    if(Phaser.Input.Keyboard.JustDown(this.keys.b)){
      this._fzSettings.audioEnabled=(this._fzSettings.audioEnabled!==false)?false:true;
    }
    if(Phaser.Input.Keyboard.JustDown(this.keys.m)){
      this._fzSettings.reducedEffects=!!this._fzSettings.reducedEffects?false:true;
    }
    this._fzMenuApplyTrackFilters();
    this._fzMenuPersistSettings();
    var selTrack=this._fzMenuSelectedTrack();
    if(inGp&&this._gpPreviewTrackKey&&FZERO_TRACKS[this._gpPreviewTrackKey]) selTrack=FZERO_TRACKS[this._gpPreviewTrackKey];
    var maxPageNow=Math.max(0,Math.ceil(this._tracksFiltered.length/this._pageSize)-1);
    if(this._page>maxPageNow) this._page=maxPageNow;
    var pStart=this._page*this._pageSize;
    var pEnd=Math.min(this._tracksFiltered.length,pStart+this._pageSize);
    if(this._sel<pStart) this._sel=pStart;
    if(this._sel>=pEnd) this._sel=Math.max(pStart,pEnd-1);
    var lines=[],li;
    for(li=pStart;li<pEnd;li++){
      var t=this._tracksFiltered[li];
      var marker=(li===this._sel)?'> ':'  ';
      var best=EWR_STATE.raceScores[t.key]?('  BEST '+EWR_STATE.raceScores[t.key]+'s'):'';
      lines.push(marker+t.name+' ['+t.key+']'+best);
    }
    if(!lines.length) lines=['(no tracks for current filters)'];
    this.trackListTxt.setText(lines.join('\n'));
    this.listMetaTxt.setText('TRACKS '+(this._tracksFiltered.length?((this._sel+1)+'/'+this._tracksFiltered.length):'0/0')+'  PAGE '+(this._page+1)+'/'+(maxPageNow+1)+
      '\nFILTER D:'+this._filterDifficulty+'  S:'+this._filterStyle);
    var thumbKey=this._fzMenuEnsureThumb(selTrack);
    var thumbKeep={};
    if(thumbKey&&this.thumbSprite){
      thumbKeep[thumbKey]=1;
      _raceThumbTouch(thumbKey);
      this.thumbSprite.setTexture(thumbKey).setVisible(true).setDisplaySize(this._thumbSize.w,this._thumbSize.h).setPosition(710,252);
    }else if(this.thumbSprite){
      this.thumbSprite.setVisible(false);
    }
    _raceThumbEvictIfNeeded(this,thumbKeep);
    var hz=0, zones=selTrack.zones||[];
    for(li=0;li<zones.length;li++){
      if(zones[li].type===RACE_ZONE_TYPES.DAMAGE||zones[li].type===RACE_ZONE_TYPES.SLOW||zones[li].type===RACE_ZONE_TYPES.ROUGH) hz++;
    }
    this.thumbTitleTxt.setText(selTrack.name);
    this.thumbMetaTxt.setText(
      'DIST '+Math.floor(selTrack.dist||0)+'  LAPS '+Math.floor(selTrack.laps||3)+'\n'+
      'STYLE '+String(selTrack.styleTag||'TECH')+'  DIFF '+String(selTrack.difficultyTag||'MED')+'\n'+
      'RECOMMENDED '+String(selTrack.recommendedProfile||'FZERO')+'  LEN '+String(selTrack.lengthTag||'MED')+'\n'+
      'HAZARD SPANS '+hz
    );
    var modeLabel=this._raceMode;
    if(this._raceMode==='GRAND_PRIX'&&this._gpCupSource==='COMBAT') modeLabel='GRAND_PRIX (COMBAT)';
    this.modeTxt.setText('MODE: '+modeLabel+'  PROFILE: '+this._profileKey);
    this.diffTxt.setText('DIFFICULTY: '+this._difficultyKey+'  VIEW: '+(FEATURE_FLAGS.racePseudo3D?'PSEUDO3D':'TOPDOWN')+'  LINE: '+(FEATURE_FLAGS.raceRacingLineIndicatorEnabled?'ON':'OFF'));
    var cupTableDisp=(this._gpCupSource==='COMBAT')?(FZERO_COMBAT_CUPS||{}):(FZERO_CUPS||{});
    var cupKeyDisp=(this._gpCupSource==='COMBAT')?this._combatCupKey:this._gpCupKey;
    if(this._raceMode==='GRAND_PRIX'&&cupTableDisp[cupKeyDisp]){
      var cup=cupTableDisp[cupKeyDisp];
      var cupParts=[];
      for(var cti=0;cti<cup.tracks.length;cti++){
        var ctk=String(cup.tracks[cti]||'westport');
        var ct=_raceTrackWithCupOverride(ctk,cupKeyDisp)||FZERO_TRACKS[ctk]||FZERO_TRACKS.westport;
        cupParts.push(ctk+'('+Math.floor((ct&&ct.laps)||3)+'L)');
      }
      this.cupTxt.setText('CUP: '+cup.name+((this._gpCupSource==='COMBAT')?' [COMBAT]':'')+'  TRACKS: '+cupParts.join(' > '));
    }else if(this._raceMode==='COMBAT'){
      this.cupTxt.setText('COMBAT LAYER: '+this._combatCupKey.toUpperCase()+'  [LEFT/RIGHT]');
    }else{
      this.cupTxt.setText('CUP: -');
    }
    var ghostRec=(FEATURE_FLAGS.raceGhostsEnabled||FEATURE_FLAGS.raceReplayEnabled)?_raceGhostGet(selTrack.key,this._profileKey):null;
    var canReplay=!!(FEATURE_FLAGS.raceReplayEnabled&&ghostRec&&ghostRec.logB64);
    this.replayTxt.setText(canReplay?('BEST GHOST: '+(ghostRec.timeMs/1000).toFixed(2)+'s  [R] WATCH REPLAY (simV'+(ghostRec.simV||3)+')'):'NO GHOST FOR '+selTrack.key.toUpperCase()+' / '+this._profileKey);
    var modeHelp=(this._raceMode==='GRAND_PRIX')?((this._gpCupSource==='COMBAT')?'COMBAT CUP — deterministic combat races':'GP uses cup order and deterministic seeds'):(this._raceMode==='COMBAT'?'COMBAT ITEMS ENABLED':'SINGLE TRACK MODE');
    this.settingsTxt.setText(modeHelp+'  |  FILTERS '+this._filterDifficulty+'/'+this._filterStyle+'  |  AUDIO '+(this._fzSettings.audioEnabled!==false?'ON':'OFF')+'  FX '+(this._fzSettings.reducedEffects?'LOW':'FULL'));
    if(this.buildTxt){
      var bi=_raceBuildInfo();
      this.buildTxt.setText('RACING SANDBOX — rcVersion '+String(bi.rcVersion||'n/a')+' — fileKind '+String(bi.fileKind||'main'));
    }
    if(Phaser.Input.Keyboard.JustDown(this.keys.z)){
      this._done=true;
      var gpCupTable=(this._gpCupSource==='COMBAT')?(FZERO_COMBAT_CUPS||{}):(FZERO_CUPS||{});
      var gpCupKey=(this._gpCupSource==='COMBAT')?this._combatCupKey:this._gpCupKey;
      var gpCupKeys=Object.keys(gpCupTable||{});
      var cupStart=(this._raceMode==='GRAND_PRIX')?(gpCupTable[gpCupKey]||((gpCupKeys.length&&gpCupTable[gpCupKeys[0]])?gpCupTable[gpCupKeys[0]]:null)):null;
      if(this._raceMode==='GRAND_PRIX'&&cupStart){
        if(!gpCupTable[gpCupKey]&&gpCupKeys.length) gpCupKey=gpCupKeys[0];
        var seedBase=((EWR_STATE.rngState&&EWR_STATE.rngState.runSeed)||_dailySeedFromKey(_dailySeedKey()))>>>0;
        var gpState={
          cupKey:gpCupKey,
          raceIndex:0,
          tracks:cupStart.tracks.slice(0),
          pointsByRacerId:{},
          totalTimeMsByRacerId:{},
          seedBase:seedBase,
          finished:false,
          combatMode:(this._gpCupSource==='COMBAT'),
          cupSource:(this._gpCupSource==='COMBAT')?'COMBAT':'RACE'
        };
        var firstKey=cupStart.tracks[0]||'westport';
        var firstTrack=_raceTrackWithCupOverride(firstKey,gpCupKey)||FZERO_TRACKS.westport;
        this.scene.start('FZero',{track:firstTrack,fromMenu:true,mode:'GRAND_PRIX',profileKey:this._profileKey,difficultyKey:this._difficultyKey,gpState:gpState,simV:4});
      }else{
        this.scene.start('FZero',{track:selTrack,fromMenu:true,mode:this._raceMode,profileKey:this._profileKey,difficultyKey:this._difficultyKey,combatCupKey:this._combatCupKey,simV:4});
      }
      return;
    }
    if(canReplay&&this._raceMode!=='GRAND_PRIX'&&Phaser.Input.Keyboard.JustDown(this.keys.r)){
      this._done=true;
      this.scene.start('FZero',{track:selTrack,fromMenu:true,mode:'REPLAY',profileKey:this._profileKey,difficultyKey:'NORMAL',combatCupKey:this._combatCupKey,replayGhost:ghostRec,simV:_raceResolveSimV(ghostRec.simV||3)});
      return;
    }
    if(Phaser.Input.Keyboard.JustDown(this.keys.x)){
      this.scene.start(this._returnScene);return;
    }
  };
})({LW:960});

// ════════════════════════════════════════════════════════════════
// SAVE MANAGER
// ════════════════════════════════════════════════════════════════
function SaveManagerScene(){ Phaser.Scene.call(this,{key:'SaveManager'}); }
SaveManagerScene.prototype=Object.create(Phaser.Scene.prototype);
SaveManagerScene.prototype.constructor=SaveManagerScene;
SaveManagerScene.prototype.create=function(){
  var W=960,H=540;
  _resetPools(true);
  this._done=false;
  var d=this.scene.settings.data||{};
  this._mode=d.mode||'save';
  this._returnScene=d.returnScene||'Title';
  this._returnData=d.returnData||{};
  this._sel=0;
  this._opts=['auto','slotA','slotB','quick'];
  var bg=this.add.graphics();
  bg.fillStyle(0x0f0018,1);bg.fillRect(0,0,W,H);
  bg.fillStyle(0x220033,0.85);bg.fillRoundedRect(130,70,700,390,14);
  bg.lineStyle(3,0xffd700,0.7);bg.strokeRoundedRect(130,70,700,390,14);
  this.add.text(W/2,104,'SAVE MANAGER',{fontFamily:'Bangers,Georgia,serif',fontSize:'44px',color:'#ffd700',stroke:'#000000',strokeThickness:7}).setOrigin(0.5);
  this.modeTxt=this.add.text(W/2,146,'MODE: '+this._mode.toUpperCase(),{fontFamily:'Inconsolata,monospace',fontSize:'18px',color:'#66ffcc',stroke:'#000000',strokeThickness:4}).setOrigin(0.5);
  this.listTxt=this.add.text(170,190,'',{fontFamily:'Inconsolata,monospace',fontSize:'18px',color:'#ffffff',stroke:'#000000',strokeThickness:3,align:'left',lineSpacing:8}).setDepth(5);
  this.helpTxt=this.add.text(W/2,430,'[UP/DOWN] SELECT   [Z] EXECUTE   [X] BACK   [C] MODE CYCLE',{fontFamily:'Inconsolata,monospace',fontSize:'13px',color:'#bbbbbb',stroke:'#000000',strokeThickness:3}).setOrigin(0.5);
  this.feedTxt=this.add.text(W/2,468,'',{fontFamily:'Inconsolata,monospace',fontSize:'14px',color:'#66ffcc',stroke:'#000000',strokeThickness:3}).setOrigin(0.5);
  this.keys={
    up:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.UP),
    down:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.DOWN),
    z:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.Z),
    x:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.X),
    c:this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.C)
  };
  this._refreshList();
};
SaveManagerScene.prototype._slotLabel=function(slot){
  var meta=_getSaveSlotMeta(slot);
  if(!meta.exists) return slot.toUpperCase()+'  —  EMPTY';
  var dateStr=meta.ts?new Date(meta.ts).toLocaleString():'unknown';
  var chk=meta.checksumOk?'ok':((meta.errors&&meta.errors.length)?meta.errors[0]:'invalid');
  return slot.toUpperCase()+'  —  v'+(meta.version||'?')+'  —  '+dateStr+'  —  '+String(meta.scene||'unknown')+'  —  '+chk.toUpperCase();
};
SaveManagerScene.prototype._refreshList=function(){
  this.modeTxt.setText('MODE: '+this._mode.toUpperCase());
  var lines=[],i;
  for(i=0;i<this._opts.length;i++){
    lines.push((i===this._sel?'> ':'  ')+this._slotLabel(this._opts[i]));
  }
  lines.push('');
  lines.push('ACTIONS:');
  lines.push(this._mode==='save'?'Z saves selected slot':'Z loads selected slot');
  lines.push('C cycles mode (SAVE/LOAD/IMPORT/EXPORT)');
  this.listTxt.setText(lines.join('\n'));
  _fitTextInRect(this.listTxt,{w:640,h:250},{minFont:12,maxFont:18});
};
SaveManagerScene.prototype._exec=function(){
  var slot=this._opts[this._sel];
  var res=null;
  if(this._mode==='save'){
    res=_saveState(slot,EWR_STATE,'save-manager');
    this.feedTxt.setColor(res.ok?'#66ffcc':'#ff6666').setText(res.ok?'SAVED '+slot.toUpperCase():'SAVE FAILED: '+(res.reason||'unknown'));
    return;
  }
  if(this._mode==='load'){
    res=_loadState(slot);
    if(!res.ok&&slot==='auto'&&res.reason!=='corrupt-cancelled') res=_recoverLastGoodSave();
    this.feedTxt.setColor(res.ok?'#66ffcc':'#ff6666').setText(res.ok?'LOADED '+(res.key||slot).toUpperCase():'LOAD FAILED: '+(res.reason||'unknown'));
    return;
  }
  if(this._mode==='import'){
    var raw=(typeof window!=='undefined'&&window.prompt)?window.prompt('Paste save JSON payload:',''):'';
    if(!raw){this.feedTxt.setColor('#ff6666').setText('IMPORT CANCELED');return;}
    var packet=_safeJsonParse(raw)||{};
    var payload=packet.payload||packet;
    var v=_validateSavePayload(payload||{});
    if(!v.ok){this.feedTxt.setColor('#ff6666').setText('INVALID SAVE: '+v.errors.join(','));return;}
    var mig=_migrateState(payload.state||payload,payload.version||1);
    var key=_saveSlotKey(slot);
    try{
      localStorage.setItem(key,JSON.stringify(payload));
      this.feedTxt.setColor('#66ffcc').setText('IMPORTED '+slot.toUpperCase()+'  v'+(payload.version||'?')+'->v'+(mig&&mig.to?mig.to:SAVE_VERSION));
      _telemetryInc('migrationEvents','import',mig&&mig.steps||0);
    }catch(e){this.feedTxt.setColor('#ff6666').setText('IMPORT FAILED');}
    return;
  }
  if(this._mode==='export'){
    var expRaw=(typeof localStorage!=='undefined')?localStorage.getItem(_saveSlotKey(slot)):'';
    if(!expRaw){this.feedTxt.setColor('#ff6666').setText('NOTHING TO EXPORT');return;}
    var expPayload=_safeJsonParse(expRaw)||{};
    var packetOut={
      format:'CEHP_SAVE_EXPORT',
      version:expPayload.version||SAVE_VERSION,
      checksum:expPayload.checksum||'none',
      exportedAt:_nowTs(),
      payload:expPayload
    };
    if(typeof window!=='undefined'&&window.prompt) window.prompt('Copy save JSON:',JSON.stringify(packetOut));
    this.feedTxt.setColor('#66ffcc').setText('EXPORT READY FOR '+slot.toUpperCase());
  }
};
SaveManagerScene.prototype.update=(function(cfg){
  return function(time,delta){
    var LW=cfg.LW;
    if(this._done) return;
    if(Phaser.Input.Keyboard.JustDown(this.keys.up)){this._sel=(this._sel+this._opts.length-1)%this._opts.length;this._refreshList();}
    if(Phaser.Input.Keyboard.JustDown(this.keys.down)){this._sel=(this._sel+1)%this._opts.length;this._refreshList();}
    if(Phaser.Input.Keyboard.JustDown(this.keys.c)){
      var modes=['save','load','import','export'];
      var idx=modes.indexOf(this._mode);
      this._mode=modes[(idx+1)%modes.length];
      this._refreshList();
    }
    if(Phaser.Input.Keyboard.JustDown(this.keys.z)){this._exec();}
    if(Phaser.Input.Keyboard.JustDown(this.keys.x)){
      this._done=true;
      _sceneTransitionSafe(this,this._returnScene,this._returnData);
    }
  };
})({LW:960});

// ════════════════════════════════════════════════════════════════
// JOURNAL SCENE
// ════════════════════════════════════════════════════════════════
function _wrapSceneCreateInit(sceneCtor,includeAux){
  if(!sceneCtor||!sceneCtor.prototype||!sceneCtor.prototype.create) return;
  if(sceneCtor.prototype._createWrapped) return;
  var origCreate=sceneCtor.prototype.create;
  sceneCtor.prototype.create=function(){
    _backfillStateKeys(EWR_STATE);
    _syncRngFromState(EWR_STATE);
    _resetPools(includeAux===true);
    this._transitioning=false;
    this._allowImmediateStart=false;
    this._restartQueued=false;
    this._inputLocked=false;
    this._disposables={timers:[],tweens:[],texts:[]};
    if(EWR_STATE.saveMeta){
      EWR_STATE.saveMeta.lastScene=(this.scene&&this.scene.key)?this.scene.key:'unknown';
    }
    if(!this._sceneLifecycleHooked&&this.events){
      var selfScene=this;
      this.events.once('shutdown',function(){
        try{_cleanupSceneDisposables(selfScene);}catch(e){}
        try{if(selfScene.time&&selfScene.time.removeAllEvents) selfScene.time.removeAllEvents();}catch(e2){}
        try{if(selfScene.tweens&&selfScene.tweens.killAll) selfScene.tweens.killAll();}catch(e3){}
        selfScene._transitioning=false;
        selfScene._allowImmediateStart=false;
        _unlockGlobalInput();
      });
      this._sceneLifecycleHooked=true;
    }
    // Sandbox-safe wrapper: avoid scene.start monkey-patching/hotkey hooks from monolith.
    if(FEATURE_FLAGS.profiler) _startProfiler();
    var ret=origCreate.apply(this,arguments);
    if(this.scene&&this.scene.key!=='Boot') _gfxAttachScene(this);
    return ret;
  };
  sceneCtor.prototype._createWrapped=true;
}

_wrapSceneCreateInit(FZeroScene,true);
_wrapSceneCreateInit(FZeroMenuScene,true);
_wrapSceneCreateInit(FZeroResultsScene,true);
_wrapSceneCreateInit(SaveManagerScene,true);

var config = {
  type: FEATURE_FLAGS.metroidAtmosphereWebGL?Phaser.AUTO:Phaser.CANVAS,
  width: 960,
  height: 540,
  backgroundColor: '#0a0014',
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  },
  input: {
    gamepad: true,
    activePointers: 4
  },
  scene: [
    FZeroMenuScene,
    FZeroScene,
    FZeroResultsScene,
    SaveManagerScene
  ]
};
var GAME_INSTANCE = null;
try{
  GAME_INSTANCE = new Phaser.Game(config);
  if(typeof window!=='undefined') window.__CEHP_GAME=GAME_INSTANCE;
}catch(e){
  _renderCrashFallback(e,'boot');
}
</script>
