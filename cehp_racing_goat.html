function _gfxProfileForSceneKey(sceneKey){
  var k=(sceneKey||'').toLowerCase();
  if(k.indexOf('level1')===0||k.indexOf('worldmap')===0||k.indexOf('mainmode')===0) return 'jungle';
  if(k.indexOf('level2')===0||k.indexOf('void')>=0||k.indexOf('meta')>=0) return 'cave';
  if(k.indexOf('level3')===0||k.indexOf('rasta')>=0||k.indexOf('commercial')>=0) return 'factory';
  if(k.indexOf('level4')===0||k.indexOf('catdemocracy')>=0) return 'sunset';
  if(k.indexOf('level5')===0||k.indexOf('level6')===0||k.indexOf('epilogue')>=0) return 'storm';
  return 'default';
}

function _gfxResolveProfile(scene){
  var key=(scene&&scene._gfxProfileKey)?scene._gfxProfileKey:_gfxProfileForSceneKey(scene&&scene.scene?scene.scene.key:'');
  return VISUAL_PROFILE[key]||VISUAL_PROFILE.default;
}

function _gfxHexToInt(hex){
  if(typeof hex==='number') return hex;
  var h=String(hex||'#000000').replace('#','');
  return parseInt(h,16)||0;
}

function _gfxLerpColor(a,b,t){
  t=Math.max(0,Math.min(1,t||0));
  var ar=(a>>16)&255, ag=(a>>8)&255, ab=a&255;
  var br=(b>>16)&255, bg=(b>>8)&255, bb=b&255;
  var rr=Math.round(Phaser.Math.Linear(ar,br,t));
  var rg=Math.round(Phaser.Math.Linear(ag,bg,t));
  var rb=Math.round(Phaser.Math.Linear(ab,bb,t));
  return (rr<<16)|(rg<<8)|rb;
}

function _gfxSnapToVirtual(scene,value,axis){
  var v=(BALANCE.visual&&BALANCE.visual.internalResolution)||{compatW:320,compatH:180};
  var sw=(scene&&scene.scale&&scene.scale.width)||960;
  var sh=(scene&&scene.scale&&scene.scale.height)||540;
  var iw=Math.max(1,v.compatW||320);
  var ih=Math.max(1,v.compatH||180);
  var step=(axis==='y')?(sh/ih):(sw/iw);
  if(!isFinite(step)||step<=0) step=1;
  return Math.round(value/step)*step;
}

function _gfxAttachScene(scene,profileKey){
  if(!scene||scene._gfxAttached||!scene.add||!scene.events) return;
  scene._gfxAttached=true;
  scene._gfxProfileKey=profileKey||_gfxProfileForSceneKey(scene.scene&&scene.scene.key?scene.scene.key:'');
  scene._gfxOverlayG=scene.add.graphics().setScrollFactor(0).setDepth(9950);
  var postFn=function(){ _gfxRenderSceneOverlay(scene); };
  scene.events.on('postupdate',postFn);
  scene.events.once('shutdown',function(){
    if(scene.events) scene.events.off('postupdate',postFn);
    if(scene._gfxOverlayG){ try{scene._gfxOverlayG.destroy();}catch(e){} }
    scene._gfxOverlayG=null;
    scene._gfxAttached=false;
  });
}

function _gfxRenderSceneOverlay(scene){
  if(!scene||!scene._gfxOverlayG) return;
  var g=scene._gfxOverlayG;
  g.clear();
  if(!FEATURE_FLAGS.visualOverhaulV1) return;
  if(FEATURE_FLAGS.pixelSnapStrict&&scene.cameras&&scene.cameras.main){
    var cam=scene.cameras.main;
    cam.scrollX=_gfxSnapToVirtual(scene,cam.scrollX,'x');
    cam.scrollY=_gfxSnapToVirtual(scene,cam.scrollY,'y');
  }
  var prof=_gfxResolveProfile(scene);
  var grad=(BALANCE.visual&&BALANCE.visual.grade)||{};
  var dith=(BALANCE.visual&&BALANCE.visual.dither)||{};
  var W=(scene.scale&&scene.scale.width)||960;
  var H=(scene.scale&&scene.scale.height)||540;
  if(grad.enabled!==false){
    g.fillStyle(prof.shadowTint||grad.blackLiftColor||0x0e0a18,(prof.shadowAlpha!==undefined)?prof.shadowAlpha:(grad.blackLiftAlpha||0.16));
    g.fillRect(0,0,W,H);
    g.fillStyle(prof.warmTint||grad.highlightWarmColor||0x2a1305,(prof.warmAlpha!==undefined)?prof.warmAlpha:(grad.highlightWarmAlpha||0.08));
    g.fillRect(0,0,W,Math.floor(H*0.42));
    g.fillStyle(prof.fogTint||0x111122,(prof.fogAlpha!==undefined)?prof.fogAlpha:0.06);
    g.fillRect(0,Math.floor(H*0.68),W,Math.ceil(H*0.32));
  }
  if(FEATURE_FLAGS.useDitherPass&&dith.enabled!==false){
    var step=Math.max(2,dith.step||2);
    var frame=(scene.game&&scene.game.loop)?scene.game.loop.frame:0;
    var yStart=frame%step;
    for(var y=yStart;y<H;y+=step){
      var alt=(Math.floor((y-yStart)/step)%2===0);
      g.fillStyle(0x000000,alt?(dith.alphaA||0.05):(dith.alphaB||0.025));
      g.fillRect(0,y,W,1);
    }
  }
}

function _gfxToggle(mode){
  var m=(mode||'').toLowerCase();
  if(m==='dither'){ FEATURE_FLAGS.useDitherPass=!FEATURE_FLAGS.useDitherPass; return FEATURE_FLAGS.useDitherPass; }
  if(m==='grade'){ FEATURE_FLAGS.visualOverhaulV1=!FEATURE_FLAGS.visualOverhaulV1; return FEATURE_FLAGS.visualOverhaulV1; }
  if(m==='pixelsnap'){ FEATURE_FLAGS.pixelSnapStrict=!FEATURE_FLAGS.pixelSnapStrict; return FEATURE_FLAGS.pixelSnapStrict; }
  if(m==='parallaxdebug'){ FEATURE_FLAGS.parallaxDebug=!FEATURE_FLAGS.parallaxDebug; return FEATURE_FLAGS.parallaxDebug; }
  return false;
}

function _gfxCaptureBaselineSet(){
  var game=(typeof window!=='undefined')?window.__CEHP_GAME:null;
  if(!game||!game.renderer||!game.renderer.snapshot) return {ok:false,error:'snapshot-unavailable'};
  var shotNames=[
    'title_full','idle_backdrop','apex_jump','dash_occluder','cave_lightshaft',
    'water_strip','hit_confirm','parallax_vista','hud_overlay','notification_event'
  ];
  var out=[];
  var idx=0;
  var startedTs=_nowTs();
  var captureNext=function(){
    if(idx>=shotNames.length){
      GFX_STATE.captureQueue=out;
      GFX_STATE.lastCaptureTs=startedTs;
      return;
    }
    var nm=shotNames[idx++];
    game.renderer.snapshot(function(image){
      try{
        out.push({name:nm,data:image&&image.src?image.src:'',ts:_nowTs()});
      }catch(e){
        out.push({name:nm,data:'',ts:_nowTs(),error:String(e&&e.message||e)});
      }
      captureNext();
    });
  };
  captureNext();
  return {ok:true,queued:shotNames.length};
}

  },

  }
};

function _cloneDefault(v){
  if(v===null||typeof v!=='object') return v;
  if(Object.prototype.toString.call(v)==='[object Array]') return v.slice();
  var out={};
  for(var k in v){ if(v.hasOwnProperty(k)) out[k]=_cloneDefault(v[k]); }
  return out;
}

function _ensureDefaults(target, defaults){
  if(!target||typeof target!=='object') target={};
  for(var k in defaults){
    if(!defaults.hasOwnProperty(k)) continue;
    if(target[k]===undefined||target[k]===null){ target[k]=_cloneDefault(defaults[k]); continue; }
    if(defaults[k]&&typeof defaults[k]==='object'&&Object.prototype.toString.call(defaults[k])!=='[object Array]'){
      target[k]=_ensureDefaults(target[k],defaults[k]);
    }
  }
  return target;
}

function _backfillStateKeys(state){
  state=state||EWR_STATE;
  _ensureDefaults(state,EWR_DEFAULTS);
  if(!state.levelsBeaten) state.levelsBeaten=[];
  if(!state.commercialsShown) state.commercialsShown={};
  if(!state.fzero||typeof state.fzero!=='object') state.fzero=_cloneDefault(EWR_DEFAULTS.fzero);
  if(!state.fzero.settings||typeof state.fzero.settings!=='object') state.fzero.settings=_cloneDefault(EWR_DEFAULTS.fzero.settings);
  var _fzDiff=String(state.fzero.settings.difficultyKey||'').toUpperCase();
  if(_fzDiff==='BEGINNER'||_fzDiff==='EASY') _fzDiff='EASY';
  else if(_fzDiff==='STANDARD'||_fzDiff==='NORMAL') _fzDiff='NORMAL';
  else if(_fzDiff==='EXPERT'||_fzDiff==='HARD') _fzDiff='HARD';
  else if(_fzDiff==='MASTER') _fzDiff='MASTER';
  else{
    var _legacyDiff=String(state.fzero.difficulty||'standard').toLowerCase();
    if(_legacyDiff==='beginner'||_legacyDiff==='easy') _fzDiff='EASY';
    else if(_legacyDiff==='expert'||_legacyDiff==='hard') _fzDiff='HARD';
    else if(_legacyDiff==='master') _fzDiff='MASTER';
    else _fzDiff='NORMAL';
  }
  state.fzero.settings.difficultyKey=_fzDiff;
  state.fzero.difficulty=(_fzDiff==='EASY')?'beginner':(_fzDiff==='HARD'?'expert':(_fzDiff==='MASTER'?'master':'standard'));
  state.fzero.settings.gpEnabled=!!state.fzero.settings.gpEnabled;
  state.fzero.settings.combatEnabled=!!state.fzero.settings.combatEnabled;
  state.fzero.settings.gpCupKey=String(state.fzero.settings.gpCupKey||'starter');
  state.fzero.settings.combatCupKey=String(state.fzero.settings.combatCupKey||'combat_starter');
  var _cupSrc=String(state.fzero.settings.gpCupSource||'RACE').toUpperCase();
  state.fzero.settings.gpCupSource=(_cupSrc==='COMBAT')?'COMBAT':'RACE';
  state.fzero.settings.showRacingLine=(state.fzero.settings.showRacingLine!==false);
  var _view=String(state.fzero.settings.defaultView||'TOPDOWN').toUpperCase();
  state.fzero.settings.defaultView=(_view==='PSEUDO3D')?'PSEUDO3D':'TOPDOWN';
  state.fzero.settings.audioEnabled=(state.fzero.settings.audioEnabled!==false);
  state.fzero.settings.reducedEffects=!!state.fzero.settings.reducedEffects;
  if(!state.fzero.ghosts||typeof state.fzero.ghosts!=='object') state.fzero.ghosts={};
  for(var _gTrack in state.fzero.ghosts){
    if(!state.fzero.ghosts.hasOwnProperty(_gTrack)) continue;
    if(!state.fzero.ghosts[_gTrack]||typeof state.fzero.ghosts[_gTrack]!=='object'){
      state.fzero.ghosts[_gTrack]={};
      continue;
    }
    for(var _gProfile in state.fzero.ghosts[_gTrack]){
      if(!state.fzero.ghosts[_gTrack].hasOwnProperty(_gProfile)) continue;
      var _rec=state.fzero.ghosts[_gTrack][_gProfile];
      if(!_rec||typeof _rec!=='object'||typeof _rec.logB64!=='string'){
        delete state.fzero.ghosts[_gTrack][_gProfile];
      }else{
        var _simV=Math.floor(Number(_rec.simV||3));
        if(!isFinite(_simV)||_simV<3) _simV=3;
        _rec.simV=_simV;
      }
    }
  }
  if(!state.saveMeta) state.saveMeta=_cloneDefault(EWR_DEFAULTS.saveMeta);
  state.saveMeta.version=SAVE_VERSION;
  return state;
}

function _rngRestore(snapshot){
  if(!snapshot) return;
  RNG.setState(snapshot.seed,snapshot.cursor||0);
  _syncStateRng(EWR_STATE);
  if(EWR_STATE.rngState) EWR_STATE.rngState.runSeed=snapshot.runSeed||snapshot.seed;
}

function _rngFloat(){
  if(FEATURE_FLAGS.seededRng){
    var v=RNG.next();
    _syncStateRng(EWR_STATE);
    return v;
  }
  return Math.random();
}

function _rngInt(max){
  if(max===undefined) max=1;
  if(FEATURE_FLAGS.seededRng){
    var v=RNG.nextInt(max);
    _syncStateRng(EWR_STATE);
    return v;
  }
  return Math.floor(Math.random()*Math.max(1,Math.floor(Number(max)||1)));
}

function _rngChoice(arr){
  if(!arr||!arr.length) return null;
  return arr[_rngInt(arr.length)];
}

function _rngShuffle(arr){
  if(!arr||!arr.length) return [];
  if(FEATURE_FLAGS.seededRng){
    var s=RNG.shuffle(arr);
    _syncStateRng(EWR_STATE);
    return s;
  }
  var out=arr.slice();
  for(var i=out.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=out[i]; out[i]=out[j]; out[j]=tmp;
  }
  return out;
}

function _rngWeightedChoice(items){
  if(!items||!items.length) return null;
  if(FEATURE_FLAGS.seededRng){
    var v=RNG.weightedChoice(items);
    _syncStateRng(EWR_STATE);
    return v;
  }
  var total=0,i,w;
  for(i=0;i<items.length;i++){w=items[i].weight===undefined?1:Number(items[i].weight);if(!isFinite(w)||w<0)w=0;total+=w;}
  if(total<=0) return items[Math.floor(Math.random()*items.length)];
  var roll=Math.random()*total;
  for(i=0;i<items.length;i++){
    w=items[i].weight===undefined?1:Number(items[i].weight);
    if(!isFinite(w)||w<0) w=0;
    roll-=w;
    if(roll<=0) return items[i];
  }
  return items[items.length-1];
}

function _nowTs(){ return Date.now?Date.now():(new Date()).getTime(); }

function _saveSlotKey(slot){

}

function _safeJsonParse(raw){
  if(!raw||typeof raw!=='string') return null;
  try{return JSON.parse(raw);}catch(e){return null;}
}

function _stateSnapshot(state){

function _dailySeedKey(ts){

function _dailySeedFromKey(dateKey){
  var s=0,i,ch;
  for(i=0;i<dateKey.length;i++){ch=dateKey.charCodeAt(i);s=(s*131+ch)%4294967296;}
  if(s===0) s=1;
  return s;
}

var _SAVE_RUNTIME = {lastSaveTs:0,pending:null,pendingReason:'',flushTimer:null,lastChecksum:''};

function _stableStringify(v){
  if(v===null) return 'null';
  var t=typeof v;
  if(t==='number') return isFinite(v)?String(v):'null';
  if(t==='boolean') return v?'true':'false';
  if(t==='string') return JSON.stringify(v);
  if(Object.prototype.toString.call(v)==='[object Array]'){
    var arr=[],i;
    for(i=0;i<v.length;i++) arr.push(_stableStringify(v[i]));
    return '['+arr.join(',')+']';
  }
  if(t==='object'){
    var keys=[],k,parts=[];
    for(k in v){ if(v.hasOwnProperty(k)) keys.push(k); }
    keys.sort();
    for(var ki=0;ki<keys.length;ki++){
      k=keys[ki];
      parts.push(JSON.stringify(k)+':'+_stableStringify(v[k]));
    }
    return '{'+parts.join(',')+'}';
  }
  return 'null';
}

function _checksumState(state){
  var s=_stableStringify(state||EWR_STATE);
  var h=2166136261>>>0;
  for(var i=0;i<s.length;i++){
    h^=s.charCodeAt(i);
    h=(h+((h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24)))>>>0;
  }
  return ('00000000'+h.toString(16)).slice(-8);
}

function _validateSavePayload(payload){
  var out={ok:true,errors:[]};
  if(!payload||typeof payload!=='object'){out.ok=false;out.errors.push('payload-missing');return out;}
  if(typeof payload.version!=='number'){out.ok=false;out.errors.push('version-missing');}
  if(!payload.state||typeof payload.state!=='object'){out.ok=false;out.errors.push('state-missing');return out;}
  var st=payload.state;
  if(!st.saveMeta||typeof st.saveMeta!=='object'){out.ok=false;out.errors.push('saveMeta-missing');}
  if(!st.rngState||typeof st.rngState!=='object'){out.ok=false;out.errors.push('rngState-missing');}
  if(!st.telemetry||typeof st.telemetry!=='object'){out.ok=false;out.errors.push('telemetry-missing');}
  if(st.saveMeta&&payload.checksum&&FEATURE_FLAGS.saveChecksums!==false){
    var chk=st.saveMeta.checksum||payload.checksum;
    var clone=_safeJsonParse(JSON.stringify(st))||{};
    if(clone.saveMeta) clone.saveMeta.checksum='';
    var calc=_checksumState(clone);
    if(chk!==calc){out.ok=false;out.errors.push('checksum-mismatch');out.expected=calc;out.actual=chk;}
  }
  return out;
}

function _migrateState(inState,fromVersion){
  var s=_safeJsonParse(JSON.stringify(inState||{}))||{};
  var version=Math.max(1,Math.floor(Number(fromVersion||s.saveMeta&&s.saveMeta.version||1)||1));
  var steps=0;
  _ensureDefaults(s,EWR_DEFAULTS);

  while(version<SAVE_VERSION){
    if(version===1){
      _ensureDefaults(s,{telemetry:EWR_DEFAULTS.telemetry});
      version=2; steps++;
      continue;
    }
    if(version===2){
      _ensureDefaults(s,{settings:EWR_DEFAULTS.settings});
      version=3; steps++;
      continue;
    }
    if(version===3){
      _ensureDefaults(s,{achievements:EWR_DEFAULTS.achievements});
      version=4; steps++;
      continue;
    }
    if(version===4){
      _ensureDefaults(s,{ngPlus:EWR_DEFAULTS.ngPlus});
      version=5; steps++;
      continue;
    }
    if(version===5){
      _ensureDefaults(s,{rngState:EWR_DEFAULTS.rngState,narrative:EWR_DEFAULTS.narrative,saveMeta:EWR_DEFAULTS.saveMeta,challenge:EWR_DEFAULTS.challenge,cosmetics:EWR_DEFAULTS.cosmetics,input:EWR_DEFAULTS.input});
      version=6; steps++;
      continue;
    }
    if(version===6){
      _ensureDefaults(s,{
        telemetry:EWR_DEFAULTS.telemetry,
        fzero:EWR_DEFAULTS.fzero,
        achievements:EWR_DEFAULTS.achievements,
        rngState:EWR_DEFAULTS.rngState,
        narrative:EWR_DEFAULTS.narrative,
        saveMeta:EWR_DEFAULTS.saveMeta
      });
      version=7; steps++;
      continue;
    }
    if(version===7){
      _ensureDefaults(s,{
        telemetry:EWR_DEFAULTS.telemetry,
        narrative:EWR_DEFAULTS.narrative,
        saveMeta:EWR_DEFAULTS.saveMeta,
        fzero:EWR_DEFAULTS.fzero
      });
      version=8; steps++;
      continue;
    }
    version++;
  }

  if(!s.commercialsShown||typeof s.commercialsShown!=='object') s.commercialsShown={};
  if(!s.commercialsShown._cycle) s.commercialsShown._cycle=[];
  if(!s.commercialsShown._seen) s.commercialsShown._seen=[];
  if(s.levelsBeaten&&s.levelsBeaten.indexOf('rcboss')>=0&&s.levelsBeaten.indexOf('rasta-boss')<0) s.levelsBeaten.push('rasta-boss');
  if(s.levelsBeaten&&s.levelsBeaten.indexOf('rasta-boss')>=0&&s.levelsBeaten.indexOf('rcboss')<0) s.levelsBeaten.push('rcboss');
  if(!s.playerPosW4) s.playerPosW4={x:1,y:1};
  if(!s.playerPosW5) s.playerPosW5={x:1,y:1};
  if(!s.playerPosW6) s.playerPosW6={x:1,y:2};
  if(Object.prototype.toString.call(s.raceScores)==='[object Array]'){
    s.raceScores={westport:Number(s.raceScores[0]||0),vine:Number(s.raceScores[1]||0),crossroads:Number(s.raceScores[2]||0)};
  }
  if(!s.raceScores||typeof s.raceScores!=='object') s.raceScores={westport:0,vine:0,crossroads:0,debt_derby:0};
  if(s.raceScores.debt_derby===undefined) s.raceScores.debt_derby=0;
  if(!s.fzero||typeof s.fzero!=='object') s.fzero=_cloneDefault(EWR_DEFAULTS.fzero);
  if(!s.saveMeta||typeof s.saveMeta!=='object') s.saveMeta=_cloneDefault(EWR_DEFAULTS.saveMeta);
  if(!s.narrative||typeof s.narrative!=='object') s.narrative=_cloneDefault(EWR_DEFAULTS.narrative);
  _ensureDefaults(s,EWR_DEFAULTS);
  s.saveMeta.version=SAVE_VERSION;
  if(!s.rngState.runSeed) s.rngState.runSeed=s.rngState.seed||1;
  if(!s.rngState.dailySeed) s.rngState.dailySeed=s.rngState.seed||1;
  if(!s.telemetry.migrationsApplied) s.telemetry.migrationsApplied=0;
  s.telemetry.migrationsApplied += steps;
  if(!s.telemetry.migrationEvents) s.telemetry.migrationEvents={};
  s.telemetry.migrationEvents['v'+(fromVersion||1)+'-to-v'+SAVE_VERSION]=(s.telemetry.migrationEvents['v'+(fromVersion||1)+'-to-v'+SAVE_VERSION]||0)+1;
  return {state:s,from:fromVersion||1,to:SAVE_VERSION,steps:steps};
}

function _writeSaveKey(key,payload){
  localStorage.setItem(key,JSON.stringify(payload));
}

function _rotateAutoBackups(){
  var cur=localStorage.getItem(SAVE_KEYS.auto);
  if(cur){
    var b1=localStorage.getItem(SAVE_KEYS.backup1);
    if(b1) localStorage.setItem(SAVE_KEYS.backup2,b1);
    localStorage.setItem(SAVE_KEYS.backup1,cur);
    localStorage.setItem(SAVE_KEYS.backup,cur);
  }
}

function _saveState(slot,state,reason){
  if(FEATURE_FLAGS.saveSystem===false) return {ok:false,reason:'disabled'};
  if(typeof localStorage==='undefined') return {ok:false,reason:'no-storage'};
  var tgtState=_backfillStateKeys(state||EWR_STATE);
  var now=_nowTs();
  if(_SAVE_RUNTIME.pending&&slot==='auto'&&(now-_SAVE_RUNTIME.lastSaveTs)<(BALANCE.save.debounceMs||300)){
    _SAVE_RUNTIME.pending=tgtState;
    _SAVE_RUNTIME.pendingReason=reason||'debounced';
    return {ok:true,queued:true,slot:slot};
  }
  _syncStateRng(tgtState);
  tgtState.saveMeta.version=SAVE_VERSION;
  if(slot==='auto') tgtState.saveMeta.lastAutoSaveTs=now;
  else tgtState.saveMeta.lastManualSaveTs=now;
  if(!tgtState.saveMeta.dirtySinceTs) tgtState.saveMeta.dirtySinceTs=now;
  var snap=_stateSnapshot(tgtState);
  if(snap.saveMeta) snap.saveMeta.checksum='';
  var checksum=FEATURE_FLAGS.saveChecksums===false?'':_checksumState(snap);
  tgtState.saveMeta.checksum=checksum;
  tgtState.saveMeta.lastGoodSlot=slot||'auto';
  var payload={version:SAVE_VERSION,checksum:checksum,reason:reason||'manual',state:_stateSnapshot(tgtState)};
  var key=_saveSlotKey(slot);
  try{
    if(slot==='auto'){
      _rotateAutoBackups();
    }
    _writeSaveKey(key,payload);
    _SAVE_RUNTIME.lastSaveTs=now;
    _SAVE_RUNTIME.lastChecksum=checksum;
    _telemetryInc('saveOps','total',1);
    _telemetryInc('saveOps',slot||'auto',1);
    return {ok:true,key:key,bytes:JSON.stringify(payload).length};
  }catch(e){
    _telemetryInc('loadFailures','saveWriteFail',1);
    _telemetryInc('corruptionEvents','saveWriteFail',1);
    return {ok:false,reason:'write-failed',error:String(e&&e.message||e)};
  }
}

function _flushSaveQueue(){
  if(!_SAVE_RUNTIME.pending) return {ok:true,flushed:false};
  var st=_SAVE_RUNTIME.pending;
  var why=_SAVE_RUNTIME.pendingReason||'queued';
  _SAVE_RUNTIME.pending=null;
  _SAVE_RUNTIME.pendingReason='';
  return _saveState('auto',st,why);
}

function _loadState(slot,silentCorrupt){
  if(typeof localStorage==='undefined') return {ok:false,reason:'no-storage'};
  var reqSlot=slot||'auto';
  var key=_saveSlotKey(reqSlot);
  var raw=null,payload=null,mig=null,st=null,val=null;
  var now=_nowTs();
  var requestedRaw=localStorage.getItem(key);
  var requestedPayload=_safeJsonParse(requestedRaw||'');
  var requestedVal=requestedPayload?_validateSavePayload(requestedPayload):{ok:false,errors:[requestedRaw?'parse-failed':'missing']};
  if(requestedRaw&&(!requestedPayload||!requestedVal.ok)){
    _backfillStateKeys(EWR_STATE);
    EWR_STATE.saveMeta.lastCorruptTs=now;
    if(!EWR_STATE.telemetry.saveRecovery) EWR_STATE.telemetry.saveRecovery={detected:0,recovered:0,cancelled:0,bySlot:{auto:0,backup1:0,backup2:0}};
    EWR_STATE.telemetry.saveRecovery.detected=(EWR_STATE.telemetry.saveRecovery.detected||0)+1;
    _telemetryInc('loadFailures','corrupt',1);
    _telemetryInc('corruptionEvents','checksum',1);
    if(!silentCorrupt){
      var rec=_showSaveRecoveryModal(null,{requestedSlot:reqSlot});
      if(rec&&rec.action==='restore'&&rec.slot){
        var recLoad=_loadState(rec.slot,true);
        if(recLoad&&recLoad.ok){
          _backfillStateKeys(EWR_STATE);
          if(!EWR_STATE.telemetry.saveRecovery) EWR_STATE.telemetry.saveRecovery={detected:0,recovered:0,cancelled:0,bySlot:{auto:0,backup1:0,backup2:0}};
          EWR_STATE.telemetry.saveRecovery.recovered=(EWR_STATE.telemetry.saveRecovery.recovered||0)+1;
          if(!EWR_STATE.telemetry.saveRecovery.bySlot) EWR_STATE.telemetry.saveRecovery.bySlot={auto:0,backup1:0,backup2:0};
          if(EWR_STATE.telemetry.saveRecovery.bySlot[rec.slot]===undefined) EWR_STATE.telemetry.saveRecovery.bySlot[rec.slot]=0;
          EWR_STATE.telemetry.saveRecovery.bySlot[rec.slot]++;
          EWR_STATE.saveMeta.lastRecoveryTs=_nowTs();
          EWR_STATE.saveMeta.lastRecoverySource=rec.slot;
          var recMeta=_getSaveSlotMeta(rec.slot);
          var recScene=null, gm=(typeof window!=='undefined')?window.__CEHP_GAME:null;
          if(gm&&gm.scene&&gm.scene.getScenes){
            var scList=gm.scene.getScenes(true);
            if(scList&&scList.length) recScene=scList[0];
          }
          _showReceipt(recScene,'RECOVERY APPLIED',[
            'SOURCE: '+rec.slot.toUpperCase(),
            'SCENE: '+String(recMeta.scene||'unknown').toUpperCase(),
            'TIME: '+(recMeta.ts?new Date(recMeta.ts).toLocaleString():'UNKNOWN'),
            'CHECKSUM: '+(recMeta.checksumOk?'PASS':'FAIL')
          ],{autoHideMs:2200,skippable:true});
          _flushSaveQueue();
        } else {
          if(!EWR_STATE.telemetry.saveRecovery) EWR_STATE.telemetry.saveRecovery={detected:0,recovered:0,cancelled:0,bySlot:{auto:0,backup1:0,backup2:0}};
          EWR_STATE.telemetry.saveRecovery.cancelled=(EWR_STATE.telemetry.saveRecovery.cancelled||0)+1;
        }
        return recLoad;
      }
      if(!EWR_STATE.telemetry.saveRecovery) EWR_STATE.telemetry.saveRecovery={detected:0,recovered:0,cancelled:0,bySlot:{auto:0,backup1:0,backup2:0}};
      EWR_STATE.telemetry.saveRecovery.cancelled=(EWR_STATE.telemetry.saveRecovery.cancelled||0)+1;
      return {ok:false,reason:'corrupt-cancelled',validation:requestedVal};
    }
  }
  var fallbackKeys=[key];
  if(slot===undefined||slot===null||slot===''){
    fallbackKeys=[key,SAVE_KEYS.backup1,SAVE_KEYS.backup2,SAVE_KEYS.backup,SAVE_KEYS.slotA,SAVE_KEYS.slotB,SAVE_KEYS.quick];
  }
  try{
    var useKey=null;
    for(var fk=0;fk<fallbackKeys.length;fk++){
      raw=localStorage.getItem(fallbackKeys[fk]);
      if(!raw) continue;
      payload=_safeJsonParse(raw);
      if(!payload||typeof payload!=='object') continue;
      val=_validateSavePayload(payload);
      if(val.ok){ useKey=fallbackKeys[fk]; break; }
    }
    if(!raw||!payload){ _telemetryInc('loadFailures','missing',1); return {ok:false,reason:'missing'}; }
    if(!val||!val.ok){
      _telemetryInc('loadFailures','corrupt',1);
      _telemetryInc('corruptionEvents','checksum',1);
      return {ok:false,reason:'corrupt',validation:val};
    }
    mig=_migrateState(payload.state||payload,payload.version||1);
    st=mig.state;
    _backfillStateKeys(st);
    EWR_STATE=st;
    _syncRngFromState(EWR_STATE);
    EWR_STATE.saveMeta.lastScene=EWR_STATE.saveMeta.lastScene||SCENE_KEYS.boot;
    EWR_STATE.saveMeta.lastGoodSlot=
      (useKey===SAVE_KEYS.slotA?'slotA':
      useKey===SAVE_KEYS.slotB?'slotB':
      useKey===SAVE_KEYS.quick?'quick':
      useKey===SAVE_KEYS.backup1?'backup1':
      useKey===SAVE_KEYS.backup2?'backup2':'auto');

function _saveStateDiff(a,b,prefix,out){
  out=out||[];
  prefix=prefix||'root';
  if(a===b) return out;
  var ta=Object.prototype.toString.call(a),tb=Object.prototype.toString.call(b);
  if(ta!==tb){out.push(prefix+': type '+ta+' -> '+tb);return out;}
  if(ta==='[object Object]'){
    var seen={},k;
    for(k in a){if(a.hasOwnProperty(k)) seen[k]=true;}
    for(k in b){if(b.hasOwnProperty(k)) seen[k]=true;}
    for(k in seen){ if(!seen.hasOwnProperty(k)) continue; _saveStateDiff(a?a[k]:undefined,b?b[k]:undefined,prefix+'.'+k,out); }
    return out;
  }
  if(ta==='[object Array]'){
    if((a?a.length:0)!==(b?b.length:0)) out.push(prefix+'.length: '+(a?a.length:0)+' -> '+(b?b.length:0));
    var i,max=Math.max(a?a.length:0,b?b.length:0);
    for(i=0;i<max;i++) _saveStateDiff(a?a[i]:undefined,b?b[i]:undefined,prefix+'['+i+']',out);
    return out;
  }
  out.push(prefix+': '+String(a)+' -> '+String(b));
  return out;
}

function _getSaveSlotMeta(slot){

  if(!raw) return meta;
  meta.exists=true;
  var payload=_safeJsonParse(raw);
  if(!payload||typeof payload!=='object'){meta.errors.push('parse-failed');return meta;}
  meta.version=Number(payload.version)||0;
  var st=payload.state||{};
  var sm=st.saveMeta||{};
  meta.ts=sm.lastAutoSaveTs||sm.lastManualSaveTs||0;
  meta.scene=sm.lastScene||'unknown';

  return meta;
}

function _deterministicAssert(seed,steps){
  var n=Math.max(1,Math.floor(Number(steps)||64));
  var r1=[],r2=[],i;
  RNG.setSeed(seed);
  for(i=0;i<n;i++) r1.push(RNG.next());
  RNG.setSeed(seed);
  for(i=0;i<n;i++) r2.push(RNG.next());
  for(i=0;i<n;i++){ if(r1[i]!==r2[i]) return {ok:false,index:i}; }
  return {ok:true,steps:n};
}

    if(Object.prototype.toString.call(rows)!=='[object Array]'||!rows.length){ out.maps[maps[mi]]={ok:false,reason:'missing'}; out.ok=false; continue; }
    passable={}; start=null;
    for(r=0;r<rows.length;r++){
      row=rows[r];
      if(typeof row!=='string') continue;
      for(c=0;c<row.length;c++){
        ch=row.charAt(c);
        if(ch!=='#'&&ch!==' '){
          key=r+','+c;
          passable[key]=1;
          totalPass++;
          if(!start) start={r:r,c:c};
        }
      }
    }
    if(!start){ out.maps[maps[mi]]={ok:false,reason:'no-passable'}; out.ok=false; continue; }
    seen={}; q=[start]; seen[start.r+','+start.c]=1;
    for(qi=0;qi<q.length;qi++){
      cur=q[qi];
      for(nk=0;nk<dirs.length;nk++){
        nr=cur.r+dirs[nk][1];
        nc=cur.c+dirs[nk][0];
        nk2=nr+','+nc;
        if(passable[nk2]&&!seen[nk2]){ seen[nk2]=1; q.push({r:nr,c:nc}); }
      }
    }
    var passCount=0,seenCount=0,pk;
    for(pk in passable){ if(passable.hasOwnProperty(pk)) passCount++; }
    for(pk in seen){ if(seen.hasOwnProperty(pk)) seenCount++; }
    out.maps[maps[mi]]={ok:seenCount===passCount,reachable:seenCount,total:passCount,unreachable:Math.max(0,passCount-seenCount)};
    if(seenCount!==passCount) out.ok=false;
  }
  out.totalPassable=totalPass;
  return out;
}

function _renderCrashFallback(err,sceneKey){
  if(typeof window!=='undefined'){
    if(window.__cehpCrashFallbackLock) return;
    window.__cehpCrashFallbackLock=true;
  }
  var errMsg=String(err&&err.message?err.message:err||'Unknown error');
  var stackMsg='';
  if(err&&err.stack){
    try{
      stackMsg='\n'+String(err.stack).split('\n').slice(0,6).join('\n');
    }catch(_e){}
  }
  var msg='CACTUS ED CRASH SAFETY MODE\nScene: '+(sceneKey||'unknown')+'\n'+errMsg+stackMsg;
  try{
    if(typeof document!=='undefined'){
      var node=document.getElementById('cehp-crash-banner');
      if(!node){
        node=document.createElement('div');
        node.id='cehp-crash-banner';
        node.style.position='fixed';
        node.style.left='0';
        node.style.top='0';
        node.style.right='0';
        node.style.zIndex='999999';
        node.style.padding='12px';
        node.style.background='#330000';
        node.style.color='#ffeeee';
        node.style.borderBottom='2px solid #ff4444';
        node.style.fontFamily='monospace';
        node.style.whiteSpace='pre-wrap';
        document.body.appendChild(node);
      }
      node.textContent=msg;
    }
  }catch(e){}
  try{
    var gm=(typeof window!=='undefined'&&window.__CEHP_GAME)?window.__CEHP_GAME:null;
    var keys=(gm&&gm.scene&&gm.scene.keys)?gm.scene.keys:null;
    var target=(keys&&keys.Title)?'Title':((keys&&keys.FZeroMenu)?'FZeroMenu':'');
    var canRestart=true;
    if(typeof window!=='undefined'){
      if(window.__cehpCrashLastTarget===target) canRestart=false;
      else window.__cehpCrashLastTarget=target;
    }
    if(canRestart&&target&&gm&&gm.scene&&gm.scene.start) gm.scene.start(target);
  }catch(e2){}
  if(typeof window!=='undefined'){
    try{ window.setTimeout(function(){ window.__cehpCrashFallbackLock=false; window.__cehpCrashLastTarget=''; },250); }catch(e3){ window.__cehpCrashFallbackLock=false; }
  }
}

function _installCrashHooks(){
  if(typeof window==='undefined'||window._cehpCrashHooksInstalled) return;
  window._cehpCrashHooksInstalled=true;
  window.addEventListener('error',function(ev){
    var msg=String(ev&&ev.message||'');
    if(!ev.error&&msg==='Script error.'){
      try{ console.warn('[crash-hook] opaque script error ignored',ev&&ev.filename,ev&&ev.lineno,ev&&ev.colno); }catch(_e){}
      return;
    }
    _renderCrashFallback(ev.error||ev.message,ev&&ev.filename?ev.filename:'window.error');
  });
  window.addEventListener('unhandledrejection',function(ev){ _renderCrashFallback(ev.reason||'Promise rejection','unhandledrejection'); });
}

function updateCatWsState(cat, delta) {
  if(!cat.wsState){cat.wsState='normal';cat.wsTimer=2000+Math.random()*5000;cat.wsMsg='';cat.wsPhaseT=0;}
  cat.wsPhaseT=(cat.wsPhaseT||0)+delta;
  cat.wsTimer=(cat.wsTimer||3000)-delta;
  if(cat.wsTimer<=0&&!cat.following){
    var arch = cat.archetype || null;
    var wsStates = arch ? arch.wsStates : ['normal','normal','normal','speech','stare','vibrate','levitate','philosophize'];
    cat.wsState=wsStates[Math.floor(Math.random()*wsStates.length)];
    var speechPool = arch ? arch.speech : WS_CAT_SPEECH;
    cat.wsMsg=(cat.wsState==='speech'||cat.wsState==='philosophize'||cat.wsState==='stare')?speechPool[Math.floor(Math.random()*speechPool.length)]:'';
    cat.wsTimer=cat.wsState==='normal'?3500+Math.random()*5000:1500+Math.random()*2500;
    cat.wsPhaseT=0;
  }
}

function _countAdOutcomes(state){

function _uniqueOutcomeCount(state){

function _recalcMetaAchievements(scene){

function _recordAdOutcome(adId,outcome){

  if(!(outcome==='chaos'&&last&&last.outcome==='chaos'&&last.adId===adId&&Math.abs((last.ts||0)-now)<1200)){
    EWR_STATE.narrative.adLedger.push({ts:now,adId:String(adId||'unknown'),outcome:String(outcome||'sellout'),sympathySpent:0,mandelaSpent:0,modsApplied:[]});

function _nextCommercialBranch(adId,state){
  _backfillStateKeys(EWR_STATE);
  var sym=EWR_STATE.rastaCorp&&EWR_STATE.rastaCorp.sympathy||0;
  var man=EWR_STATE.rastaCorp&&EWR_STATE.rastaCorp.mandela||0;
  var cost=(BALANCE.ads&&BALANCE.ads.chaosCost)||{sympathy:1,mandela:1};
  var active=EWR_STATE.narrative&&EWR_STATE.narrative.activeRuleMods||{};
  var out='sellout';
  if(state&&state.choice) out=state.choice;
  else{
    if((active.chaosCharges||0)>0&&sym>=cost.sympathy&&man>=cost.mandela) out='chaos';
    else if(man>sym+1&&sym>=cost.sympathy&&man>=cost.mandela) out='chaos';
    else if(sym>man) out='subvert';
  }
  return out;
}

function _getCommercialForWorld(worldKey) {
  var wc = EWR_STATE.commercialsShown[worldKey] || 0;
  if(wc >= 2) return null;
  var cycle = EWR_STATE.commercialsShown._cycle || [];
  var pool = [];
  for(var i=0;i<COMMERCIALS.length;i++){
    if(cycle.indexOf(COMMERCIALS[i].id)<0) pool.push(COMMERCIALS[i]);
  }
  if(pool.length===0){
    cycle=[];
    pool=COMMERCIALS.slice();
  }
  var pick=pool[0];
  if(FEATURE_FLAGS.weightedCommercials!==false) pick=_rngWeightedChoice(pool)||pool[0];
  else pick=pool[_rngInt(pool.length)]||pool[0];
  var lastId=EWR_STATE.commercialsShown._lastAdId||'';
  if(pool.length>1&&pick.id===lastId){
    for(var ri=0;ri<pool.length;ri++){if(pool[ri].id!==lastId){pick=pool[ri];break;}}
  }
  cycle.push(pick.id);
  EWR_STATE.commercialsShown._cycle=cycle;
  return pick;
}

function _triggerCommercial(scene, returnScene, worldKey, extraData) {
  extraData=extraData||{};
  var ad=null;
  if(extraData.forceAdId){
    for(var fi=0;fi<COMMERCIALS.length;fi++){ if(COMMERCIALS[fi].id===extraData.forceAdId){ ad=COMMERCIALS[fi]; break; } }
  }
  if(!ad) ad=_getCommercialForWorld(worldKey||'w1');
  if(!ad){ _sceneTransitionSafe(scene,returnScene,extraData||{}); return; }
  EWR_STATE.commercialsShown[worldKey||'w1'] = (EWR_STATE.commercialsShown[worldKey||'w1']||0)+1;
  if(!EWR_STATE.commercialsShown._seen) EWR_STATE.commercialsShown._seen=[];
  EWR_STATE.commercialsShown._seen.push(ad.id);
  EWR_STATE.commercialsShown._lastAdId=ad.id;
  EWR_STATE.rastaCorp.commercialsSeen++;
  var payload={adId:ad.id,returnScene:returnScene,returnData:extraData||{},adBranch:_nextCommercialBranch(ad.id,{})};
  _sceneTransitionSafe(scene,'CommercialBreak',payload);
}

  var key=_normalizeBeatKey(beatKey);

  if(beaten.indexOf(key)>=0) return true;
  if(key==='rasta-boss'&&beaten.indexOf('rcboss')>=0) return true;
  return false;
}

  if(!_hasBeatKey(key)) EWR_STATE.levelsBeaten.push(key);
  if(key==='rasta-boss'&&EWR_STATE.levelsBeaten.indexOf('rcboss')<0) EWR_STATE.levelsBeaten.push('rcboss');
}

function _awardOnce(beatKey,reward,onAward){

  if(!_hasBeatKey(beatKey)){
    _markBeatKey(beatKey);
    if(reward&&reward>0){EWR_STATE.aloe+=reward;_trackAloeSource('reward:'+_normalizeBeatKey(beatKey),reward);}

    awarded=true;
    _recalcMetaAchievements(null);
  }
  if(onAward) onAward(awarded);
  return awarded;
}

  else if(type==='text') scene._disposables.texts.push(obj);
  return obj;
}

  }
  for(i=0;i<scene._disposables.texts.length;i++){
    t=scene._disposables.texts[i];
    try{ if(t&&t.destroy) t.destroy(); }catch(e){}
  }
  scene._disposables.timers.length=0;
  scene._disposables.tweens.length=0;
  scene._disposables.texts.length=0;
}

function _shouldAutoSaveTransition(nextKey){
  if(!FEATURE_FLAGS.saveSystem) return false;
  if(!nextKey) return false;
  if(nextKey.indexOf('WorldMap')===0) return true;
  if(nextKey.indexOf('Epilogue')>=0) return true;
  if(nextKey==='Title') return true;
  return false;
}

function _autoSaveForTransition(scene,nextKey){
  if(!_shouldAutoSaveTransition(nextKey)) return;
  _backfillStateKeys(EWR_STATE);
  EWR_STATE.saveMeta.lastScene=(scene&&scene.scene&&scene.scene.key)?scene.scene.key:nextKey;
  EWR_STATE.saveMeta.lastAutoSaveTs=_nowTs();
  _saveState('auto',EWR_STATE,'transition:'+nextKey);
  _flushSaveQueue();
}

function _sceneTransitionSafe(scene,nextKey,data){
  TRANSITION_METRICS.attempts++;
  if(!scene||!scene.scene||!nextKey) return false;
  if(scene._transitioning){ TRANSITION_METRICS.blocked++; return false; }
  if(_isInputLocked(scene)){ TRANSITION_METRICS.blocked++; return false; }
  var gm=(scene.game)||(scene.sys&&scene.sys.game)||((typeof window!=='undefined')?window.__CEHP_GAME:null);
  var sceneKeys=(gm&&gm.scene&&gm.scene.keys)?gm.scene.keys:null;
  if(sceneKeys&&sceneKeys[nextKey]===undefined){
    TRANSITION_METRICS.blocked++;
    if(scene._flash) scene._flash('SCENE MISSING: '+nextKey,900,22,'#ff6666');
    try{ console.warn('[sceneTransitionSafe] missing target scene:',nextKey); }catch(eWarn){}
    return false;
  }
  scene._transitioning=true;
  _lockGlobalInput();
  _autoSaveForTransition(scene,nextKey);
  var startFn=function(){
    TRANSITION_METRICS.started++;
    scene._allowImmediateStart=true;
    try{
      if(data===undefined) scene.scene.start(nextKey);
      else scene.scene.start(nextKey,data);
    }catch(eStart){
      scene._transitioning=false;
      scene._allowImmediateStart=false;
      try{ console.error('[sceneTransitionSafe] start failed for',nextKey,eStart); }catch(eLog){}
      if(scene._flash) scene._flash('TRANSITION FAILED: '+nextKey,950,22,'#ff6666');
    }finally{
      _unlockGlobalInput();
    }
  };
  if(scene.time&&scene.time.delayedCall) _safeDelayedCall(scene,0,startFn);
  else startFn();
  return true;
}

function _restartSceneAfterDeath(scene,delay,msg){
  if(!scene||scene._restartQueued) return;
  scene._restartQueued=true;
  var sk=scene.scene&&scene.scene.key?scene.scene.key:'';
  if(sk==='HandtowelScene'||sk==='MochiQueenScene'||sk==='InsulinAdmiralScene'||sk==='RastaCorpBossScene') _consumeRuleMods('boss-retry');
  _trackDeath(scene.scene&&scene.scene.key?scene.scene.key:'unknown');
  if(msg&&scene._flash) scene._flash(msg,Math.max(600,delay||2200),34,'#ffffff');
  if(!scene.time||!scene.time.delayedCall){
    EWR_STATE.health[0]=EWR_STATE.maxHealth[0];
    EWR_STATE.combo.streak=0; EWR_STATE.combo.mult=1;
    _resetPools();
    scene._restartQueued=false;
    scene.scene.restart();
    return;
  }
  _safeDelayedCall(scene,delay||2200,function(){
    EWR_STATE.health[0]=EWR_STATE.maxHealth[0];
    EWR_STATE.combo.streak=0; EWR_STATE.combo.mult=1;
    _resetPools();
    scene._restartQueued=false;
    scene.scene.restart();
  },null,scene);
}

function _clampDelta(delta){
  if(delta===undefined||delta===null||isNaN(delta)) return 16;
  if(delta<8) return 8;
  if(delta>100) return 100;
  return delta;
}

function _safeNum(v,fallback){
  return (typeof v==='number'&&isFinite(v))?v:fallback;
}

function _runSceneSanityChecks(scene){
  if(!(DEV_SANITY||FEATURE_FLAGS.sceneSanity||FEATURE_FLAGS.profiler)) return;
  if(!scene) return;
  if(DEV_SANITY||FEATURE_FLAGS.sceneSanity){
    var ep=scene.ep||scene.player||null;
    if(ep){
      ep.x=_safeNum(ep.x,0);
      ep.y=_safeNum(ep.y,0);
      ep.vx=_safeNum(ep.vx,0);
      ep.vy=_safeNum(ep.vy,0);
    }
    if(EWR_STATE&&EWR_STATE.health){
      EWR_STATE.health[0]=Math.max(0,_safeNum(EWR_STATE.health[0],EWR_STATE.maxHealth&&EWR_STATE.maxHealth[0]||3));
    }
  }
  if(FEATURE_FLAGS.profiler){
    var d=(scene.game&&scene.game.loop)?scene.game.loop.delta:16;
    _profilerSample(d);
    _drawProfiler(scene);
  }
}

// ── SOUND MODULE (Web Audio API — zero assets) ───────────────────
var SOUND = (function(){
  var ctx = null;
  function _init(){
    if(!ctx) try { ctx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){}
  }
  function _tone(type, f, f2, dur, vol, delay){
    if(!ctx) return;
    try {
      var osc=ctx.createOscillator(), gn=ctx.createGain();
      osc.connect(gn); gn.connect(ctx.destination);
      osc.type=type||'square';
      var t=ctx.currentTime+(delay||0);
      osc.frequency.setValueAtTime(f, t);
      if(f2) osc.frequency.exponentialRampToValueAtTime(Math.max(1,f2), t+dur);
      gn.gain.setValueAtTime(vol||0.18, t);
      gn.gain.exponentialRampToValueAtTime(0.0001, t+dur);
      osc.start(t); osc.stop(t+dur);
    } catch(e){}
  }
  return {
    init: _init,
    punch:   function(){ _tone('square',320,80,0.08,0.22); },
    kick:    function(){ _tone('square',160,50,0.12,0.28); },
    jump:    function(){ _tone('sine',200,500,0.14,0.15); },
    hurt:    function(){ _tone('sawtooth',440,80,0.3,0.3); },
    pickup:  function(){ _tone('sine',330,330,0.07,0.18); _tone('sine',660,660,0.08,0.18,0.14); },
    death:   function(){ _tone('sawtooth',440,55,0.9,0.35); },
    bossHit: function(){ _tone('square',60,30,0.25,0.35); },
    victory: function(){
      var notes=[262,330,392,523,659];
      for(var i=0;i<notes.length;i++){
        (function(nn,dd){ setTimeout(function(){ _tone('square',nn,nn,0.12,0.2); },dd); })(notes[i],i*100);
      }
    },
    charge: function(){ _tone('square',200,260,0.05,0.10); },
    blast:  function(){ _tone('sawtooth',120,40,0.25,0.6); }
  };
})();

    g.fillStyle(parseInt(colors.body.slice(1),16),1);
    g.fillTriangle(4,bY-16,8,bY-21,11,bY-16); g.fillTriangle(15,bY-16,19,bY-21,23,bY-16);
    // Eyes

    // Nose

    g.lineBetween(-2,bY-7,6,bY-6); g.lineBetween(-2,bY-5,6,bY-5);
    g.lineBetween(14,bY-6,22,bY-7); g.lineBetween(14,bY-5,22,bY-5);

    // Smoker cigarette
    if (smoker) {
      g.fillStyle(parseInt(AT.cigBody.slice(1),16),1); g.fillRect(17,bY-7,9,2);
      g.fillStyle(parseInt(AT.cigTip.slice(1),16),1); g.fillCircle(26,bY-6,2);
      g.fillStyle(0xffaa00,0.6); g.fillCircle(26,bY-6,1);
    }

    // Legs (not when sitting or dancing)
    if (!sitting && !dance) {
      g.fillStyle(parseInt(AT.outline.slice(1),16),1);
      g.fillRect(-8,bY+8,6,5); g.fillRect(2,bY+8,6,5); g.fillRect(8,bY+8,6,5);
      g.fillStyle(parseInt(colors.body.slice(1),16),1);
      g.fillRect(-7,bY+9,4,4); g.fillRect(3,bY+9,4,4); g.fillRect(9,bY+9,4,4);
    }

    // Tail
    g.lineStyle(4,parseInt(AT.outline.slice(1),16),1);
    g.beginPath(); g.moveTo(-10,bY+8);
    for (var i=1;i<=7;i++){var t=i/7;g.lineTo(-10-t*18,bY+8-Math.sin(tailAng+t*Math.PI)*8*t);}

    g.beginPath(); g.moveTo(-10,bY+8);
    for (var j=1;j<=7;j++){var tt=j/7;g.lineTo(-10-tt*18,bY+8-Math.sin(tailAng+tt*Math.PI)*8*tt);}
    g.strokePath();
    g.restore();
  }
};

function _raceTextureStats(){

    if(out.keysSample.length<24&&(k.indexOf('raceThumb_')===0||k.indexOf('raceTrackCache_')===0)) out.keysSample.push(k);
    keys.push(k);
  }
  var owners=reg.owners||{}, ownerClean={};

function _raceThumbTouch(key){

  var reg=_raceTextureRegistry();
  var map=reg.thumbsMap||(reg.thumbsMap={});
  var lru=reg.thumbsLRU||(reg.thumbsLRU=[]);
  map[key]={lastUse:_nowTs()};
  var i;
  for(i=lru.length-1;i>=0;i--){
    if(lru[i]===key){ lru.splice(i,1); break; }
  }
  lru.push(key);
}
function _raceThumbEvictIfNeeded(scene,keepKeys){
  var texMgr=scene&&scene.textures;
  if(!texMgr) return;
  var cfg=(BALANCE.race&&BALANCE.race.cache)||{};
  var maxKeep=Math.max(6,Math.floor(cfg.thumbMax||14));
  var reg=_raceTextureRegistry();
  var lru=reg.thumbsLRU||(reg.thumbsLRU=[]);
  var keep=keepKeys||{};
  while(lru.length>maxKeep){
    var victim=lru.shift();
    if(!victim) break;
    if(keep[victim]){
      lru.push(victim);
      continue;
    }
    if(texMgr.exists(victim)) texMgr.remove(victim);
    if(reg.thumbsMap&&reg.thumbsMap[victim]) delete reg.thumbsMap[victim];
  }
}
function _raceTrackCacheAcquire(key){

function _raceTrackCacheEvictIfNeeded(scene){
  var texMgr=scene&&scene.textures;
  if(!texMgr) return;
  var reg=_raceTextureRegistry();
  var cfg=(BALANCE.race&&BALANCE.race.cache)||{};
  var maxKeep=Math.max(2,Math.floor(cfg.trackCacheMax||8));
  var keys=[],k;
  for(k in reg.trackCaches){
    if(!reg.trackCaches.hasOwnProperty(k)) continue;
    keys.push(k);
  }
  if(keys.length<=maxKeep) return;
  keys.sort(function(a,b){
    var ta=(reg.trackCaches[a]&&reg.trackCaches[a].lastUse)||0;
    var tb=(reg.trackCaches[b]&&reg.trackCaches[b].lastUse)||0;
    return ta-tb;
  });
  var remaining=keys.length;
  for(var i=0;i<keys.length&&remaining>maxKeep;i++){
    var victim=keys[i];
    if((reg.owners&&reg.owners[victim])>0) continue;
    if(texMgr.exists(victim)) texMgr.remove(victim);
    if(reg.trackCaches&&reg.trackCaches[victim]) delete reg.trackCaches[victim];
    remaining--;
  }
}
function _raceTrackCacheRelease(scene,key){
  if(!key) return;
  var reg=_raceTextureRegistry();
  if(!reg.owners) reg.owners={};
  var n=(reg.owners[key]||0)-1;
  if(n<=0){
    delete reg.owners[key];
    if(reg.trackCaches&&reg.trackCaches[key]) reg.trackCaches[key].lastUse=_nowTs();
    _raceTrackCacheEvictIfNeeded(scene);
  }else{
    reg.owners[key]=n;
    if(reg.trackCaches&&reg.trackCaches[key]) reg.trackCaches[key].lastUse=_nowTs();
  }
}

  out.sort(function(a,b){
    if(b.points!==a.points) return b.points-a.points;
    if(a.timeMs!==b.timeMs) return a.timeMs-b.timeMs;
    return (a.id<b.id)?-1:((a.id>b.id)?1:0);

function _raceCombatSummaryBump(sum,itemType,field,amt){

  if(!sum.itemTotals[it]||typeof sum.itemTotals[it]!=='object') sum.itemTotals[it]={p:0,u:0,hD:0,hT:0,blocks:0};
  if(sum.itemTotals[it].blocks===undefined) sum.itemTotals[it].blocks=0;

  if(sum.blocksByItem[it]===undefined) sum.blocksByItem[it]=0;

function _raceCombatTryPickup(world,racer){

      _raceCombatApplyHit(world,_raceFindRacerById(world,e.ownerId)||null,r,RACE_ITEM_TYPES.MINE,cfg.slowFrames||75);

      if(ds>Math.max(1,Number(e.dsRadius||cfg.fieldDsRadius||28))) continue;

  var seed=Math.floor(rec.seed||1337)||1337;
  var packed=_raceDecodeLogFromB64(rec.logB64||'');

    difficultyKey:'NORMAL',
    simV:simV

function _raceGpSanityHeadless(opts){
  var o=opts||{};
  var cupKey=String(o.cupKey||'starter');
  var cupSource=String(o.cupSource||'RACE').toUpperCase();
  var cupTable=(cupSource==='COMBAT')?(FZERO_COMBAT_CUPS||{}):(FZERO_CUPS||{});
  var fallbackKey=(cupSource==='COMBAT')?'combat_starter':'starter';
  var cup=(cupTable&&cupTable[cupKey])?cupTable[cupKey]:(cupTable&&cupTable[fallbackKey]?cupTable[fallbackKey]:null);

  var seedBase=Math.floor(o.seed||1337)||1337;
  var runOnce=function(seedVal){
    var points={},times={},assertFails=0,hashes=[],notes=[];
    for(var ri=0;ri<Math.min(3,cup.tracks.length);ri++){
      var tk=cup.tracks[ri];
      var tr=_raceTrackWithCupOverride(tk,cup.key||cupKey||'starter');
      if(!tr) return {ok:false,error:'missing-track:'+tk};
      var raceSeed=_raceStableSeedFromParts(seedVal,cup.key||cupKey||'starter',ri,tk);
      var w=CEHP_RACE_ENGINE.createWorld(raceSeed,tr,{
        playerProfileKey:'FZERO',
        aiProfileKey:'FZERO',
        fieldCount:8,
        raceMode:(cupSource==='COMBAT')?'COMBAT':'RACE',
        difficultyKey:'NORMAL',
        simV:4,
        isGrandPrix:true,
        gpState:{cupKey:cup.key||cupKey,combatMode:(cupSource==='COMBAT')}
      });
      var log=_raceBuildLogFromGenerator({generator:o.generator||'sineSteer',frames:2800,seed:raceSeed,trackKey:tk});
      for(var fi=0;fi<2800&&w.phase!=='FINISHED';fi++){
        CEHP_RACE_ENGINE.step(w,log[fi]||RACE_NEUTRAL_FRAME_INPUT);
      }
      if(w.phase!=='FINISHED') return {ok:false,error:'gp-race-timeout:'+tk};
      if(w.asserts&&w.asserts.count>0) assertFails+=w.asserts.count;
      var rr=w.racers||[];
      for(var ii=0;ii<rr.length;ii++){
        var r=rr[ii];
        if(!r||!r.id) continue;
        points[r.id]=(points[r.id]||0)+_raceGpPointsForPosition(r.position||rr.length);
        times[r.id]=(times[r.id]||0)+Math.max(0,Math.floor((r.finishMs&&r.finishMs>0)?r.finishMs:w.telemetry.totalMs));
      }
      hashes.push(CEHP_RACE_ENGINE.stateHash(w));
      notes.push(tk+':'+(rr[0]?rr[0].id:'none'));
    }
    var standings=_raceBuildGpStandings(points,times);
    return {
      ok:standings.length>0&&assertFails===0,
      standings:standings,
      assertFails:assertFails,
      digest:_raceHashFromString(_stableStringify({points:points,times:times,hashes:hashes,notes:notes}))
    };
  };
  var a=runOnce(seedBase), b=runOnce(seedBase);
  return {
    ok:!!(a.ok&&b.ok&&a.digest===b.digest),
    cupKey:cup.key||cupKey,
    runA:a,
    runB:b
  };
}

        if((avgSlow/100)>_raceClamp(Number(qa.maxAvgSlowUptimePct||0.35),0,1)) paceViol.push('slow-high');
        if(paceViol.length){
          var oKey=tcKey+'|'+dk+'|'+paceViol.join(',');
          if(!seenOutlier[oKey]){
            seenOutlier[oKey]=1;
            out.pacingOutliers.push({trackKey:trackKey,cupKey:cupKey,difficultyKey:dk,violations:paceViol,avgHitsPerMinute:avgHits,avgUsesPerMinute:avgUses,avgSlowUptimePct:avgSlow});

    out.recommendations.push('Dominant item(s) detected; reduce weight for dominant buckets or add counter-items in those rank buckets.');
  }else{
    out.recommendations.push('Item usage spread looks healthy across tested seeds.');
  }
  if(out.pacingOutliers.length){
    out.recommendations.push('Pacing outliers detected; adjust pickup spacing/count or qa thresholds after reviewing replay traces.');
  }else{
    out.recommendations.push('Pacing metrics are within configured QA bounds for sampled runs.');
  }

}
function _raceCacheChurnProbe(opts){
  var o=opts||{};
  var cacheCfg=(BALANCE.race&&BALANCE.race.cache)||{};
  var thumbMax=Math.max(6,Math.floor(cacheCfg.thumbMax||14));
  var trackCacheMax=Math.max(2,Math.floor(cacheCfg.trackCacheMax||8));
  var passes=Math.max(1,Math.floor(o.passes||4));
  var tracks=(o.tracks&&o.tracks.length)?o.tracks:Object.keys(FZERO_TRACKS||{}).slice(0,Math.max(10,thumbMax+2));
  var thumbMap={},thumbLru=[],trackMap={},trackLru=[];
  var evictions=0,p,t,tk,sig,thumbKey,trackKey;
  for(p=0;p<passes;p++){
    for(t=0;t<tracks.length;t++){
      tk=String(tracks[t]||'westport');
      sig=_raceTrackSignatureHash(FZERO_TRACKS&&FZERO_TRACKS[tk]?FZERO_TRACKS[tk]:{key:tk});
      thumbKey='raceThumb_'+tk+'_v'+Math.max(1,Math.floor(cacheCfg.thumbKeyVersion||1))+'_'+sig;
      if(!thumbMap[thumbKey]){
        thumbMap[thumbKey]=1;
        thumbLru.push(thumbKey);
      }else{
        var idxT=thumbLru.indexOf(thumbKey);
        if(idxT>=0) thumbLru.splice(idxT,1);
        thumbLru.push(thumbKey);
      }
      while(thumbLru.length>thumbMax){
        var vT=thumbLru.shift();
        if(vT&&thumbMap[vT]){ delete thumbMap[vT]; evictions++; }
      }
      trackKey='raceTrackCache_'+tk+'_v'+Math.max(1,Math.floor(cacheCfg.trackCacheKeyVersion||1))+'_'+sig;
      if(!trackMap[trackKey]){
        trackMap[trackKey]=1;
        trackLru.push(trackKey);
      }else{
        var idxC=trackLru.indexOf(trackKey);
        if(idxC>=0) trackLru.splice(idxC,1);
        trackLru.push(trackKey);
      }
      while(trackLru.length>trackCacheMax){
        var vC=trackLru.shift();
        if(vC&&trackMap[vC]){ delete trackMap[vC]; evictions++; }
      }
    }
  }
  var tex=_raceTextureStats();
  var ok=(thumbLru.length<=thumbMax&&trackLru.length<=trackCacheMax&&tex.raceThumbCount<=thumbMax&&tex.raceTrackCacheCount<=trackCacheMax);
  return {
    ok:!!ok,
    thumbCount:Math.floor(tex.raceThumbCount||thumbLru.length||0),
    trackCacheCount:Math.floor(tex.raceTrackCacheCount||trackLru.length||0),
    evictions:Math.floor(evictions||0),
    passes:passes
  };
}
function _raceReleaseCheck(opts){

    var combatCups=o.combatCups&&o.combatCups.length?o.combatCups:['combat_starter','combat_chaos'];
    var combatGenerators=o.combatGenerators&&o.combatGenerators.length?o.combatGenerators:['idle','sineSteer'];
    var combatSimVs=o.combatSimVs&&o.combatSimVs.length?o.combatSimVs:[3,4];
    var cFrames=Math.max(300,Math.floor((o.frames!==undefined?o.frames:900)*0.67));
    for(var ci=0;ci<combatTracks.length;ci++){
      var ctk=String(combatTracks[ci]||'westport');

        var cCup=String(combatCups[cci]||'combat_starter');

          var cgen=String(combatGenerators[cg]||'sineSteer');
          for(var csv=0;csv<combatSimVs.length;csv++){
            var cSimV=_raceResolveSimV(combatSimVs[csv]);

    });
    if(!combatCup.ok) failures.push({type:'combat-cup-sanity',cupKey:(o.combatCupKey||'combat_starter'),detail:combatCup});
    else notes.push('combat-cup-sanity-ok:'+(o.combatCupKey||'combat_starter'));

    worstWorst:Number((smoke.perfSummary&&smoke.perfSummary.worstWorst)||0)

  var assertSummary={

    assertSummary:assertSummary,
    rcVersion:RACE_BUILD_RC_VERSION
  };

function _raceBaselineArtifact(opts){

  var inArr=_safeJsonParse(String(jsonStr||''));
  if(!inArr||Object.prototype.toString.call(inArr)!=='[object Array]') return {ok:false,count:0,error:'invalid-json-array'};

      name:String(s.name||('Draft '+(out.length+1))),
      ts:Math.floor(Number(s.ts)||_nowTs()),
      def:_raceDeepClone(defObj)
    });
  }
  try{
    localStorage.setItem(key,JSON.stringify(out));
    return {ok:true,count:out.length};
  }catch(e){

  }

      trackKey:o.trackKey||'westport',
      seed:seed||1337,
      frames:frames||((log&&log.length)||600),

FZeroScene.prototype._flash = function(txt,dur,sz,col){

FZeroScene.prototype._fzSetBadge=function(name,frames){
  var cfg=(BALANCE.race&&BALANCE.race.juice)||{};
  var f=Math.max(1,Math.floor(frames||cfg.badgeFrames||42));
  if(!this._statusBadgeTimers) this._statusBadgeTimers={};
  this._statusBadgeTimers[name]=Math.max(this._statusBadgeTimers[name]||0,f);
};
FZeroScene.prototype._fzTickBadges=function(){
  var t=this._statusBadgeTimers||{},k;
  for(k in t){
    if(!t.hasOwnProperty(k)) continue;
    if(t[k]>0) t[k]--;
  }
  if(this._splitPopFrames>0) this._splitPopFrames--;
  if(this._fxRings&&this._fxRings.length){
    for(var i=this._fxRings.length-1;i>=0;i--){
      var fx=this._fxRings[i];
      fx.frames--;
      if(fx.frames<=0) this._fxRings.splice(i,1);
    }
  }
};
FZeroScene.prototype._fzStatusRow=function(){
  var t=this._statusBadgeTimers||{},s=[];
  if(t.DRAFT>0) s.push('DRAFT');
  if(t.BOOST_LOCKED>0) s.push('BOOST LOCKED');
  if(t.PIT_REGEN>0) s.push('PIT REGEN');
  if(t.ROUGH>0) s.push('ROUGH');
  if(t.SLOW>0) s.push('SLOW');
  if(t.SLOWED>0) s.push('SLOWED');

FZeroScene.prototype._fzMaybeInitAudio=function(){
  if(this._audioUnlocked||!this._audioEnabled) return;
  if(typeof window==='undefined') return;
  var AC=window.AudioContext||window.webkitAudioContext;
  if(!AC) return;
  try{
    if(!this._audioCtx) this._audioCtx=new AC();
    if(this._audioCtx.state==='suspended') this._audioCtx.resume();
    this._audioUnlocked=(this._audioCtx.state==='running');
  }catch(e){}
};
FZeroScene.prototype._fzBeep=function(freq,dur,gain){
  if(!this._audioEnabled||this._reducedEffects) return;
  this._fzMaybeInitAudio();
  if(!this._audioCtx||!this._audioUnlocked) return;
  try{
    var ctx=this._audioCtx;
    var now=ctx.currentTime;
    var osc=ctx.createOscillator();
    var gn=ctx.createGain();
    osc.type='square';
    osc.frequency.value=Math.max(80,Math.min(1600,Number(freq)||440));
    gn.gain.value=0.0001;
    gn.gain.linearRampToValueAtTime(Math.max(0.0001,Math.min(0.06,Number(gain)||0.03)),now+0.005);
    gn.gain.exponentialRampToValueAtTime(0.0001,now+Math.max(0.02,Number(dur)||0.06));
    osc.connect(gn); gn.connect(ctx.destination);
    osc.start(now);
    osc.stop(now+Math.max(0.03,Number(dur)||0.06));
  }catch(e){}
};
FZeroScene.prototype._fzPushRing=function(color){

};

FZeroScene.prototype._fzEnsureRecordCapacity=function(nextLen){
  if(nextLen<=this._recordedPackedLog.length) return;
  var cap=this._recordedPackedLog.length;
  while(cap<nextLen) cap=Math.min(this._recordMaxFrames,cap*2);
  if(cap<=this._recordedPackedLog.length) return;
  var grown=new Uint16Array(cap);
  grown.set(this._recordedPackedLog.subarray(0,this._recordedPackedLen),0);
  this._recordedPackedLog=grown;
};
FZeroScene.prototype._fzRecordPackedInput=function(frameInput){
  if(!this._recordingActive||!frameInput||!frameInput.player) return;
  if(this._recordedPackedLen>=this._recordMaxFrames) return;
  this._fzEnsureRecordCapacity(this._recordedPackedLen+1);
  this._recordedPackedLog[this._recordedPackedLen++]=_racePackFrameInput(frameInput.player);
};
FZeroScene.prototype._fzReplayInputFrame=function(){
  var packed=this._packedIdle;
  if(this._replayPackedLog&&this._replayFrameIdx<this._replayPackedLog.length) packed=this._replayPackedLog[this._replayFrameIdx];
  this._replayFrameIdx++;
  _raceUnpackFrameInput(packed,this._replayInputScratch);
  return this._replayInputScratch;
};
FZeroScene.prototype._fzStepGhostWorld=function(){
  if(!this._ghostWorld||!this._ghostInputScratch) return;
  var packed=this._packedIdle;
  if(this._ghostPackedLog&&this._ghostFrameIdx<this._ghostPackedLog.length) packed=this._ghostPackedLog[this._ghostFrameIdx];
  this._ghostFrameIdx++;

FZeroScene.prototype._fzInvalidateTrackCache=function(){
  this._trackCacheBuilt=false;
  this._trackCacheKey='';
  this._trackCacheLineSig='';
  if(this._trackCacheSprite){
    this._trackCacheSprite.destroy();
    this._trackCacheSprite=null;
  }
  if(this._trackCacheTexKey) _raceTrackCacheRelease(this,this._trackCacheTexKey);
  this._trackCacheTexKey='';
};
FZeroScene.prototype._fzBuildTrackCache=function(){
  if(!FEATURE_FLAGS.raceTrackRenderCacheEnabled||!this._raceWorld||!this._raceWorld.track) return;
  var cacheCfg=(BALANCE.race&&BALANCE.race.cache)||{};
  var tr=this._raceWorld.track;
  var lineSig='off';
  if(FEATURE_FLAGS.raceRacingLineIndicatorEnabled&&tr.lineD&&tr.lineD.length){
    var lm=tr.lineMeta||{};
    var midx=Math.floor(tr.lineD.length*0.5);
    lineSig=
      Math.round((lm.maxAbsD||0)*10)+':'+
      Math.round((lm.maxDelta||0)*10)+':'+
      Math.round((tr.lineD[0]||0)*10)+':'+
      Math.round((tr.lineD[midx]||0)*10)+':'+
      ((lm.hasAnchors)?1:0);
  }
  var sigHash=_raceTrackSignatureHash(this._trackCfg||tr||{});
  var key=tr.key+'|sig:'+sigHash+'|'+tr.samples.length+'|'+tr.zones.length+'|line:'+lineSig+'|lineOn:'+(FEATURE_FLAGS.raceRacingLineIndicatorEnabled?1:0)+'|rev:'+(this._editorRevision||0);
  if(this._trackCacheBuilt&&this._trackCacheKey===key&&this._trackCacheSprite) return;
  this._fzInvalidateTrackCache();
  var samples=tr.samples||[];
  if(!samples.length) return;
  var minX=999999,maxX=-999999,minY=999999,maxY=-999999;
  for(var i=0;i<samples.length;i++){
    var sm=samples[i], hw=(sm.width||120)*0.5;
    minX=Math.min(minX,sm.x-hw-20); maxX=Math.max(maxX,sm.x+hw+20);
    minY=Math.min(minY,sm.y-hw-20); maxY=Math.max(maxY,sm.y+hw+20);
  }
  var pad=24;
  var texW=Math.max(64,Math.ceil((maxX-minX)+(pad*2)));
  var texH=Math.max(64,Math.ceil((maxY-minY)+(pad*2)));
  var offX=minX-pad, offY=minY-pad;
  var cacheV=Math.max(1,Math.floor(cacheCfg.trackCacheKeyVersion||1));
  var revSig=_raceHashFromString(key+'|'+texW+'x'+texH+'|'+Math.round(offX)+','+Math.round(offY));
  var keyTex='raceTrackCache_'+tr.key+'_v'+cacheV+'_'+revSig;
  if(this.textures&&this.textures.exists(keyTex)){
    this._trackCacheTexKey=keyTex;
    _raceTrackCacheAcquire(keyTex);
    this._trackCacheSprite=this.add.image(0,0,keyTex).setOrigin(0,0).setDepth(1);
    this._trackCacheMinX=offX;
    this._trackCacheMinY=offY;
    this._trackCachePad=pad;
    this._trackCacheLineSig=lineSig;
    this._trackCacheBuilt=true;
    this._trackCacheKey=key;
    return;
  }
  var gg=this.make.graphics({x:0,y:0,add:false});
  var zones=tr.zones||[];
  for(i=0;i<zones.length;i++){
    var z=zones[i];
    var step=28,segs=0,ss=z.s0;
    while(segs<220){
      var sNext=ss+step,stop=false;
      if(z.s0<=z.s1){ if(ss>z.s1) break; if(sNext>z.s1){ sNext=z.s1; stop=true; } }
      else{
        if(ss>=tr.lapLength&&sNext>=tr.lapLength){ ss-=tr.lapLength; sNext-=tr.lapLength; }
        if(ss<=z.s1&&sNext>z.s1){ sNext=z.s1; stop=true; }
      }
      var sm0=_raceSampleAt(tr,ss), sm1=_raceSampleAt(tr,sNext);
      var d0a=_raceClamp(z.d0,-sm0.width*0.5,sm0.width*0.5), d1a=_raceClamp(z.d1,-sm0.width*0.5,sm0.width*0.5);
      var d0b=_raceClamp(z.d0,-sm1.width*0.5,sm1.width*0.5), d1b=_raceClamp(z.d1,-sm1.width*0.5,sm1.width*0.5);
      var p0={x:sm0.x+sm0.nx*d0a-offX,y:sm0.y+sm0.ny*d0a-offY};
      var p1={x:sm0.x+sm0.nx*d1a-offX,y:sm0.y+sm0.ny*d1a-offY};
      var p2={x:sm1.x+sm1.nx*d0b-offX,y:sm1.y+sm1.ny*d0b-offY};
      var p3={x:sm1.x+sm1.nx*d1b-offX,y:sm1.y+sm1.ny*d1b-offY};
      this._fzDrawZonePattern(gg,z,p0,p1,p2,p3,segs);
      ss=sNext; segs++;
      if(stop) break;
      if(z.s0>z.s1&&ss>tr.lapLength) ss-=tr.lapLength;
      if(z.s0>z.s1&&ss>=z.s1&&ss<z.s0&&segs>8) break;
    }
  }
  for(i=0;i<samples.length;i++){
    var a=samples[i], b=samples[(i+1)%samples.length];
    var la={x:a.x+a.nx*(a.width*0.5)-offX,y:a.y+a.ny*(a.width*0.5)-offY};
    var lb={x:b.x+b.nx*(b.width*0.5)-offX,y:b.y+b.ny*(b.width*0.5)-offY};
    var ra={x:a.x-a.nx*(a.width*0.5)-offX,y:a.y-a.ny*(a.width*0.5)-offY};
    var rb={x:b.x-b.nx*(b.width*0.5)-offX,y:b.y-b.ny*(b.width*0.5)-offY};
    gg.lineStyle(3,0x2f3f66,0.95);
    gg.beginPath(); gg.moveTo(la.x,la.y); gg.lineTo(lb.x,lb.y); gg.strokePath();
    gg.beginPath(); gg.moveTo(ra.x,ra.y); gg.lineTo(rb.x,rb.y); gg.strokePath();
    if(i%2===0){
      gg.lineStyle(1,0x8ea3d7,0.45);
      gg.beginPath(); gg.moveTo(a.x-offX,a.y-offY); gg.lineTo(b.x-offX,b.y-offY); gg.strokePath();
    }
    if(i%7===0){
      gg.lineStyle(1,0xffffff,0.28);
      gg.beginPath(); gg.moveTo((la.x+ra.x)*0.5,(la.y+ra.y)*0.5); gg.lineTo((lb.x+rb.x)*0.5,(lb.y+rb.y)*0.5); gg.strokePath();
    }
  }
  if(FEATURE_FLAGS.raceRacingLineIndicatorEnabled&&tr.lineD&&tr.lineD.length){
    for(i=0;i<samples.length;i++){
      if((i%3)===1) continue;
      var ca=samples[i], cb=samples[(i+1)%samples.length];
      var da=Number(tr.lineD[i])||0;
      var db=Number(tr.lineD[(i+1)%samples.length])||0;
      var lx0=(ca.x+ca.nx*da)-offX, ly0=(ca.y+ca.ny*da)-offY;
      var lx1=(cb.x+cb.nx*db)-offX, ly1=(cb.y+cb.ny*db)-offY;
      gg.lineStyle(2,0x9fe8ff,0.35);
      gg.beginPath(); gg.moveTo(lx0,ly0); gg.lineTo(lx1,ly1); gg.strokePath();
      if((i%9)===0){
        gg.lineStyle(1,0xdff8ff,0.48);
        gg.beginPath();
        gg.moveTo(lx0-(ca.tx*2),ly0-(ca.ty*2));
        gg.lineTo(lx0+(ca.tx*2),ly0+(ca.ty*2));
        gg.strokePath();
      }
    }
  }
  var checkpoints=tr.checkpoints||[];
  for(i=0;i<checkpoints.length;i++){
    var cp=checkpoints[i], csm=_raceSampleAt(tr,cp.s), gh=Math.min((csm.width||120)*0.46,cp.radius||42);
    gg.lineStyle(2,0xf4f7ff,0.55);
    gg.beginPath();
    gg.moveTo(csm.x+csm.nx*gh-offX,csm.y+csm.ny*gh-offY);
    gg.lineTo(csm.x-csm.nx*gh-offX,csm.y-csm.ny*gh-offY);
    gg.strokePath();
  }
  gg.generateTexture(keyTex,texW,texH);
  gg.destroy();
  this._trackCacheTexKey=keyTex;
  _raceTrackCacheAcquire(keyTex);
  this._trackCacheSprite=this.add.image(0,0,keyTex).setOrigin(0,0).setDepth(1);
  this._trackCacheMinX=offX;
  this._trackCacheMinY=offY;
  this._trackCachePad=pad;
  this._trackCacheLineSig=lineSig;
  this._trackCacheBuilt=true;
  this._trackCacheKey=key;
};

FZeroScene.prototype._fzPosForRacer=function(r){
  var tr=this._raceWorld.track;

  return {x:sm.x+sm.nx*r.d,y:sm.y+sm.ny*r.d,s:sm};
};

FZeroScene.prototype._fzWorldToScreen=function(x,y,camX,camY,zoom,W,H){
  return {x:Math.floor(W*0.5+(x-camX)*zoom),y:Math.floor(H*0.5+(y-camY)*zoom)};
};

FZeroScene.prototype._fzColorForZone=function(type){
  if(type===RACE_ZONE_TYPES.BOOST_PAD) return 0xffd700;
  if(type===RACE_ZONE_TYPES.PIT) return 0x44e6ff;
  if(type===RACE_ZONE_TYPES.ROUGH) return 0x8b5a2b;
  if(type===RACE_ZONE_TYPES.DAMAGE) return 0xff4444;
  if(type===RACE_ZONE_TYPES.SLOW) return 0xaa66ff;

FZeroScene.prototype._fzResetPlayerForProfile=function(profileKey){

FZeroScene.prototype._fzNudgeProfile=function(param,delta){
  var w=this._raceWorld;
  if(!w||!w.racers||!w.racers.length) return;
  var p=w.racers[0];
  var pk=p.profile||'FZERO';
  var pf=_raceProfile(pk);
  if(!pf||pf[param]===undefined) return;
  var next=Number(pf[param]||0)+delta;
  if(param==='grip'||param==='driftGrip') next=_raceClamp(next,0.10,1.20);
  else if(param==='driftChargeRate') next=_raceClamp(next,0.05,4.0);
  else if(param==='boostAccel') next=_raceClamp(next,0,2.0);
  else if(param==='steerGain') next=_raceClamp(next,0.05,1.5);
  else if(param==='wallLoss') next=_raceClamp(next,0,0.9);
  else if(param==='vMax') next=_raceClamp(next,1.0,20.0);
  else if(param==='energyDrainRate') next=_raceClamp(next,0,1.0);
  pf[param]=next;
  console.log('[RACE TUNE]',pk,param,'=>',pf[param],_stableStringify(pf));
};
FZeroScene.prototype._fzHandleDebugKeys=function(){
  if(!FEATURE_FLAGS.raceDebugOverlay||!this._raceWorld||!this._raceWorld.racers||!this._raceWorld.racers.length) return;
  if(this._isReplay) return;
  if(FEATURE_FLAGS.raceDebugTuningRequiresModifier&&!(this.keys.alt&&this.keys.alt.isDown)) return;
  if(Phaser.Input.Keyboard.JustDown(this.keys.one)) this._fzResetPlayerForProfile('KART');
  if(Phaser.Input.Keyboard.JustDown(this.keys.two)) this._fzResetPlayerForProfile('HOVER');
  if(Phaser.Input.Keyboard.JustDown(this.keys.three)) this._fzResetPlayerForProfile('FZERO');
  var p=this._raceWorld.racers[0];
  var pk=p.profile||'FZERO';
  var mult=this.keys.shift.isDown?5:1;
  var map=null;
  if(pk==='KART'){
    map={p1:'grip',p2:'driftGrip',p3:'driftChargeRate',p4:'boostAccel',s1:0.01,s2:0.01,s3:0.05,s4:0.01};
  }else if(pk==='HOVER'){
    map={p1:'steerGain',p2:'grip',p3:'wallLoss',p4:'',s1:0.01,s2:0.01,s3:0.01,s4:0};
  }else{
    if(_raceProfile('FZERO').energyDrainRate===undefined) _raceProfile('FZERO').energyDrainRate=0.02;
    map={p1:'vMax',p2:'boostAccel',p3:'energyDrainRate',p4:'',s1:0.10,s2:0.01,s3:0.005,s4:0};
  }
  if(Phaser.Input.Keyboard.JustDown(this.keys.q)) this._fzNudgeProfile(map.p1,map.s1*mult);
  if(Phaser.Input.Keyboard.JustDown(this.keys.a)) this._fzNudgeProfile(map.p1,-map.s1*mult);
  if(Phaser.Input.Keyboard.JustDown(this.keys.w)) this._fzNudgeProfile(map.p2,map.s2*mult);
  if(Phaser.Input.Keyboard.JustDown(this.keys.s)) this._fzNudgeProfile(map.p2,-map.s2*mult);
  if(Phaser.Input.Keyboard.JustDown(this.keys.e)) this._fzNudgeProfile(map.p3,map.s3*mult);
  if(Phaser.Input.Keyboard.JustDown(this.keys.d)) this._fzNudgeProfile(map.p3,-map.s3*mult);
  if(map.p4){
    if(Phaser.Input.Keyboard.JustDown(this.keys.r)) this._fzNudgeProfile(map.p4,map.s4*mult);
    if(Phaser.Input.Keyboard.JustDown(this.keys.f)) this._fzNudgeProfile(map.p4,-map.s4*mult);
  }
};
FZeroScene.prototype._fzUpdateTopDownCamera=function(playerPos,playerSample,player){
  var baseZoom=this._trackCfg.zoom||1.06;
  var pf=_raceProfile(player.profile||'FZERO');
  var vNorm=_raceClamp(player.v/Math.max(0.001,pf.vMax||9),0,1);
  var look=28+(vNorm*120);
  var tx=playerPos.x+playerSample.tx*look;
  var ty=playerPos.y+playerSample.ty*look*0.72;
  if(this._worldCam.frameInit!==true){
    this._worldCam.x=tx;
    this._worldCam.y=ty;
    this._worldCam.zoom=baseZoom;
    this._worldCam.frameInit=true;
  }else{
    this._worldCam.x+=(tx-this._worldCam.x)*0.14;
    this._worldCam.y+=(ty-this._worldCam.y)*0.14;
    var targetZoom=_raceClamp(baseZoom-(vNorm*0.13),0.82,baseZoom+0.02);
    this._worldCam.zoom+=(targetZoom-this._worldCam.zoom)*0.10;
  }
};
FZeroScene.prototype._fzDrawZonePattern=function(g,z,p0,p1,p2,p3,segIdx){
  var clr=this._fzColorForZone(z.type);
  g.fillStyle(clr,0.14);
  g.beginPath();
  g.moveTo(p0.x,p0.y); g.lineTo(p1.x,p1.y); g.lineTo(p3.x,p3.y); g.lineTo(p2.x,p2.y); g.closePath();
  g.fillPath();
  g.lineStyle(1,clr,0.72);
  if(z.type===RACE_ZONE_TYPES.BOOST_PAD){
    g.beginPath(); g.moveTo(p0.x,p0.y); g.lineTo(p3.x,p3.y); g.strokePath();
    if((segIdx%2)===0){ g.beginPath(); g.moveTo((p0.x+p2.x)*0.5,(p0.y+p2.y)*0.5); g.lineTo((p1.x+p3.x)*0.5,(p1.y+p3.y)*0.5); g.strokePath(); }
  }else if(z.type===RACE_ZONE_TYPES.PIT){
    var cx=(p0.x+p1.x+p2.x+p3.x)*0.25, cy=(p0.y+p1.y+p2.y+p3.y)*0.25;
    g.fillStyle(clr,0.65); g.fillCircle(cx,cy,1.8);
    g.fillCircle((p0.x+p3.x)*0.5,(p0.y+p3.y)*0.5,1.4);
  }else if(z.type===RACE_ZONE_TYPES.ROUGH){
    var n=Math.sin((segIdx+1)*12.9898)*43758.5453;

FZeroScene.prototype._fzNearestControlPoint=function(wx,wy){

  var best=-1,bestD=1e18;
  for(var i=0;i<cps.length;i++){
    var cp=cps[i];
    var dx=(cp.x-wx), dy=(cp.y-wy);
    var d=(dx*dx)+(dy*dy);

  }
  return {idx:best,dist:(bestD>=0&&bestD<1e18)?Math.sqrt(bestD):99999};
};
FZeroScene.prototype._fzNearestSample=function(wx,wy){
  var tr=this._raceWorld&&this._raceWorld.track?this._raceWorld.track:null;
  var arr=tr&&tr.samples?tr.samples:[];
  var best=-1,bestD=1e18;
  for(var i=0;i<arr.length;i++){
    var sm=arr[i];
    var dx=(sm.x-wx), dy=(sm.y-wy);
    var d=(dx*dx)+(dy*dy);
    if(d<bestD){ bestD=d; best=i; }
  }
  return {idx:best,dist:(bestD>=0&&bestD<1e18)?Math.sqrt(bestD):99999};

FZeroScene.prototype._fzMouseTrackProjection=function(wx,wy){

  var sm=tr.samples[ns.idx];

FZeroScene.prototype._fzEditorDraftSlotsLoad=function(){

        ts:Math.floor(Number(slot.ts)||_nowTs()),
        def:_raceDeepClone(defObj)
      });

      out.sort(function(a,b){ return (a.ts||0)-(b.ts||0); });

    }
    return out;
  }catch(e){ return []; }

FZeroScene.prototype._fzEditorNormalizePickups=function(){
  if(!this._trackCfg) return false;
  var tr=this._raceWorld&&this._raceWorld.track?this._raceWorld.track:null;
  if(!tr||!tr.samples||!tr.samples.length) return false;
  var src=this._fzEditorGetPickupArray(false)||[];
  var lap=Math.max(1,tr.lapLength||1);
  var norm=[],i,pk,sVal,sm,half,safe,dVal;
  for(i=0;i<src.length;i++){
    pk=src[i]||{};
    sVal=_raceWrap(Number(pk.s)||0,lap);
    sm=_raceSampleAt(tr,sVal);
    half=Math.max(0,(Number(sm.width)||120)*0.5);
    safe=Math.max(0,half-8);
    dVal=_raceClamp(Number(pk.d)||0,-safe,safe);
    norm.push({s:sVal,d:dVal,kind:String(pk.kind||'ITEM_BOX').toUpperCase()});
  }
  norm.sort(function(a,b){
    if(a.s!==b.s) return a.s-b.s;
    if(a.d!==b.d) return a.d-b.d;
    return (a.kind<b.kind)?-1:((a.kind>b.kind)?1:0);
  });
  var dedup=[];
  var minDs=40;
  for(i=0;i<norm.length;i++){
    var keep=true;
    if(dedup.length){
      var prev=dedup[dedup.length-1];
      var ds=Math.abs(_raceDeltaSWrap(prev.s,norm[i].s,lap));
      if(ds<minDs&&Math.abs((prev.d||0)-(norm[i].d||0))<14){
        keep=false;
      }
    }
    if(keep) dedup.push(norm[i]);
  }
  if(dedup.length>1){
    var dsWrap=Math.abs(_raceDeltaSWrap(dedup[0].s,dedup[dedup.length-1].s,lap));
    if(dsWrap<minDs&&Math.abs((dedup[0].d||0)-(dedup[dedup.length-1].d||0))<14){
      dedup.pop();
    }
  }
  this._fzEditorSetPickupArray(dedup);
  return true;
};
FZeroScene.prototype._fzEditorAutoPlacePickups=function(){
  if(!this._trackCfg) return false;
  var tr=this._raceWorld&&this._raceWorld.track?this._raceWorld.track:null;
  if(!tr||!tr.samples||!tr.samples.length) return false;
  var lap=Math.max(1,tr.lapLength||1);
  var samples=tr.samples||[];
  var targetCount=_raceClamp(Math.floor(lap/420),6,16);
  var step=lap/targetCount;
  var picks=[],k,j,baseS,candS,idx,curv,sm,score,bestS,bestScore,lineD,half,safe,dVal;
  for(k=0;k<targetCount;k++){
    baseS=_raceWrap((k+0.42)*step,lap);
    bestS=baseS;
    bestScore=1e9;
    for(j=-3;j<=3;j++){
      candS=_raceWrap(baseS+(j*(step/8)),lap);
      idx=Math.floor((candS/lap)*samples.length);
      if(idx<0) idx=0;
      if(idx>=samples.length) idx=samples.length-1;
      sm=samples[idx];
      curv=Math.abs(_raceCurvatureAtSample(samples,idx));
      score=curv+Math.max(0,(112-(Number(sm.width)||120))*0.006)+(Math.abs(j)*0.003);
      if(score<bestScore){
        bestScore=score;
        bestS=candS;
      }
    }
    sm=_raceSampleAt(tr,bestS);
    lineD=_raceLineAtS(tr,bestS);
    half=Math.max(0,(Number(sm.width)||120)*0.5);
    safe=Math.max(0,half-8);
    dVal=_raceClamp(lineD+((k%2===0)?-10:10),-safe,safe);
    picks.push({s:bestS,d:dVal,kind:'ITEM_BOX'});
  }
  this._fzEditorSetPickupArray(picks);
  this._fzEditorNormalizePickups();
  return true;
};
